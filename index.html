<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>峇里島陽光與海灘存錢計劃</title>
    <style>
        :root {
            --primary-color: #0077b6;
            --accent-color: #00b4d8;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --checked-bg: #a7c957;
            --checked-text: #386641;
            --text-color: #333333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.6rem;
            margin: 0 0 5px 0;
            letter-spacing: 1px;
        }

        header p {
            font-size: 0.85rem;
            color: #666;
            margin: 0;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .stat-card {
            text-align: center;
            padding: 5px 0;
        }

        .stat-card h3 {
            margin: 0 0 3px 0;
            font-size: 0.8rem;
            color: #777;
        }

        .stat-card p {
            margin: 0;
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .month-column {
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            border: 1px solid #e1e8ed;
            overflow: hidden;
        }

        .month-header {
            background: #e0f2fe;
            color: #0369a1;
            padding: 12px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
            border-bottom: 1px solid #bae6fd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-target {
            font-size: 0.8rem;
            color: #0e7490;
            font-weight: 500;
        }

        .days-list {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .day-cell {
            padding: 12px 0;
            text-align: center;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: bold;
            color: #475569;
            transition: all 0.1s ease;
            user-select: none;
        }

        .day-cell.checked {
            background-color: var(--checked-bg) !important;
            color: var(--checked-text) !important;
            border-color: #7a9a46;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>峇里島陽光與海灘存錢計劃</h1>
        <p>每天一點點，離陽光海灘更近一步！🌴</p>
    </header>

    <div class="dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid #f1f5f9; padding-bottom: 10px;">
            <h3>目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.8rem; color: #059669;">$0</p>
        </div>
        <div class="stat-card" style="margin-top: 5px;">
            <h3>已完成天數</h3>
            <p id="days-count">0 / 365 天</p>
        </div>
        <div class="stat-card" style="margin-top: 5px;">
            <h3>目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
</div>

<script>
    const monthsData = [
        { name: "一月", target: "存下 496 元", start: 1, end: 31 },
        { name: "二月", target: "存下 1274 元", start: 32, end: 59 },
        { name: "三月", target: "存下 2325 元", start: 60, end: 90 },
        { name: "四月", target: "存下 3165 元", start: 91, end: 120 },
        { name: "五月", target: "存下 4216 元", start: 121, end: 151 },
        { name: "六月", target: "存下 4995 元", start: 152, end: 181 },
        { name: "七月", target: "存下 6107 元", start: 182, end: 212 },
        { name: "八月", target: "存下 7068 元", start: 213, end: 243 },
        { name: "九月", target: "存下 7755 元", start: 244, end: 273 },
        { name: "十月", target: "存下 8959 元", start: 274, end: 304 },
        { name: "十一月", target: "存下 9585 元", start: 305, end: 334 },
        { name: "十二月", target: "存下 10850 元", start: 335, end: 365 }
    ];

    let checkedDays = JSON.parse(localStorage.getItem('365_savings_progress')) || [];
    const gridContainer = document.getElementById('months-grid');

    function renderGrid() {
        gridContainer.innerHTML = '';
        
        monthsData.forEach(month => {
            const col = document.createElement('div');
            col.className = 'month-column';

            const header = document.createElement('div');
            header.className = 'month-header';
            header.innerHTML = `<span>${month.name}</span><span class="month-target">${month.target}</span>`;
            col.appendChild(header);

            const daysList = document.createElement('div');
            daysList.className = 'days-list';

            for (let i = month.start; i <= month.end; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerText = i;
                
                if (checkedDays.includes(i)) {
                    cell.classList.add('checked');
                }

                cell.addEventListener('click', () => toggleDay(i, cell));
                daysList.appendChild(cell);
            }

            col.appendChild(daysList);
            gridContainer.appendChild(col);
        });

        updateDashboard();
    }

    function toggleDay(dayAmount, element) {
        const index = checkedDays.indexOf(dayAmount);
        if (index === -1) {
            checkedDays.push(dayAmount);
            element.classList.add('checked');
        } else {
            checkedDays.splice(index, 1);
            element.classList.remove('checked');
        }
        
        localStorage.setItem('365_savings_progress', JSON.stringify(checkedDays));
        updateDashboard();
    }

    function updateDashboard() {
        const totalSaved = checkedDays.reduce((sum, val) => sum + val, 0);
        const daysCount = checkedDays.length;
        const progressPercent = ((daysCount / 365) * 100).toFixed(1);

        document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        document.getElementById('days-count').innerText = `${daysCount} / 365 天`;
        document.getElementById('progress-percent').innerText = `${progressPercent}%`;
    }

    renderGrid();
</script>

</body>
</html>
