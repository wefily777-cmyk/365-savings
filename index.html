<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳 (網頁版)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0077b6 0%, #00b4d8 100%);
            --btn-gradient: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            --bg-color: #f4f7fa;
            --card-bg: rgba(255, 255, 255, 0.85);
            --checked-bg: linear-gradient(135deg, #a7c957 0%, #8cae42 100%);
            --checked-text: #ffffff;
            --text-color: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.05);
            --cell-bg: #ffffff;
            --cell-text: #334155;
            --water-color: linear-gradient(180deg, #4ea8de 0%, #0077b6 100%);
            --app-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            --inner-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
            --glass-blur: 12px;
        }

        /* 🌙 修正夜間模式：強制將文字轉為高對比的淺色，避免被主題色吃掉 */
        body.midnight-mode {
            --card-bg: rgba(19, 28, 46, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --cell-bg: #1a2438;
            --cell-text: #cbd5e1;
            --app-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --text-color: #f8fafc !important; 
            --text-muted: #94a3b8 !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            margin: 0;
            padding: 20px 16px;
            background-color: var(--bg-color);
            -webkit-tap-highlight-color: transparent;
            transition: background 0.5s ease, color 0.5s ease;
            letter-spacing: -0.2px;
        }

        .container { max-width: 480px; margin: 0 auto; }
        
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.4rem; font-weight: 800; color: var(--text-color); margin: 0; }
        .gear-btn { background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.2rem; padding: 8px 12px; border-radius: 14px; cursor: pointer; box-shadow: var(--app-shadow); transition: transform 0.2s; color: var(--text-color); }
        .gear-btn:active { transform: scale(0.92) rotate(30deg); }

        .mode-selector-box {
            background: var(--card-bg); padding: 14px; border-radius: 20px; margin-bottom: 12px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { color: var(--text-color); font-size: 0.85rem; font-weight: 700; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.04); color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; font-weight: 700; outline: none; }
        body.midnight-mode .mode-select { background-color: rgba(255,255,255,0.06); }

        .daily-wisdom-card {
            background: var(--card-bg); padding: 16px; border-radius: 20px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: all 0.5s ease; position: relative; color: var(--text-color);
        }
        .wisdom-header-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.6; margin-bottom: 8px; }
        .wisdom-text { font-size: 0.95rem; line-height: 1.5; font-weight: 700; text-align: left; margin-bottom: 6px; }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.7; font-weight: bold; }
        .wisdom-refresh-btn { background: none; border: none; font-size: 0.9rem; cursor: pointer; padding: 4px; opacity: 0.6; transition: transform 0.3s; color: var(--text-color); }
        .wisdom-refresh-btn:active { transform: rotate(180deg); }

        .config-sub-panel { display: none; background-color: rgba(0,0,0,0.03); padding: 12px; border-radius: 14px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); }
        .config-flex-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; width: 100%; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 10px; padding: 8px; font-weight: 700; text-align: center; outline: none; }

        .target-progress-box { 
            background: var(--card-bg); padding: 18px; border-radius: 24px; box-shadow: var(--app-shadow); margin-bottom: 16px; border: 1px solid var(--border-color); 
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; color: var(--text-color); }
        .target-input { flex: 1; border: none; border-radius: 12px; padding: 10px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.04); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }
        body.midnight-mode .target-input { background-color: rgba(255,255,255,0.06); }

        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 42px; border-radius: 16px; margin: 12px 0 14px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        body.midnight-mode .water-bottle-container { background-color: rgba(255,255,255,0.06); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 14px 0 0 14px; width: 0%; transition: width 0.8s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 14px; }
        .water-floating-runner { position: absolute; right: -16px; top: -26px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 2.5s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 600; background-color: rgba(0,0,0,0.03); padding: 12px 16px; border-radius: 14px; margin-top: 10px; min-height: 38px; display: flex; align-items: center; justify-content: center; line-height: 1.4; box-shadow: var(--inner-shadow); }
        body.midnight-mode .blueprint-status { background-color: rgba(255,255,255,0.05); }

        .app-journal-box { 
            display: none; background: var(--card-bg); border-radius: 24px; padding: 18px; margin-bottom: 16px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); 
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; color: var(--text-color); }
        
        .patch-toggle-btn { background-color: rgba(0,0,0,0.04); color: var(--text-color); border: 1px solid var(--border-color); width: 100%; padding: 10px; border-radius: 12px; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        body.midnight-mode .patch-toggle-btn { background-color: rgba(255,255,255,0.06); }
        .manual-patch-box { display: none; background-color: rgba(0,0,0,0.03); padding: 12px; border-radius: 14px; margin-bottom: 14px; flex-direction: column; gap: 10px; box-shadow: var(--inner-shadow); }
        .patch-form { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .patch-btn { background: var(--btn-gradient); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-weight: 700; cursor: pointer; }

        .journal-container-list { max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 12px 16px; border-radius: 14px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); color: var(--text-color); }
        .journal-row-card.patched-card { border-left: 4px solid #10b981; }
        
        .journal-left-info { display: flex; flex-direction: column; gap: 4px; }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #0284c7; background-color: rgba(2, 132, 199, 0.1); padding: 2px 8px; border-radius: 6px; width: fit-content; }
        .j-day-tag.patch-tag { color: #10b981; background-color: rgba(16, 185, 129, 0.1); }
        .j-day-tag.birthday-tag { color: #db2777; background-color: rgba(219, 39, 119, 0.1); }
        .j-date-text { font-size: 0.85rem; color: var(--text-muted); font-weight: 600; }
        .journal-right-flex { display: flex; align-items: center; gap: 12px; }
        .journal-right-amt { font-size: 1.15rem; font-weight: 800; color: #10b981; }
        .journal-delete-btn { background-color: rgba(239, 68, 68, 0.08); border: none; color: #ef4444; font-size: 0.85rem; cursor: pointer; padding: 6px; border-radius: 8px; }

        .random-box { 
            background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 24px; margin-bottom: 16px; box-shadow: var(--app-shadow); 
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .random-title { font-size: 0.85rem; font-weight: 800; color: var(--text-color); opacity: 0.7; letter-spacing: 0.5px; margin-bottom: 10px; }
        .celebrity-info { font-size: 1.05rem; color: var(--text-color); margin-bottom: 16px; min-height: 48px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: 700; text-align: center; }
        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 14px 36px; font-size: 0.95rem; font-weight: 800; border-radius: 16px; cursor: pointer; box-shadow: 0 8px 20px rgba(2, 132, 199, 0.2); width: 100%; transition: all 0.2s; }

        .dashboard { 
            background: var(--card-bg); padding: 16px; border-radius: 24px; box-shadow: var(--app-shadow); margin-bottom: 20px; border: 1px solid var(--border-color); 
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
        }
        .stat-card { text-align: center; padding: 6px 0; }
        .stat-card h3 { margin: 0 0 4px 0; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        .stat-card p { margin: 0; font-size: 1.3rem; font-weight: 800; color: var(--text-color); }

        .grid-container { display: flex; flex-direction: column; gap: 18px; }
        .month-column { 
            background: var(--card-bg); border-radius: 22px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; 
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .month-header { background: rgba(0,0,0,0.02); color: var(--text-color); padding: 14px 16px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        body.midnight-mode .month-header { background: rgba(255,255,255,0.03); }
        .month-target { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.2s ease; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 4px 10px rgba(167, 201, 87, 0.25); border-color: transparent; }
        .day-cell.readonly-lock { cursor: default; }

        .settings-panel-box { display: flex; flex-direction: column; gap: 16px; text-align: left !important; }
        .settings-row-title { font-size: 0.85rem; font-weight: 800; color: var(--text-color); opacity: 0.6; margin-bottom: 6px; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .settings-item-btn { background: rgba(0,0,0,0.04); border: 1px solid var(--border-color); padding: 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        body.midnight-mode .settings-item-btn { background: rgba(255,255,255,0.05); }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.4s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: var(--cell-bg); border-radius: 28px; padding: 24px; width: 85%; max-width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); text-align: center; border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.4s; }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
        .custom-modal-text { font-size: 1rem; line-height: 1.5; color: var(--text-color); margin-bottom: 24px; white-space: pre-line; font-weight: 700;}
        .custom-modal-btn-group { display: flex; gap: 12px; }
        .custom-modal-btn { background: var(--btn-gradient); color: white; border: none; padding: 12px 24px; font-size: 0.95rem; font-weight: 800; border-radius: 14px; cursor: pointer; flex: 1; }
        .custom-modal-btn.cancel-btn { background: rgba(0,0,0,0.05); color: var(--text-color); border: 1px solid var(--border-color); }
        body.midnight-mode .custom-modal-btn.cancel-btn { background: rgba(255,255,255,0.05); }

        .prompt-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 10000; opacity: 0; pointer-events: none; }
        .prompt-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .prompt-modal { background-color: var(--cell-bg); border-radius: 28px; padding: 24px; width: 85%; max-width: 300px; text-align: center; border: 1px solid var(--border-color); }
        .prompt-title { font-weight: 800; margin-bottom: 14px; color: var(--text-color); }
        .prompt-input-box { width: 90%; padding: 12px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.04); color: var(--text-color); border-radius: 12px; font-size: 1.2rem; text-align: center; font-weight: 800; margin-bottom: 18px; outline: none; }
        body.midnight-mode .prompt-input-box { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="mode-selector-box">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <div class="config-flex-row">
                <span id="lbl-custom-amt">🔧 設定自訂面額：</span>
                <div>
                    <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:65px;" value="100">
                    <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:8px 12px; font-weight:bold; border-radius:8px; color:white; font-size:0.8rem; margin-left:4px;" onclick="applyCustomFixedAmount()">套用</button>
                </div>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <div class="config-flex-row">
                <span id="lbl-start-date">📅 起始日期：</span>
                <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
                <span id="journal-end-date-display" style="color: var(--text-muted); font-size:0.8rem;">結束：--</span>
            </div>
        </div>
    </div>

    <div class="daily-wisdom-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="wisdom-refresh-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="target-progress-box">
        <div class="target-input-group">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標</span>
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" oninput="saveTargetGoal(); updateDashboard();">
        </div>

        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>

        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-journal-box" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>

        <button class="patch-toggle-btn" onclick="togglePatchBox()">
            <span id="lbl-expand-tool">➕ 展開補帳與多人同步工具</span>
        </button>
        
        <div class="manual-patch-box" id="manual-patch-expand-area">
            <div class="patch-form">
                <div>
                    <span style="font-size:0.8rem; color:var(--text-muted);" id="lbl-patch-date">日期：</span>
                    <input type="date" id="patch-date-input" class="config-input" style="font-size:0.8rem; padding:6px;">
                </div>
                <div>
                    <span style="font-size:0.8rem; color:var(--text-muted);" id="lbl-patch-amt">面額：</span>
                    <select id="patch-amount-select" class="config-input" style="font-size:0.8rem; padding:6px; background:var(--cell-bg); color:var(--text-color);">
                    </select>
                </div>
                <button class="patch-btn" onclick="executeManualPatch()" id="btn-patch-submit">登載</button>
            </div>
        </div>

        <div class="journal-container-list" id="journal-list-render-target">
        </div>
    </div>

    <div class="random-box" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display">開啟今日驚喜儲蓄任務...</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.7rem; color: #10b981;">$0</p>
        </div>
        <div class="stat-card">
            <h3 id="label-completed-unit">已完成天數</h3>
            <p id="days-count">0 / 365 天</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal" style="max-width: 340px;">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div style="margin-top: 4px;">

    // 🎵 【淨化版】背景音樂引擎：移除了詭異的微小頻差，全面換成溫暖、和諧的 SPA 冥想純律和弦
    let audioCtx = null;
    let mainLfoNode = null;
    let mainGainNode = null;
    let oscillatorNodesPool = [];

    function startSpiritualBgmEngine() {
        if (!isBgmEnabled) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            stopSpiritualBgmEngine(false); 

            let baseFreq = THEME_CONTENT_BANK[activeThemeKey].audioFreq;

            // 加入低通濾波器 (Lowpass Filter)，把尖銳的電子音過濾掉，變得悶悶的、非常溫暖
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 450; 
            filter.connect(audioCtx.destination);

            mainGainNode = audioCtx.createGain();
            mainGainNode.gain.setValueAtTime(0, audioCtx.currentTime); 
            mainGainNode.gain.linearRampToValueAtTime(0.08, audioCtx.currentTime + 4); // 像日出一樣，4秒鐘超輕柔淡入
            mainGainNode.connect(filter);

            // 用 LFO 製造超慢速的呼吸感 (Tremolo)，每 12.5 秒起伏一次
            mainLfoNode = audioCtx.createOscillator();
            mainLfoNode.type = 'sine';
            mainLfoNode.frequency.setValueAtTime(0.08, audioCtx.currentTime); 
            const lfoGain = audioCtx.createGain();
            lfoGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            mainLfoNode.connect(lfoGain);
            lfoGain.connect(mainGainNode.gain);
            mainLfoNode.start();

            // 完全不刺耳的和諧純律 (Root, P5, Octave)，聽起來非常莊嚴平靜
            let chords = [1, 1.5, 2]; // 經典款：根音、完全五度、八度
            if (activeThemeKey === 'buddhism') chords = [1, 1.333, 1.5]; // 禪心：懸留和弦，有東方空靈感
            else if (activeThemeKey === 'rainbow') chords = [1, 1.25, 1.5]; // 彩虹：大三和弦，溫暖充滿希望
            else if (activeThemeKey === 'gospel') chords = [0.5, 1, 1.5]; // 恩典：極低頻墊底，如同教堂管風琴

            chords.forEach((ratio) => {
                const osc = audioCtx.createOscillator();
                osc.type = 'sine'; // 捨棄三角波，全部採用最圓潤的正弦波
                osc.frequency.setValueAtTime(baseFreq * ratio, audioCtx.currentTime);
                osc.connect(mainGainNode);
                osc.start();
                oscillatorNodesPool.push(osc);
            });

        } catch(e) { console.log("等待互動解鎖音訊"); }
    }

    // 優雅淡出，不會發出「啪」的斷電聲
    function stopSpiritualBgmEngine(clearState = true) {
        if (clearState) {
            isBgmEnabled = false;
            localStorage.setItem('bgm_engine_enabled', 'false');
            updateBgmBtnUI();
        }
        if (!mainGainNode || !audioCtx) return;
        
        const time = audioCtx.currentTime;
        mainGainNode.gain.cancelScheduledValues(time);
        mainGainNode.gain.setValueAtTime(mainGainNode.gain.value, time);
        mainGainNode.gain.exponentialRampToValueAtTime(0.0001, time + 0.5); // 0.5秒緩緩淡出
        
        const currentOscs = oscillatorNodesPool;
        const lfo = mainLfoNode;
        
        setTimeout(() => {
            try {
                currentOscs.forEach(o => o.stop());
                if (lfo) lfo.stop();
            } catch(e){}
        }, 600);

        oscillatorNodesPool = [];
        mainLfoNode = null;
        mainGainNode = null;
    }

    function playThemeSound() {
        try {

            const gain = ctx.createGain();
            const config = THEME_CONTENT_BANK[activeThemeKey] || THEME_CONTENT_BANK['classic'];
            
            osc.type = 'sine'; // 改用溫潤單音
            osc.frequency.setValueAtTime(config.audioFreq * 4, ctx.currentTime); // 提高音階當作輕脆的提示音
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.3);
        } catch(e){}
    }

            showStandardAlert(LANG_DICTIONARY[currentLang].alertRepeat); return;

        const newPatchCard = {
            dayIndex: journalListHistory.length + 1,
            dateStr: dateVal,
            amount: amtVal,
            isPatched: true
        };

        journalListHistory.push(newPatchCard);
        localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
        playThemeSound();
        renderGrid();
    }

        } else {

                let monthTargetText = ""; let totalDaysInMonth = month.end - month.start + 1;
                
                if (currentMode === '365_阶梯' || isJournalStyle) {
                    let sum = 0; for(let d=month.start; d<=month.end; d++) sum += d;
                    monthTargetText = `$${sum}`;
                } else if (currentMode === 'custom_fixed') {
                    monthTargetText = `$${totalDaysInMonth * currentCustomFixedAmt}`;
                }

                const header = document.createElement('div'); header.className = 'month-header';
                header.innerHTML = `<span>${mName}</span><span class="month-target">${monthTargetText}</span>`;
                col.appendChild(header);

                const daysList = document.createElement('div'); daysList.className = 'days-list';

                for (let i = month.start; i <= month.end; i++) {
                    const cell = document.createElement('div'); cell.className = 'day-cell'; cell.id = `day-${i}`;
                    
                    if (currentMode === '365_阶梯' || isJournalStyle) {
                        cell.innerText = i;
                        if (isJournalStyle) {
                            cell.classList.add('readonly-lock'); 
                            if (journalListHistory.some(card => card.amount === i)) cell.classList.add('checked');
                        } else {
                            if (checkedDays365.includes(i)) cell.classList.add('checked');
                        }
                    } else if (currentMode === 'custom_fixed') {
                        cell.innerText = `$${currentCustomFixedAmt}`; if (checkedDaysCustom.includes(i)) cell.classList.add('checked');
                    } else {
                        if (隨喜Map[i]) {
                            cell.innerHTML = `<span style="font-size:0.75rem; display:block; opacity:0.6;">D${i}</span>$${隨喜Map[i]}`;
                            cell.classList.add('checked');
                        } else { cell.innerHTML = `<span style="font-size:0.75rem; opacity:0.4; display:block;">D${i}</span>💸`; }
                    }

                    if (!isJournalStyle) { cell.addEventListener('click', () => toggleDayOrWeek(i, cell)); }
                    daysList.appendChild(cell); cellsMap[i] = cell;
                }
                col.appendChild(daysList); gridContainer.appendChild(col);
            });
        }
        loadTargetGoal();
        
        selectThemeStyle(activeThemeKey);
    }

    function toggleDayOrWeek(id, element) {
        if (currentMode === '隨喜') {
            if (隨喜Map[id]) {
                delete 隨喜Map[id];
                element.innerHTML = `<span style="font-size:0.75rem; opacity:0.4; display:block;">D${id}</span>💸`;
                element.classList.remove('checked');
                localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map));
                playThemeSound(); updateDashboard();
            } else {
                openPromptModal(`💖 Day ${id}`, "100", function(inputAmt) {
                    let amt = parseInt(inputAmt) || 0;
                    if (amt > 0) {
                        隨喜Map[id] = amt;
                        element.innerHTML = `<span style="font-size:0.75rem; display:block; opacity:0.6;">D${id}</span>$${amt}`;
                        element.classList.add('checked');
                        localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map));
                        playThemeSound(); updateDashboard();
                    }
                });
            }
            return;
        }

        let arr = []; let key = "";
        if (currentMode === '365_阶梯') { arr = checkedDays365; key = '365_savings_progress'; }
        else if (currentMode === 'custom_fixed') { arr = checkedDaysCustom; key = 'custom_fixed_savings_progress'; }
        else if (currentMode === 'week_52') { arr = checkedWeeks52; key = 'week_52_savings_progress'; }

        const idx = arr.indexOf(id);
        if (idx === -1) { arr.push(id); element.classList.add('checked'); }
        else { arr.splice(idx, 1); element.classList.remove('checked'); }
        
        localStorage.setItem(key, JSON.stringify(arr));
        playThemeSound();
        updateDashboard();
        triggerMilestoneCelebration(arr.length);
    }

    function updateDashboard() {
        let totalSaved = 0; let daysCount = 0; let maxUnits = 365;
        let hasBirthdayBonus = false; 
        
        const isJournalStyle = (currentMode==='365_journal');

        if (currentMode === '365_阶梯') {
            totalSaved = checkedDays365.reduce((sum, val) => sum + val, 0);
            daysCount = checkedDays365.length;
        } else if (isJournalStyle) {
            totalSaved = journalListHistory.reduce((sum, card) => sum + card.amount, 0);
            daysCount = journalListHistory.length;
            if (journalListHistory.some(card => card.dateStr.endsWith('01-19'))) {
                totalSaved += 1000; hasBirthdayBonus = true;
            }
        } else if (currentMode === 'custom_fixed') {
            totalSaved = checkedDaysCustom.length * currentCustomFixedAmt; daysCount = checkedDaysCustom.length;
        } else if (currentMode === 'week_52') {
            totalSaved = checkedWeeks52.reduce((sum, w) => sum + (w * 10), 0);
            daysCount = checkedWeeks52.length; maxUnits = 52;
        } else {
            for (let k in 隨喜Map) { totalSaved += parseInt(隨喜Map[k]) || 0; }
            daysCount = Object.keys(隨喜Map).length;
        }
        
        const percentNum = maxUnits > 0 ? (daysCount / maxUnits) * 100 : 0;
        const progressPercent = percentNum.toFixed(2);

        if(document.getElementById('total-saved')) document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        if(document.getElementById('days-count')) document.getElementById('days-count').innerText = `${daysCount} / ${maxUnits} ${currentMode==='week_52'?'W':'D'}`;
        if(document.getElementById('progress-percent')) document.getElementById('progress-percent').innerText = `${progressPercent}%`;

        const waterFluid = document.getElementById('dynamic-water-fluid');
        const waterRunner = document.getElementById('dynamic-water-runner');
        if (waterFluid) {
            waterFluid.style.width = `${percentNum}%`;
            if (percentNum >= 98) waterFluid.classList.add('full'); else waterFluid.classList.remove('full');
        }

        const config = THEME_CONTENT_BANK[activeThemeKey] || THEME_CONTENT_BANK['classic'];
        const goalText = document.getElementById('target-saving-input').value || "Dream";
        const statusBox = document.getElementById('blueprint-status-text');
        const d = LANG_DICTIONARY[currentLang];

        let runnerIcon = config.runnerIcon || "🚀"; 
        if (hasBirthdayBonus) {
            if(statusBox) statusBox.innerHTML = d.bdayBonus.replace('${prog}', progressPercent).replace('${goal}', goalText);
            if (waterRunner) waterRunner.innerText = "🎁";
        } else {
            if (percentNum === 0) {
                if(statusBox) statusBox.innerHTML = d.statusInit.replace('${name}', config.idName[currentLang]).replace('${goal}', goalText);
            } else {
                if(statusBox) statusBox.innerHTML = d.statusRun.replace('${icon}', config.runnerIcon).replace('${name}', config.idName[currentLang]).replace('${prog}', progressPercent).replace('${goal}', goalText);
            }
            if (waterRunner) waterRunner.innerText = runnerIcon;
        }
    }

    function pickCelebrity() {
        const d = LANG_DICTIONARY[currentLang];
        
        if (currentMode === 'custom_fixed') {
            document.getElementById('celebrity-display').innerHTML = `<b>Target: $${currentCustomFixedAmt}</b>`; return;
        } else if (currentMode === 'week_52') {
            document.getElementById('celebrity-display').innerHTML = `<b>Target: Weekly Step</b>`; return;
        }

        const pulledAmounts = journalListHistory.map(card => card.amount);
        const availableAmounts = [];
        let isJournalStyle = (currentMode === '365_journal');
        
        for (let i = 1; i <= 365; i++) {
            if (isJournalStyle) {
                if (!journalListHistory.some(card => card.amount === i)) availableAmounts.push(i);
            } else {
                if (!隨喜Map[i]) availableAmounts.push(i);
            }
        }

        if (availableAmounts.length === 0) {
            document.getElementById('celebrity-display').innerHTML = "🏆 Max Complete! 🏆"; return;
        }

        const selectedAmount = availableAmounts[Math.floor(Math.random() * availableAmounts.length)];
        const config = THEME_CONTENT_BANK[activeThemeKey] || THEME_CONTENT_BANK['classic'];
        
        const quotePool = config.quotes[currentLang];
        let randomQuote = (quotePool && quotePool.length > 0) ? quotePool[Math.floor(Math.random() * quotePool.length)] : { source: "Astra", text: "Keep going!" };
        
        playThemeSound();

        document.getElementById('celebrity-display').innerHTML = `
            <div style="background: rgba(255,255,255,0.4); padding: 12px; border-radius: 14px; margin-bottom: 10px; font-size: 0.9rem; line-height:1.4; border: 1px solid rgba(255,255,255,0.2); text-align: left;">
                “${randomQuote.text}”
                <br><span style="font-size:0.75rem; opacity:0.6; display:block; text-align:right; margin-top:4px; font-weight:bold;">——《${randomQuote.source}》</span>
            </div>
            <span style="font-size:1.05rem; font-weight:bold;">✨ Target: $${selectedAmount}</span>
        `;

        let confirmTitle = d.confirmBoxTitle + `【${config.idName[currentLang]}】`;
        let confirmBody = d.confirmBoxBody.replace('${amt}', selectedAmount);

        showFlexibleConfirm(`${confirmTitle}\n\n${confirmBody}`, function() {
            if (isJournalStyle) {
                const nextDayIndex = journalListHistory.length + 1;
                const todayStr = new Date().toISOString().split('T')[0];
                journalListHistory.push({ dayIndex: nextDayIndex, dateStr: todayStr, amount: selectedAmount, isPatched: false });
                localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
            } else {
                隨喜Map[selectedAmount] = selectedAmount;
                localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map));
            }
            
            playThemeSound();
            renderGrid();
            
            const targetCell = cellsMap[selectedAmount];
            if (targetCell) {
                targetCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
                document.querySelectorAll('.target-flash').forEach(el => el.classList.remove('target-flash'));
                targetCell.classList.add('target-flash');
            }
            confetti({ particleCount: 60, spread: 50 });
        });
    }

    document.addEventListener('click', function() {
        if (isBgmEnabled && audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => { startSpiritualBgmEngine(); });
        }
    }, { once: false });

    changeLanguage(currentLang);
</script>
