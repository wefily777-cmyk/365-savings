<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f7ede2 0%, #f5cac3 100%);
            --card-bg: rgba(255, 255, 255, 0.78);
            --text-color: #2b2d42;
            --text-muted: #6c757d;
            --border-color: rgba(255, 255, 255, 0.6);
            --cell-bg: rgba(255, 255, 255, 0.65);
            --cell-text: #2b2d42;
            --btn-gradient: linear-gradient(135deg, #f28482 0%, #84a59d 100%);
            --checked-bg: linear-gradient(135deg, #84a59d 0%, #62837c 100%);
            --checked-text: #ffffff;
            --water-color: linear-gradient(180deg, #96e6a1 0%, #d4fc79 100%);
            --app-shadow: 0 20px 40px -15px rgba(43, 45, 66, 0.08), 0 4px 12px -4px rgba(43, 45, 66, 0.04);
            --inner-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.02);
            --glass-blur: 24px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 24px 16px 50px 16px;
            background: var(--bg-gradient) !important;
            background-attachment: fixed !important;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.4px;
        }

        .container { max-width: 440px; margin: 0 auto; }
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.35rem; font-weight: 900; color: var(--text-color); margin: 0; }
        
        .gear-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.25rem; padding: 12px 14px; border-radius: 18px; cursor: pointer; 
            box-shadow: var(--app-shadow); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); backdrop-filter: blur(var(--glass-blur));
        }
        .gear-btn:active { transform: scale(0.85) rotate(60deg); }

        .app-card {
            background: var(--card-bg); padding: 20px; border-radius: 28px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { font-size: 0.85rem; font-weight: 800; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.03); color: var(--text-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; outline: none; }

        .header-action-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.5; margin-bottom: 12px; }
        .wisdom-text { font-size: 1.05rem; line-height: 1.65; font-weight: 700; text-align: left; margin-bottom: 8px; color: var(--text-color); word-break: break-word; }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.8; font-weight: bold; }
        .refresh-circle-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-color); transition: transform 0.4s; padding: 4px; }
        .refresh-circle-btn:active { transform: rotate(180deg) scale(1.15); }

        .config-sub-panel { display: none; align-items: center; justify-content: space-between; background-color: rgba(0,0,0,0.02); padding: 12px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); margin-top: 12px; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 12px; padding: 10px; font-weight: 700; text-align: center; outline: none; }

        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; }
        .target-input { flex: 1; border: none; border-radius: 14px; padding: 12px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.03); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }

        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 44px; border-radius: 20px; margin: 14px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 18px 0 0 18px; width: 0%; transition: width 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 18px; }
        .water-floating-runner { position: absolute; right: -16px; top: -24px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 3s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 700; background-color: rgba(0,0,0,0.02); padding: 12px 16px; border-radius: 16px; line-height: 1.5; box-shadow: var(--inner-shadow); }

        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; }
        
        .journal-container-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 14px 16px; border-radius: 16px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s; }
        .journal-row-card:active { transform: scale(0.98); }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #f28482; background-color: rgba(242, 132, 130, 0.1); padding: 3px 8px; border-radius: 8px; }

        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 16px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; box-shadow: 0 8px 24px rgba(242, 132, 130, 0.2); width: 100%; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .random-btn:active { transform: scale(0.96); }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { text-align: center; padding: 10px 0; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
        .stat-card p { margin: 0; font-size: 1.4rem; font-weight: 900; color: var(--text-color); }

        .month-column { background: var(--card-bg); border-radius: 28px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 18px; }
        .month-header { background: rgba(0,0,0,0.01); padding: 14px 18px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 15px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; }
        .day-cell:active { transform: scale(0.85); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 8px 20px rgba(132, 165, 157, 0.4); border-color: transparent; }

        .settings-panel-box { display: flex; flex-direction: column; gap: 18px; text-align: left !important; }
        .settings-row-title { font-size: 0.85rem; font-weight: 800; opacity: 0.6; margin-bottom: 6px; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; box-sizing: border-box; }
        .settings-btn-grid button { width: 100%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .settings-item-btn { background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(242, 132, 130, 0.2); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.3); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: #ffffff; border-radius: 32px; padding: 24px; width: 88%; max-width: 340px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15); text-align: center; color: #2b2d42; }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
        
        .settings-main-action-btn { background: var(--btn-gradient); color: white; border: none; padding: 15px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; margin-top: 18px; width: 100%; box-shadow: 0 6px 18px rgba(242, 132, 130, 0.25); }
        
        footer { text-align: center; margin-top: 30px; padding: 20px 0; }
        .reset-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; opacity: 0.5; }
        .reset-btn:hover { opacity: 1; background: #ffe3e3; color: #d90429; border-color: #d90429; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="app-card">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <span class="mode-label" id="lbl-custom-amt">🔧 設定自訂面額：</span>
            <div style="display:flex; gap:4px;">
                <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:70px;" value="100">
                <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:10px 14px; font-weight:bold; border-radius:12px; color:white; font-size:0.85rem;" onclick="applyCustomFixedAmount()">套用</button>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <span class="mode-label" id="lbl-start-date">📅 手帳起始日：</span>
            <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
        </div>
    </div>

    <div class="daily-wisdom-card app-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="refresh-circle-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">裝填能量中...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="app-card">
        <div class="header-action-line">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標願望藍圖</span>
            <button class="refresh-circle-btn" onclick="refreshBlueprintStatus(true)">🔄</button>
        </div>
        <div class="target-input-group">
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" value="夢想計劃" oninput="saveTargetGoal(); updateDashboard();">
        </div>
        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>
        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-card" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>
        <div style="display: flex; gap: 6px; margin-bottom: 12px; background: rgba(0,0,0,0.02); padding: 10px; border-radius: 14px; border: 1px dashed var(--border-color);">
            <input type="number" id="manual-journal-day" min="1" max="365" placeholder="Day (1-365)" style="width: 32%; border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; text-align: center; font-weight: bold; background: var(--cell-bg); color: var(--text-color);">
            <input type="number" id="manual-journal-amt" placeholder="金額 ($)" style="width: 38%; border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; text-align: center; font-weight: bold; background: var(--cell-bg); color: var(--text-color);">
            <button onclick="handleManualJournalSubmit()" style="flex: 1; background: var(--btn-gradient); border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 0.8rem; cursor: pointer;">登載手帳</button>
        </div>
        <div class="journal-container-list" id="journal-list-render-target"></div>
    </div>

    <div class="app-card" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display" style="margin: 10px 0; font-size: 0.9rem; opacity: 0.8;">點擊下方按鈕，抽取今日專屬指引面額</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="app-card dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.6rem; color: #62837c;">$0</p>
        </div>
        <div class="stat-card">
            <div id="lbl-dash-done-container">
                <h3 id="label-completed-unit">已完成天數</h3>
            </div>
            <p id="days-count">0 / 365</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
    
    <footer>
        <button class="reset-btn" id="lbl-reset-btn-text" onclick="resetChallenge()">🔄 重置大廳所有儲蓄數據</button>
    </footer>
</div>

<div class="custom-modal-overlay" id="confirm-modal-layer">
    <div class="custom-modal">
        <h3 id="confirm-modal-title" style="margin-top:0; color:#f28482;">🎰 盲盒指引開啟</h3>
        <p id="confirm-modal-body" style="font-weight:700; font-size:1.1rem; line-height:1.6; margin:20px 0;"></p>
        <div id="confirm-modal-buttons" style="display:flex; gap:10px;">
            <button class="settings-main-action-btn" id="lbl-btn-confirm" style="margin-top:0; flex:1;" onclick="confirmJournalSaving()">確認放入儲蓄瓶</button>
            <button class="settings-main-action-btn" id="lbl-btn-cancel" style="margin-top:0; background:rgba(0,0,0,0.06); color:#2b2d42; flex:1;" onclick="closeConfirmModal()">取消</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-theme">🎨 選擇世界觀主題 / Theme</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn theme-item" id="s-theme-classic" onclick="selectThemeStyle('classic')">🌌 經典原版</button>
                    <button class="settings-item-btn theme-item" id="s-theme-rainbow" onclick="selectThemeStyle('rainbow')">🌈 彩虹療癒</button>
                    <button class="settings-item-btn theme-item" id="s-theme-buddhism" onclick="selectThemeStyle('buddhism')">🏯 禪心福報</button>
                    <button class="settings-item-btn theme-item" id="s-theme-gospel" onclick="selectThemeStyle('gospel')">✝️ 恩典管家</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-music">🎵 背景沉浸自然音效 / Nature Sounds</div>
                <div class="settings-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="settings-item-btn" id="btn-toggle-bgm" onclick="toggleBgmState()">環境音效：已關閉</button>
                </div>
            </div>
        </div>
        <button class="settings-main-action-btn" onclick="closeSettingsPanel()" id="btn-setting-close">儲存變更 / Save</button>
    </div>
</div>

<script>
    let currentMode = localStorage.getItem('global_saving_mode') || '365_journal';
    let currentLang = localStorage.getItem('global_app_language') || 'zh-TW';
    let activeThemeKey = localStorage.getItem('active_spiritual_theme_v2') || 'classic';
    let isBgmEnabled = localStorage.getItem('bgm_engine_enabled') === 'true';
    let currentCustomFixedAmt = parseInt(localStorage.getItem('custom_fixed_config_amt')) || 100;

    let journalListHistory = JSON.parse(localStorage.getItem('365_journal_mode_history')) || [];
    let checkedDays365 = JSON.parse(localStorage.getItem('365_savings_progress')) || [];
    let checkedDaysCustom = JSON.parse(localStorage.getItem('custom_fixed_savings_progress')) || [];
    let checkedWeeks52 = JSON.parse(localStorage.getItem('week_52_savings_progress')) || [];
    let 隨喜Map = JSON.parse(localStorage.getItem('any_any_savings_map')) || {};
    let triggeredMilestones = JSON.parse(localStorage.getItem('triggered_milestones_v2')) || [];

    let tempPendingAmount = null;
    let webAudioCtx = null; let mainBgmNode = null;

    // 🌟 生日彩蛋：判斷今天是否為 1/19
function isBirthdayToday() {
    const today = new Date();
    return (today.getMonth() === 0 && today.getDate() === 19);
}

    const LANG_DICTIONARY = {
        'zh-TW': {
            title: "✨ 祈星渡仁 — 萬用百變存錢大廳 ✨", lblCore: "⚙️ 儲蓄核心：", lblCustomAmt: "🔧 設定自訂面額：", btnApply: "套用",
            lblStartDate: "📅 手帳起始日：", lblTarget: "🎯 儲蓄目標願望藍圖", lblJournal: "📝 儲蓄流水手帳", 
            lblBoxTitle: "🎲 幸運儲蓄盲盒抽獎", btnBoxDraw: "抽取今日驚喜任務",
            lblDashTotal: "目前已存總金額", lblDashDoneDay: "已完成天數", lblDashDoneWeek: "已完成週數", lblDashProg: "目前總進度",
            opt1: "🛡️ 365天防誤觸智慧手帳模式 [預設]", opt2: "💎 365天階梯存錢法 (經典自選)", opt3: "📊 萬用自訂固定金額法",
            opt4: "📈 52週階梯存錢法 (每週步道)", opt5: "💖 自由隨喜無壓力存錢法",
            boxWelcome: "🔮 歡迎來到【${name}】大廳<br><span style='font-size:0.8rem; font-weight:normal; opacity:0.7; margin-top:4px; display:inline-block;'>點擊下方按鈕，抽取今日專屬指引面額</span>",

                { source: "獨立自主", text: "真正的獨立，是從財務不受制於人開始的。今天你又為自己的獨立主權，投下了關鍵一票。" },
                { source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
                { source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
                { source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
                { source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
                { source: "致富開端", text: "每一位億萬富豪，都是從存下第一塊錢、第一千塊錢開始的。你現在正走在正確的起點上。" },
                { source: "理智自留", text: "把辛苦賺來的薪水，留下一部分給未來的自己，這是對自己最基本的尊重與疼愛。" },
                { source: "原子威力", text: "不要小看每天進步的 1%。一年的積累，將會展現出讓所有人都驚嘆的巨大複利效應。" },
                { source: "核心競爭力", text: "在消費主義盛行的年代，強大的「儲蓄力」就是你對抗時代浪潮的核心競爭力。" },
                { source: "長期長青", text: "把目光從眼前的打折促銷移開，投向遠方的星辰大海。你的財富藍圖，遠比這些宏大。" },
                { source: "財務覺醒", text: "看著餘額一點點變多，內心的焦慮就會一點點變少。這才是最實用的身心靈療癒。" },
                { source: "掌控遊戲", text: "人生是一場資源管理的遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },
                { source: "意志傳承", text: "用你的規律與自律，為身邊的人做出最好的榜樣。財富的意志，也是一種高貴的傳承。" },
                { source: "清醒生活", text: "不被廣告洗腦，不為攀比買單。清醒地存錢，清醒地生活，做最酷的自己。" },
                { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶中。" },
                { source: "洛克菲勒", text: "我不相信一夕致富，我只相信像造樓磚瓦一樣，一塊一塊疊加出來的財務帝國。" },
                { source: "巴菲特", text: "當別人在消費主義中瘋狂時，我們在防誤觸的登載裡保持眾人皆醉我獨醒的冷靜。" },
                { source: "原子習慣", text: "每天存下一個小決定，一年後這個決定會回報你一個完全不同的人生主導權。" },
                { source: "致富心態", text: "真正的富有，不是你向世界展示了什麼，而是你為自己的人生保留了多少退路。" },
                { source: "查理·芒格", text: "自律是一條孤獨但越走越寬的複利步道，今天的存留，就是對未來的最高敬意。" },
                { source: "清醒思維", text: "精緻窮的泡沫一戳就破，卡裡的餘額與心中的藍圖，才是你行走江湖最硬的底氣。" },
                { source: "長期主義", text: "儲蓄就像是一場無聲的馬拉松，不看一開始有多快，只看你是否天天都在往前邁進。" },
                { source: "本質思考", text: "把辛苦賺來的薪水留一部分給未來的自己，這不是摳門，這是對自己最基本的尊嚴。" },
                { source: "金錢本質", text: "錢不能帶來一切幸福，但當你不想過某種生活時，它能給你底氣大聲說「不」。" },
                { source: "自律力量", text: "當存錢變成像呼吸一樣不需要大腦思考的習慣時，你已經成功掌控了你的命運之舵。" },
                { source: "習慣迴路", text: "每一次拒絕無謂消遣的點擊，都是在大腦皮層裡，為未來的富足人生重新拉一條明智的線。" },
                { source: "愛因斯坦", text: "時間與堅持會讓複利展現神蹟。不要輕視眼前的十元百元，那是未來的夢想種子。" },
                { source: "獨立自主", text: "財務不獨立，靈魂就無法真正自由。開今天你又為自己的尊嚴，投下了無比關鍵的一票。" },
                { source: "生活哲學", text: "物欲退潮之後，留下來的才是真正的精神盛宴。把多餘的能量封存，靜待夢想開花。" },
                { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當下這點小小的克制，在五年後的風景裡根本微不足道。" },
                { source: "核心競爭力", text: "在每個人都隨手清空購物車的年代，強大的「儲蓄力」就是你對抗時代浪潮的最強護城河。" },
                { source: "掌控遊戲", text: "人生是一場精彩的資源管理遊戲。今天成功留存一筆資產，你就在這場遊戲裡又領先了一步。" },
                { source: "踏實累積", text: "世界上沒有一夜暴富的捷徑，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶。" },
                { source: "財務健康", text: "儲蓄之於你的財富藍圖，如同運動之於身體，是一項需要每天持之以恆的高級自我修煉。" },
                { source: "意志基石", text: "財富的厚度取決於你內心的定力。今天不為短暫的面子消費，明天才能擁有長遠的裡子。" },
                { source: "賽內卡", text: "好運從來不是憑空而來，而是機會遇到了準備好的人。儲蓄就是你最強的戰略儲備。" },
                { source: "意志修煉", text: "存錢是一場跟自己大腦獎賞機制的對抗。每成功一次，你的靈魂就比昨天更強壯一分。" },
                { source: "金錢美學", text: "最美的情感是長久陪伴，最好的財務是規律如常。用每天的堅持，編織你專屬的資產藝術。" },
                { source: "大師開示", text: "財富如同滾雪球，關鍵在於找到足夠濕的雪和足夠長的坡。今天的大廳就是你的雪道。" },
                { source: "無畏未來", text: "因為手中握有親手累積的防護盾牌，面對未來的種種不確定性，我們依然能夠氣定神閒。" },
                { source: "清醒生活", text: "不被天花亂墜的廣告洗腦，不為攀比買單。清醒地存錢，做自己人生最酷的主人。" },
                { source: "富爸爸", text: "如果你連眼前的零碎資金都理不清楚，宇宙又怎麼放心把更大的財富寶庫託付給你？" },
                { source: "思維變革", text: "把短暫消耗的物質欲，轉化為永續增長的儲蓄大廳，這才是最高階的身心靈平衡。" },
                { source: "卡內基", text: "能夠完全掌控自己財務的人，通常也能輕鬆掌控自己的人生。你今天依然走在主宰的路上。" },
                { source: "原子決心", text: "每一筆存入都是對生活無聲的宣告：我正在主導我的人生，而不是被日子盲目推著走。" },
                { source: "思考致富", text: "心態決定了你身邊財富的流向。當你對每一塊錢充滿敬意，它便會長久留下來為你工作。" },
                { source: "格蘭特", text: "儲蓄率比投資報酬率更重要。因為它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
                { source: "金錢密碼", text: "看著進度條與餘額一點一點變多，內心的焦慮就會一點點變消散，這是最實用的身心靈療癒。" },
                { source: "意志傳承", text: "用你的規律與自律，為身邊的家人做出最好的榜樣。財富的意志，也是一種高貴的傳承。" },
                { source: "穩定前行", text: "生活需要偶爾的驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
                { source: "詹姆斯", text: "原子習慣的魅力在於無形。今天克制衝動存下的每一筆資金，都是在雕刻你未來的身價。" },
                { source: "探索精神", text: "想要跨出舒適圈需要巨大的底氣，而儲蓄就是你探索宇宙、追求夢想最堅實的底氣燃料。" },
                { source: "長期思維", text: "用十年的宏大眼光來看待今天的儲蓄。今天的一小步，是十年後財富自由的一大步。" },
                { source: "理財聖經", text: "賺錢是能力，存錢是智慧，花錢是藝術。今天我們不談藝術，只修煉最踏實的生存智慧。" },
                { source: "夢想燃料", text: "沒有燃料的火箭永遠無法升空。把你對未來的雄心壯志，化為當下一點一滴的實質燃料。" },
                { source: "自知之明", text: "明白生活的無常，因而選擇在豐沛時收斂、在順境時儲存，這是最高階的遠見與智慧。" },
                { source: "未來資產", text: "你今天存下的不是冷冰冰的數字，而是未來的你，能夠自由調配、拒絕不喜歡的人的時間。" },
                { source: "自律開關", text: "關掉盲目的消費衝動，打開儲蓄的快樂噴泉。看著水瓶漸漸盈滿，是最健康的安多酚。" },
                { source: "理智至上", text: "別讓一時的壞情緒掏空你的錢包。今天用儲蓄來療癒自己，比任何報復性消費都有效。" },
                { source: "生活哲學", text: "減少地上的無謂牽絆，增加卡裡的真實資產。讓你的每一步都走得輕盈、底氣十足。" },
                { source: "財富格局", text: "格局宏大的人，看得見五年後的風景。為了那份無價的自由，當下的克制根本微不足道。" },
                { source: "自律宣言", text: "我不做物質與帳單的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的手心。" },
                { source: "致富開端", text: "每一位白手起家的智者，都是從存下第一塊錢、第一千塊錢開始的。你正走在正確的路上。" },
                { source: "原子威力", text: "不要小看每天微小的進步。一年 365 天的不懈積累，將展現出讓所有人都驚嘆的巨幅複利。" },
                { source: "清醒思維", text: "真正的精緻，不是全身名牌卻內心空虛；而是卡裡有退路、眼中有光芒、心中有藍圖。" },
                { source: "洛克菲勒", text: "命運由你的習慣決定。今天你在大廳存下的每一塊錢，都是在為未來的自己招兵買馬。" },
                { source: "巴菲特", text: "如果不找到一個在你睡覺時也能賺錢的方法，你將工作到死。而儲蓄，就是本金的起點。" },
                { source: "查理·芒格", text: "手裡揮舞著錘子的人，看什麼都像釘子。手裡握有充足儲蓄的人，看什麼都是機會。" },
                { source: "致富心態", text: "虛榮是最大的破財免災陷阱。真正的財務安全，是擁有說走就走的自由與底氣。" },
                { source: "原子習慣", text: "別試圖在一夜之間改變命運。用每天一成不變的規律存入，撬動未來驚人的複利槓桿。" },
                { source: "極簡豐盛", text: "當你不再需要用昂貴的奢侈品來填補內心的空虛，你的財富大廈才算真正開始動工。" },
                { source: "長期主義", text: "時間是好習慣的朋友，是壞習慣的敵人。今天你又站在了時間與財富的朋友這一邊。" },
                { source: "思考致富", text: "金錢總是流向懂得尊重它、愛護它的人。用這個充滿儀式感的智慧手帳，鎖住你的好運磁場。" },
                { source: "富爸爸", text: "富人買入資產，窮人買入負債。今天省下的每一筆盲目開銷，都是在買入未來的時間自由。" },
                { source: "卡內基", text: "自律是一把無形的鑰匙，能打開所有你原本以為緊閉的大門。今天你依然握著這把鑰匙。" },
                { source: "本質思考", text: "每次結帳前問自己：這能讓我更自由，還是讓我被物質綁得更緊？理智收斂，大富足也。" },
                { source: "生存智慧", text: "世界的無常我們無法左右，但卡裡的數字與穩固的防線，是我們給家人最實在的溫柔護盾。" },
                { source: "原子決心", text: "不要輕看進度條上的任何一次增長。每一次防誤觸的點擊，都是對富足人生投下的神聖一票。" },
                { source: "清醒生活", text: "拒絕精緻窮，擁抱內心豐盛。當你學會跟金錢和諧相處，整個宇宙都會成為你的財務護法。" },
                { source: "格蘭特", text: "當你的儲蓄率突破一個臨界點，你對時間的掌控權將會呈現幾何級數的爆炸性增長。" },
                { source: "長期思維", text: "不要為了眼前的短暫刺激，出賣了五年後的浩瀚星空。把目光放遠，你的藍圖無比宏大。" },
                { source: "意志修煉", text: "儲蓄大廳不僅僅是理財的工具，更是你淬鍊心靈意志、掌控自我獎賞機制的精神道場。" },
                { source: "獨立宣言", text: "真正的獨立是從財務不受制於人開始的。今天繼續為自己的尊嚴與主權，添磚加瓦。" },
                { source: "穩定前前", text: "在喧囂多變的紅塵中，用每天雷打不動的儲蓄，為自己築起一座風雨不透的鋼鐵長城。" },
                { source: "金錢能量", text: "看著水瓶的液位一天天升高的過程，就是內心焦慮一天天消散的過程，這是最實用的療癒。" },
                { source: "巴菲特", text: "最划算的投資，就是投資你自己的自律。today存下的每一筆底氣，都是明天自由的籌碼。" },
                { source: "拿破崙·希爾", text: "如果你無法在小錢上展現驚人的掌控力，巨大的財富風暴來臨時，你也根本留不住它。" },
                { source: "梭羅", text: "回歸純粹的積累，你會發現生活原本不需要那麼多繁雜。輕裝上陣，人生才能底氣十足。" },
                { source: "原子習慣", text: "微小的複利就像地底的泉水，一開始默默無聞，直到有一天它會噴湧而出，震撼所有人。" },
                { source: "探索精神", text: "儲蓄就像是夢想火箭的固體燃料。燃料越充足，未來你能抵達的星系就越廣闊、越自由。" },
                { source: "霍華·馬克", text: "卓越的財務結果來自於日常不盲從的理智抉擇。今天你又做出了最聰明、最清醒的決定。" },
                { source: "刻意練習", text: "把儲蓄當作一種可以被刻意練習的微習慣。隨著天數累積，你的財務防線會變得堅不可摧。" },
                { source: "未來宣言", text: "對未來最好的饋贈，就是把當下的每一份多餘資源，都安放在最具複利價值的儲蓄瓶中。" },
                { source: "致富心態", text: "存錢不需要特別的理由。存錢是為了在未來的某一天，擁有對時間說「不」的至高權利。" },
                { source: "清醒思維", text: "別被外界精緻的消費陷阱捕獲。卡裡有退路、眼中有光芒、手帳有規律，才是最頂級的精緻。" },
                { source: "金錢密碼", text: "當你開始帶著敬意去收納每一張鈔票、每一個數字，財富也會開始尊重你的意志，長久留存。" },
                { source: "長期主義", text: "不要在乎起跑時有多麼微小，這是一場漫長的馬拉松，只要今天還在向前，你就贏了所有人。" },
                { source: "自律開關", text: "關掉不必要的無效消費，打開儲蓄的快樂泉源。看著進度條增長，享受最健康的安多酚。" },
                { source: "理智至上", text: "別讓一時的情緒波動掏空你的錢包。今天用這份儲蓄手帳來安頓心靈，比任何消費都更療癒。" },
                { source: "大師開示", text: "財富如同滾雪球，關鍵在於找到足夠濕的雪和足夠長的坡。今天大廳就是你最穩固的雪道。" },
                { source: "生活哲學", text: "減少地上的無謂牽絆，增加卡裡的真實資產。讓你的每一步都走得輕盈、走得底氣十足。" },
                { source: "原子決心", text: "每一筆存入都是無聲的宣告：我正在掌控我的人生，而非被生活盲目推著往前走。" },
                { source: "財務健康", text: "儲蓄之於財務，如同運動之於身體。這是一項需要每天持之以恆、不找藉口的高級自律。" },
                { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當暴風雨來臨時，你早已在溫暖的大廳裡優雅喝茶。" },
                { source: "財富格局", text: "格局大的人，看得到五年後的風景。為了五年後的自由，當下這點克制根本微不足道。" },
                { source: "自律宣言", text: "我不做物質的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的手心。" },
                { source: "金錢能量", text: "金錢流向珍惜它的人。用一個充滿敬意與規律的儀式收納它，它便會長久陪伴你。" },
                { source: "人生智慧", text: "聰明的人懂得如何賺錢，而智慧的人懂得如何與賺來的錢相處。今天，我們在修煉智慧。" },
                { source: "穩定前行", text: "生活需要驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
                { source: "獨立自主", text: "真正的獨立，是從財務不受制於人開始的。今天你又為自己的獨立主權，投下了關鍵一票。" },
                { source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
                { source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
                { source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
                { source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
                { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶中。" },
                { source: "洛克菲勒", text: "我不看重你過去賺了多少，我只看重你現在留下了多少。每一筆儲蓄都是你未來的底牌。" },
                { source: "巴菲特", text: "當誘惑鋪天蓋地時，能按捺住衝動、穩穩將資產存入大廳的人，才是真正的財富贏家。" },
                { source: "原子習慣", text: "複利的魔力在於前期的默默無聞。守住這份枯燥的規律，未來它會用巨大的自由回報你。" },
                { source: "致富心態", text: "真正的奢華不是展示給別人看的行頭，而是卡裡源源不絕的數字給你拒絕不喜歡之事的自由。" },
                { source: "查理·芒格", text: "要得到你想要的東西，最可靠的方法是讓自己配得上它。自律的積累就是最好的通行證。" },
                { source: "清醒思維", text: "消費主義的陷阱就是讓你用辛勞的時間去換取短暫的虛榮。今天，我們選擇留住時間。" },
                { source: "長期主義", text: "不要因為面額小就放棄登載。金字塔的頂端，原本就是由無數塊最基層的磚石疊加而成。" },
                { source: "本質思考", text: "每一次付款前的三秒停頓，都是理智與慾望的交鋒。今天，你的理智又贏得了一次勝仗。" },
                { source: "金錢本質", text: "錢不是冷冰冰的數字，它是你工作精力的結晶。妥善收納它，是對自己付出最基本的尊重。" },
                { source: "自律力量", text: "自由從來不是隨心所欲，而是自我主宰。今天存下短暫的慾望，換取明天更廣闊的選擇權。" },
                { source: "習慣迴路", text: "打破當下即時滿足的怪圈，每次防誤觸手帳的記錄，都是在為未來的富足人生重新拉線。" },
                { source: "愛因斯坦", text: "複利是世界第八大奇蹟。給時間一點時間，讓微小的財富種子在堅持中默默翻倍茁壯。" },
                { source: "獨立自主", text: "底氣遠比短暫的虛榮更能撫平生活的焦慮。手中有糧，心中不慌，這是永恆的真理。" },
                { source: "生活哲學", text: "物欲退潮後，留下的才是真正的豐盛。把多餘的資源封存進儲蓄瓶，期待未來的驚喜花開。" },
                { source: "遠見卓識", text: "在平凡的日常中累積，才能在無常的變局中突圍。你今天的理智，是明天的頂級防護網。" },
                { source: "核心競爭力", text: "在這個每個人都被精緻窮捕獲的年代，強大的「儲蓄力」就是你對抗時代浪潮的最強核心。" },
                { source: "掌控遊戲", text: "人生是一場精彩的資源管理遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },
                { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄大廳中。" },
                { source: "財務健康", text: "儲蓄之於財務，如同運動之於身體。這是一項需要每天持之以恆、不找藉口的高級自律。" },
                { source: "長期長青", text: "把目光從眼前的打折促銷移開，投向遠方的星辰大海。你的財富藍圖，遠比這些物質宏大。" },
                { source: "塞內卡", text: "所謂好運，就是機會遇到了準備好的人。每天雷打不動的儲蓄，就是你最強的戰略儲備。" },
                { source: "意志修煉", text: "存錢是一場跟自己大腦獎賞機制的對抗。每成功一次，你的靈魂與定力就更強壯一分。" },
                { source: "金錢美學", text: "最美的情感是長久陪伴，最好的財務是規律如常。用每天的堅持，編織出你專屬的資產美學。" },
                { source: "大師開示", text: "財富就如同滾雪球，關鍵在於找到足夠濕的雪和足夠長的坡。今天的大廳就是你的雪道。" },
                { source: "無畏未來", text: "因為手中握有親手累積的防護盾牌，面對未來的種種不確定性，我們依然能夠笑看風雲。" },
                { source: "清醒生活", text: "不被廣告洗腦，不為攀比買單。清醒地存錢，清醒地生活，做最酷、最清醒的自己。" },
                { source: "富爸爸", text: "資產是把錢放進你口袋的東西。每天往存錢罐注入能量，就是在持續買入未來的安全感。" },
                { source: "習慣的力量", text: "防誤觸的每一次點擊，都是在大腦皮層鞏固富足思維，開啟智慧大廳的第一步。" },
                { source: "卡內基", text: "能夠掌控自己財務的人，通常也能掌控自己的人生。今天你依然走在主宰的道路上。" },
                { source: "原子決心", text: "每一筆存入都是無聲的宣告：我正在掌控我的人生，而非被生活與帳單盲目推著往前走。" },
                { source: "思考致富", text: "心態決定財富的流向。將物質的匱乏感轉化為積累的成就感，你就是源源不絕的富足源頭。" },
                { source: "格蘭特", text: "儲蓄率比投資報酬率更重要。它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
                { source: "金錢密碼", text: "當你開始尊重金錢的每一次累積，金錢也會開始尊重你的意志，留下來長久為你工作。" },
                { source: "長期思維", text: "用十年的宏大眼光來看待今天的儲蓄。今天的一小步，是十年後財富自由的一大步。" },
                { source: "理財聖經", text: "賺錢是能力，存錢是智慧，花錢是藝術。今天我們不談藝術，只談最踏實、最硬核的智慧。" },
                { source: "夢想燃料", text: "沒有燃料的火箭永遠無法升空。把你對未來的雄心壯志，化為當下一點一滴的實質燃料。" },
                { source: "自知之明", text: "明白生活的無常，因而選擇在順境時收斂、在豐沛時儲存，這是最高級、最清醒的遠見。" },
                { source: "未來資產", text: "你今天存下的不是冷冰冰的數字，而是未來的你，能夠自由調配的時間與說不的彈性。" },
                { source: "自律開關", text: "關掉不必要的無效消費衝動，打開儲蓄的快樂噴泉。看著進度條增長，是最健康的安多酚。" },
                { source: "理智至上", text: "別讓短暫的情緒波動掏空你的錢包。今天用儲蓄手帳來安頓自己，比任何消費都更療癒。" },
                { source: "生活哲學", text: "減少地上的無謂牽絆，增加卡裡的真實資產。讓你的每一步都走得輕盈、走得底氣十足。" },
                { source: "財富格局", text: "格局大的人，看得到五年後的風景。為了五年後的自由，當下這點克制根本微不足道。" },
                { source: "自律宣言", text: "我不做物質的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的溫暖手心。" },
                { source: "致富開端", text: "每一位白手起家的智者，都是從存下第一塊錢、第一千塊錢開始的。你現在正走在正確的起點。" },
                { source: "原子威力", text: "不要小看每天進步的 1%。一年的積累，將會展現出讓所有人都驚嘆的巨幅複利效應。" },
                { source: "理智自留", text: "把辛苦賺來的薪水，留下一部分給未來的自己，這是對自己最基本的尊重與疼愛。" },
                { source: "核心競爭力", text: "在消費主義盛行的年代，強大的「儲蓄力」就是你對抗時代浪潮與無常最核心的競爭力。" },
                { source: "財務覺醒", text: "看著餘額一點點變多，內心的焦慮就會一點點變少。這才是最實用、最直接的身心靈療癒。" },
                { source: "意志傳承", text: "用你的規律與自律，為身邊的家人做出最好的榜樣。財富的意志，也是一種高貴的傳承。" },
                { source: "富足完全體", text: "規律如流水，積累如須彌。當你將儲蓄內化為生活的一部分，你已經開啟了富足的終極大門。" },
                { source: "巴菲特", text: "投資自己才是最賺錢的生意。而學會克制慾望並規律儲蓄，是投資自律的起點。" },
                { source: "洛克菲勒", text: "起點不決定終點。唯有克勤克儉、步步為營的積累，才能讓你的財富之樹常青。" },
                { source: "致富心態", text: "存錢不需要特別的理由。存錢是為了獲得對時間的絕對掌控權，那是無價的自由。" },
                { source: "查理·芒格", text: "走到更高的層次需要極大的自律。每一筆存下的資金，都是你未來自由的籌碼。" },
                { source: "原子習慣", text: "微小的改變能帶來巨大的連鎖反應。存下日常的零碎，是在雕刻你未來的身價。" },
                { source: "長期主義", text: "耐得住枯燥的累積，才配得上無憂的未來。今天存下意志，明天收穫自由。" },
                { source: "思考致富", text: "財富是思維的產物。將多餘的物質慾望轉化為永續的儲蓄，探索未來的廣闊世界。" },
                { source: "習慣的力量", text: "防誤觸的每一次點擊，都是在大腦皮層鞏固富足思維，開啟智慧大廳的第一步。" },
                { source: "拿破崙·希爾", text: "如果你不能在小事上自律，你就永遠無法在大事上建立真正的財富王國。" },
                { source: "富爸爸", text: "資產是把錢放進你口袋的東西. 每天往存錢罐注入能量, 就是在持續買入未來的安全感。" },
                { source: "格蘭特", text: "儲蓄率比投資報酬率更重要。它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
                { source: "金錢本質", text: "金錢換不來幸福，但能換來拒絕不喜歡生活的底氣。為這份尊嚴，今天繼續累積。" },
                { source: "微小累積", text: "不要輕視每一張十元、百元。金字塔的頂端，也是由無數塊最基層的磚石疊加而成。" },
                { source: "財務防線", text: "穩固的防線能讓你睡得更安穩。用今天的理智，為明天的生活買一份高額的安心險。" },
                { source: "本質思考", text: "看清真正需要與短暫想要的區別，每一次理智的存留，都是智慧大廳的一次勝仗。" },

                { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當暴風雨來臨時，你早已在溫暖的大廳裡優雅喝茶。" },

                { source: "原子威力", text: "不要小看每天進步的 1%。一年的積累，將會展現出讓所有人都驚嘆的巨大複利效應。" },

                { source: "清醒生活", text: "不被廣告洗腦，不為攀比買單。清醒地存錢，清醒地生活，做最酷的自己。" },
                { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶中。" },
                { source: "巴菲特", text: "開始存錢並及早投資，這是最值得養成的一種習慣。溪流匯聚，終成汪洋。" },
                { source: "梭羅", text: "一個人的富有程度，與他所能放下的無謂物質多寡成正比。回歸純粹的積累。" },
                { source: "探索精神", text: "跨出舒適圈需要資本，而儲蓄就是你探索宇宙、追求夢想最堅實的底氣燃料。" },
                { source: "霍華·馬克", text: "卓越的財務結果來自於日常不盲從大眾的理智抉擇。今天存下的，是明天的防護網。" },
                { source: "刻意練習", text: "儲蓄是一種可以被練習的技能。隨著天數增加，你的財務核心將會變得無比強大。" },
                { source: "塞內卡", text: "所謂好運，就是機會遇到了準備好的人。儲蓄就是你最好的戰略儲備。" },

                { source: "長期思維", text: "用十年的眼光來看待今天的儲蓄。今天的一小步，是十年後財富自由的一大步。" },
                { source: "自律力量", text: "每一天不重複的堅持，都在為你的毅力儲蓄。財富只是這場意志遊戲的副產品。" },
                { source: "原子決心", text: "每一筆存入都是無聲的宣告：我正在掌控我的人生，而非被生活盲目推著走。" },
                { source: "查理·芒格", text: "想得到一樣東西，最可靠的方法是讓你配得上它。自律積累，就是最好的修行。" },
                { source: "金錢能量", text: "金錢流向珍惜它的人。用一個充滿敬意與規律的儀式收納它，它便會長久陪伴你。" },
                { source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
                { source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
                { source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
                { source: "理智自留", text: "把辛苦賺來的薪水，留下一部分給未來的自己，這是對自己最基本的尊重與疼愛。" },
                { source: "長期長青", text: "把目光從眼前的打折促銷移開，投向遠方的星辰大海。你的財富藍圖，遠比這些宏大。" },
                { source: "掌控遊戲", text: "人生是一場資源管理的遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },
                { source: "意志傳承", text: "用你的規律與自律，為身邊的人做出最好的榜樣。財富的意志，也是一種高貴的傳承。" },
                { source: "詹姆斯", text: "每一天的小小克制，都是在為你未來的財務城堡奠定基石，穩扎穩打。" },
                { source: "富足思維", text: "當你不再為無謂的物質買單，你便開始真正主宰自己的財富命運與人生藍圖。" },
                { source: "卡內基", text: "儲蓄不只是理財，它更是心靈意志力的一種高級修煉與自我掌控，非常人所能及。" },
                { source: "長期主義", text: "不要在乎起跑時有多麼微小，這是一場漫長的馬拉松，只要今天還在向前就足夠。" },
                { source: "意志基石", text: "財富的厚度取決於你內心的定力。今天不為面子消費，明天才能擁有真正的裡子。" },
                { source: "自知之明", text: "明白生活的無常，因而選擇在順境時收斂、在豐沛時儲存，這是最高級的遠見。" },
                { source: "理智至上", text: "別讓短暫的情緒波動掏空你的錢包。今天用儲蓄來療癒自己，比任何消費都有效。" },
                { source: "財富格局", text: "格局大的人，看得到五年後的風景。為了五年後的自由，當下這點克制根本微不足道。" },
                { source: "自律宣言", text: "我不做物質的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的手心。" },
                { source: "穩定前行", text: "生活需要驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
                { source: "習慣紅利", text: "當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。今天你做得很好。" },
                { source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
                { source: "原子習慣", text: "別因為面額小就放棄。每一天的微小堅持，都是在重塑你與富足世界連接的磁場。" },
                { source: "財務健康", text: "儲蓄之於財務，如同運動之於身體。這是一項需要每天持之以恆的高級自律。" },
                { source: "清醒生活", text: "不被廣告洗腦，不為攀比買單。清醒地存錢，清醒地生活，做最酷的自己。" },
                { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶中。" },
                { source: "長期長青", text: "把目光從眼前的打折促銷移開，投向遠方的星辰大海。你的財富藍圖，遠比這些宏大。" },
                { source: "理智自留", text: "把辛苦賺來的薪水，留下一部分給未來的自己，這是對自己最基本的尊重與疼愛。" },
                { source: "意志修煉", text: "存錢是一場跟自己大腦獎賞機制的對抗。每成功一次，你的靈魂就更強壯一分。" },
                { source: "思考致富", text: "心態決定財富的流向。將物質的匱乏感轉化為積累的成就感，你就是富足的源頭。" },
                { source: "拿破崙·希爾", text: "如果你不能在小事上自律，你就永遠無法在大事上建立真正的財富王國。" },
                { source: "富爸爸", text: "不要在消費完後才存錢，要在存錢後才消費。顛倒這個順序，人生大不同。" },
                { source: "習慣的力量", text: "防誤觸的每一次點擊，都是在大腦皮層鞏固富足思維，開啟智慧大廳的第一步。" },
                { source: "查理·芒格", text: "要得到一樣東西，最可靠的方法是讓你配得上它。自律積累，就是最好的修行。" },
                { source: "巴菲特", text: "不要在消費完後才存錢，要在存錢後才消費。顛倒這個順序，人生大不同。" },
                { source: "卡內基", text: "能夠掌控自己財務的人，通常也能掌控自己的人生。今天你依然走在主宰的路上。" },
                { source: "致富心態", text: "存錢不需要特別的理由。存錢是為了獲得對時間的掌控權，那是無價的自由。" },
                { source: "未來宣言", text: "對未來最好的饋贈，就是把當下的每一份資源，都安放在最具複利價值的地方。" },
                { source: "核心競爭力", text: "在消費主義盛行的年代，強大的「儲蓄力」就是你對抗時代浪潮的核心競爭力。" },
                { source: "財務防線", text: "穩固的防線能讓你睡得更安穩。用今天的理智，為明天的生活買一份高額的安心險。" },
                { source: "生活哲學", text: "減少地上的牽絆，增加心中的資產。讓你的每一步都走得輕盈、走得底氣十足。" },
                { source: "思考致富", text: "將多餘的物質慾望轉化為永續的儲蓄瓶，探索未知的廣闊世界，看見更美風景。" },
                { source: "格蘭特", text: "儲蓄率比投資報酬率更重要。它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
                { source: "原子習慣", text: "微小的改變能帶來巨大的連鎖反應。存下日常的零碎，是在雕刻你未來的身價。" },
                { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當暴風雨來臨時，你早已在溫暖的大廳裡優雅喝茶。" },
                { source: "理智至上", text: "別讓短暫的情緒波動掏空你的錢包。今天用儲蓄來療癒自己，比任何消費都更有效。" },
                { source: "穩定前行", text: "生活需要驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
                { source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
                { source: "原子威力", text: "不要小看每天進步的 1%。一年的積累，將會展現出讓所有人都驚嘆的巨大複利效應。" },
                { source: "清醒思維", text: "真正的精緻，是卡裡有退路、眼中有光芒、心中有藍圖。做最獨立清醒的自己。" },
                { source: "掌控遊戲", text: "人生是一場資源管理的遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },
                { source: "獨立自主", text: "真正的獨立，是從財務不受制於人開始的。今天你又為自己的獨立主權，投下了關鍵一票。" },
                { source: "致富開端", text: "每一位億萬富豪，都是從存下第一塊錢、第一千塊錢開始的。你現在正走在正確的起點上。" },
                { source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
                { source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
                { source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
                { source: "財務覺醒", text: "看著餘額一點點變多，內心的焦慮就會一點點變少。這才是最實用的身心靈療癒。" },
                { source: "長期主義", text: "不要在乎起跑時有多麼微小，這是一場漫長的馬拉松，只要今天還在向前就值得慶祝。" },
                { source: "意志傳承", text: "用你的規律與自律，為身邊的人做出最好的榜樣。財富的意志，也是一種高記的傳承。" },
                { source: "思考致富", text: "財富是思維的產物。將多餘的物質慾望轉化為永續的儲蓄瓶，探索未知的廣闊世界。" },
                { source: "卡內基", text: "儲蓄不只是理財，它更是心靈意志力的一種高級修煉與自我掌控，非常人所能及。" },
                { source: "生活哲學", text: "減少地上的牽絆，增加心中的資產。讓你的每一步都走得輕盈、走得底氣十足。" },
                { source: "巴菲特", text: "開始存錢並及早投資，這是最值得養成的一種習慣。溪流匯聚，終成汪洋。" }
                ],
                'zh-CN': [
                    { source: "巴菲特", text: "开始存钱并及早投资，这是最值得养成的一种习惯。溪流汇聚，终成汪洋。" },
                { source: "查理·芒格", text: "走到更高的层次需要极大的自律。每一笔存下的资金，都是未来自由的筹码。" },
                { source: "詹姆斯·克利尔", text: "原子习惯的威力在于积累。今天克制冲动存下的每一块钱，都是对未来投下的信任票。" },
                { source: "财富密码", text: "财富并非源于赚了多少，而是源于留住了多少。每一滴储蓄都是为梦想城堡奠定的稳固基石。" },
                { source: "卡内基", text: "储蓄不只是理财，它更是心灵意志力的一种高级修炼与自我掌控。" },
                { source: "长期主义", text: "耐得住枯燥的积累，才配得上无忧的未来。今天存下意志，明天收获自由。" },
                { source: "思考致富", text: "财富是思维的产物。将多余的物质欲望转化为永续的储蓄瓶，探索未知的广阔世界。" },
                { source: "富爸爸", text: "资产是把钱放进你口袋的东西。每天往存钱罐注入能量，就是在持续买入未来的安全感。" },
                { source: "习惯的力量", text: "防误触的每一次点击，都是在大脑皮层巩固富足思维，开启智慧大厅的第一步。" },
                { source: "理财哲学", text: "当你不再为无谓的消费买单，你便开始真正主章自己的财富命运与人生蓝图。" },
                { source: "拿破仑·希尔", text: "如果你不能在小事上自律，你就永远无法在大事上建立真正的财富王国。" },
                { source: "梭罗", text: "一个人的富有程度，与他所能放下的无谓物质多寡成正比。回归纯粹的积累。" },
                { source: "原子习惯", text: "微小的改变能带来巨大的连锁反应。存下日常的零碎，是在雕刻你未来的身价。" },
                { source: "探索精神", text: "跨出舒适圈需要资本，而储蓄就是你探索宇宙、追求梦想最坚实的底气燃料。" },
                { source: "本质思考", text: "看清真正需要与短暂想要的区别，每一次理智的存留，都是智慧大厅的一次胜仗。" },
                { source: "洛克菲勒", text: "起点不决定终点。唯有克勤克俭、步步为营的积累，才能让家族的财富之树常青。" },
                { source: "致富心态", text: "存钱不需要特别的理由。存钱是为了获得对时间的掌控权，那是无价的自由。" },
                { source: "霍华·马克", text: "卓越的财务结果来自于日常不盲从大众的理智抉择。今天存下的，是明天的防护网。" },
                { source: "刻意练习", text: "储蓄是一种可以被练习的技能。随着天数增加，你的财务核心将会变得无比强大。" },
                { source: "未来宣言", text: "对未来最好的馈赠，就是把当下的每一份资源，都安放在最具复利价值的地方。" },
                { source: "雷·达里奥", text: "痛苦加上反思等于进步。今天省下的每一笔诱惑，都是对未来更明智人生的投资。" },
                { source: "刻意自律", text: "自由不是随心所欲，而是自我主宰。存下今天的欲望，换取明天选择的权利。" },
                { source: "财富觉醒", text: "金钱是你工作时间与精力的结晶。随意挥霍它，等于在挥霍你曾付出的人生。" },
                { source: "习惯回路", text: "打破当下即时满足的怪圈，每次防误触的登载，都是在为未来的富足重新拉线。" },
                { source: "爱因斯坦", text: "复利是世界第八大奇迹。给时间一点时间，让微小的财富种子在坚持中默默翻倍。" },
                { source: "本多静六", text: "四分之一储蓄法是致富的铁律。在平凡的日常中积累，才能在无常的变局中突围。" },
                { source: "意志基石", text: "财富的厚度取决于你内心的定力。今天不为面子消费，明天才能拥有真正的里子。" },
                { source: "塞内卡", text: "所谓好运，就是机会遇到了准备好的人。储蓄就是你最好的战略储备。" },
                { source: "极简生活", text: "当你拥有的越少，你被物质绑架的机会就越低。把精力与资金，留给真正有价值的梦想。" },
                { source: "财富杠杆", text: "没有本金，再好的机会也只是看客。今天存下的每一块钱，都是你未来的金钱杠杆。" },
                { source: "格兰特·萨巴蒂尔", text: "储蓄率比投资报酬率更重要。它是你唯一能 100% 掌控的财务指标。" },
                { source: "心灵安全感", text: "存钱不是因为小气，而是开因为我们深知，底气远比短暂的虚荣更能抚平生活的焦虑。" },
                { source: "思考致富", text: "心态决定财富的流向。将物质的匮乏感转化为积累的成就感，你就是富足的源头。" },
                { source: "长期思维", text: "用十年的眼光来看待今天的储蓄。今天的一小步，是十年后财富自由的一大步。" },
                { source: "巴菲特", text: "不要在消费完后才存钱，要在存钱后才消费。颠倒这个顺序，人生大不同。" },
                { source: "自律力量", text: "每一天不重复的坚持，都在为你的毅力储蓄。财富只是这场意志游戏的副产品。" },
                { source: "金钱本质", text: "金钱换不来幸福，但能换来拒绝不喜欢生活的底气。为这份尊严，今天继续积累。" },
                { source: "微小积累", text: "不要轻视每一张十元、百元。金字塔的顶端，也是由无数块最基层的砖石叠加而成。" },
                { source: "财务防线", text: "稳固的防线能让你睡得更安稳。用今天的理智，为明天的生活买一份高额的安心险。" },
                { source: "原子决心", text: "每一笔存入都是无声的宣告：我正在掌控我的人生，而非被生活盲目推着走。" },
                { source: "财富自由", text: "自由的代价是前期的自律。在欲望澎湃的世界里，守住心中的存钱罐，就是高级的智慧。" },
                { source: "查理·芒格", text: "想得到一样东西，最可靠的方法是让你配得上它。自律积累，就是最好的修行。" },
                { source: "本质思考", text: "每次付款前的三秒停顿，都是理智与欲望的交锋。今天，你的理智又赢得了一次。" },
                { source: "极简丰盛", text: "物欲退潮后，留下的才是真正的丰盛。把多余的能量封存，期待梦想开花。" },
                { source: "理财圣经", text: "赚钱是能力，存钱是智慧，花钱是艺术。今天我们不谈艺术，只谈最踏实的智慧。" },
                { source: "意志修炼", text: "存钱是一场跟自己大脑奖赏机制的对抗。每成功一次，你的灵魂就更强壮一分。" },
                { source: "梦想燃料", text: "没有燃料的火箭无法升空。把你对未来的雄心，化为当下一点一滴的实质燃料。" },
                { source: "卡内基", text: "能够掌控自己财务的人，通常也能掌控自己的人生。今天你依然走在主宰的路上。" },
                { source: "自知之明", text: "明白生活的无常，因而选择在顺境时收敛、在丰沛时储存，这是最高级的远见。" },
                { source: "未来资产", text: "你今天存下的不是冷冰冰的数字，而是未来的你，能够自由调配的时间与弹性。" },
                { source: "清醒思维", text: "别被精致穷的陷阱捕获。真正的精致，是卡里有退路、眼中有光芒、心中有蓝图。" },
                { source: "金钱密码", text: "当你开始尊重金钱的每一次积累，金钱也会开始尊重你的意志，留下来为你工作。" },
                { source: "长期主义", text: "储蓄是一场没有终点的马拉松。不在乎起跑有多快，只在乎你是否每天都在向前迈进。" },

                { source: "巴菲特", text: "开始存钱并及早投资，这是最值得养成的一种习惯。溪流汇聚，终成汪洋。" },
                { source: "梭罗", text: "一个人的富有程度，与他所能放下的无谓物质多寡成正比。回归纯粹的积累。" },
                { source: "探索精神", text: "跨出舒适圈需要资本，而储蓄就是你探索宇宙、追求梦想最坚实的底气燃料。" },
                { source: "霍华·马克", text: "卓越的财务结果来自于日常不盲从大众的理智抉择。今天存下的，是明天的防护网。" },
                { source: "刻意练习", text: "储蓄是一种可以被练习的技能。随着天数增加，你的财务核心将会变得无比强大。" },
                { source: "塞内卡", text: "所谓好运，就是机会遇到了准备好的人。储蓄就是你最好的战略储备。" },
                { source: "爱因斯坦", text: "复利是世界第八大奇迹。给时间一点时间，让微小的财富种子在坚持中默默翻倍。" },
                { source: "理财圣经", text: "赚钱是能力，存钱是智慧，花钱是艺术。今天我们不谈艺术，只谈最踏实的智慧。" },
                { source: "长期思维", text: "用十年的眼光来看待今天的储蓄。今天的一小步，是十年后财富自由的一大步。" },
                { source: "自律力量", text: "每一天不重复的坚持，都在为你的毅力储蓄。财富只是这场意志游戏的副产品。" },
                { source: "原子决心", text: "每一笔存入都是无声的宣告：我正在掌控我的人生，而非被生活盲目推着走。" },
                { source: "查理·芒格", text: "想得到一样东西，最可靠的方法是让你配得上它。自律积累，就是最好的修行。" },
                { source: "金钱能量", text: "金钱流向珍惜它的人。用一个充满敬意与规律的仪式收纳它，它便会长久陪伴你。" },
                { source: "习惯红利", text: "习惯的红利是惊人的。当存钱变成像呼吸一样自然时，富足便不再是一件遥远的事。" },

                { source: "长期长青", text: "把目光从眼前的打折促销移开，投向远方的星辰大海。你的财富蓝图，远比这些宏大。" },
                { source: "掌控游戏", text: "人生是一场资源管理的游戏。今天成功留存一笔资产，你在这场游戏里又领先了一步。" },
                { source: "意志传承", text: "用你的规律与自律，为身边的人做出最好的榜样。财富的意志，也是一种高贵的传承。" },
                { source: "詹姆斯", text: "每一天的小小克制，都是在为你未来的财务城堡奠定基石，稳扎稳打。" },
                { source: "富足思维", text: "当你不再为无谓的物质买单，你便开始真正主宰自己的财富命运与人生蓝图。" },
                { source: "卡内基", text: "储蓄不只是理财，它更是心灵意志力的一种高级修炼与自我掌控，非常人所能及。" },
                { source: "长期主义", text: "不要在乎起跑时有多么微小，这是一场漫长的马拉松，只要今天还在向前就足够。" },
                { source: "意志基石", text: "财富的厚度取决于你内心的定力。今天不为面子消费，明天才能拥有真正的里子。" },
                { source: "自知之明", text: "明白生活的无常，因而选择在顺境时收敛、在丰沛时储存，这是最高级的远见。" },

                { source: "自律宣言", text: "我不做物质的奴隶，要做财富的主人。今天再次将掌控权牢牢握在自己的手心。" },

                { source: "致富心态", text: "存钱不需要特别的理由。存钱是为了获得对时间的掌控权，那是无价的自由。" },
                { source: "未来宣言", text: "对未来最好的馈赠，就是把当下的每一份资源，都安放在最具复利价值的地方。" },
                { source: "核心竞争力", text: "在消费主义盛行的年代，强大的“储蓄力”就是你对抗时代浪潮的核心竞争力。" },
                { source: "财务防线", text: "稳固的防线能让你睡得更安稳。用今天的理智，为明天的生活买一份高额的安心险。" },
                { source: "生活哲学", text: "减少地上的牵绊，增加心中的资产。让你的每一步都走得轻盈、走得底气十足。" },

                { source: "原子习惯", text: "微小的改变能带来巨大的连锁反应。存下日常的零碎，是在雕刻你未来的身价。" },

                { source: "理智至上", text: "别让短暂的情绪波动掏空你的钱包。今天用储蓄来疗愈自己，比任何消费都更有效。" },

                { source: "原子威力", text: "不要小看每天进步的 1%。一年的积累，将会展现出让所有人都惊叹的巨大复利效应。" },
                { source: "清醒思维", text: "真正的精致，是卡里有退路、眼中有光芒、心中有蓝图。做最独立清醒的自己。" },
                { source: "掌控游戏", text: "人生是一场资源管理的游戏。今天成功留存一笔资产，你在这场游戏里又领先了一步。" },
                { source: "独立自主", text: "真正的独立，是从财务不受制于人开始的。今天你又为自己的独立主权，投下了关键一票。" },
                { source: "致富开端", text: "每一位亿万富豪，都是从存下第一块钱、第一千块钱开始的。你现在正走在正确的起点上。" },
                { source: "无畏未来", text: "因为手中握有积累的盾牌，所以面对未来的种种不确定性，我们依然能够笑看风云。" },

                { source: "财务觉醒", text: "看着余额一点点变多，内心的焦虑就会一点点变少。这才是最实用的身心灵疗愈。" },
