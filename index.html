                { source: "Constant Guard", text: "Though thousands of trends surge through the world, guard your own space undisturbed. A morning entry into your ledger serves as the most grounding early prayer for your soul." },

                { source: "Perfect Wholeness", text: "A nine-story tower rises from accumulated soil. Do not envy the blessings of others; starting from this step today, you are perfecting your own Pure Land provisions." },
                { source: "Diamond Sutra Teachings", text: "If a Bodhisattva practices charity without clinging to phenomena, it is like a person with clear eyes walking in bright sunlight. Saving without attachment brings immeasurable blessings." },
                { source: "Master Yin Guang", text: "One part sincerity dispels one part negative karma and increases one part blessing and wisdom. Accumulate steadily; never slip into superficiality and haste." },
                { source: "Vimalakirti Sutra", text: "According to the purity of one's mind, the Buddha-land is pure. If the mind is free from material bondage, your piggy bank transforms into an inexhaustible sacred vase." },
                { source: "Master Guang Qin", text: "Be honest in character and constant in cultivation. Steadily saving a wholesome cause today brings great spiritual liberation tomorrow." },
                { source: "The Quiet Way", text: "The clamor of the world is a fleeting cloud. Guard the pure water in your hands and prevent desires from evaporating; this is the greatest provision of blessings." },
                { source: "The Great Path", text: "Do not fail to commit a good deed just because it is small. Every bit placed into the jar today becomes a field of blessings for infinite merits in the cycle of cause and effect." },
                { source: "Master Lian Chi", text: "One less pursuit brings one more bit of coolness; one bit of resources saved brings one more act of compassion. Nurture your spirit and cease chasing external desires." },
                { source: "Infinite Life Sutra", text: "Worldly people contend for non-essential matters. Only by practicing restraint with wisdom can one enjoy profound stability amidst a chaotic world." },
                { source: "Cold Mountain Poem", text: "Live through today, worry about this year. Better to pile up merits early like lotuses in the Pure Land. Dwell in calm devotion, and the vase fills naturally." },
                { source: "Sutra on Eight Awarenesses", text: "Many desires bring suffering; the fatigue of life and death arises from greed. Few desires bring effortless peace and liberation. Saving is a silent practice." },
                { source: "View of Impermanence", text: "All things in the universe flow and change. Knowing how to store provisions in times of prosperity prepares you to face the storm with absolute poise and no fear." },
                { source: "Master Hong Yi", text: "Knowing contentment brings lifelong dignity; knowing when to stop prevents lifelong shame. When the inner self is pure, the universe naturally becomes vast and abundant." },
                { source: "Platform Sutra", text: "The inherent nature is fully sufficient; do not seek outside. With few desires and contentment, transforming worldly resources into pure merits today is the highest practice." },
                { source: "Avatamsaka Sutra", text: "Everything is created by the mind alone. If you view the world with scarcity, everything is bleak; if you store provisions with contentment, every drop becomes a blessing." },
                { source: "Buddhist Proverb", text: "A spoonful of water gradually becomes an ocean; accumulated dust eventually builds Mount Meru. Every bit in the pure vase today is a non-retrogressing field of blessings." },
                { source: "Path to Liberation", text: "See through attachments to attain freedom. Restraining current greed, anger, and ignorance to preserve provisions for a greater compassionate vision is grand wisdom." },
                { source: "Mahaprajnaparamita Sastra", text: "Charity, morality, patience, and diligence. Today's self-discipline and moderation are the silent everyday practice of Viriya Paramita." },
                { source: "Samantabhadra Vows", text: "Always accord with sentient beings and maintain purity. Turn excess material desires into sweet dew, sealing it in the blessing vase to nourish the long path to enlightenment." },
                { source: "Shared by the Five", text: "Deeply realize that worldly wealth is shared by the five hazards. Only pure merits and wholesome causes are the true provisions that no one can steal." },
                { source: "Hundred Parables Sutra", text: "A foolish man saw another build a three-story house and wished to copy it, yet refused to lay the foundation. Today's saving is your most stable bedrock in the human realm." },
                { source: "Zen Teachings", text: "Close off external illusions and guard the domain of your heart. Saving a desire lights a lamp of wisdom to shatter future impermanence." },
                { source: "Lotus Sutra", text: "Constantly practice patience with a gentle spirit. Refuse to compare material wealth with the world, dwell in regular accumulation, and blessings will follow you like a shadow." },
                { source: "Serene Hall", text: "A nine-story tower rises from accumulated soil. Do not envy the blessings of others; starting from this step today, you are perfecting your own Pure Land provisions." },
                { source: "Diamond Sutra", text: "Past mind cannot be grasped, present mind cannot be grasped, future mind cannot be grasped. Dwell in the present and steadily accumulate provisions for your pure vase." },
                { source: "Heart Sutra", text: "The mind is without hindrance; because there is no hindrance, there is no fear. Contentment brings lasting joy. Saving plants a blessing for the future, yielding ultimate serenity." },
                { source: "Master Hong Yi", text: "The most beautiful scenery in life is inner calm and composure. With few desires and true contentment, every speck of dust and every phenomena becomes a field of blessings in the heart." },
                { source: "Platform Sutra", text: "All fields of blessings reside within the heart; seek from within, and everything aligns. Turn abundance into constant devotion, pouring pure water into micro-blessings." },
                { source: "Lotus Sutra Teachings", text: "Virtues and conditions are all born from vows. Every minor restraint and saving accumulates your merits and virtues across the cosmos, yielding great liberation." },
                { source: "Mahaprajnaparamita Sastra", text: "Like a person bringing a lamp into a dark room, the light shines and all darkness vanishes. Diligent saving is like holding a lamp, dispelling future impermanence and worry." },
                { source: "Buddhist Wisdom", text: "Though water drops are tiny, they gradually fill a great vessel. There is no shortcut to accumulating blessings; consistently infuse wholesome causes into daily thoughts." },
                { source: "Mind Cultivation", text: "Wealth is shared by the five hazards. Only inner richness and the spiritual provisions of your wholesome deeds are the true wealth that transcends impermanence." },
                { source: "Zen Teachings", text: "Seeking outwardly is an illusion; inner cultivation endures. Saving a single desire is lighting a lamp of the heart to illuminate the great path ahead." },
                { source: "Dust and Blessing", text: "A massive tree grows from a tiny sprout. Safely sealing your provisions in the pure vase today is the deepest reverence for the cosmic law of cause and effect." },
                { source: "Prajnaparamita Sutra", text: "If one can dwell in a mind that seeks nothing, all worldly abundance, joy, and provisions will naturally manifest in perfection without scarcity." },
                { source: "Master Yin Guang", text: "One part sincerity dispels one part negative karma and increases one part blessing and wisdom. Accumulate steadily; never slip into worldly superficiality and haste." },
                { source: "Vimalakirti Sutra", text: "According to the purity of one's mind, the Buddha-land is pure. If the mind is free from material bondage, your piggy bank transforms into an inexhaustible sacred vase." },

                ],
                'ja': [
                    { source: "金剛経", text: "過去心も得るべからず、現在心も得るべからず、未來心も得るべからず。当下に安住し、着実に浄瓶の資糧を積み重ねよ。" },
                { source: "心経", text: "心に罣礙（けげ）なし、罣礙なきが故に恐怖なし。知足常楽、貯蓄は未来に福の種を蒔き、真の大清静を得るためのものです。" },
                { source: "弘一法師", text: "人生で最も美しい景色は、内なる淡定と従容（しょうよう）です。少欲知足、一塵一法がすべて心の中の福田となります。" },
                { source: "六祖壇経", text: "一切の福田は方寸（ほうすん）を離れず、心より覓（もと）むれば通ぜざるはなし。豊かさを恒心に変え、小さな福の中に浄水を布施せよ。" },
                { source: "法華経", text: "福徳の因縁は、すべて願より生ず。毎回の微小な克制と貯蓄は、三千大千世界において、あなたの功徳と福徳を凝縮することです。" },
                { source: "大智度論", text: "人が灯火を携えて冥室に入るが如く、光明が照らせば諸々の闇は皆滅す。勤勉な貯蓄は灯火を掲げるが如く、未来の無常と憂いを取り除きます。" },
                { source: "仏門の知恵", text: "水滴は微小なれど、漸く大器を満たす。福報の蓄積に近道はなく、ただ日常の起心動念の間に、恒常不懈に善因を注ぎ込むのみです。" },
                { source: "修心格量", text: "財は五家（ごか）の共有物なり。ただ内なる富裕と手の中の善業資糧こそが、無常を乗り越えてあなたに随う真の富です。" },
                { source: "禅修の開示", text: "外に求めるは皆幻相であり、内に修めてこそ始終を得る。一つの欲念を貯めることは、一盞の心灯を点じ、前進する大路を照らすことです。" },
                { source: "一塵一福", text: "合抱の木も毫末より生ず。今日、資糧を静かに浄瓶に封じることは、宇宙の因果の法則に対する最も深遠なる礼敬です。" },
                { source: "大品般若経", text: "もし人が無所得の心に安住するを得ば、世間の一切の豊穣、喜楽、資糧は自然に具足するでしょう。" },
                { source: "印光大師", text: "一分の誠心は一分の罪業を消し、一分の福慧を増す。着実に積み重ね、決して世俗の虚浮と急躁に流されることなかれ。" },
                { source: "維摩詰経", text: "その心の清浄なるに随って仏土も清浄なり。心が物質の束縛を受けなければ、目の前の貯金箱も無尽蔵の宝瓶へと化します。" },
                { source: "広欽老和尚", text: "人は実直であるべし、修行は恒心であるべし。今日着実にお金の因果を蓄えれば、未来に一分の大自在を得るでしょう。" },
                { source: "寂静の道", text: "世間の喧騒はすべて過眼の雲煙にすぎず。手の中の浄水を守り、欲念によって蒸発させぬことこそが、最大の福報資糧です。" },
                { source: "大成の捷径", text: "善の小さきを以て為さざることなかれ。今日貯金箱に入る一分一毫も、因果の流転において、未来に無量の功徳を承ける福田となります。" },
                { source: "蓮池大師", text: "追求を一つ減らせば清涼が一つ増し、資財を一つ省けば慈悲が一つ増す。心神を安んじ、外に向かって馳せ求めることなかれ。" },
                { source: "無量寿経", text: "世人は共に不急の務めを争う。ただ知恵の中で内斂し持守してこそ、無常の紅塵の中で大いなる安穏を享受できます。" },
                { source: "寒山詩", text: "今日過ぐれば今日、今年憂えれば今年。早く積み重ねて功徳の浄土の蓮とするに如かず。心を定めて持守すれば、瓶は自ずから満ちる。" },
                { source: "八大人覚経", text: "多欲は苦なり、生死の疲労は貪欲より起こる。少欲無為なれば、身心自在なり。貯蓄とは無声の修持にほかなりません。" },
                { source: "無常観", text: "世間の万物は皆流転の中にあり。順境の時に遮蔽を知り資糧を残してこそ、無常（嵐）が到来した時に心に驚怖なく、泰然と処することができます。" },
                { source: "弘一法師", text: "足るを知れば常に足り、終身辱められず。止まるを知れば常に止まり、終身恥をかかず。内清浄なれば、目の前の乾坤は自ずから広大で豊かになります。" },
                { source: "六祖壇経", text: "本性は自ら足る、外に求めることなかれ。少欲知足、今日世俗の資糧を清浄な功徳に変えることこそ、最上乗の修持です。" },
                { source: "華厳経", text: "一切は唯心造なり。もし欠乏の心で世界を見るならば、至る所すべて荒涼。もし知足の心で資糧を蓄えるならば、一滴の水もすべて福報となります。" },
                { source: "仏門の格言", text: "一杓の水も漸く江海となり、微塵の積もるも終には須弥山となる。今日、浄瓶の中の一分一毫は、すべて未来の不退転の福田です。" },
                { source: "解脱の道", text: "執着を見破ってこそ、自在を得る。当下の貪・瞋・癡・慢を克制し、資糧をより広大な慈悲の願景に残すこと、これこそが大知恵です。" },
                { source: "大智度論", text: "布施・持戒・忍辱・精進。今日の自律と節制は、すなわち精進波羅蜜の日常における無声の修行です。" },
                { source: "普賢行願", text: "恒に衆生に順じ、常に清浄を行う。余計な物欲を甘露に変えて福報の浄瓶に封存し、未来の遥かなる菩提路を潤せ。" },
                { source: "五家の共有", text: "世間の富は五家（水・火・官・賊・命）の共有物であると深く知り、内なる清浄功徳と手の中の善因こそが、誰にも奪われぬ真の資糧なり。" },
                { source: "百喩経", text: "愚人、他人の三層の楼閣を見てこれを模倣せんとするも、その基礎を築くを欲せず。今日の貯蓄は、あなたが人間に築く最も堅固な基石です。" },
                { source: "禅修の開示", text: "外なる妄想を閉じ、内なる方寸を守る。一つの欲念を貯めることは、一盞の知恵の心灯を点じ、未来の無常を照らし破ることです。" },
                { source: "法華経", text: "常に忍辱を行い、心気和柔なり。世俗と物欲を競わず、当下の規則的な蓄積に安住すれば、福德は自ずから影の形の如く随います。" },
                { source: "維摩詰経", text: "居家にあるといえども三界に著せず。紅塵の中で資糧を打理するも、心は物質に奴隷化されぬこと、これこそが大乗菩薩の清浄な持守です。" },
                { source: "大諦造化", text: "因果は歴歴として違うことなし。今日ここに貯蓄の種を一つ蒔けば、因縁具足せし時、必ず心霊の安穏と福報に満ちた大樹を収穫せん。" },
                { source: "清浄法身", text: "外なる繁華は皆夢幻泡影なり。毎日の恒常なる自律を以て、己の霊魂の浮躁を洗い流し、最も純粋なる踏実へと帰せしむ。" },
                { source: "印光大師", text: "敦倫尽分、閑邪存誠。小さな事の中に己の本分を尽くし、浮誇せず、奢靡せず、福澤は自ずから綿長にして絶えず。" },
                { source: "仏暦随筆", text: "水滴石を穿つは一日の功に非ず。福報の凝聚もまた日日不断の堅持にあり。軽くクリックする、それもまた一筆の功徳資糧なり。" },
                { source: "心霊の寂静", text: "少欲の者は地上に臥すといえども、なお安楽なり。多欲の者は天堂に処すといえども、また意に称わず。清貧の中の富足を守るは、大清静なり。" },
                { source: "達摩祖師", text: "妄想なく、また執着なし。貯蓄を一種の自然な呼吸の如く見なし、急がず騒がず、因縁は自ずから水到りて渠成る。" },
                { source: "涅槃経", text: "善悪の報いは影の形の如く随い、三世の因果は循環して失わず。今日己を克して善を存せば、未来の清涼なる福報はすでに注がれています。" },
                { source: "广钦老和尚", text: "修行は急がず、実直であるべし。貯金も同じく、一日一歩、心安理得（しんあんりとく）なれば、これぞ真の真実なり。" },
                { source: "薬師経", text: "一切の貪吝執着を解脱せよ。小福の中で修持し、今日の資糧を無病無災・内心安寧の浄土エネルギーへと転化せよ。" },
                { source: "大願成就", text: "衆生の願力は不可思議なり。あなたの貯蓄の目標を利他の宏大なる願景へと変えれば、一歩一歩の蓄積がすべて無量の功徳を帯びん。" },
                { source: "百丈懐海", text: "一日作（な）さざれば、一日食らわず。勤労に家を保ち、知恵を以て収斂し、日常の起居労作の中で、己の福徳資糧を円満せよ。" },
                { source: "大悲咒の語境", text: "心に慈悲を抱けば、万物は豊穣なり。一己の私のために資源を揮霍（きかく）せず、理智的に持守すれば、全宇宙があなたの護法磁場と化さん。" },
                { source: "禅宗公案", text: "趙州の茶、雲門の餅、皆当下にあり。遠方の奢華を羨む必要なし、眼前の貯金箱を守れば、当下これ霊山の大堂なり。" },
                { source: "因果の鉄則", text: "春に一粒の粟を植えれば、秋に万顆の種を収穫す。因果は決して人を欺かず。今日省きし微小なる資財は、すなわち明日の大自在の因の始まりなり。" },
                { source: "弘一大師", text: "事事に余地を残す、これすなわち相（すがた）に著せず。富裕なる時に一分の退路を残すは、霊魂に対する最も深き優しさと慈悲なり。" },
                { source: "虚雲老和尚", text: "五帝四朝を座視するも、滄桑の幾度たるを覚えず。世間の財物は生れて来るとき持たず、死んでゆくとき携え得ず。ただ定力と善業のみが永く随う。" },
                { source: "清涼蓮語", text: "欲火は心を焼くも、ただ知足のみが清涼なる甘露と化す。今日浮躁なる消費欲を熄（めつ）すれば、浄瓶の一滴の功徳清泉に換わらん。" },
                { source: "太虚大師", text: "天を仰いで長嘯するは、頭を垂れて播種するに如かず。人成ればすなわち仏成る。当下の一分一毫の資産を理（おさ）めるは、世間法における最高級の修行なり。" },
                { source: "一塵一浄土", text: "一花一世界、一葉一如来。この小さき貯金箱こそ、あなたが物欲を洗い流し、福報と知恵を凝聚する清浄な方寸（こころ）なり。" },
                { source: "禅林僧宝伝", text: "寂寞に耐えてこそ、繁華を守り得る。退屈なる日日の蓄積の中で、あなたの心性は静かに蛻変（ぜいへん）し、円満に具足してゆく。" },
                { source: "慈悲の布施", text: "貯蓄は未来に多くの人々を救う能力を持つためのものです。この大慈悲心を抱いて蓄積すれば、一円一円がすべて仏光に輝かん。" },
                { source: "六度波羅蜜", text: "持戒はすなわち克制であり、精進はすなわち恒常なり。今日あなたが貯金箱の前で合掌せば、自律と長遠心を同時に修持することなり。" },
                { source: "清浄道論", text: "貪婪の染汚を遠離し、霊魂の純潔を保持せよ。物質の誘惑を看淡せば、未来の道路は自然に歩歩生蓮（ほほしょうれん）となり、罣礙（けげ）なからん。" },
                { source: "智者大師", text: "止観双修、定慧等持。消費の衝動を前にして「止」まり、未来の設計図の中で「観」ずれば、大富足なり。" },
                { source: "当下に安住", text: "外界の風浪がいかに起ころうとも、我は自ら蓮華台に安坐す。毎日の雷打不動の功徳登載を以て、世俗の無常に対抗する金色法盾を築け。" },
                { source: "圓満の始終", text: "九層の台も、累土より起こる。他人の福報を羨むことなかれ、今日のこの一歩より、あなたもまた己の浄土資糧を円満してゆく。" },
                { source: "心経の指引", text: "心に罣礙なければ、自然に恐怖なし。今日一分の奢華を省けば、明日の生活のために、もう一分の大清静を蓄えることなり。" },
                { source: "金剛経の開示", text: "一切の有為の法は、夢幻泡影の如し。眼前の物質の虚妄を見破り、着実に浄瓶の資糧を積み重ねることこそ、真の持守なり。" },
                { source: "弘一法師", text: "少欲知足、身心自在。この小さき貯金箱の前での毎回の登載は、心の中の無駄な雑草を修剪することなり。" },
                { source: "仏門の知恵", text: "水滴は微小なれど、漸く大器を満たす。福報の凝聚に近道はなく、ただ日常の克制の間に、恒常不懈に善因を注ぎ込むのみです。" },
                { source: "六祖壇経", text: "本性は自ら足る、外に求めることなかれ。世俗と物欲を競わず、規則的な蓄積に安住すれば、功徳と福徳は自ずから影の形の如く随います。" },
                { source: "大智度論", text: "人が灯火を携えて冥室に入るが如く、光明が照らせば諸々の闇は皆滅す。勤勉な貯蓄は灯火を掲げるが如く、未来の一切の無常の憂いを取り除きます。" },
                { source: "普賢行願", text: "恒に衆生に順じ、常に清浄を行う。余計な世俗の物欲を甘露に変えて封存してこそ、未来の遥かなる菩提路を潤すことができます。" },
                { source: "印光大師", text: "一分の誠心は一分の罪業を消し、一分の福慧を増す。着実に積み重ね、世俗の虚浮と急躁に流されることなかれ。" },
                { source: "維摩詰経", text: "その心の清浄なるに随って仏土も清浄なり。心が欲望に誘拐されなければ、眼前の貯蓄大堂こそ、あなたの清浄な心霊の方寸（こころ）なり。" },
                { source: "広欽老和尚", text: "人は実直であるべし、修行は恒心であるべし。貯金も同じく、一日一歩、心安理得なれば、これぞ真の真実なり。" },
                { source: "一塵一福", text: "合抱の木も毫末より生ず。今日、資糧を静かに浄瓶に封じることは、宇宙の因果の法則に対する最も深遠なる礼敬です。" },
                { source: "寒山詩意", text: "今日過ぐれば今日、今年憂えれば今年。早く積み重ねて功徳の浄土の蓮とするに如かず。心を定めて持守すれば、瓶は自ずから満ちる。" },
                { source: "八大人覚経", text: "多欲は苦なり、生死の疲労なり。少欲無為なれば身心自在なり。手の中の毎回の貯蓄は、すべて無声の修持なり。" },
                { source: "無常觀", text: "世間の万物は皆流転の中にあり。順境の時に遮蔽を知り資糧を残してこそ、暴風雨が到来した時に心に驚怖なく、泰然と処することができます。" },
                { source: "修心格量", text: "外なる繁華は皆過眼の雲煙にすぎず。手の中の浄水を守り、欲念によって蒸発させぬことこそ、人間最大の福報資糧です。" },
                { source: "大成の捷径", text: "善の小さきを以て為さざることなかれ。今日貯金箱に入る一分一毫も、因果の流転において、未来に無量の大安穏を承ける因の始まりなり。" },
                { source: "蓮池大師", text: "追求を一つ減らせば清涼が一つ増し、資財を一つ省けば慈悲が一つ増す。心神を安んじ、決して外に向かって馳せ求めることなかれ。" },
                { source: "無量寿経", text: "世人は共に不急の務めを争う。ただ知恵の中で内斂し持守してこそ、浮躁なる紅塵の中で、真の大自在を享受できます。" },
                { source: "清浄法身", text: "外に求めるは皆幻相であり、内に修めてこそ始終を得る。一つの欲念を貯めることは、一盞の知恵の心灯を点じ、前進する大路を照らすことです。" },
                { source: "因果の鉄則", text: "春に一粒の粟を植えれば、秋に万顆の種を収穫す。因果は決して人を欺かず。今日省きし微小なる資財は、すなわち明日の大解脱の種子なり。" },
                { source: "達摩祖師", text: "妄想なく、また執着なし。貯蓄を一種の自然な呼吸の如く見なし、急がず騒がず、因縁は自ずから水到りて渠成る。" },
                { source: "涅槃経", text: "善悪の報いは影の形の如く随う。今日己を克して善を存せば、己の霊魂の浮躁を洗い流し、未来の清涼なる福報はすでに注がれています。" },
                { source: "薬師経", text: "一切の貪吝執着を解脱せよ。小福の中で精進し、今日の資糧を無病無災・内心安寧の浄土エネルギーへと転化せよ。" },
                { source: "大願成就", text: "衆生の願力は不可思議なり。あなたの貯蓄の目標を利他的な宏大なる願景へと変えれば、一歩一歩の蓄積がすべて慈悲の光に輝かん。" },
                { source: "百丈懐海", text: "一日作（な）さざれば、一日食らわず。勤労に家を保ち、知恵を以て収斂し、日常の起居労作の中で、己の福德資糧を円満せよ。" },
                { source: "大悲心水", text: "心懷慈悲、万物は豊穣なり。一己の私のために資源を揮霍せず、理智的に持守すれば、全宇宙があなたの護法磁場と化さん。" },
                { source: "禅宗公案", text: "趙州の茶、雲門の餅、皆当下にあり。遠方の奢華を羨む必要なし、眼前の貯蓄を守れば、当下これ霊山の大堂なり。" },
                { source: "虚雲老和尚", text: "五帝四朝を座視するも、滄桑の幾度たるを覚えず。世間の財物は生れて来るとき持たず、死んでゆくとき携え得ず。ただ定力と善業のみが永く随う。" },
                { source: "清涼蓮語", text: "欲火は心を焼くも、ただ知足のみが清涼なる甘露と化す。今日浮躁なる消費欲を熄すれば、浄瓶の一滴の功徳清泉に換わらん。" },
                { source: "太虚大師", text: "天を仰いで長嘯するは、頭を垂れて播種するに如かず。眼前の当下一分一毫の資産を理めるは、世間法における最高級にして最も踏実なる修行なり。" },
                { source: "一塵一浄土", text: "一花一世界、一葉一如来。この小さき貯金箱こそ、あなたが物欲を洗い流し、知恵を凝聚する清浄な方寸なり。" },
                { source: "禅林僧宝", text: "寂寞に耐えてこそ、繁華を守り得る。退屈なる日日の蓄積の中で、あなたの心性は静かに蛻変し、円満に具足してゆく。" },
                { source: "六度持守", text: "持戒はすなわち克制であり、精進はすなわち恒常なり。今日あなたが貯金箱の前で合掌せば、自律と長遠心を同時に修持することなり。" },
                { source: "清淨道論", text: "貪婪の染汚を遠離し、霊魂の純潔を保持せよ。物質の誘惑を看淡せば、未来の道路は自然に歩歩生蓮となり、罣礙なからん。" },
                { source: "智者大師", text: "止觀双修、定慧等持。消費の衝動を前にして「止」まり、未来の設計図の中で「観」ずれば、大富足なり。" },
                { source: "当下に安住", text: "外界の風浪がいかに起ころうとも、我は自ら蓮華台に安坐す。毎日の雷打不動の功徳登載を以て、世俗の無常に対抗する金色法盾を築け。" },
                { source: "圓満の始終", text: "九層の台も、累土より起こる。他人の福報を羨むことなかれ、今日のこの一歩より、あなたもまた己の浄土資糧を円満してゆく。" },
                { source: "百喻経", text: "愚人、他人の三層の楼閣を見てこれを模倣せんとするも、その基礎を築くを欲せず。今日の貯蓄は、あなたが人間に築く最も堅固な基石です。" },
                { source: "仏門の格言", text: "一杓の水も漸く江海となり、微塵の積もるも終には須弥山となる。今日、浄瓶の中の一分一毫は、すべて未来の不退転福田です。" },
                { source: "解脱の道", text: "執着を見破ってこそ、自在を得る。当下の貪・瞋・癡・慢を克制し、資糧をより広大な慈悲の願景に残すこと、これこそが大知恵です。" },
                { source: "華厳経", text: "一切は唯心造なり。もし欠乏の心で世界を見るならば、至る所すべて荒涼。もし知足の心で資糧を蓄えるならば、一滴の水もすべて福報となります。" },
                { source: "清心神咒", text: "物欲は双眼を蒙蔽（もうへい）するも、自律は雲を撥（はら）って日を見せしむ。毎回の欲望との交鋒は、内なる如意宝珠の塵を拭うが如し。" },
                { source: "布施の心量", text: "手の中に常に余糧あり、心の中に常に慈悲あり。貯蓄は未来のある日に、他人の生命の中で風雨を遮る傘となるためのものです。" },
                { source: "恒常なる持守", text: "世間に千百種の風潮が流行（はや）るとも、己の方寸を守って乱さず。清晨（せいしん）の一筆の貯蓄は、霊魂に対する最も踏実なる早課（おつとめ）なり。" },
                { source: "安穏なる大堂", text: "知足の者は地上に臥すといえどもなお天堂の如し。多欲の者は天堂に処すといえどもなお地獄の如し。財富を理（おさ）めるは、すなわち霊魂を安んずることなり。" },
                { source: "知恵の福田", text: "外に向かって洗練を求めることなかれ、内に向かって堅固を求めるべし。あなたが虚栄のために消費するのをやめるとき、己の福田の中に常青の松柏を植えることなり。" },
                { source: "定力の修練", text: "消費主義が至る所に溢れる潮流の中で、あなたが貯蓄をしっかりと押し切るその定力は、すでに大多数の凡夫を超越しています。" },
                { source: "因果の示現", text: "今日、目立たぬ一小筆の資糧に見えるものも、時間の無窮の流転の中で、終には満天の繁星と化し、あなたの人生の旅路を護らん。" },
                { source: "心霊の浄瓶", text: "苦労して稼いだ福報を適切に封存し、みだりに漏失せしめず。これは吝嗇に非ず、宇宙の因果の法則に対する最も誠摯なる頂礼なり。" },
                { source: "圓満の始終", text: "日日に登載せば、歩步に蓮を生ず。この自律があなたの生命の一部と化するとき、人間至る所すべて安心無憂の普陀（ふだ）の大堂なり。" },
                { source: "心経の指引", text: "諸法は空の相（すがた）にして、生ぜず滅せず。心の中の無駄な攀縁（はんえん）と物欲を熄滅し、定心に浄瓶の資糧を蓄え、真空の大安穏を享受せよ。" },
                { source: "金剛経の開示", text: "相（すがた）を取らず、如如不動なり。満天の繁華なる消費の誘惑を前にして、手の中の貯金箱を守るは、これ無上の持守なり。" },
                { source: "弘一法師", text: "内清浄なれば、目の前の乾坤は自ずから広大なり。今日資糧を静かに封存するは、未来の日のために福田をもう一分植えることなり。" },
                { source: "仏門の知恵", text: "水滴は微小なれど、漸く大器を満たす。福報の凝聚はすべて日日不断の堅持にあり。軽くクリックする、それもまた一筆の功徳なり。" },
                { source: "六祖壇經", text: "一切の福田は方寸を離れず、心より覓むれば通ぜざるはなし。豊かさを恒心に変え、小さな福の中に浄水を布施せよ。" },
                { source: "大智度論", text: "布施・持戒・忍辱・精進。今日の自律と節制は、すなわち精進波羅蜜の日常における無声の修行です。" },
                { source: "普賢行願", text: "恒に衆生に順じ、常に清浄を行う。世俗と物欲を競わず、当下の規則的な蓄積に安住すれば、福德は自ずから影の形の如く随います。" },
                { source: "印光大師", text: "敦倫尽分、闲邪存誠。小さな事の中に己の本分を尽くし、浮誇せず、奢靡せず、福澤は自ずから綿長にして絶えず。" },
                { source: "維摩詰経", text: "居家にあるといえども三界に著せず。紅塵の中で資糧を打理するも、心は物質に奴隷化されぬこと、これ菩薩の清浄な持守なり。" },
                { source: "広欽老和尚", text: "修行は急がず、実直であるべし。貯金も同じく、一日一歩、心安理得なれば、これぞ真の真実なり。" },
                { source: "薬師経", text: "一切の貪吝執着を解脱せよ。小福の中で修持し、今日の資糧を無病無災・内心安寧の浄土エネルギーへと轉化せよ。" },
                { source: "大願成就", text: "衆生の願力は不可思議なり。あなたの貯蓄の目標を利他的な宏大なる願景へと変えれば、一歩一歩の蓄積がすべて無量の功徳を帯びん。" },
                { source: "百丈懐海", text: "一日作さざれば、一日食らわず。勤労に家を保ち、知恵を以て収斂し、日常の起居労作の中で、己の福徳資糧を円滿せよ。" },
                { source: "大悲咒の境", text: "心に慈悲を抱けば、万物は豊穣なり。一己の私のために資源を揮霍せず、理智的に持守すれば、全宇宙があなたの護法磁場と化さん。" },
                { source: "禅宗公案", text: "趙州茶、雲門餅、皆当下にあり。遠方の奢華を羨む必要なし、眼前の貯金箱を守れば、當下これ靈山の大堂なり。" },
                { source: "因果の鉄則", text: "春に一粒の粟を植えれば、秋に万顆の種を収穫す。因果は決して人を欺かず。今日省きし微小なる資財は、すなわち明日の大自在の因の始まりなり。" },
                { source: "弘一大師", text: "事事に余地を残す、これすなわち相に著せず。富裕なる時に一分退路を残すは、霊魂に対する最も深き優しさと慈悲なり。" },
                { source: "虚雲老和尚", text: "世間の財物は生れて来るとき持たず、死んでゆくとき携え得ず。ただ定力と善業のみが永く随う。一分一毫の資糧を理め、心に罣礙なし。" },
                { source: "清涼蓮語", text: "欲火は心を焼くも、ただ知足のみが清涼なる甘露と化す。今日浮躁なる消費欲を熄すれば、浄瓶の一滴の功徳清泉に換わらん。" },
                { source: "太虚大師", text: "天を仰いで長嘯するは、頭を垂れて播種するに如かず。人成ればすなわち仏成る。当下の一分一毫の資産を理めるは、世間法における最高級の修行なり。" },
                { source: "一塵一浄土", text: "一花一世界、一葉一如來。この小さき貯金箱こそ、あなたが物欲を洗い流し、福報與知恵を凝聚する清浄な方寸なり。" },
                { source: "禪林僧寶", text: "寂寞に耐えてこそ、繁華を守り得る。退屈なる日日の蓄積の中で、あなたの心性は静かに蛻変し、円滿に具足してゆく。" },
                { source: "六度持守", text: "持戒はすなわち克制であり、精進はすなわち恆常なり。今日あなたが存錢罐の前で合掌せば、自律と長遠心を同時に修持することなり。" },
                { source: "清淨道論", text: "貪婪の染汚を遠離し、靈魂の純潔を保持せよ。物質の誘惑を看淡せば、未来の道路は自然に步步生蓮となり、罣礙なからん。" },
                { source: "智者大師", text: "止觀双修、定慧等持。消費の衝動を前にして「止」まり、未来の設計図の中で「観」ずれば、大富足なり。" },
                { source: "当下に安住", text: "外界の風浪がいかに起ころうとも、我は自ら蓮華台に安坐す。毎日の雷打不動の功徳登載を以て、世俗の無常に対抗する金色法盾を築け。" },
                { source: "圓滿の始終", text: "九層の台も、累土より起こる。他人の福報を羨むことなかれ、今日のこの一歩より、あなたもまた己の浄土資糧を円滿してゆく。" },
                { source: "金剛経の開示", text: "若し菩薩、心、法に住して布施を行ずれば、人の暗に入りて則ち何も見えざるが如し。今日我ら無相に儲蓄し、踏実に生活せば、福徳は思量すべからず。" },
                { source: "印光大師", text: "一分の誠心は一分の罪業を消し、一分の福慧を増す。着実に積み重ね、決して世俗の虚浮と急躁に流されることなかれ。" },

                { source: "光之工作者", text: "将每一次点击当作能量的传递。稳固你的根基，彩虹的光芒将会从你的核心绽放出来。" },
                { source: "频率对齐", text: "匮乏来自恐惧，富足源于信任。信任宇宙的资源无穷无尽，而你正优雅地留存这份富饶。" },
                { source: "正念财富", text: "金钱在流动中带来体验，在静止中带来安定。欢喜地为它预备一间充满爱与光的香槟大厅。" },
                { source: "心灵滋养", text: "听一场环境的潮汐，感受呼吸的频率。存下安稳，是给自己最温柔、最长情的告白。" },
                { source: "丰盛蓝图", text: "宇宙的宝库早已为你敞开，今天你所存下的每一份安宁，都会化作未来实现奇迹的魔法羽翼。" },
                { source: "欧林", text: "你可以透过喜悦而非痛苦来学习与成长。当你顺应丰盛，储蓄便是一场快乐的能量游戏。" },
                { source: "迪帕克", text: "财富是意图的延伸。将你对未来的无限渴望，温柔地在当下化为具体且踏实的积累。" },
                { source: "零极限", text: "对不起，请原谅我，谢谢你，我爱你。清理对金钱的焦虑，让存钱筒成为纯净的显化空间。" },
                { source: "光轮共振", text: "当你的心轮充满感恩，你的海底轮便会长出延伸至大地深处的根，稳稳承接宇宙所有的餽赠。" },
                { source: "奇迹课程", text: "奇迹是自然的。当它没有发生，表示有些事情卡住了。今天存下的喜悦，就是疏通丰盛的钥匙。" },
                { source: "丰盛显化", text: "宇宙的资源是无限的，当你放下对匮乏的恐惧，财富之流就会像温暖的阳光一样洒满你的生活。" },
                { source: "海底轮能量", text: "深呼吸，将意识带回双脚。今天存下的每一笔能量，都是在为你的生命之树浇水，让根基无比稳固。" },
                { source: "路易斯·贺", text: "我放手让过去的限制离开。我现在就站在彩虹的顶端，欢喜地迎接生命赐予我的所有丰盛与好运。" },
                { source: "高频共振", text: "金钱是一种纯粹的能量。当你用爱与感恩的喜悦磁场去吸引它、留存它，它就会长久地留下来陪伴你。" },
                { source: "疗愈微风", text: "听一场环境的潮汐，让心灵安静下来。你今天存下的安稳，正在内在宇宙中，为你折射出最美的光芒。" },
                { source: "吸引力法则", text: "我是一块强大的财富磁铁。我的储蓄瓶里装满了感恩的频率，宇宙正以千百倍的温柔将奇迹回馈给我。" },
                { source: "内在宇宙", text: "你不需要为了证明自己而过度消费。你本身就是圆满具足的宇宙，拥有一切应得的爱与丰盛。" },
                { source: "巴夏开示", text: "跟随你当下的最高兴奋。储蓄不只是一组数字，它是你向生命之流投下的信任票，全然被爱包围。" },
                { source: "正念财富", text: "金钱在流动时带来源源不断的体验，在静止时带来无可取代的安定。优雅地为它预备一间香槟大厅。" },
                { source: "灵魂陪伴", text: "放慢脚步，听听内心最真实的声音。今天存下的不著相资产，是给自己灵魂的温柔防御盾牌。" },
                { source: "脉轮疗愈", text: "当你的心轮充满感恩，你的海底轮便会长出延伸至大地深处的根，稳稳承接宇宙所有的财富餽赠。" },
                { source: "零极限", text: "对不起，请原谅我，谢谢你，我爱。清理对金钱所有的焦虑与匮乏感，让储蓄筒成为纯净的显化空间。" },
                { source: "宇宙之爱", text: "对一小块钱微笑，整个宇宙的财富大门都会为你的频率而敞开。你正被这股丰盛的暖流温柔包裹。" },
                { source: "迪帕克", text: "财富是意图的延伸。将你对未来的无限渴望，化为当下一点一滴、温柔且踏实的积累。" },
                { source: "光之工作者", text: "将每一次的防误触点击当作能量的传递。稳固你的物质根基，彩虹的光芒将会从你的核心绽放出来。" },
                { source: "欧林", text: "你可以透过喜悦而非痛苦来成长。当你顺应丰盛的法则，储蓄就会变成一场最快乐、最舒心的能量游戏。" },
                { source: "心轮共振", text: "金钱是宇宙流动的爱之能量。我欢喜地接纳它，智慧地留存它，让我的生活充满无限奇迹与平静。" },
                { source: "奇迹课程", text: "奇迹是自然的。当它没有发生，表示有些事情卡住了。今天存下的喜悦，就是疏通丰盛的钥匙。" },
                { source: "内在小孩", text: "亲爱的，辛苦了。我们正一步一步建立最温慢的安全避风港，未来的我们，一定会无比幸福、自在。" },
                { source: "环境疗愈", text: "环境的声音能洗涤一切浮躁。看着水瓶的进度条慢慢上涨，这就是宇宙给你最美好的安心回报。" },
                { source: "吸引力核心", text: "当你发自内心感谢手里的每一笔资产，丰盛的磁场就已经在你的大厅扎根，好运无穷无尽。" },
                { source: "彩虹宣言", text: "不攀比、不焦虑，稳稳拿捏自己的生活节奏。今天存下的底气，是明天对抗无常的最强底牌。" },
                { source: "海底轮共鸣", text: "深呼吸，将能量带回大地。每一次理智的停留，都是在为你的人生大树浇水，根基坚不可摧。" },
                { source: "宇宙显化", text: "金钱流向快乐、珍惜它的人。带着爱把今天这笔放入储蓄瓶，你就是全宇宙最富足的显化大师。" }
                ],
                'en': [
                    { source: "Louise Hay", text: "I deserve a life of safety and abundance. I deeply thank the universe and the earth for all the prosperous blessings given to me right now." },
                { source: "Law of Attraction", text: "My frequency vibrates in perfect harmony with abundance. When I save with love and gratitude, money flows back to me with infinite tenderness." },
                { source: "Mindfulness Meditation", text: "Each time I invest energy into the saving jar, I am deeply nourishing my root chakra. Feel yourself unconditionally embraced by Mother Earth." },
                { source: "Bashar", text: "Act on your highest excitement with zero expectations. Wealth is the natural byproduct of flowing with life; you are already fully surrounded by love." },
                { source: "Healing ASMR", text: "Let your mind settle, like the gentle purr of a relaxed cat. Every saving act lights up a vibrant stroke of a rainbow within your inner universe." },
                { source: "Abundance Affirmation", text: "Money is the flowing energy of love from the universe. I joyfully accept it and wisely retain it, filling my life with endless miracles and peace." },
                { source: "Cosmic Feedback", text: "Breathe deeply and feel the abundance of the present. You have nothing to prove outwardly; you are the most precious treasure, worthy of all the beauty in the world." },
                { source: "Spiritual Healing", text: "Release the fear of scarcity and place your hands gently over your heart chakra. What you save today is not just digits, but a tender shield of protection for your soul." },
                { source: "Inner Child", text: "Dear one, you've worked hard. We are building the warmest safe harbor step by step. Our future self will surely be incredibly happy." },
                { source: "Flow of Abundance", text: "Be grateful for what you hold in this moment. When you smile at a small coin, the universe's gates of wealth quietly open to align with your frequency." },
                { source: "Lightworker", text: "Treat every click as a transmission of pure energy. Steady your foundation, and the rainbow light will radiate brilliantly from your core." },
                { source: "Frequency Alignment", text: "Scarcity stems from fear, while abundance springs from trust. Trust that cosmic resources are infinite, and you are elegantly retaining this richness." },
                { source: "Mindful Wealth", text: "Money brings experiences in its flow and brings stability in its stillness. Joyfully prepare a Champagne Hall filled with love and light for it." },
                { source: "Soul Nourishment", text: "Listen to the environmental tides and feel the rhythm of your breath. Storing this stability is the most tender and enduring confession to yourself." },
                { source: "Abundance Blueprint", text: "The universe's treasury has long been open to you. Every ounce of peace you save today turns into magical wings to manifest future miracles." },
                { source: "Orin", text: "You can learn and grow through joy rather than pain. When you align with the laws of abundance, saving becomes a delightful game of energy." },
                { source: "Deepak Chopra", text: "Wealth is the extension of intention. Gently transform your infinite desires for the future into concrete, earnest accumulation in the present." },
                { source: "Ho'oponopono", text: "I'm sorry, Please forgive me, Thank you, I love you. Cleanse all anxiety around money and let the ledger become a pure space of manifestation." },
                { source: "Chakra Resonance", text: "When your heart chakra overflows with gratitude, your root chakra extends deep into the earth, firmly receiving all cosmic gifts." },
                { source: "A Course in Miracles", text: "Miracles are natural. When they do not occur, something has become congested. The joy you save today is the key to unclogging the flow of abundance." },
                { source: "Abundance Manifestation", text: "The universe's resources are limitless. When you drop the fear of lack, the flow of wealth shines upon your life like warm sunlight." },
                { source: "Root Chakra Energy", text: "Inhale deeply and bring your awareness down to your feet. Every bit of energy saved today waters your tree of life, making its foundation unshakeable." },
                { source: "Louise Hay", text: "I release all past limitations. I stand at the peak of the rainbow now, joyfully welcoming all the prosperity and luck life bestows upon me." },
                { source: "High-Freq Resonance", text: "Money is pure energy. When you attract and retain it with a magnetic field of love and grateful joy, it stays to keep you company long-term." },
                { source: "Healing Breeze", text: "Listen to the rhythmic tides of your environment and let your heart settle. The stability you save today refracts the most beautiful rainbow light in your inner universe." },
                { source: "Law of Attraction", text: "I am a powerful money magnet. My saving jar is packed with the frequency of gratitude, and the universe reflects miracles back to me with absolute tenderness." },
                { source: "Inner Universe", text: "You don't need to overspend to prove your worth. You are a complete universe in yourself, holding all the love and abundance you deserve." },
                { source: "Bashar Teachings", text: "Follow your highest excitement in the moment. Savings are more than cold numbers; they are your vote of confidence in life's flow, fully wrapped in love." },
                { source: "Mindful Wealth", text: "Money brings a steady stream of experiences when flowing and irreplaceable stability when still. Elegantly prepare a Champagne Hall for it." },
                { source: "Soul Companionship", text: "Slow down and listen to the truest voice within. What you save today is a tender shield, silently supporting the most brilliant version of your future self." },
                { source: "Chakra Healing", text: "When your heart chakra fills with gratitude, your root chakra anchors deep into the earth, firmly catching every financial gift from the universe." },
                { source: "Ho'oponopono", text: "I'm sorry, Please forgive me, Thank you, I love you. Clear away all anxiety and lack, letting the ledger transform into a pure manifestation space." },
                { source: "Cosmic Love", text: "Smile at a single coin, and the grand gates of wealth will swing open for your frequency. You are being warmly enveloped by this affluent tide." },
                { source: "Deepak Chopra", text: "Wealth is the extension of intention. Shape your boundless longings for the future into gentle, rock-solid steps of daily accumulation." },
                { source: "Lightworker", text: "View every mindful click as a transmission of energy. Solidify your physical foundation, and the rainbow light will blossom from your core." },
                { source: "Orin", text: "You can choose to grow through joy rather than suffering. When you honor the laws of abundance, saving becomes a blissful energy game." },
                { source: "Heart Resonance", text: "Money is the flowing energy of love from the universe. I joyfully accept it and wisely retain it, filling my life with infinite miracles and peace." },
                { source: "A Course in Miracles", text: "Miracles are natural. When they do not occur, something has become congested. The joy you save today is the key to unclogging the flow of abundance." },
                { source: "Inner Child", text: "Dear one, you've worked hard. We are building the warmest safe harbor step by step. Our future self will surely be incredibly happy and free." },
                { source: "Ambient Healing", text: "The sounds of nature wash away all restlessness. Watching the progress bar of your water bottle rise is the universe's beautiful return of peace." },
                { source: "Attraction Core", text: "When you deeply thank every asset in your hands, the magnetic field of abundance roots itself in your hall, drawing boundless luck." },
                { source: "Rainbow Manifesto", text: "No comparisons, no anxiety—firmly hold your own rhythm of life. The confidence saved today is your strongest trump card against tomorrow's changes." },
                { source: "Root Chakra Resonance", text: "Breathe deeply and ground your energy. Every rational pause before spending waters your life's tree, building an unbreakable foundation." },
                { source: "Cosmic Manifestation", text: "Money flows toward joy and appreciation. Place today's entry into the saving jar with love; you are the ultimate master of abundance." }
                ],
                'ja': [
                    { source: "ルイーズ・ヘイ", text: "私は安全で豊かな人生を送る価値があります。今この瞬間、私に与えられているすべての豊かな恵みに、宇宙と大地へ心から感謝します。" },
                { source: "引き寄せの法則", text: "私の周波数は豊かさと完璧に共鳴しています。愛と感謝を込めて貯蓄するとき、お金は千百倍の優しさとなって私に還ってきます。" },
                { source: "マインドフルネス瞑想", text: "貯金箱にエネルギーを注ぐたびに、自分の第1チャクラ（ルートチャクラ）が深く満たされていきます。大地に無条件に抱かれる安心感を感じてください。" },
                { source: "バシャール", text: "期待を手放し、最大のワクワクに従って行動しましょう。富は生命の流れに順応した自然な産物であり、あなたはすでに愛に包まれています。" },
                { source: "癒やしのASMR", text: "リラックスした猫のゴロゴロ音のように、心を静めて。毎回の貯蓄は、内なる宇宙に美しい虹のひと筋を灯すことです。" },
                { source: "豊かさのアファメーション", text: "お金は宇宙を流れる愛のエネルギーです。私はそれをお祝いの心で受け入れ、知恵を持って蓄え、人生を奇跡と平穏で満たします。" },
                { source: "宇宙からのフィードバック", text: "深く息を吸い込んで、今ここにある豊かさを感じてください。外に証明する必要はありません。あなた自身が最も尊い宝物であり、世界の美しさを享受する価値があります。" },
                { source: "スピリチュアルヒーリング", text: "欠乏への恐れを手放し、両手をそっとハートチャクラに当てて。今日貯めたものは数字ではなく、自分の魂への優しいお守り（防護の盾）です。" },
                { source: "インナーチャイルド", text: "愛するあなたへ、お疲れ様。私たちは一歩ずつ、最も温かい安心の港を築いています。未来の私たちは、きっと最高に幸せになります。" },
                { source: "豊かさの循環", text: "今この瞬間の所有に感謝しましょう。小さな一円に微笑みかけるとき、宇宙の富の扉があなたの周波数に合わせて静かに開きます。" },
                { source: "ライトワーカー", text: "毎回のクリックをエネルギーの伝達として捉えて。あなたの根底を強固にすれば、コアから虹の輝きが解き放たれます。" },
                { source: "周波数の同調", text: "欠乏は恐れから生まれ、豊かさは信頼から源を発します。宇宙の資源は無尽蔵であることを信頼し、その豊かさを優雅に蓄えましょう。" },
                { source: "マインドフル・ウェルス", text: "お金は流れるときに体験をもたらし、静止するときに安定をもたらします。愛と光に満ちたシャンパン大堂を喜んで用意してあげましょう。" },
                { source: "心の滋養", text: "環境の潮汐に耳を傾け、呼吸の周波数を感じて。この安穏を貯めることは、自分自身への最も優しく、最も長情な告白です。" },
                { source: "豊かさの設計図", text: "宇宙の宝庫はすでにあなたに開かれています。今日あなたが蓄えた平穏は、未来に奇跡を起こす魔法の羽へと変わります。" },
                { source: "オリン", text: "あなたは苦痛ではなく、喜びを通じて学び、成長することができます。豊かさの法則に従うとき、貯蓄は最も楽しいエネルギーゲームになります。" },
                { source: "ディーパック・チョプラ", text: "富は意図の延長線上にあります。未来への無限の憧れを、今この瞬間の具体的で確かな蓄積へと優しく変えていきましょう。" },
                { source: "ホ・オポノポノ", text: "ごめんなさい、許してください、ありがとう、愛しています。お金に対する焦りをクリーニングし、貯金箱を純粋な現出の空間にしましょう。" },
                { source: "オーラ共振", text: "ハートチャクラが感謝で満たされるとき、ルートチャクラは大地の奥深くへと根を伸ばし、宇宙からのすべての贈り物をしっかりと受け止めます。" },
                { source: "奇跡のコース", text: "奇跡は自然なものです。それが起こらないときは、何かが滞っている証拠です。今日貯めた喜びが、豊かさを呼び込む鍵となります。" },
                { source: "豊かさの顕現", text: "宇宙の資源は無限です。欠乏への恐れを手放せば、富の流れは温かい陽光のようにあなたの生活に降り注ぎます。" },
                { source: "第1チャクラのエネルギー", text: "深く息を吸い、意識を足元に戻して。今日蓄えたエネルギーは、あなたの生命の木に水をやり、根底をこの上なく強固にすることです。" },
                { source: "ルイーズ・ヘイ", text: "過去の制限をすべて手放します。私は今、虹の頂点に立ち、生命がもたらしてくれるすべての豊かさと幸運を歓喜して迎えています。" },
                { source: "高頻度共振", text: "お金は純粋なエネルギーです。愛と感謝の喜びの磁場でそれを引き寄せ、留めるとき、それは長きにわたりあなたに寄り添ってくれます。" },
                { source: "癒やしの微風", text: "環境の潮汐を聴き、心を静めて。あなたが今日貯めた安穏は、内なる宇宙の中で最も美しい光の輝きを反射しています。" },
                { source: "引き寄せの法則", text: "私は強力な富の磁石です。私の貯蓄瓶は感謝の周波数で満たされており、宇宙は千百倍の優しさで奇跡を還してくれます。" },
                { source: "内なる宇宙", text: "自分を証明するために過度な消費をする必要はありません。あなた自身が円満具足の宇宙であり、得るべきすべての愛と豊かさを持っています。" },
                { source: "バシャールの開示", text: "当下の最高のワクワクに従って。貯蓄は単なる数字ではなく、生命の流れに対してあなたが投じた信頼票であり、完全に愛に包まれています。" },
                { source: "正念財富", text: "お金は流動するときに源々たる体験をもたらし、静止するときに代えがたい安定をもたらします。優雅にシャンパン大堂を用意しましょう。" },
                { source: "霊魂の付き添い", text: "歩みを緩め、内なる最も真実な声に耳を傾けて。今日貯めたものは、未来の最も素晴らしいあなたを裏で黙々と支えるためのお守りです。" },
                { source: "チャクラの癒やし", text: "ハートチャクラが感謝で満たされるとき、ルートチャクラは大地の奥深くへと根を伸ばし、宇宙からのすべての富の贈り物をしっかりと受け止めます。" },
                { source: "ホ・オポノポノ", text: "ごめんなさい、許してください、ありがとう、愛しています。お金に対する焦りや欠乏感をクリーニングし、貯蓄を純粋な現出の空間に。" },
                { source: "宇宙の愛", text: "小さな一円に微笑みかけるとき、宇宙の富の扉があなたの周波数に合わせて静かに開きます。あなたはこの豊かな暖流に優しく包まれています。" },
                { source: "ディーパック", text: "富は意図の延長です。未来への無限の渇望を、今この瞬間の優しく踏実な蓄積へと変えていきましょう。" },
                { source: "ライトワーカー", text: "誤タップ防止の毎回のクリックをエネルギーの伝達として捉えて。物質的根基を固めれば、虹の輝きがコアから咲き誇ります。" },
                { source: "オリン", text: "苦しみではなく喜びを通じて成長できます。豊かさの法則に従えば、貯蓄は最も楽しくて心地よいエネルギーゲームになります。" },

        gospel: { 
            name: { 'zh-TW': "✝️ 恩典管家", 'zh-CN': "✝️ 恩典管家", 'en': "✝️ Grace Steward", 'ja': "✝️ 恩寵の執事" },
            runnerIcon: "🕊️",
            quotes: {
                'zh-TW': [
                    { source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，便是忠心、良善又智慧的管家。" },
                { source: "箴言", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
                { source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的富足與託付交給妳。" },
                { source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },
                { source: "五餅二魚", text: "不要輕看手中微小的五餅二魚。憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。" },
                { source: "詩篇", text: "祂使我的福杯滿溢。在感恩與順服中智慧行事，耶和華必作你的牧者，使你的產業在乾旱之年依然青翠。" },
                { source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
                { source: "信心播種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
                { source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
                { source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
                { source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
                { source: "箴言十", text: "耶和華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的管道。" },
                { source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆的產業。" },
                { source: "萬物源頭", text: "我們帶不走地上的絲毫，卻能管理好當下的重託。用智慧為未來的恩典築起高牆。" },
                { source: "管家格言", text: "儲蓄不是出於對明天的恐懼，而是出於對今天恩典的尊重與管理。滿有平安，毫無匱乏。" },
                { source: "瑪拉基書", text: "以此試試我，是否為你們敞開天上的窗戶，傾福與你們，甚至無處可容。信心隨行，毫無憂慮。" },
                { source: "傳道書", text: "當將你的糧食撒在水面，因為日久必能得著。明智的收斂與預備，是看透世事後的沉穩智慧。" },
                { source: "箴言十三", text: "不義之財必速減；勤勞積蓄的必豐盈。在誠實中一塊錢一塊錢的累積，神的應許永不落空。" },
                { source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
                { source: "應許大廳", text: "看哪！天上的飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧的管理，而非出於對匱乏的恐懼。" },
                { source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
                { source: "箴言十", text: "耶好華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的渠道。" },
                { source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆的產業。" },
                { source: "萬物源頭", text: "我們帶不走地上的絲毫，卻能管理好當下的重託。用智慧為未來的恩典大廳築起高牆。" },
                { source: "管家格言", text: "儲蓄不是出於對明天的恐懼，而是出於對今天恩典的尊重與管理。滿有平安，毫無匱乏。" },
                { source: "瑪拉基書", text: "以此試試我，是否為你們敞開天上的窗戶，傾福與你們，甚至無處可容。信心隨行，毫無憂慮。" },
                { source: "傳道書", text: "當將你的糧食撒在水面，因為日久必能得著。明智的收斂與預備，是看透世事後的沉穩智慧。" },
                { source: "箴言十三", text: "不義之財必速減；勤勞積蓄的必豐盈。在誠實中一塊錢一塊錢的累積，神的應許永不落空。" },
                { source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
                { source: "應許大廳", text: "看哪！天上的飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧的管理，而非出於對匱乏的恐懼。" },
                { source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對神託付之資產最美的交代。" },
                { source: "箴言廿一", text: "智慧人家中積蓄寶物膏油；愚昧人隨得隨吞。今天我們選擇作智慧人，為未來預備充足的油。" },
                { source: "詩篇廿三", text: "耶和華是我的牧者，我必不致缺乏。在豐盛中常存謙卑與憐憫，祂必帶領你走在青草地上。" },
                { source: "提摩太前書六", text: "不要寄託希望於無常的財富上，只要寄託於那厚賜萬物給我們享受的神。智慧理財，得享真正生命。" },
                { source: "信心撒種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
                { source: "路加十六", text: "倘若你們在不義的錢財上不忠心，誰還把那真實的錢財託付你們呢？理好眼前的每一塊錢，是高級的修煉。" },
                { source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
                { source: "箴言六", text: "懶惰人哪，你去察看螞蟻的動作就可得智慧。螞蟻在夏天預備食物，在收割時聚斂糧食。今天，我們學習這份遠見。" },
                { source: "哥林多後書九", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
                { source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
                { source: "箴言八", text: "智慧的果實勝過黃金，強如精金；她的出產超乎高銀。在智慧的引導下累積，你的財富將滿有平安。" },
                { source: "馬太六", text: "不要為明天憂慮，因為明天自有明天的憂慮。今天的儲蓄是智慧的管理，不是憂慮的堆積，心安理得。" },
                { source: "利未記", text: "地裡的出產都要歸耶和華為聖。帶著聖潔與感恩的心去打理你的每一分資產，豐盛的泉源必長流不息。" },
                { source: "箴言廿二", text: "智慧人見禍藏躲；愚蒙人前往受害。每天雷打不動的儲蓄，就是你見禍藏躲、未雨綢繆的智慧高牆。" },
                { source: "信心之盾", text: "憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。不要輕看手中這筆微小的資源。" },
                { source: "詩篇一一二", text: "他家中有財寶道德；他的仁義存到永遠。讓財富與智慧並行，你的家庭必在恩典中得享大安穩。" },
                { source: "管家宣告", text: "我受託管理這份豐盛，必以忠心、良善與智慧回報。每一步的克制與累積，都是在為主預備器皿。" },
                { source: "箴言十四", text: "智慧婦人建立家室；愚妄婦人親手拆毀。用每天的堅持與理智，為你的家庭築起最穩固的經濟防線。" },
                { source: "路加福音六", text: "你們要給人，就必有給你們的，並且用十足的升斗，連搖帶按，尖疊地落在你們懷裡。智慧累積，大能布施。" },
                { source: "平安應許", text: "我的神必照祂榮耀的豐盛，在基督耶穌裡使你們一切所需用的都充足。常存知足的心，大富足也。" },
                { source: "箴言廿八", text: "誠實人必多得福；想要急速發財的，不免受罰。踏踏實實、一塊錢一塊錢的累積，才是蒙福的王道。" },
                { source: "羅馬書", text: "凡事都不可虧欠人，唯有彼此相愛，要常以為虧欠。理清你的財務，讓你的生命毫無罣礙、滿有自由。" },
                { source: "箴言十五", text: "少有財寶，敬畏耶和華，強如多有財寶，煩亂不安。守住心中的平安與存錢罐，是最上乘的富足。" },
                { source: "信心足跡", text: "不要輕看手中微小的五餅二魚。只要在小事上忠心，微小的累積在信心的應許裡，也必將化作無窮的倉房。" },
                { source: "箴言十九", text: "憐憫貧窮的，就是借給耶和華；他的善行，耶和華必償還。智慧儲蓄，為了未來有更大的能力去愛與給予。" },
                { source: "以弗所書", text: "神能照著運行在我們心裡的大能，充充足足地成就一切，超過我們所求所想的。今天，繼續帶著信心前行。" },
                { source: "箴言十", text: "手懶的，要受貧窮；手勤的，卻要富足。不要羨慕他人的豐盛，用你今天的殷勤點擊，圓滿你自己的器皿。" },
                { source: "彼得前書", text: "各人要照所得的恩賜彼此服事，作神百般恩賜的好管家。今天你依然走在智慧打理、領受應許的路上。" },
                { source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳裡。" },
                { source: "恩典大廳", text: "願恩惠、平安從我們的父神充充足足地加給你們！在小小的存錢罐中，見證信心與毅力滴水穿石的永恆應許。" },
                { source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，作良善智慧的好管家。" },
                { source: "箴言指引", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
                { source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的託付交託給你。" },
                { source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },
                { source: "五餅二魚", text: "不要輕看手中微小的資源。憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。" },
                { source: "詩篇應許", text: "祂使我的福杯滿溢。在感恩與順服中智慧行事，耶和華必作你的牧者，使你的產業常青。" },
                { source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
                { source: "信心播種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的無窮倉房預備豐盛。" },
                { source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄。" },
                { source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心滴水穿石。" },
                { source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
                { source: "箴言十", text: "耶和華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的渠道。" },
                { source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆產業。" },
                { source: "萬物源頭", text: "我們帶不走地上的絲毫，卻能管理好當下的重託。用智慧為未來的恩典大廳築起高牆。" },
                { source: "管家格言", text: "儲蓄不是出於對明天的恐懼，而是出於對今天恩典的尊重與管理。滿有平安，毫無匱乏。" },
                { source: "瑪拉基書", text: "以此試試我，是否為你們敞開天上的窗戶，傾福與你們，甚至無處可容。信心隨行。" },
                { source: "傳道書", text: "當將你的糧食撒在水面，因為日久必能得著。明智的收斂與預備，是看透世事後的沉穩智慧。" },
                { source: "箴言十三", text: "不義之財必速減；勤勞積蓄的必豐盈。在誠實中一塊錢一塊錢的累積，神的應許永不落空。" },
                { source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
                { source: "應許大廳", text: "看哪！天上的飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧，而非出於對匱乏的恐懼。" },
                { source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對託付資產最美的交代。" },
                { source: "箴言廿一", text: "智慧人家中積蓄寶物膏油；愚昧人隨得隨吞。今天我們選擇作智慧人，為未來預備充足的油。" },
                { source: "提摩太前書", text: "不要寄託希望於無常的財富上，只要寄託於厚賜萬物給我們的神。智慧理財，得享真正生命。" },
                { source: "路加十六", text: "倘若你們在不義的錢財上不忠心，誰還把那真實的錢財託付你們呢？理好眼前的每一塊錢。" },
                { source: "箴言六", text: "懶惰人哪，你去察看螞蟻的動作。螞蟻在夏天預備食物，在收割時聚斂糧食. 學習這份遠見。" },
                { source: "箴言八", text: "智慧的果實勝過黃金，強如精金；她的出產超乎高銀。在智慧的引導下累積，財富將滿有平安。" },
                { source: "馬太六", text: "不要為明天憂慮，因為明天自有明天的憂慮。今天的儲蓄是智慧管理，不是憂慮堆積，心安理得。" },
                { source: "利未記", text: "地裡的出產都要歸耶和華為聖。帶著聖潔與感恩的心去打理你的每一分資產，泉源必長流不息。" },
                { source: "箴言廿二", text: "智慧人見禍藏躲；愚蒙人前往受害。每天雷打不動的儲蓄，就是你未雨綢繆的智慧高牆。" },
                { source: "詩篇一一二", text: "他家中有財寶道德；他的仁義存到永遠。讓財富與智慧並行，你的家庭必在恩典中得享大安穩。" },
                { source: "管家宣告", text: "我受託管理這份豐盛，必以忠心、良善與智慧回報。每一步的克制與累積，都是在為主預備器皿。" },
                { source: "箴言十四", text: "智慧婦人建立家室；愚妄婦人親手拆毀。用每天的堅持與理智，為家庭築起最穩固的經濟防線。" },
                { source: "路加福音六", text: "你們要給人，就必有給你們的，並且用十足的升斗，連搖帶按，尖疊地落在你們懷裡。智慧累積。" },
                { source: "平安應許", text: "我的神必照祂榮耀的豐盛，在基督耶穌裡使你們一切所需用的都充足。常存知足的心，大富足也。" },
                { source: "箴言廿八", text: "誠實人必多得福；想要急速發財的，不免受罰。踏踏實實、一塊錢一塊錢的累積，才是蒙福王道。" },
                { source: "羅馬書", text: "凡事都不可虧欠人，唯有彼此相愛，要常以為虧欠。理清財務，讓你的生命毫無罣礙、滿有自由。" },
                { source: "箴言十五", text: "少有財寶，敬畏耶和華，強如多有財寶，煩亂不安。守住心中的平安與存錢罐，是最上乘的富足。" },
                { source: "信心足跡", text: "不要輕看手中微小的五餅二魚。只要在小事上忠心，微小的累積在信心的應許裡，也必將化作無窮。" },
                { source: "箴言十九", text: "憐憫貧窮的，就是借給耶和華；他的善行，耶和華必償還。智慧儲蓄，為了未來有能力去愛。" },
                { source: "以弗所書", text: "神能照著運行在我們心裡的大能，充充足足地成就一切，超過我們所求所想的。今天繼續前行。" },
                { source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳。" },
                { source: "約書亞記", text: "這律法書不可離開你的口，總要晝夜思想。將自律的話語刻在心頭，你的道路就必亨通，凡事順利。" },
                { source: "詩篇一編", text: "他要像一棵樹栽在溪水旁，按時候結果子，葉子也不枯乾。凡他所做的盡都順利。規律累積的福分。" },
                { source: "箴言二十", text: "不要貪睡，免致貧窮；眼要睜開，就得飽食。清晨在防誤觸大廳按下的第一筆，就是清醒的開端。" },
                { source: "哥林多前", text: "凡事都要規規矩矩地按著次序行。把你的財務流水理得井井有條，這也是對上帝賜予秩序的尊崇。" },
                { source: "加拉太書", text: "我們行善，不可喪志；若不灰心，到了時候就要收割。儲蓄的路上不要氣餒，應許的季節必會來到。" },
                { source: "帖撒羅尼迦", text: "要常常喜樂，不住地禱告，凡事謝恩。帶著滿滿的感恩與喜悅來管理每一塊錢，資產必蒙保守。" },
                { source: "箴言十六", text: "心中的謀劃在乎人，舌頭的應對由於耶和華。你所做的，要交託耶和華，你所謀的，就必成立。" },
                { source: "希伯來書", text: "必須忍耐，使你們行完了神的旨意，就可以得著所應許的。這三十天的恆心，主都看在眼裡。" },
                { source: "恩典大廳", text: "願恩惠、平安從我們的父神充充足足地加給你們！在小小的存錢罐中，見證信心與毅力滴水穿石的永恆應許。" },
                { source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對神託付之資產最美的交代。" },
                { source: "箴言廿一", text: "智慧人家中積蓄寶物膏油；愚昧人隨得隨吞。今天我們選擇作智慧人，為未來預備充足的油。" },
                { source: "詩篇廿三", text: "大能者是我的牧者，我必不致缺乏。在豐盛中常存謙卑與憐憫，祂必帶領你走在青草地上。" },
                { source: "提摩太前書", text: "不要寄託希望於無常的財富上，只要寄託於那厚賜萬物給我們享受的神。智慧理財，得享真正生命。" },
                { source: "信心撒種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
                { source: "路加十六", text: "倘若你們在不義的錢財上不忠心，誰還把那真實的錢財託付你們呢？理好眼前的每一塊錢，是高級的修煉。" },
                { source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
                { source: "箴言六", text: "懶惰人哪，你去察看螞蟻的動作就可得智慧。螞蟻在夏天預備食物，在收割時聚斂糧食。今天，我們學習這份遠見。" },
                { source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
                { source: "恩典宣告", text: "大能者啊，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },

                { source: "以弗所書", text: "神能照著運行在我們心裡的大能，充充足足地成就一切，超過我們所求所想的。今天，繼續帶著信心前行。" },
                { source: "箴言十", text: "手懶的，要受貧窮；手勤的，卻要富足。不要羨慕他人的豐盛，用你今天的殷勤點擊，圓滿你自己的器皿。" },
                { source: "彼得前書", text: "各人要照所得的恩賜彼此服事，作神百般恩賜的好管家。今天你依然走在智慧打理、領受應許的路上。" },
                { source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳裡。" },
                { source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，便是忠心、良善又智慧的管家。" },
                { source: "箴言", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
                { source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的富足與託付交給妳。" },
                { source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },

                ],
                'zh-CN': [
                    { source: "马太福音", text: "因为你的财宝在哪里，你的心也在哪里。好好管理手中的资产，便是忠心、良善又智慧的管家。" },
                { source: "箴言", text: "手懒的，要受贫穷；手勤的，却要富足。智慧的财务规划，能在恩典中得享心灵的真正安稳。" },
                { source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。将今日的本分做好，神必将更大的富足与托付交给妳。" },
                { source: "提摩太前书", text: "敬虔加上知足的心便是大利了。储蓄不为积攒地上的财宝，乃为在主里得着随事随在的平安。" },
                { source: "五饼二鱼", text: "不要轻看手中微小的五饼二鱼。凭着信心交托并播种，恩典的泉源必将在生命的旷野中化为神迹。" },
                { source: "诗篇", text: "祂使我的福杯满溢。在感恩与顺服中智慧行事，耶和华必作你的牧者，使你的产业在干旱之年依然青翠。" },
                { source: "智慧管家", text: "万物都从神而来，我们只是代为管理的忠心仆人。用远见规划资产，在丰盛中常存谦卑与怜悯的心。" },
                { source: "信心播种", text: "流泪撒种的，必欢呼收割。今天的每一分自律与忍耐，都是在为未来的恩典大厅，预备丰盛的无穷仓房。" },
                { source: "哥林多后书", text: "神能将各样的恩惠多多的加给你们，使你们凡事常常充足，能多行各样善事。智慧储蓄，丰盛一生。" },
                { source: "恩典宣告", text: "我的心哪，你要称颂耶和华！不忘记祂的一切恩惠，在小小的存钱罐中，见证信心与毅力滴水穿石的应许。" },
                { source: "申命记", text: "你要纪念耶和华你的神，因为得货财的力量是祂给你的。以感恩之心，作忠诚的资产守门人。" },
                { source: "箴言十", text: "耶和华所赐的福使人富足，并不加上忧虑。智慧地留存与规划，是领受长远平安的管道。" },
                { source: "路加十二", text: "你们的生命不在乎家产丰盛。得着那不能坏的钱囊，今天在小钱上忠心，明天领受永恒的产业。" },
                { source: "万物源头", text: "我们带不走地上的丝毫，却能管理好当下的重托。用智慧为未来的恩典筑起高墙。" },
                { source: "管家格言", text: "储蓄不是出于对明天的恐惧，而是出于对今天恩典的尊重与管理。满有平安，毫无匮乏。" },
                { source: "玛拉基书", text: "以此试试我，是否为你们敞开天上的窗户，倾福与你们，甚至无处可容。信心随行，毫无忧虑。" },
                { source: "传道书", text: "当将你的粮食撒在水面，因为日久必能得着。明智的收敛与预备，是看透世事后的沉稳智慧。" },
                { source: "箴言十三", text: "不义之财必速减；勤劳积蓄的必丰盈。在诚实中一块钱一块钱的积累，神的应许永不落空。" },
                { source: "希伯来书", text: "你们存心不可贪恋钱财，要以自己所有的为足。因为主曾说：我总不撇下你，也不丢弃你。" },
                { source: "应许大厅", text: "看哪！天上的飞鸟不种也不收，天父尚且养活它们。今天的克制是出于智慧的管理，而非出于对匮乏的恐惧。" },
                { source: "申命记", text: "你要纪念耶和华你的神，因为得货财的力量是祂给你的。以感恩之心，作忠诚的资产守门人。" },
                { source: "箴言十", text: "耶和华所赐的福使人富足，并不加上忧虑。智慧地留存与规划，是领受长远平安的渠道。" },
                { source: "路加十二", text: "你们的生命不在乎家产丰盛。得着那不能坏的钱囊，今天在小钱上忠心，明天领受永恒的产业。" },
                { source: "万物源头", text: "我们带不走地上的丝毫，却能管理好当下的重托。用智慧为未来的恩典大厅筑起高墙。" },
                { source: "管家格言", text: "储蓄不是出于对明天的恐惧，而是出于对今天恩典的尊重与管理。满有平安，毫无匮乏。" },
                { source: "玛拉基书", text: "以此试试我，是否为你们敞开天上的窗户，倾福与你们，甚至无处可容。信心随行，毫无忧虑。" },
                { source: "传道书", text: "当将你的粮食撒在水面，因为日久必能得着。明智的收敛与预备，是看透世事后的沉稳智慧。" },
                { source: "箴言十三", text: "不义之财必速减；勤劳积蓄的必丰盈。在诚实中一块钱一块钱的积累，神的应许永不落空。" },
                { source: "希伯来书", text: "你们存心不可贪恋钱财，要以自己所有的为足。因为主曾说：我总不撇下力，也不丢弃你。" },
                { source: "应许大厅", text: "看哪！天上的飞鸟不种也不收，天父尚且养活它们。今天的克制是出于智慧的管理，而非出于对匮乏的恐惧。" },
                { source: "哥林多前书", text: "所求于管家的，是要他有忠心。在日常的收支中常存远见，就是对神托付之资产最美的交代。" },
                { source: "箴言廿一", text: "智慧人家中积蓄宝物膏油；愚昧人随得随吞。今天我们选择作智慧人，为未来预备充足的油。" },
                { source: "诗篇廿三", text: "耶和华是我的牧者，我必不致缺乏。在丰盛中常存谦卑与怜悯，祂必带领你走在青草地上。" },
                { source: "提摩太前书六", text: "不要寄托希望于无常的财富上，只要寄托于那厚赐万物给我们享受的神。智慧理财，得享真正生命。" },
                { source: "信心撒种", text: "流泪撒种的，必欢呼收获。今天的每一分自律与忍耐，都是在为未来的恩典大厅，预备丰盛的无穷仓房。" },
                { source: "路加十六", text: "倘若你们在不义的钱财上不忠心，谁还把那真实的钱财托付你们呢？理好眼前的每一块钱，是高级的修炼。" },
                { source: "智慧管家", text: "万物都从神而来，我们只是代为管理的忠心仆人。用远见规划资产，在丰盛中常存谦卑与怜悯的心。" },
                { source: "箴言六", text: "懒惰人哪，你去察看蚂蚁的动作就可得智慧。蚂蚁在夏天预备食物，在收获时聚敛粮食。今天，我们学习这份远见。" },
                { source: "哥林多后书九", text: "神能将各样的恩惠多多的加给你们，使你们凡事常常充足，能多行各样善事。智慧储蓄，丰盛一生。" },
                { source: "恩典宣告", text: "我的心哪，你要称颂耶和华！不忘记祂的一切恩惠，在小小的存钱罐中，见证信心与毅力滴水穿石的承诺。" },
                { source: "箴言八", text: "智慧的果实胜过黄金，强如精金；她的出产超乎高银。在智慧的引导下 my 积累，你的财富将满有平安。" },
                { source: "马太六", text: "不要为明天忧虑，因为明天自有明天的忧虑。今天的储蓄是智慧的管理，不是忧虑的堆积，心安理得。" },
                { source: "利未记", text: "地里的出产都要归耶和华为圣。带着圣洁与感恩的心去打理你的每一分资产，丰盛的泉源必长流不息。" },
                { source: "箴言廿二", text: "智慧人见祸藏躲；愚蒙人前往受害。每天雷打不动的储蓄，就是你见祸藏躲、未雨绸缪的智慧高墙。" },
                { source: "信心之盾", text: "凭着信心交托并播种，恩典的泉源必将在生命的旷野中化为神迹。不要轻看手中这笔微小的资源。" },
                { source: "诗篇一一二", text: "他家中有财宝道德；他的仁义存到永远。让财富与智慧并行，你的家庭必在恩典中得享大安稳。" },
                { source: "管家宣告", text: "我受托管理这份丰盛，必以忠心、良善与智慧回报。每一步的克制与积累，都是在为主预备器皿。" },
                { source: "箴言十四", text: "智慧妇人建立家室；愚妄妇人亲手拆毁。用每天的坚持与理智，为你的家庭筑起最稳固的经济防线。" },
                { source: "路加福音六", text: "你们要给人，就必有给你们的，并且用十足的升斗，连摇带按，尖叠地落在你们怀里。智慧积累，大能布施。" },
                { source: "平安应许", text: "我的神必照祂荣耀的丰盛，在基督耶稣里使你们一切所需用的都充足。常存知足的心，大富足也。" },
                { source: "箴言廿八", text: "诚实人必多得福；想要急速发财的，不免受罚。踏踏实实、一块钱一块钱的积累，才是蒙福的王道。" },
                { source: "罗马书", text: "凡事都不可亏欠人，唯有彼此相爱，要常以为亏欠。理清你的财务，让你的生命毫无挂碍、满有自由。" },
                { source: "箴言十五", text: "少有财宝，敬畏耶和华，强如多有财宝，烦乱不安。守住心中的平安与存钱罐，是最上乘的富足。" },
                { source: "信心足迹", text: "不要轻看手中微小的五饼二鱼。只要在小事上忠心，微小的积累在信心的应许里，也必将化作无穷的仓房。" },
                { source: "箴言十九", text: "怜悯贫穷的，就是借给耶和华；他的善行，耶和华必偿还。智慧储蓄，为了未来有更大的能力去爱与给予。" },
                { source: "以弗所书", text: "神能照着运行在我们心里的大能，充充足足地成就一切，超过我们所求所想的。今天，继续带着信心前行。" },
                { source: "箴言十", text: "手懒的，要受贫穷；手勤的，却要富足。不要羡慕他人的丰盛，用你今天的殷勤点击，圆满你自己的器皿。" },
                { source: "彼得前书", text: "各人要照所得的恩赐彼此服事，作神百般恩赐的好管家。今天你依然走在智慧打理、领受应许的路上。" },
                { source: "永恒保障", text: "因为你的财宝在哪里，你的心也在哪里。好好管理地上的资产，同时将心安放在永恒的平安大厅里。" },
                { source: "恩典大厅", text: "愿恩惠、平安从我们的父神充充足足地加给你们！在小小的存钱罐中，见证信心与毅力滴水穿石的永恒应许。" },
                { source: "马太福音", text: "因为你的财宝在哪里，你的心也在哪里。好好管理手中的资产，作良善智慧的好管家。" },
