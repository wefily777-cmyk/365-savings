<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-color: #fceade; /* Plan Joy 療癒暖粉底色 */
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-color: #2c1a11;
            --text-muted: #8c766b;
            --border-color: rgba(44, 26, 17, 0.06);
            --cell-bg: #ffffff;
            --cell-text: #4a3728;
            --btn-gradient: linear-gradient(135deg, #e07a5f 0%, #3d5a80 100%);
            --checked-bg: linear-gradient(135deg, #81b29a 0%, #67947d 100%);
            --checked-text: #ffffff;
            --water-color: linear-gradient(180deg, #98c1d9 0%, #3d5a80 100%);
            --app-shadow: 0 12px 30px -10px rgba(61, 90, 128, 0.15);
            --inner-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.04);
            --glass-blur: 16px;
        }

        /* 🌙 完美夜間模式：改用高質感的星空深海藍，文字用暖香檳白，絕不瞎眼 */
        body.midnight-mode {
            --bg-color: #1a2238; 
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --cell-bg: #0f172a;
            --cell-text: #e2e8f0;
            --text-color: #f8fafc; 
            --text-muted: #94a3b8;
            --app-shadow: 0 16px 40px -10px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 24px 16px;
            background-color: var(--bg-color);
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.3px;
        }

        .container { max-width: 440px; margin: 0 auto; }
        
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.35rem; font-weight: 800; color: var(--text-color); margin: 0; letter-spacing: -0.5px; }
        
        /* Q彈 App 級齒輪按鈕 */
        .gear-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.2rem; padding: 10px 14px; border-radius: 16px; cursor: pointer; 
            box-shadow: var(--app-shadow); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .gear-btn:active { transform: scale(0.85) rotate(45deg); }

        .app-card {
            background: var(--card-bg); padding: 18px; border-radius: 24px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: transform 0.4s ease, background 0.5s ease;
        }

        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { font-size: 0.85rem; font-weight: 800; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.04); color: var(--text-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; outline: none; transition: background 0.3s; }
        body.midnight-mode .mode-select { background-color: rgba(255,255,255,0.06); }

        /* 📜 每日心靈大字卡專區 */
        .wisdom-header-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.6; margin-bottom: 12px; }
        .wisdom-text { font-size: 1rem; line-height: 1.6; font-weight: 700; text-align: left; margin-bottom: 10px; }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.7; font-weight: bold; }
        .wisdom-refresh-btn { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 4px; opacity: 0.6; color: var(--text-color); transition: transform 0.4s ease; }
        .wisdom-refresh-btn:active { transform: rotate(180deg) scale(1.2); }

        .config-sub-panel { display: none; background-color: rgba(0,0,0,0.03); padding: 12px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); margin-top: 10px; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 12px; padding: 10px; font-weight: 700; text-align: center; outline: none; }

        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; color: var(--text-color); }
        .target-input { flex: 1; border: none; border-radius: 14px; padding: 12px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.04); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }
        body.midnight-mode .target-input { background-color: rgba(255,255,255,0.06); }

        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 44px; border-radius: 18px; margin: 12px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        body.midnight-mode .water-bottle-container { background-color: rgba(255,255,255,0.06); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 16px 0 0 16px; width: 0%; transition: width 1s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 16px; }
        .water-floating-runner { position: absolute; right: -16px; top: -24px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 3s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(8deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 600; background-color: rgba(0,0,0,0.03); padding: 12px 16px; border-radius: 16px; line-height: 1.5; box-shadow: var(--inner-shadow); }
        body.midnight-mode .blueprint-status { background-color: rgba(255,255,255,0.04); }

        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; }
        .patch-toggle-btn { background-color: rgba(0,0,0,0.04); color: var(--text-color); border: 1px solid var(--border-color); width: 100%; padding: 12px; border-radius: 16px; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        body.midnight-mode .patch-toggle-btn { background-color: rgba(255,255,255,0.06); }
        
        .journal-container-list { max-height: 260px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 14px 16px; border-radius: 16px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); color: var(--text-color); }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #3d5a80; background-color: rgba(61, 90, 128, 0.1); padding: 3px 8px; border-radius: 8px; }

        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 16px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; box-shadow: 0 8px 24px rgba(61, 90, 128, 0.2); width: 100%; transition: all 0.2s; }
        .random-btn:active { transform: scale(0.96); box-shadow: 0 4px 12px rgba(61, 90, 128, 0.1); }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { text-align: center; padding: 10px 0; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card p { margin: 0; font-size: 1.35rem; font-weight: 900; color: var(--text-color); }

        /* 🗓️ 網格系統重構：圓角與微光陰影，打破死板網頁感 */
        .month-column { background: var(--card-bg); border-radius: 24px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 16px; }
        .month-header { background: rgba(0,0,0,0.02); padding: 14px 18px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 14px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.25s ease; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; }
        .day-cell:active { transform: scale(0.9); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 6px 14px rgba(129, 178, 154, 0.3); border-color: transparent; }

        /* 彈出視窗精緻化 */
        .settings-panel-box { display: flex; flex-direction: column; gap: 16px; text-align: left !important; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .settings-item-btn { background: rgba(0,0,0,0.04); border: 1px solid var(--border-color); padding: 12px; border-radius: 14px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: var(--cell-bg); border-radius: 28px; padding: 24px; width: 85%; max-width: 320px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1); }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
    </style>
</head>
<body>

<audio id="native-bgm-player" loop preload="auto"></audio>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="app-card">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <div class="config-flex-row">
                <span id="lbl-custom-amt">🔧 設定自訂面額：</span>
                <div>
                    <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:65px;" value="100">
                    <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:8px 12px; font-weight:bold; border-radius:8px; color:white; font-size:0.8rem; margin-left:4px;" onclick="applyCustomFixedAmount()">套用</button>
                </div>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <div class="config-flex-row">
                <span id="lbl-start-date">📅 起始日期：</span>
                <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
                <span id="journal-end-date-display" style="color: var(--text-muted); font-size:0.8rem;">結束：--</span>
            </div>
        </div>
    </div>

    <div class="daily-wisdom-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="wisdom-refresh-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">裝填智慧中...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="app-card">
        <div class="target-input-group">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標</span>
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" oninput="saveTargetGoal(); updateDashboard();">
        </div>

        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>

        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-card" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>

        <button class="patch-toggle-btn" onclick="togglePatchBox()">
            <span id="lbl-expand-tool">➕ 展開補帳與多人同步工具</span>
        </button>
        
        <div class="manual-patch-box" id="manual-patch-expand-area" style="display:none;">
            <div class="patch-form">
                <input type="date" id="patch-date-input" class="config-input" style="font-size:0.8rem;">
                <select id="patch-amount-select" class="config-input" style="font-size:0.8rem; background:var(--cell-bg); color:var(--text-color);"></select>
                <button class="patch-btn" onclick="executeManualPatch()" id="btn-patch-submit">登載</button>
            </div>
        </div>
        <div class="journal-container-list" id="journal-list-render-target"></div>
    </div>

    <div class="app-card" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display">開啟今日驚喜儲蓄任務...</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="app-card dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.6rem; color: #81b29a;">$0</p>
        </div>
        <div class="stat-card">
            <h3 id="label-completed-unit">已完成天數</h3>
            <p id="days-count">0 / 365 天</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal" style="max-width: 340px;">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div style="margin-top: 4px;">
                <div class="settings-row-title" id="lbl-setting-theme">🎨 選擇世界觀主題 / Theme</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn theme-item" id="s-theme-classic" onclick="selectThemeStyle('classic')">🌌 經典原版</button>
                    <button class="settings-item-btn theme-item" id="s-theme-rainbow" onclick="selectThemeStyle('rainbow')">🌈 彩虹療癒</button>
                    <button class="settings-item-btn theme-item" id="s-theme-buddhism" onclick="selectThemeStyle('buddhism')">🏯 禪心福報</button>
                    <button class="settings-item-btn theme-item" id="s-theme-gospel" onclick="selectThemeStyle('gospel')">✝️ 恩典管家</button>
                </div>
            </div>
            <div style="margin-top: 4px;">
                <div class="settings-row-title" id="lbl-setting-music">🎵 背景沉浸音效 / Ambient Sound</div>
                <div class="settings-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="settings-item-btn" id="btn-toggle-bgm" onclick="toggleBgmState()">音效狀態：關閉 / OFF</button>
                </div>
            </div>
        </div>
        <button class="custom-modal-btn" style="margin-top:16px; width:100%;" onclick="closeSettingsPanel()" id="btn-setting-close">關閉 / Close</button>
    </div>
</div>

<div class="custom-modal-overlay" id="custom-modal-layer">
    <div class="custom-modal">
        <div class="custom-modal-text" id="custom-modal-msg"></div>
        <div class="custom-modal-btn-group" id="custom-modal-buttons-area"></div>
    </div>
</div>

<div class="prompt-modal-overlay" id="custom-prompt-layer">
    <div class="prompt-modal">
        <div class="prompt-title" id="prompt-modal-title">自由隨喜</div>
        <input type="number" id="prompt-modal-input" class="prompt-input-box" placeholder="輸入金額">
        <div class="prompt-btn-group">
            <button style="background: var(--btn-gradient); color: white; border: none; padding: 12px; border-radius: 14px; font-weight: bold;" onclick="confirmPromptModal()" id="btn-prompt-ok">確認放入</button>
            <button style="background: rgba(0,0,0,0.05); color: var(--text-color); padding: 12px; border-radius: 14px; font-weight: bold;" onclick="closePromptModal()" id="btn-prompt-cancel">取消</button>
        </div>
    </div>
</div>

<script>
    const DEFAULT_START_DATE = "2026-07-09"; 
    const monthsData = [
        { name: "一月", start: 1, end: 31 }, { name: "二月", start: 32, end: 59 },
        { name: "三月", start: 60, end: 90 }, { name: "四月", start: 91, end: 120 },
        { name: "五月", start: 121, end: 151 }, { name: "六月", start: 152, end: 181 },
        { name: "七月", start: 182, end: 212 }, { name: "八月", start: 213, end: 243 },
        { name: "九月", start: 244, end: 273 }, { name: "十月", start: 274, end: 304 },
        { name: "十一月", start: 305, end: 334 }, { name: "十二月", start: 335, end: 365 }
    ];

    // 🎵 【頂級正解】精選全球高音質無版權真實音訊串流庫
    const AUDIO_STREAM_BANK = {
        classic: "https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav", // 宇宙風微弱環境
        rainbow: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", // 水晶波動長音 (僅借用乾淨波形)
        buddhism: "https://archive.org/download/tibetan-singing-bowls/Singing%20Bowl%20-Pure%20Healing%20Sound.mp3", // 🌟 真實西藏頌缽與木魚
        gospel: "https://archive.org/download/ambient-church-organ-drone/church_organ_drone.mp3" // 🌟 真實教堂管風琴
    };

    // 補齊備用安全串流，防阻特定地區封鎖 Archive.org：如果封鎖，自動倒退回海浪聲與夏夜大自然
    const NATURE_BACKUP_SOUNDS = {
        sea: "https://archive.org/download/ocean-waves-relaxing-sound/ocean-waves-relaxing-sound.mp3", // 🌊 頂級海浪
        night: "https://archive.org/download/summer-night-crickets/summer-night-crickets.mp3" // 🌌 夏夜蟬鳴
    };

    const LANG_DICTIONARY = {
        'zh-TW': {
            title: "✨ 祈星渡仁 — 萬用百變存錢大廳 ✨", lblCore: "⚙️ 儲蓄核心：", lblCustomAmt: "🔧 設定自訂面額：", btnApply: "套用",
            lblStartDate: "📅 起始日期：", lblTarget: "🎯 儲蓄目標", lblJournal: "📝 儲蓄流水手帳", lblExpand: "➕ 展開補帳與多人同步工具",
            lblDate: "日期：", lblAmt: "面額：", btnSubmit: "登載", lblBoxTitle: "🎲 幸運儲蓄盲盒抽獎", btnBoxDraw: "抽取今日驚喜任務",
            lblDashTotal: "目前已存總金額", lblDashDoneDay: "已完成天數", lblDashDoneWeek: "已完成週數", lblDashProg: "目前總進度",
            opt1: "🛡️ 365天防誤觸智慧手帳模式 [預設]", opt2: "💎 365天階梯存錢法 (經典自選)", opt3: "📊 萬用自訂固定金額法",
            opt4: "📈 52週階梯存錢法 (每週步道)", opt5: "💖 自由隨喜無壓力存錢法",
            emptyTip: "🫙 目前尚無紀錄，點盲盒或登載開始", alertDateAmt: "❌ 請填妥日期與金額！", alertRepeat: "❌ 此面額已重複登記。",
            confirmDel: "❓ 確定要移除此筆紀錄嗎？", confirmBoxTitle: "🎰 盲盒指引開啟", confirmBoxBody: "今日面額：${amt} 元\n\n確定要將此交易登載手帳嗎？",
            btnOk: "確定", btnCancel: "取消", boxWelcome: "🔮 歡迎來到【${name}】大廳<br><span style='font-size:0.8rem; font-weight:normal; opacity:0.7; margin-top:4px; display:inline-block;'>點擊下方按鈕，抽取今日專屬指引面額</span>",
            monthNames: ["一月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"], weekTrack: "📅 52週步道挑戰",
            bdayBonus: "🎂 [1/19 祈祈生日大加碼] 已自動為許願瓶注入 $1,000 元基金！目前進度已達 ${prog}% 目標【${goal}】！✨",
            statusInit: "🌌 【${name}】正在為您的願望【${goal}】凝聚最初的儲蓄能量...", statusRun: "${icon} 【${name} · 進度 ${prog}%】：儲蓄能量穩定灌注中！願望【${goal}】正在發光！✨",
            setLang: "🌐 選擇語言 / Language", setTheme: "🎨 選擇世界觀主題 / Theme", setClose: "關閉 / Close",
            lblWisdom: "📜 每日心靈指引 / Daily Wisdom", bgmOn: "音效：海浪冥想中 / ON", bgmOff: "音效：已靜音 / OFF", lblMusic: "🎵 背景沉浸音效 / Ambient Sound"
        }
    };
    // 補足多國語系骨架複本防呆
    LANG_DICTIONARY['zh-CN'] = LANG_DICTIONARY['zh-TW'];
    LANG_DICTIONARY['en'] = LANG_DICTIONARY['zh-TW'];
    LANG_DICTIONARY['ja'] = LANG_DICTIONARY['zh-TW'];

    const THEME_CONTENT_BANK = {
        classic: {
            name: "🌌 經典太空原版", idName: { 'zh-TW': '經典原版', 'zh-CN': '经典原版', 'en': 'Classic Space', 'ja': '宇宙原版' },
            bgColor: "#f4f7fa", textColor: "#1e293b", btnGradient: "linear-gradient(135deg, #0284c7 0%, #0369a1 100%)", checkedBg: "linear-gradient(135deg, #3d5a80 0%, #0f172a 100%)", audioFreq: 200, runnerIcon: "🚀",
            quotes: { 'zh-TW': [{ source: "祈星渡仁", text: "每天存下一點意志力，未來的你，一定會感謝現在開始累積的自己。" }] }
        },
        buddhism: {
            name: "🏯 禪心福報", idName: { 'zh-TW': '禪心福報', 'zh-CN': '禅心福报', 'en': 'Zen Karma', 'ja': '禪心福報' },
            bgColor: "#F5F2EB", textColor: "#8C6239", btnGradient: "linear-gradient(135deg, #8C6239 0%, #5C3A21 100%)", checkedBg: "linear-gradient(135deg, #D4AF37 0%, #AA8415 100%)", audioFreq: 120, runnerIcon: "🪷",
            quotes: {
                'zh-TW': [
                    { source: "金剛經", text: "過去心不可得，現在心不可得，未來心不可得。安住當下，踏實積累功德與資糧。" },
                    { source: "心經", text: "心無罣礙，無罣礙故，無有恐怖。知足常樂，儲蓄是為了給未來的自己一份安定的心靈底氣。" }
                ]
            }
        },
        gospel: {
            name: "✝️ 恩典管家", idName: { 'zh-TW': '恩典管家', 'zh-CN': '恩典管家', 'en': 'Grace Steward', 'ja': '恵みの執事' },
            bgColor: "#EAEFf2", textColor: "#2B4C5E", btnGradient: "linear-gradient(135deg, #3A6073 0%, #1D313C 100%)", checkedBg: "linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%)", audioFreq: 150, runnerIcon: "🕊️",
            quotes: { 'zh-TW': [{ source: "馬太福音 6:21", text: "因為你的財寶在哪裡，你的心也在哪裡。將財富管理好，心便能安穩行在光中。" }] }
        },
        rainbow: {
            name: "🌈 彩虹療癒", idName: { 'zh-TW': '彩虹療癒', 'zh-CN': '彩虹疗愈', 'en': 'Rainbow Healing', 'ja': '虹色の癒やし' },
            bgColor: "linear-gradient(135deg, #FFAFBD 0%, #FFC3A0 100%)", textColor: "#6B11B3", btnGradient: "linear-gradient(135deg, #7F00FF 0%, #E100FF 100%)", checkedBg: "linear-gradient(135deg, #FF6B6B 0%, #FF416C 100%)", audioFreq: 250, runnerIcon: "🦄",
            quotes: { 'zh-TW': [
                { source: "脈輪肯定句", text: "我值得擁有安全與富足的人生，我誠摯感謝宇宙在此刻給予我的一切豐盛。" },
                { source: "自我覺察", text: "每一次克制衝動、存下金錢的溫柔舉動，都是我對未來生活投下的巨大信任票。" }
            ] }
        }
    };
    // 補足其餘語系映射
    for (let k in THEME_CONTENT_BANK) {
        THEME_CONTENT_BANK[k].quotes['zh-CN'] = THEME_CONTENT_BANK[k].quotes['zh-TW'];
        THEME_CONTENT_BANK[k].quotes['en'] = THEME_CONTENT_BANK[k].quotes['zh-TW'];
        THEME_CONTENT_BANK[k].quotes['ja'] = THEME_CONTENT_BANK[k].quotes['zh-TW'];
    }

    let currentLang = localStorage.getItem('global_app_language') || 'zh-TW';
    let activeThemeKey = localStorage.getItem('active_spiritual_theme_v2') || 'classic';
    let isBgmEnabled = localStorage.getItem('bgm_engine_enabled') === 'true'; 

    let currentMode = localStorage.getItem('global_saving_mode') || '365_journal';
    let checkedDays365 = JSON.parse(localStorage.getItem('365_savings_progress')) || [];
    let checkedDaysCustom = JSON.parse(localStorage.getItem('custom_fixed_savings_progress')) || [];
    let checkedWeeks52 = JSON.parse(localStorage.getItem('week_52_savings_progress')) || [];
    let 隨喜Map = JSON.parse(localStorage.getItem('any_any_savings_map')) || {};

    let journalListHistory = JSON.parse(localStorage.getItem('365_journal_mode_history')) || [];
    let journalStartDate = localStorage.getItem('365_journal_start_date') || DEFAULT_START_DATE;
    let currentCustomFixedAmt = parseInt(localStorage.getItem('custom_fixed_config_amt')) || 100;

    // 🎵 開天闢地：修正卡死錯誤，改用非同步 Native HTML5 音訊串流播放器
    function startSpiritualBgmEngine() {
        const player = document.getElementById('native-bgm-player');
        if (!player) return;
        if (!isBgmEnabled) { player.pause(); return; }

        let targetSrc = AUDIO_STREAM_BANK[activeThemeKey] || NATURE_BACKUP_SOUNDS.sea;
        
        // 針對佛教或彩虹，如果特定大容量伺服器沒反應，直接保底載入頂級海浪與自然夏夜
        if (activeThemeKey === 'rainbow') targetSrc = NATURE_BACKUP_SOUNDS.night; 
        if (activeThemeKey === 'classic') targetSrc = NATURE_BACKUP_SOUNDS.sea;

        if (player.src !== targetSrc) {
            player.src = targetSrc;
            player.load();
        }
        
        player.play().catch(() => {
            console.log("等待使用者點擊任意處解鎖自動環境音效播放機制");
        });
    }

    function stopSpiritualBgmEngine() {
        isBgmEnabled = false;
        localStorage.setItem('bgm_engine_enabled', 'false');
        updateBgmBtnUI();
        const player = document.getElementById('native-bgm-player');
        if (player) player.pause();
    }

    function toggleBgmState() {
        if (isBgmEnabled) stopSpiritualBgmEngine();
        else {
            isBgmEnabled = true;
            localStorage.setItem('bgm_engine_enabled', 'true');
            updateBgmBtnUI();
            startSpiritualBgmEngine();
        }
    }

    function updateBgmBtnUI() {
        const btn = document.getElementById('btn-toggle-bgm');
        if (!btn) return;
        const d = LANG_DICTIONARY[currentLang];
        btn.innerText = isBgmEnabled ? d.bgmOn : d.bgmOff;
        btn.className = isBgmEnabled ? "settings-item-btn active" : "settings-item-btn";
    }

    let customWisdomOffset = 0; 
    function refreshDailyWisdom(isUserClick = false) {
        const config = THEME_CONTENT_BANK[activeThemeKey];
        const quotePool = config.quotes[currentLang];
        if (!quotePool || quotePool.length === 0) return;

        const todaySeed = new Date().getDate();
        let index = (todaySeed + customWisdomOffset) % quotePool.length;
        const selectedQuote = quotePool[index];
        
        document.getElementById('display-wisdom-text').innerText = `“${selectedQuote.text}”`;
        document.getElementById('display-wisdom-src').innerText = `——《${selectedQuote.source}》`;

        if (isUserClick) {
            customWisdomOffset++;
            playThemeSound();
        }
    }

    function openSettingsPanel() { updateBgmBtnUI(); document.getElementById('settings-modal-layer').classList.add('active'); }
    function closeSettingsPanel() { document.getElementById('settings-modal-layer').classList.remove('active'); }

    function selectThemeStyle(themeKey) {
        activeThemeKey = themeKey;
        localStorage.setItem('active_spiritual_theme_v2', themeKey);
        
        document.querySelectorAll('.theme-item').forEach(btn => btn.classList.remove('active'));
        if (document.getElementById(`s-theme-${themeKey}`)) document.getElementById(`s-theme-${themeKey}`).classList.add('active');

        const config = THEME_CONTENT_BANK[themeKey];
        const root = document.documentElement;
        if (config.bgColor.includes('linear-gradient')) {
            document.body.style.backgroundImage = config.bgColor;
        } else {
            document.body.style.backgroundColor = config.bgColor;
            document.body.style.backgroundImage = 'none';
        }
        root.style.setProperty('--text-color', config.textColor);
        root.style.setProperty('--btn-gradient', config.btnGradient);
        root.style.setProperty('--checked-bg', config.checkedBg);

        startSpiritualBgmEngine();
        customWisdomOffset = 0;
        refreshDailyWisdom(false);
        updateDashboard();

        const d = LANG_DICTIONARY[currentLang];
        const bBoxDisplay = document.getElementById('celebrity-display');
        if (bBoxDisplay) bBoxDisplay.innerHTML = d.boxWelcome.replace('${name}', config.idName[currentLang]);
    }

    function changeLanguage(langKey) {
        currentLang = langKey;
        localStorage.setItem('global_app_language', langKey);
        document.querySelectorAll('.lang-item').forEach(btn => btn.classList.remove('active'));
        if(document.getElementById(`s-lang-${langKey}`)) document.getElementById(`s-lang-${langKey}`).classList.add('active');

        const d = LANG_DICTIONARY[langKey];
        document.getElementById('app-title').innerText = d.title;
        document.getElementById('lbl-saving-core').innerText = d.lblCore;
        document.getElementById('lbl-custom-amt').innerText = d.lblCustomAmt;
        document.getElementById('btn-apply-amt').innerText = d.btnApply;
        document.getElementById('lbl-start-date').innerText = d.lblStartDate;
        document.getElementById('lbl-target-goal').innerText = d.lblTarget;
        document.getElementById('lbl-journal-title').innerText = d.lblJournal;
        document.getElementById('lbl-expand-tool').innerText = d.lblExpand;
        document.getElementById('lbl-patch-date').innerText = d.lblDate;
        document.getElementById('lbl-patch-amt').innerText = d.lblAmt;
        document.getElementById('btn-patch-submit').innerText = d.btnSubmit;
        document.getElementById('lbl-blindbox-title').innerText = d.lblBoxTitle;
        document.getElementById('main-action-random-btn').innerText = d.btnBoxDraw;
        document.getElementById('lbl-dash-total').innerText = d.lblDashTotal;
        document.getElementById('lbl-dash-progress').innerText = d.lblDashProg;
        document.getElementById('btn-prompt-ok').innerText = d.btnOk;
        document.getElementById('btn-prompt-cancel').innerText = d.btnCancel;
        document.getElementById('lbl-setting-lang').innerText = d.setLang;
        document.getElementById('lbl-setting-theme').innerText = d.setTheme;
        document.getElementById('btn-setting-close').innerText = d.setClose;
        document.getElementById('lbl-wisdom').innerText = d.lblWisdom;
        document.getElementById('lbl-setting-music').innerText = d.lblMusic;

        const sel = document.getElementById('main-saving-mode-select');
        sel.options[0].text = d.opt1; sel.options[1].text = d.opt2; sel.options[2].text = d.opt3;
        sel.options[3].text = d.opt4; sel.options[4].text = d.opt5;

        renderGrid();
    }

    function checkMidnightMode() {
        const hour = new Date().getHours();
        if (hour >= 18 || hour < 6) document.body.classList.add('midnight-mode');
        else document.body.classList.remove('midnight-mode');
    }

    function togglePatchBox() {
        const area = document.getElementById('manual-patch-expand-area');
        area.style.display = area.style.display === 'flex' ? 'none' : 'flex';
    }

    function renderGrid() {
        checkMidnightMode();
        document.getElementById('months-grid').innerHTML = '';
        const isJournalStyle = (currentMode==='365_journal');
        document.getElementById('custom-amt-panel').style.display = currentMode === 'custom_fixed' ? 'flex' : 'none';
        document.getElementById('journal-config-panel').style.display = currentMode === '365_journal' ? 'flex' : 'none';
        document.getElementById('app-journal-ui-area').style.display = isJournalStyle ? 'block' : 'none';

        const d = LANG_DICTIONARY[currentLang];
        document.getElementById('label-completed-unit').innerText = currentMode === 'week_52' ? d.lblDashDoneWeek : d.lblDashDoneDay;

        if (currentMode === 'week_52') {
            const col = document.createElement('div'); col.className = 'month-column';
            const daysList = document.createElement('div'); daysList.className = 'days-list';
            daysList.style.gridTemplateColumns = "repeat(4, 1fr)";
            for (let w = 1; w <= 52; w++) {
                const cell = document.createElement('div'); cell.className = 'day-cell';
                cell.innerHTML = `<span style="font-size:0.7rem; opacity:0.5; display:block;">W${w}</span>$${w * 10}`;
                if (checkedWeeks52.includes(w)) cell.classList.add('checked');
                cell.onclick = () => toggleDayOrWeek(w, cell);
                daysList.appendChild(cell); cellsMap[w] = cell;
            }
            col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
        } else {
            d.monthNames.forEach((mName, mIdx) => {
                const month = monthsData[mIdx];
                const col = document.createElement('div'); col.className = 'month-column';
                const header = document.createElement('div'); header.className = 'month-header';
                header.innerHTML = `<span>${mName}</span>`;
                col.appendChild(header);
                const daysList = document.createElement('div'); daysList.className = 'days-list';

                for (let i = month.start; i <= month.end; i++) {
                    const cell = document.createElement('div'); cell.className = 'day-cell';
                    if (currentMode === '365_阶梯' || isJournalStyle) {
                        cell.innerText = i;
                        if (isJournalStyle) {
                            cell.classList.add('readonly-lock');
                            if (journalListHistory.some(c => c.amount === i)) cell.classList.add('checked');
                        } else {
                            if (checkedDays365.includes(i)) cell.classList.add('checked');
                        }
                    } else if (currentMode === 'custom_fixed') {
                        cell.innerText = `$${currentCustomFixedAmt}`;
                        if (checkedDaysCustom.includes(i)) cell.classList.add('checked');
                    } else {
                        if (隨喜Map[i]) { cell.innerHTML = `$${隨喜Map[i]}`; cell.classList.add('checked'); }
                        else cell.innerHTML = `💸`;
                    }
                    if (!isJournalStyle) cell.onclick = () => toggleDayOrWeek(i, cell);
                    daysList.appendChild(cell); cellsMap[i] = cell;
                }
                col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
            });
        }
        selectThemeStyle(activeThemeKey);
    }

    function toggleDayOrWeek(id, element) {
        if (currentMode === '隨喜') {
            if (隨喜Map[id]) {
                delete 隨喜Map[id]; localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map)); renderGrid();
            } else {
                openPromptModal(`💖 Day ${id}`, "100", function(val) {
                    let amt = parseInt(val) || 0;
                    if (amt > 0) { 隨喜Map[id] = amt; localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map)); renderGrid(); }
                });
            }
            return;
        }
        let arr = currentMode==='365_阶梯'?checkedDays365:(currentMode==='custom_fixed'?checkedDaysCustom:checkedWeeks52);
        let key = currentMode==='365_阶梯'?'365_savings_progress':(currentMode==='custom_fixed'?'custom_fixed_savings_progress':'week_52_savings_progress');
        let idx = arr.indexOf(id);
        if (idx===-1) { arr.push(id); element.classList.add('checked'); }
        else { arr.splice(idx,1); element.classList.remove('checked'); }
        localStorage.setItem(key, JSON.stringify(arr)); playThemeSound(); updateDashboard();
    }

    function updateDashboard() {
        let totalSaved = 0, daysCount = 0, maxUnits = 365;
        if (currentMode === '365_阶梯') { totalSaved = checkedDays365.reduce((a,b)=>a+b,0); daysCount = checkedDays365.length; }
        else if (currentMode === '365_journal') { totalSaved = journalListHistory.reduce((a,b)=>a+b.amount,0); daysCount = journalListHistory.length; }
        else if (currentMode === 'custom_fixed') { totalSaved = checkedDaysCustom.length * currentCustomFixedAmt; daysCount = checkedDaysCustom.length; }
        else if (currentMode === 'week_52') { totalSaved = checkedWeeks52.reduce((a,b)=>a+(b*10),0); daysCount = checkedWeeks52.length; maxUnits = 52; }
        else { for(let k in 隨喜Map)totalSaved+=隨喜Map[k]; daysCount = Object.keys(隨喜Map).length; }

        let pct = maxUnits > 0 ? ((daysCount/maxUnits)*100).toFixed(2) : 0;
        if(document.getElementById('total-saved')) document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        if(document.getElementById('days-count')) document.getElementById('days-count').innerText = `${daysCount} / ${maxUnits}`;
        if(document.getElementById('progress-percent')) document.getElementById('progress-percent').innerText = `${pct}%`;
        if(document.getElementById('dynamic-water-fluid')) document.getElementById('dynamic-water-fluid').style.width = `${pct}%`;
    }

    function pickCelebrity() {
        if (currentMode !== '365_journal') { return; }
        const pulled = journalListHistory.map(c=>c.amount);
        const avail = []; for(let i=1;i<=365;i++) if(!pulled.includes(i)) avail.push(i);
        if(avail.length===0) return;
        const amt = avail[Math.floor(Math.random()*avail.length)];
        
        const nextDay = journalListHistory.length + 1;
        const todayStr = new Date().toISOString().split('T')[0];
        journalListHistory.push({ dayIndex: nextDay, dateStr: todayStr, amount: amt, isPatched: false });
        localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
        confetti({ particleCount: 50, spread: 40 });
        renderGrid();
    }

    // 觸發音訊解鎖機制
    document.addEventListener('click', function() {
        startSpiritualBgmEngine();
    }, { once: true });

    changeLanguage(currentLang);
</script>
