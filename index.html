<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f7ede2 0%, #f5cac3 100%);
            --card-bg: rgba(255, 255, 255, 0.78);
            --text-color: #2b2d42;
            --text-muted: #6c757d;
            --border-color: rgba(255, 255, 255, 0.6);
            --cell-bg: rgba(255, 255, 255, 0.65);
            --cell-text: #2b2d42;
            --btn-gradient: linear-gradient(135deg, #f28482 0%, #84a59d 100%);
            --checked-bg: linear-gradient(135deg, #84a59d 0%, #62837c 100%);
            --checked-text: #ffffff;
            --water-color: linear-gradient(180deg, #96e6a1 0%, #d4fc79 100%);
            --app-shadow: 0 20px 40px -15px rgba(43, 45, 66, 0.08), 0 4px 12px -4px rgba(43, 45, 66, 0.04);
            --inner-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.02);
            --glass-blur: 24px;
        }

        body.midnight-mode {
            --bg-gradient: linear-gradient(135deg, #111827 0%, #1e1b4b 100%);
            --card-bg: rgba(31, 41, 55, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --cell-bg: rgba(17, 24, 39, 0.5);
            --cell-text: #f3f4f6;
            --text-color: #f9fafb !important; 
            --text-muted: #9ca3af !important;
            --app-shadow: 0 24px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 24px 16px 50px 16px;
            background: var(--bg-gradient) !important;
            background-attachment: fixed !important;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.4px;
        }

        .container { max-width: 440px; margin: 0 auto; }
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.35rem; font-weight: 900; color: var(--text-color); margin: 0; }
        
        .gear-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.25rem; padding: 12px 14px; border-radius: 18px; cursor: pointer; 
            box-shadow: var(--app-shadow); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); backdrop-filter: blur(var(--glass-blur));
        }
        .gear-btn:active { transform: scale(0.85) rotate(60deg); }

        .app-card {
            background: var(--card-bg); padding: 20px; border-radius: 28px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { font-size: 0.85rem; font-weight: 800; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.03); color: var(--text-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; outline: none; }

        .header-action-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.5; margin-bottom: 12px; }
        .wisdom-text { font-size: 1.05rem; line-height: 1.65; font-weight: 700; text-align: left; margin-bottom: 8px; color: var(--text-color); }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.8; font-weight: bold; }
        .refresh-circle-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-color); transition: transform 0.4s; padding: 4px; }
        .refresh-circle-btn:active { transform: rotate(180deg) scale(1.15); }

        .config-sub-panel { display: none; align-items: center; justify-content: space-between; background-color: rgba(0,0,0,0.02); padding: 12px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); margin-top: 12px; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 12px; padding: 10px; font-weight: 700; text-align: center; outline: none; }

        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; }
        .target-input { flex: 1; border: none; border-radius: 14px; padding: 12px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.03); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }

        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 44px; border-radius: 20px; margin: 14px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 18px 0 0 18px; width: 0%; transition: width 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 18px; }
        .water-floating-runner { position: absolute; right: -16px; top: -24px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 3s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 700; background-color: rgba(0,0,0,0.02); padding: 12px 16px; border-radius: 16px; line-height: 1.5; box-shadow: var(--inner-shadow); }

        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; }
        
        .journal-container-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 14px 16px; border-radius: 16px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #f28482; background-color: rgba(242, 132, 130, 0.1); padding: 3px 8px; border-radius: 8px; }

        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 16px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; box-shadow: 0 8px 24px rgba(242, 132, 130, 0.2); width: 100%; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .random-btn:active { transform: scale(0.96); }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { text-align: center; padding: 10px 0; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
        .stat-card p { margin: 0; font-size: 1.4rem; font-weight: 900; color: var(--text-color); }

        .month-column { background: var(--card-bg); border-radius: 28px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 18px; }
        .month-header { background: rgba(0,0,0,0.01); padding: 14px 18px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 15px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; }
        .day-cell:active { transform: scale(0.85); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 8px 20px rgba(132, 165, 157, 0.4); border-color: transparent; }

        .settings-panel-box { display: flex; flex-direction: column; gap: 18px; text-align: left !important; }
        .settings-row-title { font-size: 0.85rem; font-weight: 800; opacity: 0.6; margin-bottom: 6px; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; box-sizing: border-box; }
        .settings-item-btn { background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(242, 132, 130, 0.2); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.3); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: #ffffff; border-radius: 32px; padding: 24px; width: 88%; max-width: 340px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15); text-align: center; color: #2b2d42; }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
        
        .settings-main-action-btn { background: var(--btn-gradient); color: white; border: none; padding: 15px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; margin-top: 18px; width: 100%; box-shadow: 0 6px 18px rgba(242, 132, 130, 0.25); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="app-card">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <span class="mode-label" id="lbl-custom-amt">🔧 設定自訂面額：</span>
            <div style="display:flex; gap:4px;">
                <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:70px;" value="100">
                <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:10px 14px; font-weight:bold; border-radius:12px; color:white; font-size:0.85rem;" onclick="applyCustomFixedAmount()">套用</button>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <span class="mode-label" id="lbl-start-date">📅 手帳起始日：</span>
            <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
        </div>
    </div>

    <div class="daily-wisdom-card app-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="refresh-circle-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">裝填能量中...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="app-card">
        <div class="header-action-line">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標願望藍圖</span>
            <button class="refresh-circle-btn" onclick="refreshBlueprintStatus(true)">🔄</button>
        </div>
        <div class="target-input-group">
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" value="夢想計劃" oninput="saveTargetGoal(); updateDashboard();">
        </div>
        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>
        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-card" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>
        <div class="journal-container-list" id="journal-list-render-target"></div>
    </div>

    <div class="app-card" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display" style="margin: 10px 0; font-size: 0.9rem; opacity: 0.8;">點擊下方按鈕，抽取今日專屬指引面額</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="app-card dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.6rem; color: #62837c;">$0</p>
        </div>
        <div class="stat-card">
            <h3 id="label-completed-unit">已完成天數</h3>
            <p id="days-count">0 / 365</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
</div>

<div class="custom-modal-overlay" id="confirm-modal-layer">
    <div class="custom-modal">
        <h3 style="margin-top:0; color:#f28482;">🎰 盲盒指引開啟</h3>
        <p id="confirm-modal-body" style="font-weight:700; font-size:1.1rem; line-height:1.6; margin:20px 0;"></p>
        <div style="display:flex; gap:10px;">
            <button class="settings-main-action-btn" style="margin-top:0; flex:1;" onclick="confirmJournalSaving()">確認放入儲蓄瓶</button>
            <button class="settings-main-action-btn" style="margin-top:0; background:rgba(0,0,0,0.06); color:#2b2d42; flex:1;" onclick="closeConfirmModal()">取消</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-theme">🎨 選擇世界觀主題 / Theme</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn theme-item" id="s-theme-classic" onclick="selectThemeStyle('classic')">🌌 經典原版</button>
                    <button class="settings-item-btn theme-item" id="s-theme-rainbow" onclick="selectThemeStyle('rainbow')">🌈 彩虹療癒</button>
                    <button class="settings-item-btn theme-item" id="s-theme-buddhism" onclick="selectThemeStyle('buddhism')">🏯 禪心福報</button>
                    <button class="settings-item-btn theme-item" id="s-theme-gospel" onclick="selectThemeStyle('gospel')">✝️ 恩典管家</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-music">🎵 背景沉浸自然音效 / Nature Sounds</div>
                <div class="settings-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="settings-item-btn" id="btn-toggle-bgm" onclick="toggleBgmState()">環境音效：已關閉</button>
                </div>
            </div>
        </div>
        <button class="settings-main-action-btn" onclick="closeSettingsPanel()" id="btn-setting-close">儲存變更 / Save</button>
    </div>
</div>

<script>
    let currentMode = localStorage.getItem('global_saving_mode') || '365_journal';
    let currentLang = localStorage.getItem('global_app_language') || 'zh-TW';
    let activeThemeKey = localStorage.getItem('active_spiritual_theme_v2') || 'classic';
    let isBgmEnabled = localStorage.getItem('bgm_engine_enabled') === 'true';
    let currentCustomFixedAmt = parseInt(localStorage.getItem('custom_fixed_config_amt')) || 100;

    let journalListHistory = JSON.parse(localStorage.getItem('365_journal_mode_history')) || [];
    let checkedDays365 = JSON.parse(localStorage.getItem('365_savings_progress')) || [];
    let checkedDaysCustom = JSON.parse(localStorage.getItem('custom_fixed_savings_progress')) || [];
    let checkedWeeks52 = JSON.parse(localStorage.getItem('week_52_savings_progress')) || [];
    let 隨喜Map = JSON.parse(localStorage.getItem('any_any_savings_map')) || {};

    let tempPendingAmount = null;
    let webAudioCtx = null; let mainBgmNode = null;

    const LANG_DICTIONARY = {
        'zh-TW': {
            title: "✨ 祈星渡仁 — 萬用百變存錢大廳 ✨", lblCore: "⚙️ 儲蓄核心：", lblCustomAmt: "🔧 設定自訂面額：", btnApply: "套用",
            lblStartDate: "📅 手帳起始日：", lblTarget: "🎯 儲蓄目標願望藍圖", lblJournal: "📝 儲蓄流水手帳", 
            lblBoxTitle: "🎲 幸運儲蓄盲盒抽獎", btnBoxDraw: "抽取今日驚喜任務",
            lblDashTotal: "目前已存總金額", lblDashDoneDay: "已完成天數", lblDashDoneWeek: "已完成週數", lblDashProg: "目前總進度",
            opt1: "🛡️ 365天防誤觸智慧手帳模式 [預設]", opt2: "💎 365天階梯存錢法 (經典自選)", opt3: "📊 萬用自訂固定金額法",
            opt4: "📈 52週階梯存錢法 (每週步道)", opt5: "💖 自由隨喜無壓力存錢法",
            boxWelcome: "🔮 歡迎來到【${name}】大廳<br><span style='font-size:0.8rem; font-weight:normal; opacity:0.7; margin-top:4px; display:inline-block;'>點擊下方按鈕，抽取今日專屬指引面額</span>",
            setLang: "🌐 選擇語言 / Language", setTheme: "🎨 選擇世界觀主題 / Theme", setClose: "儲存變更 / Save", 
            lblWisdom: "📜 每日心靈指引 / Daily Wisdom", lblMusic: "🎵 背景沉浸自然音效 / Nature Sounds"
        },
        'zh-CN': {
            title: "✨ 祈星渡仁 — 萬用百變存錢大廳 ✨", lblCore: "⚙️ 储蓄核心：", lblCustomAmt: "🔧 设定自订面额：", btnApply: "套用",
            lblStartDate: "📅 手账起始日：", lblTarget: "🎯 储蓄目标愿望蓝图", lblJournal: "📝 储蓄流水手账", 
            lblBoxTitle: "🎲 幸运储蓄盲盒抽奖", btnBoxDraw: "抽取今日惊喜任务",
            lblDashTotal: "目前已存总金额", lblDashDoneDay: "已完成天数", lblDashDoneWeek: "已完成周数", lblDashProg: "目前总进度",
            opt1: "🛡️ 365天防误触智慧手账模式 [预设]", opt2: "💎 365天阶梯存钱法 (经典自选)", opt3: "📊 萬用自订固定金额法",
            opt4: "📈 52周阶梯存钱法 (每周步道)", opt5: "💖 自由随喜无压力存钱法",

        { source: "獨立自主", text: "財務不獨立，靈魂就無法真正自由。今天你又為自己的尊嚴，投下了無比關鍵的一票。" },
        { source: "生活哲學", text: "物欲退潮之後，留下來的才是真正的精神盛宴。把多餘的能量封存，靜待夢想開花。" },
        { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當下這點小小的克制，在五年後的風景裡根本微不足道。" },
        { source: "核心競爭力", text: "在每個人都隨手清空購物車的年代，強大的「儲蓄力」就是你對抗時代浪潮的最強護城河。" },
        { source: "掌控遊戲", text: "人生是一場精彩的資源管理遊戲。今天成功留存一筆資產，你就在這場遊戲裡又領先了一步。" },
        { source: "踏實累積", text: "世界上沒有一夜暴富的捷徑，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶。" },
        { source: "財務健康", text: "儲蓄之於你的財富藍圖，如同運動之於身體，是一項需要每天持之以恆的高級自我修煉。" },
        { source: "意志基石", text: "財富的厚度取決於你內心的定力。今天不為短暫的面子消費，明天才能擁有長遠的裡子。" },
        { source: "賽內卡", text: "好運從來不是憑空而來，而是機會遇到了準備好的人。儲蓄就是你最強的戰略儲備。" },
        { source: "意志修煉", text: "存錢是一場跟自己大腦獎賞機制的對抗。每成功一次，你的靈魂就比昨天更強壯一分。" },
        { source: "金錢美學", text: "最美的情感是長久陪伴，最好的財務是規律如常。用每天的堅持，編織你專屬的資產藝術。" },
        { source: "大師開示", text: "財富如同滾雪球，關鍵在於找到足夠濕的雪和足夠長的坡。今天的大廳就是你的雪道。" },
        { source: "無畏未來", text: "因為手中握有親手累積的防護盾牌，面對未來的種種不確定性，我們依然能夠氣定神閒。" },
        { source: "清醒生活", text: "不被天花亂墜的廣告洗腦，不為攀比買單。清醒地存錢，做自己人生最酷的主人。" },
        { source: "富爸爸", text: "如果你連眼前的零碎資金都理不清楚，宇宙又怎麼放心把更大的財富寶庫託付給你？" },
        { source: "思維變革", text: "把短暫消耗的物質欲，轉化為永續增長的儲蓄大廳，這才是最高階的身心靈平衡。" },
        { source: "卡內基", text: "能夠完全掌控自己財務的人，通常也能輕鬆掌控自己的人生。你今天依然走在主宰的路上。" },
        { source: "原子決心", text: "每一筆存入都是對生活無聲的宣告：我正在主導我的人生，而不是被日子盲目推著走。" },
        { source: "思考致富", text: "心態決定了你身邊財富的流向。當你對每一塊錢充滿敬意，它便會長久留下來為你工作。" },
        { source: "格蘭特", text: "儲蓄率比投資報酬率更重要。因為它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
        { source: "金錢密碼", text: "看著進度條與餘額一點一點變多，內心的焦慮就會一點一點消散，這是最實用的身心靈療癒。" },
        { source: "意志傳承", text: "用你的規律與自律，為身邊的家人做出最好的榜樣。財富的意志，也是一種高貴的傳承。" },
        { source: "穩定前行", text: "生活需要偶爾的驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
        { source: "詹姆斯", text: "原子習慣的魅力在於無形。今天克制衝動存下的每一筆資金，都是在雕刻你未來的身價。" },
        { source: "探索精神", text: "想要跨出舒適圈需要巨大的底氣，而儲蓄就是你探索宇宙、追求夢想最堅實的底氣燃料。" },
        { source: "長期思維", text: "用十年的宏大眼光來看待今天的儲蓄。今天的一小步，是十年後財富自由的一大步。" },
        { source: "理財聖經", text: "賺錢是能力，存錢是智慧，花錢是藝術。今天我們不談藝術，只修煉最踏實的生存智慧。" },
        { source: "夢想燃料", text: "沒有燃料的火箭永遠無法升空。把你對未來的雄心壯志，化為當下一點一滴的實質燃料。" },
        { source: "自知之明", text: "明白生活的無常，因而選擇在豐沛時收斂、在順境時儲存，這是最高階的遠見與智慧。" },
        { source: "未來資產", text: "你今天存下的不是冷冰冰的數字，而是未來的你，能夠自由調配、拒絕不喜歡的人的時間。" },
        { source: "自律開關", text: "關掉盲目的消費衝動，打開儲蓄的快樂噴泉。看著水瓶漸漸盈滿，是最健康的安多酚。" },
        { source: "理智至上", text: "別讓一時的壞情緒掏空你的錢包。今天用儲蓄來療癒自己，比任何報復性消費都有效。" },
        { source: "生活哲學", text: "減少地上的無謂牽絆，增加卡裡的真實資產。讓你的每一步都走得輕盈、底氣十足。" },
        { source: "財富格局", text: "格局宏大的人，看得見五年後的風景。為了那份無價的自由，當下的克制根本微不足道。" },
        { source: "自律宣言", text: "我不做物質與帳單的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的手心。" },
        { source: "致富開端", text: "每一位白手起家的智者，都是從存下第一塊錢、第一千塊錢開始的。你正走在正確的路上。" },
        { source: "原子威力", text: "不要小看每天微小的進步。一年 365 天的不懈積累，將展現出讓所有人都驚嘆的巨幅複利。" },
        { source: "清醒思維", text: "真正的精緻，不是全身名牌卻內心空虛；而是卡裡有退路、眼中有光芒、心中有藍圖。" },
         { source: "洛克菲勒", text: "命運由你的習慣決定。今天你在大廳存下的每一塊錢，都是在為未來的自己招兵買馬。" },
        { source: "巴菲特", text: "如果不找到一個在你睡覺時也能賺錢的方法，你將工作到死。而儲蓄，就是本金的起點。" },
        { source: "查理·芒格", text: "手裡揮舞著錘子的人，看什麼都像釘子。手裡握有充足儲蓄的人，看什麼都是機會。" },
        { source: "致富心態", text: "虛榮是最大的破財免災陷阱。真正的財務安全，是擁有說走就走的自由與底氣。" },
        { source: "原子習慣", text: "別試圖在一夜之間改變命運。用每天一成不變的規律存入，撬動未來驚人的複利槓桿。" },
        { source: "極簡豐盛", text: "當你不再需要用昂貴的奢侈品來填補內心的空虛，你的財富大廈才算真正開始動工。" },
        { source: "長期主義", text: "時間是好習慣的朋友，是壞習慣的敵人。今天你又站在了時間與財富的朋友這一邊。" },
        { source: "思考致富", text: "金錢總是流向懂得尊重它、愛護它的人。用這個充滿儀式感的智慧手帳，鎖住你的好運磁場。" },
        { source: "富爸爸", text: "富人買入資產，窮人買入負債。今天省下的每一筆盲目開銷，都是在買入未來的時間自由。" },
        { source: "卡內基", text: "自律是一把無形的鑰匙，能打開所有你原本以為緊閉的大門。今天你依然握著這把鑰匙。" },
        { source: "本質思考", text: "每次結帳前問自己：這能讓我更自由，還是讓我被物質綁得更緊？理智收斂，大富足也。" },
        { source: "生存智慧", text: "世界的無常我們無法左右，但卡裡的數字與穩固的防線，是我們給家人最實在的溫柔護盾。" },
        { source: "原子決心", text: "不要輕看進度條上的任何一次增長。每一次防誤觸的點擊，都是對富足人生投下的神聖一票。" },
        { source: "清醒生活", text: "拒絕精緻窮，擁抱內心豐盛。當你學會跟金錢和諧相處，整個宇宙都會成為你的財務護法。" },
        { source: "格蘭特", text: "當你的儲蓄率突破一個臨界點，你對時間的掌控權將會呈現幾何級數的爆炸性增長。" },
        { source: "長期思維", text: "不要為了眼前的短暫刺激，出賣了五年後的浩瀚星空。把目光放遠，你的藍圖無比宏大。" },
        { source: "意志修煉", text: "儲蓄大廳不僅僅是理財的工具，更是你淬鍊心靈意志、掌控自我獎賞機制的精神道場。" },
        { source: "獨立宣言", text: "真正的獨立是從財務不受制於人開始的。今天繼續為自己的尊嚴與主權，添磚加瓦。" },
        { source: "穩定前前", text: "在喧囂多變的紅塵中，用每天雷打不動的儲蓄，為自己築起一座風雨不透的鋼鐵長城。" },
        { source: "金錢能量", text: "看著水瓶的液位一天天升高的過程，就是內心焦慮一天天消散的過程，這是最實用的療癒。" },
        { source: "巴菲特", text: "最划算的投資，就是投資你自己的自律。今天存下的每一筆底氣，都是明天自由的籌碼。" },
        { source: "拿破崙·希爾", text: "如果你無法在小錢上展現驚人的掌控力，巨大的財富風暴來臨時，你也根本留不住它。" },
        { source: "梭羅", text: "回歸純粹的積累，你會發現生活原本不需要那麼多繁雜。輕裝上陣，人生才能底氣十足。" },
        { source: "原子習慣", text: "微小的複利就像地底的泉水，一開始默默無聞，直到有一天它會噴湧而出，震撼所有人。" },
        { source: "探索精神", text: "儲蓄就像是夢想火箭的固體燃料。燃料越充足，未來你能抵達的星系就越廣闊、越自由。" },
        { source: "霍華·馬克", text: "卓越的財務結果來自於日常不盲從的理智抉擇。今天你又做出了最聰明、最清醒的決定。" },
        { source: "刻意練習", text: "把儲蓄當作一種可以被刻意練習的微習慣。隨著天數累積，你的財務防線會變得堅不可摧。" },
        { source: "未來宣言", text: "對未來最好的饋贈，就是把當下的每一份多餘資源，都安放在最具複利價值的儲蓄瓶中。" },
        { source: "致富心態", text: "存錢不需要特別的理由。存錢是為了在未來的某一天，擁有對時間說「不」的至高權利。" },
        { source: "清醒思維", text: "別被外界精緻的消費陷阱捕獲。卡裡有退路、眼中有光芒、手帳有規律，才是最頂級的精緻。" },
        { source: "金錢密碼", text: "當你開始帶著敬意去收納每一張鈔票、每一個數字，財富也會開始尊重你的意志，長久留存。" },
        { source: "長期主義", text: "不要在乎起跑時有多麼微小，這是一場漫長的馬拉松，只要今天還在向前，你就贏了所有人。" },
        { source: "自律開關", text: "關掉不必要的無效消費，打開儲蓄的快樂泉源。看著進度條增長，享受最健康的安多酚。" },
        { source: "理智至上", text: "別讓一時的情緒波動掏空你的錢包。今天用這份儲蓄手帳來安頓心靈，比任何消費都更療癒。" },
        { source: "大師開示", text: "財富如同滾雪球，關鍵在於找到足夠濕的雪和足夠長的坡。今天大廳就是你最穩固的雪道。" },
        { source: "生活哲學", text: "減少地上的無謂牽絆，增加卡裡的真實資產。讓你的每一步都走得輕盈、走得底氣十足。" },
        { source: "原子決心", text: "每一筆存入都是無聲的宣告：我正在掌控我的人生，而非被生活盲目推著往前走。" },
        { source: "財務健康", text: "儲蓄之於財務，如同運動之於身體。這是一項需要每天持之以恆、不找藉口的高級自律。" },
        { source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當暴風雨來臨時，你早已在溫暖的大廳裡優雅喝茶。" },
        { source: "財富格局", text: "格局大的人，看得到五年後的風景。為了五年後的自由，當下這點克制根本微不足道。" },
        { source: "自律宣言", text: "我不做物質的奴隸，要做財富的主人。今天再次將掌控權牢牢握在自己的手心。" },
        { source: "金錢能量", text: "金錢流向珍惜它的人。用一個充滿敬意與規律的儀式收納它，它便會長久陪伴你。" },
        { source: "人生智慧", text: "聰明的人懂得如何賺錢，而智慧的人懂得如何與賺來的錢相處。今天，我們在修煉智慧。" },
        { source: "穩定前行", text: "生活需要驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
        { source: "獨立自主", text: "真正的獨立，是從財務不受制於人開始的。今天你又為自己的獨立主權，投下了關鍵一票。" },
        { source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
        { source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
        { source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
        { source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
        { source: "踏實累積", text: "沒有一夜暴富的神話，只有滴水穿石的史詩。今天這滴水，已經穩穩落入你的儲蓄瓶中。" },
        { source: "洛克菲勒", text: "我不看重你過去賺了多少，我只看重你現在留下了多少。每一筆儲蓄都是你未來的底牌。" },
        { source: "巴菲特", text: "當誘惑鋪天蓋地時，能按捺住衝動、穩穩將資產存入大廳的人，才是真正的財富贏家。" },
        { source: "原子習慣", text: "複利的魔力在於前期的默默無聞。守住這份枯燥的規律，未來它會用巨大的自由回報你。" },
        { source: "致富心態", text: "真正的奢華不是展示給別人看的行頭，而是卡裡源源不絕的數字給你拒絕不喜歡之事的自由。" },
        { source: "查理·芒格", text: "要得到你想要的東西，最可靠的方法是讓自己配得上它。自律的積累就是最好的通行證。" },
        { source: "清醒思維", text: "消費主義的陷阱就是讓你用辛勞的時間去換取短暫的虛榮。今天，我們選擇留住時間。" },
        { source: "長期主義", text: "不要因為面額小就放棄登載。金字塔的頂端，原本就是由無數塊最基層的磚石疊加而成。" },
        { source: "本質思考", text: "每一次付款前的三秒停頓，都是理智與慾望的交鋒。今天，你的理智又贏得了一次勝仗。" },
        { source: "金錢本質", text: "錢不是冷冰冰的數字，它是你工作精力的結晶。妥善收納它，是對自己付出最基本的尊重。" },
        { source: "自律力量", text: "自由從來不是隨心所欲，而是自我主宰。今天存下短暫的慾望，換取明天更廣闊的選擇權。" },
        { source: "習慣迴路", text: "打破當下即時滿足的怪圈，每次防誤觸手帳的記錄，都是在為未來的富足人生重新拉線。" },
        { source: "愛因斯坦", text: "複利是世界第八大奇蹟。給時間一點時間，讓微小的財富種子在堅持中默默翻倍茁壯。" },
        { source: "獨立自主", text: "底氣遠比短暫的虛榮更能撫平生活的焦慮。手中有糧，心中不慌，這是永恆的真理。" },
        { source: "生活哲學", text: "物欲退潮後，留下的才是真正的豐盛。把多餘的資源封存進儲蓄瓶，期待未來的驚喜花開。" },
        { source: "遠見卓識", text: "在平凡的日常中累積，才能在無常的變局中突圍。你今天的理智，是明天的頂級防護網。" },
        { source: "核心競爭力", text: "在這個每個人都被精緻窮捕獲的年代，強大的「儲蓄力」就是你對抗時代浪潮的最強核心。" },
        { source: "掌控遊戲", text: "人生是一場精彩的資源管理遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },

        { source: "財務健康", text: "儲蓄之於財務，如同運動之於身體。這是一項需要每天持之以恆、不找藉口的高級自律。" },
        { source: "長期長青", text: "把目光從眼前的打折促銷移開，投向遠方的星辰大海。你的財富藍圖，遠比這些物質宏大。" },

        { source: "意志修煉", text: "存錢是一場跟自己大腦獎賞機制的對抗。每成功一次，你的靈魂與定力就更強壯一分。" },
        { source: "金錢美學", text: "最美的情感是長久陪伴，最好的財務是規律如常。用每天的堅持，編織出你專屬的資產美學。" },

{ source: "拿破崙·希爾", text: "如果你不能在小事上自律，你就永遠無法在大事上建立真正的財富王國。" },
{ source: "富爸爸", text: "不要在消費完後才存錢，要在存錢後才消費。顛倒這個順序，人生大不同。" },
{ source: "習慣的力量", text: "防誤觸的每一次點擊，都是在大腦皮層鞏固富足思維，開啟智慧大廳的第一步。" },
{ source: "查理·芒格", text: "要得到一樣東西，最可靠的方法是讓你配得上它。自律積累，就是最好的修行。" },
{ source: "巴菲特", text: "不要在消費完後才存錢，要在存錢後才消費。顛倒這個順序，人生大不同。" },
{ source: "卡內基", text: "能夠掌控自己財務的人，通常也能掌控自己的人生。今天你依然走在主宰的路上。" },
{ source: "致富心態", text: "存錢不需要特別的理由。存錢是為了獲得對時間的掌控權，那是無價的自由。" },
{ source: "未來宣言", text: "對未來最好的饋贈，就是把當下的每一份資源，都安放在最具複利價值的地方。" },
{ source: "核心競爭力", text: "在消費主義盛行的年代，強大的「儲蓄力」就是你對抗時代浪潮的核心競爭力。" },
{ source: "財務防線", text: "穩固的防線能讓你睡得更安穩。用今天的理智，為明天的生活買一份高額的安心險。" },
{ source: "生活哲學", text: "減少地上的牽絆，增加心中的資產。讓你的每一步都走得輕盈、走得底氣十足。" },
{ source: "思考致富", text: "將多餘的物質慾望轉化為永續的儲蓄瓶，探索未知的廣闊世界，看見更美風景。" },
{ source: "格蘭特", text: "儲蓄率比投資報酬率更重要。它是你活在這個世界上，唯一能 100% 掌控的財務指標。" },
{ source: "原子習慣", text: "微小的改變能帶來巨大的連鎖反應。存下日常的零碎，是在雕刻你未來的身價。" },
{ source: "遠見卓識", text: "在最繁華的季節預備冬天的糧草。當暴風雨來臨時，你早已在溫暖的大廳裡優雅喝茶。" },
{ source: "理智至上", text: "別讓短暫的情緒波動掏空你的錢包。今天用儲蓄來療癒自己，比任何消費都更有效。" },
{ source: "穩定前行", text: "生活需要驚喜，但財務需要絕對的穩定。用每天雷打不動的儲蓄，築起最堅固的長城。" },
{ source: "內在力量", text: "抵擋得住當下的消費誘惑，說明你的內在力量已經超越了環境的干擾。為自己驕傲！" },
{ source: "原子威力", text: "不要小看每天進步的 1%。一年的積累，將會展現出讓所有人都驚嘆的巨大複利效應。" },
{ source: "清醒思維", text: "真正的精緻，是卡裡有退路、眼中有光芒、心中有藍圖。做最獨立清醒的自己。" },
{ source: "掌控遊戲", text: "人生是一場資源管理的遊戲。今天成功留存一筆資產，你在這場遊戲裡又領先了一步。" },
{ source: "獨立自主", text: "真正的獨立，是從財務不受制於人開始的。今天你又為自己的獨立主權，投下了關鍵一票。" },
{ source: "致富開端", text: "每一位億萬富豪，都是從存下第一塊錢、第一千塊錢開始的。你現在正走在正確的起點上。" },
{ source: "無畏未來", text: "因為手中握有累積的盾牌，所以面對未來的種種不確定性，我們依然能夠笑看風雲。" },
{ source: "習慣紅利", text: "習慣的紅利是驚人的。當存錢變成像呼吸一樣自然時，富足便不再是一件遙遠的事。" },
{ source: "金錢美學", text: "最美的情感是陪伴，最好的財務是規律。用每天的堅持，編織出你專屬的財富美學。" },
{ source: "財務覺醒", text: "看著餘額一點點變多，內心的焦慮就會一點點變少。這才是最實用的身心靈療癒。" },
{ source: "長期主義", text: "不要在乎起跑時有多麼微小，這是一場漫長的馬拉松，只要今天還在向前就值得慶祝。" },
{ source: "意志傳承", text: "用你的規律與自律，為身邊的人做出最好的榜樣。財富的意志，也是一種高記的傳承。" },
{ source: "思考致富", text: "財富是思維的產物。將多餘的物質慾望轉化為永續的儲蓄瓶，探索未知的廣闊世界。" },
{ source: "卡內基", text: "儲蓄不只是理財，它更是心靈意志力的一種高級修煉與自我掌控，非常人所能及。" },
{ source: "生活哲學", text: "減少地上的牽絆，增加心中的資產。讓你的每一步都走得輕盈、走得底氣十足。" },
{ source: "巴菲特", text: "開始存錢並及早投資，這是最值得養成的一種習慣。溪流匯聚，終成汪洋。大圓滿！" }       
            ]
        },
        buddhism: { 
            name: "🏯 禪心福報", runnerIcon: "🪷",
            quotes: [
                { source: "金剛經", text: "過去心不可得，現在心不可得，未來心不可得。安住當下，踏實積累淨瓶資糧。" },
                { source: "心經", text: "心無罣礙，無罣礙故，無有恐怖。知足常樂，儲蓄是為未來種下一福，得享真正大清靜。" },
                { source: "弘一法師", text: "人生最曼妙的風景，竟是內心的淡定與從容。少欲知足，一塵一法皆是心中福田。" },
                { source: "六祖壇經", text: "一切福田，不離方寸；從心而覓，感無不通。將富足化為恆心，淨水布施在小福之中。" },
                { source: "法華經", text: "福德因緣，皆由願生。每次微小的克制與儲蓄，都是在三千大千世界中，匯聚你的功德福德。" },
                { source: "大智度論", text: "如人持燈入冥室，光明照耀，眾冥皆滅。勤勉儲蓄如同持燈，能消弭未來的無常與擔憂。" },
                { source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的積累沒有捷徑，唯有在日常的起心動念間，恆常不懈地注入善因。" },
                { source: "修心格量", text: "財為五家共有，唯有內心的富足與手中的善業資糧，才是伴隨你跨越無常的最真財富。" },
                { source: "禪修開示", text: "外求皆是幻相，內修方得始終。存下一分欲念，便是點亮一盞心燈，照亮前行大路。" },
                { source: "一塵一福", text: "合抱之木生於毫末。今日將資糧輕輕封入淨瓶，便是對宇宙因果法則最深沉的禮敬。" },
                { source: "大品般若經", text: "若人能安住於無所得之心，則世間一切豐盛、喜樂、資糧皆能自然具足。" },
                { source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於虛浮與急躁。" },
                { source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質束縛，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },
                { source: "廣欽老和尚", text: "做人要老實，修行要恆心。今天踏實存下一分因果，未來便得一分心靈的大自在。" },
                { source: "寂靜之道", text: "世間喧囂皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是最大的福報資糧。" },
                { source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量功德的福田。" },
                { source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲。安養心神，莫向外馳求。" },
                { source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在無常的紅塵中得享大安穩。" },
                { source: "寒山詩", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
                { source: "八大人覺經", text: "多欲為苦，生死疲勞，從貪欲起；少欲無為，身心自在。儲蓄即是無聲的修持。" },
                { source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在無常到來時，心無驚怖，泰然處之。" },
{ source: "弘一法師", text: "知足常足，終身不辱；知止常止，終身不恥。內心清淨，眼前的乾坤自然寬廣富足。" },
{ source: "六祖壇經", text: "本性自足，莫向外求。少欲知足，今日將世俗資糧化作清淨功德，便是最上乘的修持。" },
{ source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
{ source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉的福田。" },
{ source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
{ source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
{ source: "普賢行願", text: "恆順眾生，常行清淨。將多餘的物慾化為甘露，封存於福報淨瓶中，潤澤未來的漫漫菩提路。" },
{ source: "五家共有", text: "深知世間財富為五家所共，唯有內心的清淨功德與手中善因，才是任誰也奪不走的真資糧。" },
{ source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間修持最穩固的基石。" },
{ source: "禪修開示", text: "關閉外在的妄想，守住內心的方寸。存下一分欲念，便是點亮一盞智慧心燈，照破未來無常。" },
{ source: "法華經", text: "常行忍辱，心氣和柔。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
{ source: "維摩詰經", text: "雖處居家，不著三界。在紅塵中打理資糧，心卻不受物質奴役，是為大乘菩薩的清淨持守。" },
{ source: "大諦造化", text: "因果歷歷不爽。今日在此處播下一粒儲蓄的種子，因緣具足之時，必收穫滿樹的心靈安穩與福報。" },
{ source: "清淨法身", text: "外在的繁華皆是夢幻泡影。用每天的恆常自律，為自己的靈魂洗去浮躁，歸於最純粹的踏實。" },
{ source: "印光大師", text: "敦倫盡分，閑邪存誠。在小事上盡到自己的本分，不浮誇、不奢靡，福澤自然綿長不絕。" },
{ source: "佛曆隨筆", text: "水滴石穿，非一日之功。福報的凝聚亦在於日日不斷的堅持。輕輕點擊，便是又一筆功德資糧。" },
{ source: "心靈寂靜", text: "少欲者，雖臥地上，猶為安樂；多欲者，雖處天堂，亦不稱意。守住清貧中的富足，是大清靜。" },
{ source: "達摩祖師", text: "無妄想，亦無執著。將儲蓄當作一種自然的呼吸，不急不躁，因緣自會水到渠成。" },
{ source: "涅槃經", text: "善惡之報，如影隨形；三世因果，循環不失。今日克己存善，未來的清涼福報早已注定。" },
{ source: "廣欽老和尚", text: "修行不要貪快，要老實。存錢也是一樣，一天一個腳印，心安理得，才是真功夫。" },
{ source: "藥師經", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
{ source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將具有無量功德。" },
{ source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
{ source: "大悲咒語境", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
{ source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的存錢罐，當下便是靈山大廳。" },
{ source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小资財，即是明日大自在的因頭。" },
{ source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
{ source: "虛雲老和尚", text: "坐閱五帝四朝，不覺滄桑幾度。世間財物生不帶來，死不帶去，唯有定力與善業永隨。" },
{ source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶一滴功德清泉。" },
{ source: "金剛經開示", text: "若菩薩心住於法而行布施，如人入暗，即無所見。今日我們無相儲蓄，踏實生活，福德不可思量。" },
{ source: "太虛大師", text: "仰天長嘯，不如低頭播種。人成即佛成，理好當下的每一分資產，便是世間法中最高級的修行。" },
{ source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚福報與智慧的清淨方寸。" },
{ source: "禪林僧寶傳", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },
{ source: "慈悲布施", text: "儲蓄是為了未來有能力幫助更多的人。懷著這份大慈悲心去累積，每一塊錢都將閃耀佛光。" },
{ source: "六度波羅蜜", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
{ source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮、毫無罣礙。" },
{ source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
{ source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的功德登載，築起對抗世俗無常的金色法盾。" },
{ source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
                { source: "心經指引", text: "心無罣礙，自然無有恐怖。今日省下一分奢華，便是為明天的生活，多存一分大清靜。" },
{ source: "金剛經開示", text: "一切有為法，如夢幻泡影。看破眼前物質的虛妄，踏實積累淨瓶資糧，方是真持守。" },
{ source: "弘一法師", text: "少欲知足，身心自在。在這小小的存錢罐前，每一筆登載，都是在心中修剪無謂的雜草。" },
{ source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的凝聚從來沒有捷徑，唯有在日常的克制間，恆常不懈地注入善因。" },
{ source: "六祖壇經", text: "本性自足，莫向外求。不與世俗攀比物慾，安住在規律的積累中，功德福德自當如影隨形。" },
{ source: "大智度論", text: "如人持燈入冥室，光明照耀，眾冥皆滅。勤勉儲蓄如同持燈，能消弭未來一切無常擔憂。" },
{ source: "普賢行願", text: "恆順眾生，常行清淨。將多餘的世俗物慾化為甘露封存，方能潤澤未來的漫漫菩提路。" },
{ source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，莫要流於世俗的虛浮與急躁。" },
{ source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受慾望綁架，眼前的儲蓄大廳，便是你清淨的心靈方寸。" },
{ source: "廣欽老和尚", text: "做人要老實，修行要有恆心。存錢亦是同理，一天一個腳印，心安理得才是真功夫。" },
{ source: "一塵一福", text: "合抱之木生於毫末。今日將資糧輕輕封入淨瓶，便是對宇宙因果法则最深沉的禮敬。" },
{ source: "寒山詩意", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
{ source: "八大人覺經", text: "多欲為苦，生死疲勞；少欲無為，身心自在。手中的每一筆儲蓄，皆是無聲的修持。" },
{ source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在暴風雨到來時，心無驚怖，泰然處之。" },
{ source: "修心格量", text: "外在的繁華皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是人間最大的福報資糧。" },
{ source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量大安穩的因頭。" },
{ source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲。安養心神，切莫向外馳求。" },
{ source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在浮躁的紅塵中，得享一份真正的大自在。" },
{ source: "清淨法身", text: "外求皆是幻相，內修方得始終。存下一分欲念，便是點亮一盞智慧心燈，照亮前行大路。" },
{ source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小資財，即是明日大解脫的種子。" },
{ source: "達摩祖師", text: "無妄想，亦無執著。將儲蓄當作一種自然的呼吸，不急不躁，因緣自會水到渠成。" },
{ source: "涅槃經", text: "善惡之報，如影隨形。今日克己存善，為自己的靈魂洗去浮躁，未來的清涼福報早已注定。" },
{ source: "藥師經", text: "解脫一切貪吝執著。在小福中精進，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
{ source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將閃耀慈悲的光芒。" },
{ source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
{ source: "大悲心水", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
{ source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的儲蓄，當下便是靈山大廳。" },
{ source: "虛雲老和尚", text: "坐閱五帝四朝，不覺滄桑幾度。世間財物生不帶來，死不帶去，唯有定力與善業永隨。" },
{ source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶一滴功德清泉。" },
{ source: "太虛大師", text: "仰天長嘯，不如低頭播種。理好當下的每一分資產，便是世間法中最高級、最踏實的修行。" },
{ source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚智慧的清淨方寸。" },
{ source: "禪林僧寶", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },
{ source: "六度波羅蜜", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
{ source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮、毫無罣礙。" },
{ source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
{ source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的儲蓄，築起對抗世俗無常的金色法盾。" },
{ source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
{ source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間最穩固的基石。" },
{ source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉的福田。" },
{ source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
{ source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
{ source: "清心神咒", text: "物欲蒙蔽雙眼，自律撥雲見日。每一次與欲望的交鋒，都是在為內心的如意寶珠拂拭塵埃。" },
{ source: "布施心量", text: "手中常有餘糧，心中常有慈悲。儲蓄是為了在未來的某一天，能成為他人生命中遮風擋雨的傘。" },
{ source: "恆常持守", text: "任憑世間流行千百種風潮，守住自己的方寸不亂。清晨的一筆存入，是給靈魂最踏實的早課。" },
{ source: "安穩大廳", text: "知足之人，雖臥地上猶為天堂；多欲之人，雖處天堂亦如地獄。理好財富，便是安頓靈魂。" },
{ source: "智慧福田", text: "莫向外求精緻，要在內求穩固。當你不再為虛榮買單，你就在自己的福田裡種下了長青的松柏。" },
{ source: "定力修煉", text: "在消費主義鋪天蓋地的浪潮裡，你能穩穩按下一筆儲蓄，這份定力已經超越了絕大多數的凡夫。" },
{ source: "因果示現", text: "今日看似毫不起眼的一小筆資糧，在時間的無窮流轉中，終將化作漫天繁星，護佑你的人生旅途。" },
{ source: "心靈淨瓶", text: "把辛苦賺來的福報妥善封存，不使其隨意漏失。這不是吝嗇，這是對宇宙因果法則最誠摯的頂禮。" },
{ source: "圓滿始終", text: "日日登載，步步生蓮。當這份自律化為你生命的一部分，人間處處皆是安心無憂的普陀大廳。" },
 { source: "心經指引", text: "諸法空相，不生不滅。熄滅心中無謂的攀緣物欲，定心累積淨瓶資糧，得享真空大安穩。" },
{ source: "金剛經開示", text: "不取於相，如如不動。在漫天繁華的消費誘惑前，守住你手中的存錢罐，即是無上持守。" },
{ source: "弘一法師", text: "內心清淨，眼前的乾坤自然寬廣。今日將資糧輕輕封存，便是為未來的日子多植一分福田。" },
{ source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的凝聚全在於日日不斷的堅持。輕輕點擊，便是又一筆功德。" },
{ source: "六祖壇經", text: "一切福田，不離方寸。從心而覓，感無不通。將富足化為恆心，淨水布施在小福之中。" },
{ source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
{ source: "普賢行願", text: "恆順眾生，常行清淨。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
{ source: "印光大師", text: "敦倫盡分，閑邪存誠。在小事上盡到自己的本分，不浮誇、不奢靡，福澤自然綿長不絕。" },
{ source: "維摩詰經", text: "雖處居家，不著三界。在紅塵中打理資糧，心卻不受物質奴役，是為菩薩的清淨持守。" },
{ source: "廣欽老和尚", text: "修行不要貪快，要老實。存錢也是一樣，一天一個腳印，心安理得，才是真功夫。" },
{ source: "藥師經", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
{ source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將具有無量功德。" },
{ source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
{ source: "大悲咒境", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
{ source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的存錢罐，當下便是靈山大廳。" },
{ source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小资財，即是明日大自在的因頭。" },
{ source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
{ source: "虛雲老和尚", text: "世間財物生不帶來，死不帶去，唯有定力與善業永隨。理好每一分資糧，心無罣礙。" },
{ source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶一滴功德清泉。" },
{ source: "太虛大師", text: "仰天長嘯，不如低頭播種。人成即佛成，理好當下的每一分資產，便是世間法中最高級的修行。" },
{ source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚福報與智慧的清淨方寸。" },
{ source: "禪林僧寶", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },
{ source: "六度持守", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
{ source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮、毫無罣礙。" },
{ source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
{ source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的功德登載，築起對抗世俗無常的金色法盾。" },
{ source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
{ source: "金剛經開示", text: "若菩薩心住於法而行布施，如人入暗，即無所見。今日我們無相儲蓄，踏實生活，福德不可思量。" },
{ source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於虛浮與急躁。" },
{ source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質束縛，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },
{ source: "廣欽老和尚", text: "做人要老實，修行要恆心。今天踏實存下一分因果，未來便得一分心靈的大自在。" },
{ source: "寂靜之道", text: "世間喧囂皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是最大的福報資糧。" },
{ source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量功德的福田。" },
{ source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲。安養心神，莫向外馳求。" },
{ source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在無常的紅塵中得享大安穩。" },
{ source: "寒山詩", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
{ source: "八大人覺經", text: "多欲為苦，生死疲勞，從貪欲起；少欲無為，身心自在。儲蓄即是無聲的修持。" },
{ source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在無常到來時，心無驚怖，泰然處之。" },
{ source: "弘一法師", text: "知足常足，終身不辱；知止常止，終身不恥。內心清淨，眼前的乾坤自然寬廣富足。" },
{ source: "六祖壇經", text: "本性自足，莫向外求。少欲知足，今日將世俗資糧化作清淨功功德，便是最上乘的修持。" },
{ source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
{ source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉的福田。" },
{ source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
{ source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
{ source: "普賢行願", text: "恆順眾生，常行清淨。將多餘的物慾化為甘露，封存於福報淨瓶中，潤澤未來的漫漫菩提路。" },
{ source: "五家共有", text: "深知世間財富為五家所共，唯有內心的清淨功德與手中善因，才是任誰也奪不走的真資糧。" },
{ source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間修持最穩固的基石。" },
{ source: "禪修開示", text: "關閉外在的妄想，守住內心的方寸。存下一分欲念，便是點亮一盞智慧心燈，照破未來無常。" },
{ source: "法華經", text: "常行忍辱，心氣和柔。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
{ source: "安穩大廳", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
{ source: "金剛經開示", text: "過去心不可得，現在心不可得，未來心不可得。安住當下，踏實積累淨瓶功德資糧。" },
{ source: "心經指引", text: "心無罣礙，無罣礙故，無有恐怖。知足常樂，儲蓄是為未來種下一福，得大清靜。" },
{ source: "弘一法師", text: "人生最曼妙的風景，竟是內心的淡定與從容。少欲知足，一塵一法皆是心中福田。" },
{ source: "六祖壇經", text: "一切福田，不離方寸；從心而覓，感無不通。將富足化為恆心，淨水布施在小福之中。" },
{ source: "法華經開示", text: "福德因緣，皆由願生。每次微小的克制與儲蓄，:::皆是在大千世界中，匯聚你的大自在。" },
{ source: "大智度論", text: "如人持燈入冥室，光明照耀，眾冥皆滅。勤勉儲蓄如同持燈，能消弭未來的無常擔憂。" },
{ source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的積累沒有捷徑，唯有在日常的起心動念間，恆常注入善因。" },
{ source: "修心格量", text: "財為五家共有，唯有內心的富足與手中的善業資糧，才是伴隨你跨越無常的最真財富。" },
{ source: "禪修開示", text: "外求皆是幻相，內修方得始終。存下一分欲念，便是點亮一盞心燈，照亮前行大路。" },
{ source: "一塵一福", text: "合抱之木生於毫末。今日將資糧輕輕封入淨瓶，便是對宇宙因果法則最深沉的禮敬。" },
{ source: "大品般若經", text: "若人能安住於無所得之心，則世間一切豐盛、喜樂、資糧皆能自然具足，毫無匱乏。" },
{ source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於世俗的虛浮與急躁。" },
{ source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質束縛，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },
{ source: "廣欽老和尚", text: "做人要老實，修行要恆心。今天踏實存下一分因果，未來便得一分心靈的大自在。" },
{ source: "寂靜之道", text: "世間喧囂皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是最大的福報資糧。" },
{ source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量功德的福田。" },
{ source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲。安養心神，莫向外馳求。" },
{ source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在無常的紅塵中得享大安穩。" },
{ source: "寒山詩意", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
{ source: "八大人覺經", text: "多欲為苦，生死疲勞，從貪欲起；少欲無為，身心自在。儲蓄即是無聲的修持。" },
{ source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在無常到來時，心無驚怖，泰然處之。" },
{ source: "弘一法師", text: "知足常足，終身不辱；知止常止，終身不恥。內心清淨，眼前的乾坤自然寬廣富足。" },
{ source: "六祖壇經", text: "本性自足，莫向外求。少欲知足，今日將世俗資糧化作清淨功德，便是最上乘的修持。" },
{ source: "華嚴經開示", text: "一切唯心造。你若以匱乏之心看世界，處處皆荒涼；你若以知足之心存資糧，滴水皆福報。" },
{ source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉的福田。" },
{ source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
{ source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
{ source: "普賢行願", text: "恆順眾生，常行清淨。將多餘的物慾化為甘露，封存於福報淨瓶中，潤澤未來的漫漫菩提路。" },
{ source: "五家共有", text: "深知世間財富為五家所共，唯有內心的清淨功德與手中善因，才是任誰也奪不走的真資糧。" },
{ source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間修持最穩固的基石。" },
{ source: "禪修指引", text: "關閉外在的妄想，守住內心的方寸。存下一分欲念，便是點亮一盞智慧心燈，照破未來無常。" },
{ source: "法華經", text: "常行忍辱，心氣和柔。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
{ source: "維摩詰經", text: "雖處居家，不著三界。在紅塵中打理資糧，心卻不受物質奴役，是為大乘菩薩的清淨持守。" },
{ source: "大諦造化", text: "因果歷歷不爽。今日在此處播下一粒儲蓄的種子，因緣具足之時，必收穫滿樹的心靈安穩。" },
{ source: "清淨法身", text: "外在的繁華皆是夢幻泡影。用每天的恆常自律，為自己的靈魂洗去浮躁，歸於最純粹的踏實。" },
{ source: "印光大師", text: "敦倫盡分，閑邪存誠。在小事上盡到自己的本分，不浮誇、不奢靡，福澤自然綿長不絕。" },
{ source: "佛曆隨筆", text: "水滴石穿，非一日之功。福報的凝聚亦在於日日不斷的堅持。輕輕點擊，便是又一筆功德資糧。" },
{ source: "心靈寂靜", text: "少欲者，雖臥地上，猶為安樂；多欲者，雖處天堂，亦不稱意。守住清貧中的富足，是大清靜。" },
{ source: "達摩祖師", text: "無妄想，亦無執著。將儲蓄當作一種自然的呼吸，不急不躁，因緣自會水到渠成。" },
{ source: "涅槃經", text: "善惡之報，如影隨形；三世因果，循環不失。今日克己存善，未來的清涼福報早已注定。" },
{ source: "廣欽老和尚", text: "修行不要貪快，要老實。存錢也是一樣，一天一個腳印，心安理得，才是真功夫。" },
{ source: "藥師經指引", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
{ source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將具有無量功德。" },
{ source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
{ source: "大悲咒語境", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
{ source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的存錢罐，當下便是靈山大廳。" },
{ source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小资財，即是明日大自在的因頭。" },
{ source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
{ source: "虛雲老和尚", text: "坐閱五帝四朝，不覺滄桑幾度。世間財物生不帶來，死不帶去，唯有定力與善業永隨。" },
{ source: "禪心完全體", text: "少欲知足，花開見佛。用每日雷打不動的資糧登載，在無常的紅塵中築起最穩固的功德法盾。" },
{ source: "金剛經", text: "一切有為法，如夢幻泡影，如露亦如電，應作如是觀。安住當下，踏實積累功德。" },
{ source: "心經", text: "度一切苦厄。舍利子，色不異空，空不異色。知足常樂，儲蓄是為未來種下一福。" },
{ source: "弘一法師", text: "看淡世俗繁華，方得內心大清靜。每日將資糧封存淨瓶，便是人間最高級的修行。" },
{ source: "六祖壇經", text: "菩提本無樹，明鏡亦非台。本來無一物，何處惹塵埃。心若不受物質束縛，處處皆富足。" },
{ source: "法華經", text: "福德因緣，皆由願生。每次微小的克制與儲蓄，都是在心中匯聚無量功德，生大自在。" },
{ source: "大智度論", text: "精進不懈，如同持燈破暗。勤勉儲蓄能消弭未來的無常擔憂，安頓身心靈。" },
{ source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的積累沒有捷徑，唯有在日常的起心動念間，恆常不懈。" },
{ source: "修心格量", text: "世間財物皆為五家共有，唯有內心的富足與善業資糧，才是伴隨你跨越無常的真財富。" },
{ source: "禪修開示", text: "外求皆是幻相，內修方得始終。存下一分欲念，便是點亮一盞心燈，照破紅塵黑暗。" },
{ source: "一塵一福", text: "合抱之木生於毫末。今日將資糧輕輕封入淨瓶，便是對宇宙因果法則最深沉的禮敬。" },
{ source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於世俗的虛浮與急躁。" },
{ source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質奴役，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },

{ source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天功德登載，築起對抗世俗無常的金色法盾。" },
{ source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿淨土資糧。" },
{ source: "慈悲布施", text: "儲蓄是為了未來有能力幫助更多的人。懷著這份大慈悲心去累積，每一塊錢都閃耀光芒。" },
{ source: "六度波羅蜜", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
{ source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮。" },
{ source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
{ source: "藥師經", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的護身符。" },
{ source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步都將具有無量功德。" },

{ source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
{ source: "虛雲老和尚", text: "坐閱五帝四朝，不覺滄桑幾度。世間財物生不帶來死不帶去，唯有定力與善業永隨。" },
{ source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶功德清泉。" },
{ source: "太虛大師", text: "仰天長嘯，不如低頭播種。人成即佛成，理好當下的每一分資產，便是世間法中的高級修行。" },
{ source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚智慧的方寸。" },
{ source: "禪林僧寶傳", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },

        rainbow: {

                { source: "頻率對齊", text: "匱乏來自恐懼，富足源於信任。信任宇宙的資源無窮無盡，而你正優雅地留存這份富饒。" },
                { source: "正念財富", text: "金錢在流動中帶來體驗，在靜止中帶來安定。歡喜地為它預備一間充滿愛與光的香檳大廳。" },
                { source: "心靈滋養", text: "聽一場環境的潮汐，感受呼吸的頻率。存下安穩，是給自己最溫柔、最長情的告白。" },

                { source: "光輪共振", text: "當你的心輪充滿感恩，你的海底輪便會長出延伸至大地深處的根，穩穩承接宇宙所有的餽贈。" },

{ source: "光之顯化", text: "每一次理智的存留，都是在清除內心的匱乏記憶。讓金錢在你的生命中，流動成最美的光之瀑布。" },
{ source: "心靈舒壓", text: "放下物欲的攀比，回歸心靈的清靜。今天存下的每一筆底氣，都會化作未來實現奇蹟的魔法羽翼。" },
{ source: "豐盛藍圖", text: "宇宙的寶庫早已為你敞開，今天你所存下的每一份安寧，都將化作未來人生藍圖中最璀璨的彩虹。" },
{ source: "療癒音效", text: "聽一場大自然的蟬鳴，讓雜念隨風散去。每一次的儲蓄，都是在對自己的生命投下最溫柔的信任票。" },
{ source: "內在豐盛", text: "真正的富有，是內心毫無匱乏。當你帶著知足的心去累積，手裡的存錢罐就是最珍貴的顯化器。" },
{ source: "宇宙之網", text: "你與萬物皆有連接。當你開始規律、有愛地管理財富，整個宇宙都會悄悄為你的意志力點讚。" },
{ source: "高頻人生", text: "用儲蓄的成就感來取代消費的短暫刺激。看著進度條一步步填滿，是最踏實、最健康的療癒。" },
{ source: "彩虹宣言", text: "我不做物質的奴隸，要做財富的主人。今天再次將豐盛的掌控權，牢牢握在自己的溫暖手心裡。" },
{ source: "海底輪滋養", text: "穩固的財富防線能讓你睡得更安穩。用今天的理智，為明天的生活買一份高額的心靈安心險。" },
{ source: "正念奇蹟", text: "看著餘額一點點變多，內心的焦慮就會一點點變少。這才是最簡單、最實用的身心靈高頻療癒。" },
{ source: "能量流動", text: "金錢流向珍惜它的人。用一個充滿敬意與規律的儀式收納它，它便會長久地化作光芒守護著你。" },
{ source: "心靈安全感", text: "存錢不是因為匱乏，而是因為我們深知，內心的底氣遠比短暫的虛榮更能撫平生活的種種焦慮。" },
{ source: "圓滿豐盛", text: "每一天的堅持都是無聲的宣告：我正與全宇宙的富足能量完美共振，步步生蓮，走向最好的未來。" },
{ source: "心輪擴張", text: "閉上雙眼，感受心跳。今天這筆小小的驚喜，不是大風刮來的，而是宇宙聽見你自律的回應。" },
{ source: "能量淨化", text: "清理掉手機裡所有誘惑你下單的無效訊息。看著我們防誤觸大廳的乾淨介面，整個人都高頻了起來。" },
{ source: "彩虹完全體", text: "每一次你按下一筆儲蓄，內在的彩虹就多折射出一道耀眼的光芒。親愛的，你正走在無憂的路上。" },
                { source: "路易斯·賀", text: "宇宙的資源是無窮無盡的。我帶著深深的喜悅將能量存入，生活正變得無比豐盛與安全。" },
{ source: "吸引力法則", text: "當我停止對金錢的焦慮，它就會像溫暖的春風一樣，源源不絕地從四面八方主動流向我。" },
{ source: "正念冥想", text: "深呼吸，感受當下的富足。你不需要向外證明什麼，你本身就是最珍貴的寶藏，值得擁有美好。" },
{ source: "巴夏開示", text: "跟隨你內心最高的興奮前行。儲蓄不只是一組冷冰冰的數字，它是你向生命之流投下的信任票。" },
{ source: "療癒微風", text: "放慢腳步，聽一場環境的潮汐。你今天存下的安穩，正在內在宇宙中折射出最耀眼的彩虹芒。" },
{ source: "豐盛肯定句", text: "我是一塊強大的財富磁鐵。我的儲蓄瓶裡裝滿了感恩的頻率，宇宙正以千百倍的溫柔回饋我。" },
{ source: "宇宙之愛", text: "對一小塊錢微笑，整個宇宙的財富大門都會為你的頻率而敞開。你正被這股豐盛的暖流溫柔包裹。" },
{ source: "靈性療癒", text: "放下對匱乏的恐懼，將雙手安放在心輪。今天存下的不只是數字，更是對自己靈魂的溫柔陪伴。" },
{ source: "內在小孩", text: "親愛的，辛苦了。我們正一步一步建立最溫暖的安全避風港，未來的我們，一定會無比幸福、自在。" },
{ source: "豐盛之流", text: "感恩此時此刻的擁有。當你學會珍惜當下的每一份資源，宇宙就會源源不絕地為你打開全新的大門。" },
{ source: "光之工作者", text: "將每一次的防誤觸點擊當作能量的傳遞。穩固你的物質根基，彩虹的光芒將會從你的核心綻放出來。" },
{ source: "歐林開示", text: "你可以透過喜悅而非痛苦來成長。當你順應豐盛的法則，儲蓄就會變成一場最快樂、最舒心的能量遊戲。" },
{ source: "心輪共振", text: "金錢是宇宙流動的愛之能量。我歡喜地接納它，智慧地留存它，讓我的生活充滿無限奇蹟與平靜。" },
{ source: "奇蹟課程", text: "奇蹟是自然的。當它沒有發生，表示有些事情卡住了。今天存下的喜悅，就是疏通豐盛的鑰匙。" },

{ source: "吸引力法則", text: "我是一塊強大的財富磁鐵。我的儲蓄瓶裡裝滿了感恩的頻率，宇宙正以千百倍的溫柔將奇蹟回饋給我。" },
{ source: "內在宇宙", text: "你不需要為了證明自己而過度消費。你本身就是圓滿具足的宇宙，擁有一切應得的愛與豐盛。" },
{ source: "巴夏開示", text: "跟隨你當下的最高興奮。儲蓄不只是一組數字，它是你向生命之流投下的信任票，全然被愛包圍。" },
{ source: "正念財富", text: "金錢在流動時帶來源源不絕的體驗，在靜止時帶來無可取代的安定。優雅地為它預備一間香檳大廳。" },
{ source: "靈魂陪伴", text: "放慢腳步，聽聽內心最真實的聲音。今天存下的不只是數字，幕後默默支持未來最精彩的你。" },
{ source: "脈輪療癒", text: "當你的心輪充滿感恩，你的海底輪便會長出延伸至大地深處的根，穩穩承接宇宙所有的財富餽贈。" },
{ source: "零極限", text: "對不起，請原諒我，謝謝你，我愛你。清理對金錢所有的焦慮與匱乏感，讓儲蓄筒成為純淨的顯化空間。" },
{ source: "宇宙之愛", text: "對一小塊錢微笑，整個宇宙的財富大門都會為你的頻率而敞開。你正被這股豐盛的暖流溫柔包裹。" },
{ source: "迪帕克", text: "財富是意圖的延伸。將你對未來的無限渴望，化為當下一點一滴、溫柔且踏實的累積。" },
{ source: "光之工作者", text: "將每一次的防誤觸點擊當作能量的傳遞。穩固你的物質根基，彩虹的光芒將會從你的核心綻放出來。" },
{ source: "歐林", text: "你可以透過喜悅而非痛苦來成長。當你順應豐盛的法則，儲蓄就會變成一場最快樂、最舒心的能量遊戲。" },
{ source: "心輪共振", text: "金錢是宇宙流動的愛之能量。我歡喜地接納它，智慧地留存它，讓我的生活充滿無限奇蹟與平靜。" },
{ source: "奇蹟課程", text: "奇蹟是自然的。當它沒有發生，表示有些事情卡住了。今天存下的喜悅，就是疏通豐盛的鑰匙。" },

{ source: "環境療癒", text: "如同貓咪放鬆時的溫柔呼嚕聲，讓心安靜下來。每一次的儲蓄，都是在內在宇宙中點亮一抹彩虹。" },

{ source: "肯定句顯化", text: "我與宇宙的富足能量完美對齊。我每天都看著自己的財富之樹茁壯成長，內心滿是平靜與安全感。" },
{ source: "生命之流", text: "感恩此時此刻的擁有。當你學會珍惜當下的每一份資源，宇宙就會源源不絕地為你打開全新的大門。" },

{ source: "路易斯·賀", text: "我值得擁有安全與富足的人生。我誠摯感謝宇宙與大地，在此刻給予我的一切豐盛恩澤。" },

        },
        gospel: { 
            name: "✝️ 恩典管家", runnerIcon: "🕊️",
            quotes: [
                { source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，便是忠心、良善又智慧的管家。" },
                { source: "箴言", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
                { source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的富足與託付交給妳。" },
                { source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },
                { source: "五餅二魚", text: "不要輕看手中微小的五餅二魚。憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。" },
                { source: "詩篇", text: "祂使我的福杯滿溢。在感恩與順服中智慧行事，耶和華必作你的牧者，使你的產業在乾旱之年依然青翠。" },
                { source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
                { source: "信心播種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
                { source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
                { source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
                { source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
                { source: "箴言十", text: "耶和華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的管道。" },
                { source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆的產業。" },

                { source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },

{ source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對神託付之資產最美的交代。" },
{ source: "箴言廿一", text: "智慧人家中積蓄寶物膏油；愚昧人隨得隨吞。今天我們選擇作智慧人，為未來預備充足的油。" },
{ source: "詩篇廿三", text: "耶和華是我的牧者，我必不致缺乏。在豐盛中常存謙卑與憐憫，祂必帶領你走在青草地上。" },
{ source: "提摩太前書六", text: "不要寄託希望於無常的財富上，只要寄託於那厚賜萬物給我們享受的神。智慧理財，得享真正生命。" },
{ source: "信心撒種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
{ source: "路加十六", text: "倘若你們在不義的錢財上不忠心，誰還把那真實的錢財託付你們呢？理好眼前的每一塊錢，是高級的修煉。" },
{ source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
{ source: "箴言六", text: "懶惰人哪，你去察看螞蟻的動作就可得智慧。螞蟻在夏天預備食物，在收割時聚斂糧食。今天，我們學習這份遠見。" },
{ source: "哥林多後書九", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
{ source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
{ source: "箴言八", text: "智慧的果實勝過黃金，強如精金；她的出產超乎高銀。在智慧的引導下累積，你的財富將滿有平安。" },
{ source: "馬太六", text: "不要為明天憂慮，因為明天自有明天的憂慮。今天的儲蓄是智慧的管理，不是憂慮的堆積，心安理得。" },
{ source: "利未記", text: "地裡的出產都要歸耶和華為聖。帶著聖潔與感恩的心去打理你的每一分資產，豐盛的泉源必長流不息。" },
{ source: "箴言廿二", text: "智慧人見禍藏躲；愚蒙人前往受害。每天雷打不動的儲蓄，就是你見禍藏躲、未雨綢繆的智慧高牆。" },
{ source: "信心之盾", text: "憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。不要輕看手中這筆微小的資源。" },
{ source: "詩篇一一二", text: "他家中有財寶道德；他的仁義存到永遠。讓財富與智慧並行，你的家庭必在恩典中得享大安穩。" },
{ source: "管家宣告", text: "我受託管理這份豐盛，必以忠心、良善與智慧回報。每一步的克制與累積，都是在為主預備器皿。" },
{ source: "箴言十四", text: "智慧婦人建立家室；愚妄婦人親手拆毀。用每天的堅持與理智，為你的家庭築起最穩固的經濟防線。" },
{ source: "路加福音六", text: "你們要給人，就必有給你們的，並且用十足的升斗，連搖帶按，尖疊地落在你們懷裡。智慧累積，大能布施。" },
{ source: "平安應許", text: "我的神必照祂榮耀的豐盛，在基督耶穌裡使你們一切所需用的都充足。常存知足的心，大富足也。" },
{ source: "箴言廿八", text: "誠實人必多得福；想要急速發財的，不免受罰。踏踏實實、一塊錢一塊錢的累積，才是蒙福的王道。" },
{ source: "羅馬書", text: "凡事都不可虧欠人，唯有彼此相愛，要常以為虧欠。理清你的財務，讓你的生命毫無罣礙、滿有自由。" },
{ source: "箴言十五", text: "少有財寶，敬畏耶和華，強如多有財寶，煩亂不安。守住心中的平安與存錢罐，是最上乘的富足。" },
{ source: "信心足跡", text: "不要輕看手中微小的五餅二魚。只要在小事上忠心，微小的累積在信心的應許裡，也必將化作無窮的倉房。" },
{ source: "箴言十九", text: "憐憫貧窮的，就是借給耶和華；他的善行，耶和華必償還。智慧儲蓄，為了未來有更大的能力去愛與給予。" },
{ source: "以弗所書", text: "神能照著運行在我們心裡的大能，充充足足地成就一切，超過我們所求所想的。今天，繼續帶著信心前行。" },
{ source: "箴言十", text: "手懶的，要受貧窮；手勤的，卻要富足。不要羨慕他人的豐盛，用你今天的殷勤點擊，圓滿你自己的器皿。" },
{ source: "彼得前書", text: "各人要照所得的恩賜彼此服事，作神百般恩賜的好管家。今天你依然走在智慧打理、領受應許的路上。" },
{ source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳裡。" },
{ source: "恩典大廳", text: "願恩惠、平安從我們的父神充充足足地加給你們！在小小的存錢罐中，見證信心與毅力滴水穿石的永恆應許。" },
                { source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，作良善智慧的好管家。" },
{ source: "箴言指引", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
{ source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的託付交託給你。" },
{ source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },
{ source: "五餅二魚", text: "不要輕看手中微小的資源。憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。" },
{ source: "詩篇應許", text: "祂使我的福杯滿溢。在感恩與順服中智慧行事，耶和華必作你的牧者，使你的產業常青。" },
{ source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
{ source: "信心播種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的無窮倉房預備豐盛。" },
{ source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄。" },
{ source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心滴水穿石。" },
{ source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
{ source: "箴言十", text: "耶和華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的渠道。" },
{ source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆產業。" },
{ source: "萬物源頭", text: "我們帶不走地上的絲毫，卻能管理好當下的重託。用智慧為未來的恩典大廳築起高牆。" },
{ source: "管家格言", text: "儲蓄不是出於對明天的恐懼，而是出於對今天恩典的尊重與管理。滿有平安，毫無匱乏。" },
{ source: "瑪拉基書", text: "以此試試我，是否為你們敞開天上的窗戶，傾福與你們，甚至無處可容。信心隨行。" },
{ source: "傳道書", text: "當將你的糧食撒在水面，因為日久必能得著。明智的收斂與預備，是看透世事後的沉穩智慧。" },
{ source: "箴言十三", text: "不義之財必速減；勤勞積蓄的必豐盈。在誠實中一塊錢一塊錢的累積，神的應許永不落空。" },
{ source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
{ source: "應許大廳", text: "看哪！天上的飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧，而非出於對匱乏的恐懼。" },
{ source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對託付資產最美的交代。" },

{ source: "提摩太前書", text: "不要寄託希望於無常的財富上，只要寄託於厚賜萬物給我們的神。智慧理財，得享真正生命。" },

{ source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳。" },
{ source: "約書亞記", text: "這律法書不可離開你的口，總要晝夜思想。將自律的話語刻在心頭，你的道路就必亨通，凡事順利。" },
{ source: "詩篇一編", text: "他要像一棵樹栽在溪水旁，按時候結果子，葉子也不枯乾。凡他所做的盡都順利。規律累積的福分。" },
{ source: "箴言二十", text: "不要貪睡，免致貧窮；眼要睜開，就得飽食。清晨在防誤觸大廳按下的第一筆，就是清醒的開端。" },
{ source: "哥林多前", text: "凡事都要規規矩矩地按著次序行。把你的財務流水理得井井有條，這也是對上帝賜予秩序的尊崇。" },
{ source: "加拉太書", text: "我們行善，不可喪志；若不灰心，到了時候就要收割。儲蓄的路上不要氣餒，應許的季節必會來到。" },
{ source: "帖撒羅尼迦", text: "要常常喜樂，不住地禱告，凡事謝恩。帶著滿滿的感恩與喜悅來管理每一塊錢，資產必蒙保守。" },
{ source: "箴言十六", text: "心中的謀劃在乎人，舌頭的應對由於耶和華。你所做的，要交託耶和華，你所謀的，就必成立。" },
{ source: "希伯來書", text: "必須忍耐，使你們行完了神的旨意，就可以得著所應許的。這三十天的恆心，主都看在眼裡。" },
{ source: "恩典大廳", text: "願恩惠、平安從我們的父神充充足足地加給你們！在小小的存錢罐中，見證信心與毅力滴水穿石的永恆應許。" },

{ source: "詩篇一一二", text: "他家中有財寶道德；他的仁義存到永遠。讓財富與智慧並行，你的家庭必在恩典中得享大安穩。" },
{ source: "管家宣告", text: "我受託管理這份豐盛，必以忠心、良善與智慧回報。每一步的克制與累積，都是在為主預備器皿。" },
{ source: "箴言十四", text: "智慧建立家室；愚妄親手拆毀。用每天的堅持與理智，為你的家庭築起最穩固的經濟防線。" },
{ source: "路加福音", text: "你們要給人，就必有給你們的，並且用十足的升斗，連搖帶按，尖疊地落在你們懷裡。智慧累積，大能布施。" },
{ source: "平安應許", text: "我的神必照祂榮耀的豐盛，在基督耶穌裡使你們一切所需用的都充足。常存知足的心，大富足也。" },
{ source: "箴言廿八", text: "誠實人必多得福；想要急速發財的，不免受罰。踏踏實實、一塊錢一塊錢的累積，才是蒙福的王道。" },
{ source: "羅馬書", text: "凡事都不可虧欠人，唯有彼此相愛，要常以為虧欠。理清你的財務，讓你的生命毫無罣礙、滿有自由。" },
{ source: "箴言十五", text: "少有財寶，敬畏大能者，強如多有財寶，煩亂不安。守住心中的平安與存錢罐，是最上乘的富足。" },
{ source: "信心足跡", text: "不要輕看手中微小的五餅二魚。只要在小事上忠心，微小的累積在信心的應許裡，也必將化作無窮的倉房。" },
{ source: "箴言十九", text: "憐憫貧窮的，就是借給大能者；他的善行，大能者必償還。智慧儲蓄，為了未來有更大的能力去愛與給予。" },
{ source: "以弗所書", text: "神能照著運行在我們心裡的大能，充充足足地成就一切，超過我們所求所想的。今天，繼續帶著信心前行。" },
{ source: "箴言十", text: "手懶的，要受貧窮；手勤的，卻要富足。不要羨慕他人的豐盛，用你今天的殷勤點擊，圓滿你自己的器皿。" },
{ source: "彼得前書", text: "各人要照所得的恩賜彼此服事，作神百般恩賜的好管家。今天你依然走在智慧打理、領受應許的路上。" },
{ source: "永恆保障", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理地上的資產，同時將心安放在永恆的平安大廳裡。" },
{ source: "馬太福音", text: "因為你的財寶在哪裡，你的心也在哪裡。好好管理手中的資產，便是忠心、良善又智慧的管家。" },
{ source: "箴言", text: "手懶的，要受貧窮；手勤的，卻要富足。智慧的財務規劃，能在恩典中得享心靈的真正安穩。" },
{ source: "路加福音", text: "人在最小的事上忠心，在大事上也忠心。將今日的本分做好，神必將更大的富足與託付交給妳。" },
{ source: "提摩太前書", text: "敬虔加上知足的心便是大利了。儲蓄不為積攢地上的財寶，乃為在主裡得著隨事隨在的平安。" },
{ source: "五餅二魚", text: "不要輕看手中微小的五餅二魚。憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。" },
{ source: "詩篇", text: "祂使我的福杯滿溢。在感恩與順服中智慧行事，耶和華必作你的牧者，使你的產業在乾旱之年依然青翠。" },
{ source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
{ source: "信心播種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
{ source: "哥林多後書", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
{ source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
{ source: "申命記", text: "你要記念耶和華你的神，因為得貨財的力量是祂給你的。以感恩之心，作忠誠的資產守門人。" },
{ source: "箴言十", text: "耶和華所賜的福使人富足，並不加上憂慮。智慧地留存與規劃，是領受長遠平安的管道。" },
{ source: "路加十二", text: "你們的生命不在乎家產豐盛。得著那不能壞的錢囊，今天在小錢上忠心，明天領受永恆的產業。" },
{ source: "萬物源頭", text: "我們帶不走地上的絲毫，卻能管理好當下的重託。用智慧為未來的恩典築起高牆。" },
{ source: "管家格言", text: "儲蓄不是出於對明天的恐懼，而是出於對今天恩典的尊重與管理。滿有平安，毫無匱乏。" },
{ source: "瑪拉基書", text: "以此試試我，是否為你們敞開天上的窗戶，傾福與你們，甚至無處可容。信心隨行，毫無憂慮。" },
{ source: "傳道書", text: "當將你的糧食撒在水面，因為日久必能得著。明智的收斂與預備，是看透世事後的沉穩智慧。" },
{ source: "箴言十三", text: "不義之財必速減；勤勞積蓄的必豐盈。在誠實中一塊錢一塊錢的累積，神的應許永不落空。" },
{ source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
{ source: "應許大廳", text: "看哪！天上的飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧的管理，而非出於對匱乏的恐懼。" },
{ source: "恩典大廳", text: "願恩惠、平安從我們的父神充充足足地加給你們！在小小的存錢罐中，見證信心與毅力滴水穿石的永恆應許。" },

{ source: "希伯來書", text: "你們存心不可貪戀錢財，要以自己所有的為足。因為主曾說：我總不撇下你，也不丟棄你。" },
{ source: "應許大廳", text: "看哪！天天上飛鳥不種也不收，天父尚且養活牠們。今天的克制是出於智慧的管理，而非出於對匱乏的恐懼。" },
{ source: "哥林多前書", text: "所求於管家的，是要他有忠心。在日常的收支中常存遠見，就是對神託付之資產最美的交代。" },
{ source: "箴言廿一", text: "智慧人家中積蓄寶物膏油；愚昧人隨得隨吞。今天我們選擇作智慧人，為未來預備充足的油。" },
{ source: "詩篇廿三", text: "耶和華是我的牧者，我必不致缺乏。在豐盛中常存謙卑與憐憫，祂必帶領你走在青草地上。" },
{ source: "提摩太前書六", text: "不要寄託希望於無常的財富上，只要寄託於那厚賜萬物給我們享受的神。智慧理財，得享真正生命。" },
{ source: "信心撒種", text: "流淚撒種的，必歡呼收割。今天的每一分自律與忍耐，都是在為未來的恩典大廳，預備豐盛的無窮倉房。" },
{ source: "路加十六", text: "倘若你們在不義的錢財上不忠心，誰還把那真實的錢財託付你們呢？理好眼前的每一塊錢，是高級的修煉。" },
{ source: "智慧管家", text: "萬物都從神而來，我們只是代為管理的忠心僕人。用遠見規劃資產，在豐盛中常存謙卑與憐憫的心。" },
{ source: "箴言六", text: "懶惰人哪，你去察看螞蟻的動作就可得智慧。螞蟻在夏天預備食物，在收割時聚斂糧食。今天，我們學習這份遠見。" },
{ source: "哥林多後書九", text: "神能將各樣的恩惠多多的加給你們，使你們凡事常常充足，能多行各樣善事。智慧儲蓄，豐盛一生。" },
{ source: "恩典宣告", text: "我的心哪，你要稱頌耶和華！不忘記祂的一切恩惠，在小小的存錢罐中，見證信心與毅力滴水穿石的應許。" },
{ source: "箴言八", text: "智慧的果實勝過黃金，強如精金；她的出產超乎高銀。在智慧的引導下累積，你的財富將滿有平安。" },
{ source: "馬太六", text: "不要為明天憂慮，因為明天自有明天的憂慮。今天的儲蓄是智慧的管理，不是憂慮的堆積，心安理得。" },
{ source: "利未記", text: "地裡的出產都要歸耶和華為聖。帶著聖潔與感恩的心去打理你的每一分資產，豐盛的泉源必長流不息。" },
{ source: "箴言廿二", text: "智慧人見禍藏躲；愚蒙人前往受害。每天雷打不動的儲蓄，就是你見禍藏躲、未雨綢繆的智慧高牆。" },
{ source: "信心之盾", text: "憑著信心交託並播種，恩典的泉源必將在生命的曠野中化為神蹟。不要輕看手中這筆微小的資源。" },

    function refreshDailyWisdom(isClick = false) {
        const themeConfig = THEME_CONTENT_BANK[activeThemeKey] || THEME_CONTENT_BANK.classic;
        const currentQuotes = themeConfig.quotes;
        
        let index = (new Date().getDate() + customWisdomOffset) % currentQuotes.length;

        document.getElementById('display-wisdom-text').innerText = `“${q.text}”`;
        document.getElementById('display-wisdom-src').innerText = `——《${q.source}》`;
        if (isClick) { customWisdomOffset++; playThemeSound(); }

    let customBlueprintOffset = 0;
    function refreshBlueprintStatus(isClick = false) {
        let index = (new Date().getDate() + customBlueprintOffset) % blueprintTextBank.length;
        const baseText = blueprintTextBank[index];
        const goalStr = document.getElementById('target-saving-input').value || '夢想計劃';
        
        let maxUnits = 365; let currentCount = 0;
        if (currentMode === '365_journal') currentCount = journalListHistory.length;
        else if (currentMode === '365_阶梯') currentCount = checkedDays365.length;
        else if (currentMode === 'custom_fixed') currentCount = checkedDaysCustom.length;
        else if (currentMode === 'week_52') { currentCount = checkedWeeks52.length; maxUnits = 52; }
        else currentCount = Object.keys(隨喜Map).length;

        let pct = ((currentCount / maxUnits) * 100).toFixed(2);
        let runner = THEME_CONTENT_BANK[activeThemeKey]?.runnerIcon || '🚀';
        document.getElementById('blueprint-status-text').innerText = `${runner} 【進度 ${pct}%】：${baseText} 願望【${goalStr}】`;
        if (isClick) { customBlueprintOffset++; playThemeSound(); }

    function pickCelebrity() {
        if (currentMode !== '365_journal') { alert("🎰 盲盒功能專屬於【365天防誤觸智慧手帳模式】喔！"); return; }
        const pulled = journalListHistory.map(c => c.amount); const avail = [];
        for (let i = 1; i <= 365; i++) { if (!pulled.includes(i)) avail.push(i); }
        if (avail.length === 0) return;

        tempPendingAmount = avail[Math.floor(Math.random() * avail.length)];
        document.getElementById('confirm-modal-body').innerHTML = `今日面額：<span style="font-size:1.6rem; color:#84a59d;">$${tempPendingAmount}</span> 元<br><br>確定要將此交易登載手帳嗎？`;
        document.getElementById('confirm-modal-layer').classList.add('active');
        playThemeSound();
    }

    function closeConfirmModal() { document.getElementById('confirm-modal-layer').classList.remove('active'); tempPendingAmount = null; }

    function confirmJournalSaving() {
        if (!tempPendingAmount) return;
        const nextDay = journalListHistory.length + 1; const todayStr = new Date().toISOString().split('T')[0];
        journalListHistory.push({ dayIndex: nextDay, dateStr: todayStr, amount: tempPendingAmount, isPatched: false });
        localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
        document.getElementById('confirm-modal-layer').classList.remove('active');
        confetti({ particleCount: 50, spread: 50 }); playThemeSound();
        renderGrid(); tempPendingAmount = null;
    }

    function renderGrid() {
        document.getElementById('months-grid').innerHTML = '';
        const isJournalStyle = (currentMode === '365_journal');
        
        document.getElementById('custom-amt-panel').style.display = currentMode === 'custom_fixed' ? 'flex' : 'none';
        document.getElementById('journal-config-panel').style.display = isJournalStyle ? 'flex' : 'none';
        document.getElementById('app-journal-ui-area').style.display = isJournalStyle ? 'block' : 'none';
        document.getElementById('blindbox-ui-area').style.display = isJournalStyle ? 'block' : 'none';

        const d = LANG_DICTIONARY[currentLang];
        document.getElementById('label-completed-unit').innerText = currentMode === 'week_52' ? d.lblDashDoneWeek : d.lblDashDoneDay;

        if (currentMode === 'week_52') {
            const col = document.createElement('div'); col.className = 'month-column';
            const daysList = document.createElement('div'); daysList.className = 'days-list';
            daysList.style.gridTemplateColumns = "repeat(4, 1fr)";
            for (let w = 1; w <= 52; w++) {
                const cell = document.createElement('div'); cell.className = 'day-cell';
                cell.innerHTML = `<span style="font-size:0.7rem; opacity:0.5; display:block;">W${w}</span>$${w * 10}`;
                if (checkedWeeks52.includes(w)) cell.className = 'day-cell checked';
                cell.onclick = () => toggleDayOrWeek(w, cell); daysList.appendChild(cell);
            }
            col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
        } else {
            monthsData.forEach((month, mIdx) => {
                const col = document.createElement('div'); col.className = 'month-column';
                const header = document.createElement('div'); header.className = 'month-header';
                header.innerHTML = `<span>${d.title.includes('貯金') ? month.name.replace('月','月') : month.name}</span>`; col.appendChild(header);
                const daysList = document.createElement('div'); daysList.className = 'days-list';

                for (let i = month.start; i <= month.end; i++) {
                    const cell = document.createElement('div'); cell.className = 'day-cell';
                    if (currentMode === '365_阶梯' || isJournalStyle) {
                        cell.innerText = i;
                        if (isJournalStyle) {
                            if (journalListHistory.some(c => c.amount === i)) cell.className = 'day-cell checked';
                        } else { if (checkedDays365.includes(i)) cell.className = 'day-cell checked'; }
                    } else if (currentMode === 'custom_fixed') {
                        cell.innerText = `$${currentCustomFixedAmt}`;
                        if (checkedDaysCustom.includes(i)) cell.className = 'day-cell checked';
                    } else {
                        if (隨喜Map[i]) { cell.innerHTML = `$${隨喜Map[i]}`; cell.className = 'day-cell checked'; }
                        else cell.innerHTML = `💸`;
                    }
                    if (!isJournalStyle) cell.onclick = () => toggleDayOrWeek(i, cell);
                    daysList.appendChild(cell);
                }
                col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
            });
        }
        updateDashboard(); selectThemeStyle(activeThemeKey);
    }

    function toggleDayOrWeek(id, element) {
        if (currentMode === '隨喜') {
            if (隨喜Map[id]) { delete 隨喜Map[id]; } 
            else {
                let val = prompt(`💖 Day ${id} 自由隨喜 金額：`, "100"); let amt = parseInt(val) || 0;
                if (amt > 0) 隨喜Map[id] = amt;
            }
            localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map)); renderGrid(); return;
        }
        let arr = currentMode === '365_阶梯' ? checkedDays365 : (currentMode === 'custom_fixed' ? checkedDaysCustom : checkedWeeks52);
        let key = currentMode === '365_阶梯' ? '365_savings_progress' : (currentMode === 'custom_fixed' ? 'custom_fixed_savings_progress' : 'week_52_savings_progress');
        let idx = arr.indexOf(id); if (idx === -1) arr.push(id); else arr.splice(idx, 1);
        localStorage.setItem(key, JSON.stringify(arr)); playThemeSound(); renderGrid();
    }

    function updateDashboard() {
        let totalSaved = 0; let daysCount = 0; let maxUnits = 365;
        if (currentMode === '365_阶梯') { totalSaved = checkedDays365.reduce((a,b)=>a+b,0); daysCount = checkedDays365.length; }
        else if (currentMode === '365_journal') { totalSaved = journalListHistory.reduce((a,b)=>a+b.amount,0); daysCount = journalListHistory.length; }
        else if (currentMode === 'custom_fixed') { totalSaved = checkedDaysCustom.length * currentCustomFixedAmt; daysCount = checkedDaysCustom.length; }
        else if (currentMode === 'week_52') { totalSaved = checkedWeeks52.reduce((a,b)=>a+(b*10),0); daysCount = checkedWeeks52.length; maxUnits = 52; }
        else { for(let k in 隨喜Map) totalSaved += 隨喜Map[k]; daysCount = Object.keys(隨喜Map).length; }

        let pct = ((daysCount / maxUnits) * 100).toFixed(2);
        document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        document.getElementById('days-count').innerText = `${daysCount} / ${maxUnits}`;
        document.getElementById('progress-percent').innerText = `${pct}%`;
        document.getElementById('dynamic-water-fluid').style.width = `${pct}%`;

        const listContainer = document.getElementById('journal-list-render-target');
        if (listContainer) {
            listContainer.innerHTML = '';

                listContainer.innerHTML = `<div style="text-align:center; padding:12px; font-size:0.85rem; opacity:0.5;">🫙 目前手帳尚無登載紀錄</div>`;

                [...journalListHistory].reverse().forEach(item => {
                    const card = document.createElement('div'); card.className = 'journal-row-card';
                    card.innerHTML = `<span class="j-day-tag">Day ${item.dayIndex}</span><span style="font-weight:bold; font-size:0.85rem;">📅 ${item.dateStr}</span><span style="font-weight:900; color:#84a59d;">+$${item.amount}</span>`;
                    listContainer.appendChild(card);
                });
            }
        }
        document.getElementById('journal-total-count-label').innerText = `${journalListHistory.length} 筆`;
    }

    function startSpiritualBgmEngine() {
        if (!isBgmEnabled) return;
        try {
            if (!webAudioCtx) webAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (webAudioCtx.state === 'suspended') webAudioCtx.resume();
            if (mainBgmNode) return;

            mainBgmNode = webAudioCtx.createGain();
            mainBgmNode.gain.setValueAtTime(0, webAudioCtx.currentTime);
            mainBgmNode.gain.linearRampToValueAtTime(0.05, webAudioCtx.currentTime + 1.5);
            mainBgmNode.connect(webAudioCtx.destination);

            if (activeThemeKey === 'classic') {
                const bufferSize = 2 * webAudioCtx.sampleRate;
                const noiseBuffer = webAudioCtx.createBuffer(1, bufferSize, webAudioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { output[i] = (Math.random() * 2 - 1) * 0.05; }
                const noiseSource = webAudioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer; noiseSource.loop = true;
                const filter = webAudioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(350, webAudioCtx.currentTime);
                const lfo = webAudioCtx.createOscillator(); lfo.frequency.setValueAtTime(0.12, webAudioCtx.currentTime);
                const lfoGain = webAudioCtx.createGain(); lfoGain.gain.setValueAtTime(200, webAudioCtx.currentTime);
                lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
                noiseSource.connect(filter); filter.connect(mainBgmNode); lfo.start(); noiseSource.start();
                mainBgmNode.lfo = lfo; mainBgmNode.src = noiseSource;
            } else if (activeThemeKey === 'buddhism') {
                let ticks = 0;
                mainBgmNode.timer = setInterval(() => {
                    ticks++; const osc = webAudioCtx.createOscillator(); const g = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(ticks % 4 === 0 ? 150 : 170, webAudioCtx.currentTime);
                    g.gain.setValueAtTime(0.12, webAudioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 0.2);
                    osc.connect(g); g.connect(mainBgmNode); osc.start(); osc.stop(webAudioCtx.currentTime + 0.2);
                }, 1000);
            } else if (activeThemeKey === 'gospel') {
                const osc1 = webAudioCtx.createOscillator(); const osc2 = webAudioCtx.createOscillator();
                const g1 = webAudioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(65.41, webAudioCtx.currentTime);
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(130.81, webAudioCtx.currentTime);
                g1.gain.setValueAtTime(0.03, webAudioCtx.currentTime);
                osc1.connect(g1); osc2.connect(g1); g1.connect(mainBgmNode);
                osc1.start(); osc2.start();
                mainBgmNode.osc1 = osc1; mainBgmNode.osc2 = osc2;
            } else {
                mainBgmNode.timer = setInterval(() => {
                    const osc = webAudioCtx.createOscillator(); const g = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(3500 + Math.random() * 500, webAudioCtx.currentTime);
                    g.gain.setValueAtTime(0.003, webAudioCtx.currentTime); g.gain.linearRampToValueAtTime(0, webAudioCtx.currentTime + 0.1);
                    osc.connect(g); g.connect(mainBgmNode); osc.start(); osc.stop(webAudioCtx.currentTime + 0.1);
                }, 70);
            }
        } catch(e){}
    }

    function toggleBgmState() {
        if (isBgmEnabled) {
            isBgmEnabled = false; localStorage.setItem('bgm_engine_enabled', 'false');
            if (mainBgmNode) {
                if(mainBgmNode.src)mainBgmNode.src.stop(); if(mainBgmNode.lfo)mainBgmNode.lfo.stop();
                if(mainBgmNode.osc1)mainBgmNode.osc1.stop(); if(mainBgmNode.osc2)mainBgmNode.osc2.stop();
                if(mainBgmNode.timer)clearInterval(mainBgmNode.timer); mainBgmNode.disconnect(); mainBgmNode = null;
            }
        } else { isBgmEnabled = true; localStorage.setItem('bgm_engine_enabled', 'true'); startSpiritualBgmEngine(); }
        updateBgmBtnUI();
    }

    function updateBgmBtnUI() {
        const btn = document.getElementById('btn-toggle-bgm'); if(!btn) return;
        let t = "環境音效：已關閉 / OFF";
        if (isBgmEnabled) {
            if (activeThemeKey === 'classic') t = "🌊 環境音效：輕柔海浪中";
            else if (activeThemeKey === 'buddhism') t = "🪵 環境音效：禪心木魚中";
            else if (activeThemeKey === 'gospel') t = "✝️ 環境音效：恩典管風琴中";
            else t = "🌈 環境音效：夏夜蟬鳴中";
        }
        btn.innerText = t; btn.className = isBgmEnabled ? "settings-item-btn active" : "settings-item-btn";
    }

    function playThemeSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.frequency.setValueAtTime(550, ctx.currentTime); g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
        } catch(e){}
    }

    function openSettingsPanel() { updateBgmBtnUI(); document.getElementById('settings-modal-layer').classList.add('active'); }
    function closeSettingsPanel() { document.getElementById('settings-modal-layer').classList.remove('active'); }
    
    function selectThemeStyle(k) { 
        activeThemeKey = k; localStorage.setItem('active_spiritual_theme_v2', k); 
        document.querySelectorAll('.theme-item').forEach(b => b.classList.remove('active'));
        if(document.getElementById(`s-theme-${k}`)) document.getElementById(`s-theme-${k}`).classList.add('active');
        if (isBgmEnabled) { isBgmEnabled = false; toggleBgmState(); } else { updateBgmBtnUI(); }
        
        customWisdomOffset = 0;
        refreshDailyWisdom(false); 
        refreshBlueprintStatus(false);
    }
    
    function changeLanguage(langKey) {
        currentLang = langKey; localStorage.setItem('global_app_language', langKey);
        document.querySelectorAll('.lang-item').forEach(btn => btn.classList.remove('active'));
        if(document.getElementById(`s-lang-${langKey}`)) document.getElementById(`s-lang-${langKey}`).classList.add('active');

        const d = LANG_DICTIONARY[langKey];
        document.getElementById('app-title').innerText = d.title;
        document.getElementById('lbl-saving-core').innerText = d.lblCore;
        document.getElementById('lbl-custom-amt').innerText = d.lblCustomAmt;
        document.getElementById('btn-apply-amt').innerText = d.btnApply;
        document.getElementById('lbl-start-date').innerText = d.lblStartDate;
        document.getElementById('lbl-target-goal').innerText = d.lblTarget;
        document.getElementById('lbl-journal-title').innerText = d.lblJournal;
        document.getElementById('lbl-blindbox-title').innerText = d.lblBoxTitle;
        document.getElementById('main-action-random-btn').innerText = d.btnBoxDraw;
        document.getElementById('lbl-dash-total').innerText = d.lblDashTotal;
        document.getElementById('lbl-dash-progress').innerText = d.lblDashProg;
        document.getElementById('lbl-setting-lang').innerText = d.setLang;
        document.getElementById('lbl-setting-theme').innerText = d.setTheme;
        document.getElementById('btn-setting-close').innerText = d.setClose;
        document.getElementById('lbl-wisdom').innerText = d.lblWisdom;
        document.getElementById('lbl-setting-music').innerText = d.lblMusic;

        const sel = document.getElementById('main-saving-mode-select');
        sel.options[0].text = d.opt1; sel.options[1].text = d.opt2; sel.options[2].text = d.opt3; sel.options[3].text = d.opt4; sel.options[4].text = d.opt5;

        const config = THEME_CONTENT_BANK[activeThemeKey];
        const bBoxDisplay = document.getElementById('celebrity-display');
        if (bBoxDisplay && config) bBoxDisplay.innerHTML = d.boxWelcome.replace('${name}', config.name);
        
        refreshDailyWisdom(false); refreshBlueprintStatus(false);
    }
    
    function saveTargetGoal() { localStorage.setItem('goal_365_journal', document.getElementById('target-saving-input').value); refreshBlueprintStatus(false); }

    window.onload = function() {
        document.getElementById('main-saving-mode-select').value = currentMode;
        document.getElementById('target-saving-input').value = localStorage.getItem('goal_365_journal') || '夢想計劃';
        changeLanguage(currentLang);
    }
    document.addEventListener('click', function() { if(isBgmEnabled) startSpiritualBgmEngine(); }, { once: false });
</script>
</body>
