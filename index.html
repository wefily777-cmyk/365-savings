<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f7ede2 0%, #f5cac3 100%);
            --card-bg: rgba(255, 255, 255, 0.78);
            --text-color: #2b2d42;
            --text-muted: #6c757d;
            --border-color: rgba(255, 255, 255, 0.6);
            --cell-bg: rgba(255, 255, 255, 0.65);
            --cell-text: #2b2d42;
            --btn-gradient: linear-gradient(135deg, #f28482 0%, #84a59d 100%);
            --checked-bg: linear-gradient(135deg, #84a59d 0%, #62837c 100%);
            --checked-text: #ffffff;
            --water-color: linear-gradient(180deg, #96e6a1 0%, #d4fc79 100%);
            --app-shadow: 0 20px 40px -15px rgba(43, 45, 66, 0.08), 0 4px 12px -4px rgba(43, 45, 66, 0.04);
            --inner-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.02);
            --glass-blur: 24px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 24px 16px 50px 16px;
            background: var(--bg-gradient) !important;
            background-attachment: fixed !important;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.4px;
        }

        .container { max-width: 440px; margin: 0 auto; }
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.35rem; font-weight: 900; color: var(--text-color); margin: 0; }
        
        .gear-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.25rem; padding: 12px 14px; border-radius: 18px; cursor: pointer; 
            box-shadow: var(--app-shadow); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); backdrop-filter: blur(var(--glass-blur));
        }
        .gear-btn:active { transform: scale(0.85) rotate(60deg); }

        .app-card {
            background: var(--card-bg); padding: 20px; border-radius: 28px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { font-size: 0.85rem; font-weight: 800; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.03); color: var(--text-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; outline: none; }

        .header-action-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.5; margin-bottom: 12px; }
        .wisdom-text { font-size: 1.05rem; line-height: 1.65; font-weight: 700; text-align: left; margin-bottom: 8px; color: var(--text-color); word-break: break-word; }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.8; font-weight: bold; }
        .refresh-circle-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-color); transition: transform 0.4s; padding: 4px; }
        .refresh-circle-btn:active { transform: rotate(180deg) scale(1.15); }

        .config-sub-panel { display: none; align-items: center; justify-content: space-between; background-color: rgba(0,0,0,0.02); padding: 12px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); margin-top: 12px; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 12px; padding: 10px; font-weight: 700; text-align: center; outline: none; }

        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; }
        .target-input { flex: 1; border: none; border-radius: 14px; padding: 12px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.03); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }

        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 44px; border-radius: 20px; margin: 14px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 18px 0 0 18px; width: 0%; transition: width 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 18px; }
        .water-floating-runner { position: absolute; right: -16px; top: -24px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 3s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 700; background-color: rgba(0,0,0,0.02); padding: 12px 16px; border-radius: 16px; line-height: 1.5; box-shadow: var(--inner-shadow); }

        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; }
        
        .journal-container-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* 流水帳行卡片排版優化：加入 flex 與對齊，方便右側垃圾桶擺放 */
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 14px 16px; border-radius: 16px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; transition: transform 0.2s; }
        .journal-row-card:active { transform: scale(0.98); }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #f28482; background-color: rgba(242, 132, 130, 0.1); padding: 3px 8px; border-radius: 8px; }

        /* 🛠️ 新增：垃圾桶按鈕精緻化樣式與動態縮放效果 */
        .j-delete-icon-btn { background: none; border: none; font-size: 1.15rem; cursor: pointer; padding: 4px 8px; margin-left: 6px; border-radius: 8px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .j-delete-icon-btn:hover { background-color: rgba(230, 57, 70, 0.15); transform: scale(1.15); }
        .j-delete-icon-btn:active { transform: scale(0.85); }

        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 16px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; box-shadow: 0 8px 24px rgba(242, 132, 130, 0.2); width: 100%; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .random-btn:active { transform: scale(0.96); }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { text-align: center; padding: 10px 0; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
        .stat-card p { margin: 0; font-size: 1.4rem; font-weight: 900; color: var(--text-color); }

        .month-column { background: var(--card-bg); border-radius: 28px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 18px; }
        .month-header { background: rgba(0,0,0,0.01); padding: 14px 18px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 15px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; }
        .day-cell:active { transform: scale(0.85); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 8px 20px rgba(132, 165, 157, 0.4); border-color: transparent; }

        .settings-panel-box { display: flex; flex-direction: column; gap: 18px; text-align: left !important; }
        .settings-row-title { font-size: 0.85rem; font-weight: 800; opacity: 0.6; margin-bottom: 6px; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; width: 100%; box-sizing: border-box; }
        .settings-btn-grid button { width: 100%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .settings-item-btn { background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(242, 132, 165, 0.2); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.3); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: #ffffff; border-radius: 32px; padding: 24px; width: 88%; max-width: 340px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15); text-align: center; color: #2b2d42; }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
        
        .settings-main-action-btn { background: var(--btn-gradient); color: white; border: none; padding: 15px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; margin-top: 18px; width: 100%; box-shadow: 0 6px 18px rgba(242, 132, 130, 0.25); }
        
        footer { text-align: center; margin-top: 30px; padding: 20px 0; }
        .reset-btn { background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; transition: all 0.3s; opacity: 0.5; }
        .reset-btn:hover { opacity: 1; background: #ffe3e3; color: #d90429; border-color: #d90429; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="app-card">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <span class="mode-label" id="lbl-custom-amt">🔧 設定自訂面額：</span>
            <div style="display:flex; gap:4px;">
                <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:70px;" value="100">
                <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:10px 14px; font-weight:bold; border-radius:12px; color:white; font-size:0.85rem;" onclick="applyCustomFixedAmount()">套用</button>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <span class="mode-label" id="lbl-start-date">📅 手帳起始日：</span>
            <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
        </div>
    </div>

    <div class="daily-wisdom-card app-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="refresh-circle-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">裝填能量中...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="app-card">
        <div class="header-action-line">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標願望藍圖</span>
            <button class="refresh-circle-btn" onclick="refreshBlueprintStatus(true)">🔄</button>
        </div>
        <div class="target-input-group">
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" value="夢想計劃" oninput="saveTargetGoal(); updateDashboard();">
        </div>
        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>
        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-card" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>
        <div style="display: flex; gap: 6px; margin-bottom: 12px; background: rgba(0,0,0,0.02); padding: 10px; border-radius: 14px; border: 1px dashed var(--border-color);">
            <input type="number" id="manual-journal-day" min="1" max="365" placeholder="Day (1-365)" style="width: 32%; border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; text-align: center; font-weight: bold; background: var(--cell-bg); color: var(--text-color);">
            <input type="number" id="manual-journal-amt" placeholder="金額 ($)" style="width: 38%; border: 1px solid var(--border-color); border-radius: 10px; padding: 6px; text-align: center; font-weight: bold; background: var(--cell-bg); color: var(--text-color);">
            <button onclick="handleManualJournalSubmit()" style="flex: 1; background: var(--btn-gradient); border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 0.8rem; cursor: pointer;">登載手帳</button>
        </div>
        
        <button id="manual-journal-delete-btn" onclick="handleManualJournalDelete()" style="display: none; width: 100%; background: linear-gradient(135deg, #e63946 0%, #d90429 100%); border: none; color: white; border-radius: 10px; font-weight: bold; font-size: 0.85rem; cursor: pointer; padding: 10px 0; margin-bottom: 12px; box-shadow: 0 4px 12px rgba(230, 57, 70, 0.2);">🗑️ 刪除此筆手帳紀錄</button>

        <div class="journal-container-list" id="journal-list-render-target"></div>
    </div>

    <div class="app-card" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display" style="margin: 10px 0; font-size: 0.9rem; opacity: 0.8;">點擊下方按鈕，抽取今日專屬指引面額</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="app-card dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.6rem; color: #62837c;">$0</p>
        </div>
        <div class="stat-card">
            <div id="lbl-dash-done-container">
                <h3 id="label-completed-unit">已完成天數</h3>
            </div>
            <p id="days-count">0 / 365</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
    
    <footer>
        <button class="reset-btn" id="lbl-reset-btn-text" onclick="resetChallenge()">🔄 重置大廳所有儲蓄數據</button>
    </footer>
</div>

<div class="custom-modal-overlay" id="confirm-modal-layer">
    <div class="custom-modal">
        <h3 id="confirm-modal-title" style="margin-top:0; color:#f28482;">🎰 盲盒指引開啟</h3>
        <p id="confirm-modal-body" style="font-weight:700; font-size:1.1rem; line-height:1.6; margin:20px 0;"></p>
        <div id="confirm-modal-buttons" style="display:flex; gap:10px;">
            <button class="settings-main-action-btn" id="lbl-btn-confirm" style="margin-top:0; flex:1;" onclick="confirmJournalSaving()">確認放入儲蓄瓶</button>
            <button class="settings-main-action-btn" id="lbl-btn-cancel" style="margin-top:0; background:rgba(0,0,0,0.06); color:#2b2d42; flex:1;" onclick="closeConfirmModal()">取消</button>
        </div>
    </div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-theme">🎨 選擇世界觀主題 / Theme</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn theme-item" id="s-theme-classic" onclick="selectThemeStyle('classic')">🌌 經典原版</button>
                    <button class="settings-item-btn theme-item" id="s-theme-rainbow" onclick="selectThemeStyle('rainbow')">🌈 彩虹療癒</button>
                    <button class="settings-item-btn theme-item" id="s-theme-buddhism" onclick="selectThemeStyle('buddhism')">🏯 禪心福報</button>
                    <button class="settings-item-btn theme-item" id="s-theme-gospel" onclick="selectThemeStyle('gospel')">✝️ 恩典管家</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-music">🎵 背景沉浸自然音效 / Nature Sounds</div>
                <div class="settings-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="settings-item-btn" id="btn-toggle-bgm" onclick="toggleBgmState()">環境音效：已關閉</button>
                </div>
            </div>
        </div>
        <button class="settings-main-action-btn" onclick="closeSettingsPanel()" id="btn-setting-close">儲存變更 / Save</button>
    </div>
</div>

<script>
    let currentMode = localStorage.getItem('global_saving_mode') || '365_journal';
    let currentLang = localStorage.getItem('global_app_language') || 'zh-TW';
    let activeThemeKey = localStorage.getItem('active_spiritual_theme_v2') || 'classic';
    let isBgmEnabled = localStorage.getItem('bgm_engine_enabled') === 'true';
    let currentCustomFixedAmt = parseInt(localStorage.getItem('custom_fixed_config_amt')) || 100;

    let journalListHistory = JSON.parse(localStorage.getItem('365_journal_mode_history')) || [];
    let checkedDays365 = JSON.parse(localStorage.getItem('365_savings_progress')) || [];
    let checkedDaysCustom = JSON.parse(localStorage.getItem('custom_fixed_savings_progress')) || [];
    let checkedWeeks52 = JSON.parse(localStorage.getItem('week_52_savings_progress')) || [];
    let 隨喜Map = JSON.parse(localStorage.getItem('any_any_savings_map')) || {};
    let triggeredMilestones = JSON.parse(localStorage.getItem('triggered_milestones_v2')) || [];

    let tempPendingAmount = null;
    let webAudioCtx = null; let mainBgmNode = null;

    function isBirthdayToday() {
        const today = new Date();
        return (today.getMonth() === 0 && today.getDate() === 19);
    }

    function triggerConfettiStorm() {
        if (isBirthdayToday()) {
            const end = Date.now() + 1500;
            const colors = ['#fbc531', '#e1b12c', '#4cd137', '#00a8ff', '#e84118'];
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        } else {
            confetti({ particleCount: 30, spread: 40 });
        }
    }

    function handleManualJournalSubmit() {
        const dayInput = document.getElementById('manual-journal-day').value;
        const amtInput = document.getElementById('manual-journal-amt').value;
        const day = parseInt(dayInput);
        const amt = parseInt(amtInput);

        if (isNaN(day) || day < 1 || day > 365) {
            alert(currentLang === 'en' ? "Please enter a valid Day (1-365)" : "請輸入有效的天數 (1-365)");
            return;
        }
        if (isNaN(amt) || amt <= 0) {
            alert("請輸入有效的金額喔！");
            return;
        }

        let dateStr = new Date().toISOString().split('T')[0];
        const startDateVal = document.getElementById('journal-start-date-picker').value;
        if (startDateVal) {
            let sDate = new Date(startDateVal);
            sDate.setDate(sDate.getDate() + (day - 1));
            dateStr = sDate.toISOString().split('T')[0];
        }

        const existIdx = journalListHistory.findIndex(c => c.amount === day);

        if (existIdx !== -1) {
            journalListHistory[existIdx].dateStr = dateStr;
            journalListHistory[existIdx].dayIndex = day;
            journalListHistory[existIdx].customValue = amt;
        } else {
            journalListHistory.push({ dayIndex: day, dateStr: dateStr, amount: day, customValue: amt, isPatched: true });
        }

        localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
        triggerConfettiStorm();
        playThemeSound();
        
        clearManualInputs();
        renderGrid();
    }

    function executeJournalItemDelete(day) {
        const existIdx = journalListHistory.findIndex(c => c.amount === day);
        if (existIdx !== -1) {
            journalListHistory.splice(existIdx, 1);
            localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
            playThemeSound();
        }
        clearManualInputs();
        renderGrid();
    }

        if (!tempPendingAmount) return;
        const nextDay = journalListHistory.length + 1; 
        
        let todayStr = new Date().toISOString().split('T')[0];
        const startDateVal = document.getElementById('journal-start-date-picker').value;
        if (startDateVal) {
            let sDate = new Date(startDateVal);
            sDate.setDate(sDate.getDate() + journalListHistory.length);
            todayStr = sDate.toISOString().split('T')[0];
        }

        journalListHistory.push({ dayIndex: nextDay, dateStr: todayStr, amount: tempPendingAmount, isPatched: false });
        localStorage.setItem('365_journal_mode_history', JSON.stringify(journalListHistory));
        
        const finalCount = journalListHistory.length;
        triggerConfettiStorm();
        playThemeSound();
        renderGrid(); 
        tempPendingAmount = null;

        const milestoneDays = [30, 100, 200, 365];
        if (milestoneDays.includes(finalCount) && !triggeredMilestones.includes(finalCount)) {
            closeModalAndTriggerMilestone(finalCount);
        } else {
            document.getElementById('confirm-modal-layer').classList.remove('active');
        }
    }

    function triggerMilestoneCelebration(count) {
        if (triggeredMilestones.includes(count)) return;
        triggeredMilestones.push(count);
        localStorage.setItem('triggered_milestones_v2', JSON.stringify(triggeredMilestones));

        const d = LANG_DICTIONARY[currentLang];
        const themeConfig = THEME_CONTENT_BANK[activeThemeKey] || THEME_CONTENT_BANK.classic;
        const celeb = (themeConfig.milestones?.[count]?.[currentLang]) || THEME_CONTENT_BANK.classic.milestones[count]['zh-TW'];

        const duration = 2 * 1000; const end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0, y: 0.85 } });
            confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1, y: 0.85 } });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());

        document.getElementById('confirm-modal-title').innerText = celeb.title;
        document.getElementById('confirm-modal-body').innerHTML = celeb.body.replace(/\n/g, '<br>');
        document.getElementById('confirm-modal-buttons').style.display = 'none'; 
        
        let closeBtn = document.createElement('button');
        closeBtn.className = "settings-main-action-btn";
        closeBtn.style.marginTop = "15px";
        closeBtn.innerText = d.btnMilestoneClose;
        closeBtn.onclick = function() {
            document.getElementById('confirm-modal-layer').classList.remove('active');
            closeBtn.remove();
        };
        document.getElementById('confirm-modal-body').appendChild(closeBtn);
        document.getElementById('confirm-modal-layer').classList.add('active');
    }

    function renderGrid() {
        document.getElementById('months-grid').innerHTML = '';
        const isJournalStyle = (currentMode === '365_journal');
        
        document.getElementById('custom-amt-panel').style.display = currentMode === 'custom_fixed' ? 'flex' : 'none';
        document.getElementById('journal-config-panel').style.display = isJournalStyle ? 'flex' : 'none';
        document.getElementById('app-journal-ui-area').style.display = isJournalStyle ? 'block' : 'none';
        document.getElementById('blindbox-ui-area').style.display = isJournalStyle ? 'block' : 'none';

        const d = LANG_DICTIONARY[currentLang];
        document.getElementById('label-completed-unit').innerText = currentMode === 'week_52' ? d.lblDashDoneWeek : d.lblDashDoneDay;

        if (currentMode === 'week_52') {
            const col = document.createElement('div'); col.className = 'month-column';
            const daysList = document.createElement('div'); daysList.className = 'days-list';
            daysList.style.gridTemplateColumns = "repeat(4, 1fr)";
            for (let w = 1; w <= 52; w++) {
                const cell = document.createElement('div'); cell.className = 'day-cell';
                cell.innerHTML = `<span style="font-size:0.7rem; opacity:0.5; display:block;">W${w}</span>$${w * 10}`;
                if (checkedWeeks52.includes(w)) cell.className = 'day-cell checked';
                cell.onclick = () => toggleDayOrWeek(w, cell); daysList.appendChild(cell);
            }
            col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
        } else {
            monthsData.forEach((month, mIdx) => {
                const col = document.createElement('div'); col.className = 'month-column';
                const header = document.createElement('div'); header.className = 'month-header';
                header.innerHTML = `<span>${d.title.includes('貯金') ? month.name.replace('月','月') : month.name}</span>`; col.appendChild(header);
                const daysList = document.createElement('div'); daysList.className = 'days-list';

                for (let i = month.start; i <= month.end; i++) {
                    const cell = document.createElement('div'); cell.className = 'day-cell';
                    if (currentMode === '365_阶梯' || isJournalStyle) {
                        cell.innerText = i;
                        if (isJournalStyle) {
                            const histItem = journalListHistory.find(c => c.amount === i);
                            if (histItem) {
                                cell.className = 'day-cell checked';
                                let finalVal = histItem.customValue !== undefined ? histItem.customValue : i;
                                cell.innerHTML = `<div>${i}</div><span style="font-size:0.65rem;opacity:0.85;">$${finalVal}</span>`;
                            }
                        } else { if (checkedDays365.includes(i)) cell.className = 'day-cell checked'; }
                    } else if (currentMode === 'custom_fixed') {
                        cell.innerText = `$${currentCustomFixedAmt}`;
                        if (checkedDaysCustom.includes(i)) cell.className = 'day-cell checked';
                    } else {
                        if (隨喜Map[i]) { cell.innerHTML = `$${隨喜Map[i]}`; cell.className = 'day-cell checked'; }
                        else cell.innerHTML = `💸`;
                    }
                    
                    cell.onclick = () => {
                        if(isJournalStyle) {
                            document.getElementById('manual-journal-day').value = i;
                            const currentLogged = journalListHistory.find(c => c.amount === i);
                            document.getElementById('manual-journal-amt').value = currentLogged ? (currentLogged.customValue !== undefined ? currentLogged.customValue : i) : i;
                            
                            if (currentLogged) {
                                document.getElementById('manual-journal-delete-btn').style.display = 'block';
                            } else {
                                document.getElementById('manual-journal-delete-btn').style.display = 'none';
                            }
                        } else {
                            toggleDayOrWeek(i, cell);
                        }
                    };
                    daysList.appendChild(cell);
                }
                col.appendChild(daysList); document.getElementById('months-grid').appendChild(col);
            });
        }
        updateDashboard();
    }

    function toggleDayOrWeek(id, element) {
        const d = LANG_DICTIONARY[currentLang];
        if (currentMode === '隨喜') {
            if (隨喜Map[id]) { delete 隨喜Map[id]; } 
            else {
                let promptTxt = d.隨喜Prompt.replace('${id}', id);
                let val = prompt(promptTxt, "100"); let amt = parseInt(val) || 0;
                if (amt > 0) 隨喜Map[id] = amt;
            }
            localStorage.setItem('any_any_savings_map', JSON.stringify(隨喜Map)); renderGrid(); return;
        }
        let arr = currentMode === '365_阶梯' ? checkedDays365 : (currentMode === 'custom_fixed' ? checkedDaysCustom : checkedWeeks52);
        let key = currentMode === '365_阶梯' ? '365_savings_progress' : (currentMode === 'custom_fixed' ? 'custom_fixed_savings_progress' : 'week_52_savings_progress');
        let idx = arr.indexOf(id); if (idx === -1) arr.push(id); else arr.splice(idx, 1);
        localStorage.setItem(key, JSON.stringify(arr)); 
        
        const milestoneDays = [30, 100, 200, 365];
        if (milestoneDays.includes(arr.length) && !triggeredMilestones.includes(arr.length)) {
            triggerMilestoneCelebration(arr.length);
        }
        
        playThemeSound(); renderGrid();
    }

    function updateDashboard() {
        const d = LANG_DICTIONARY[currentLang];
        let totalSaved = 0; let daysCount = 0; let maxUnits = 365;
        if (currentMode === '365_阶梯') { totalSaved = checkedDays365.reduce((a,b)=>a+b,0); daysCount = checkedDays365.length; }
        else if (currentMode === '365_journal') { 
            totalSaved = journalListHistory.reduce((a,b)=>a + (b.customValue !== undefined ? b.customValue : b.amount), 0); 
            daysCount = journalListHistory.length; 
        }
        else if (currentMode === 'custom_fixed') { totalSaved = checkedDaysCustom.length * currentCustomFixedAmt; daysCount = checkedDaysCustom.length; }
        else if (currentMode === 'week_52') { totalSaved = checkedWeeks52.reduce((a,b)=>a+(b*10),0); daysCount = checkedWeeks52.length; maxUnits = 52; }
        else { for(let k in 隨喜Map) totalSaved += 隨喜Map[k]; daysCount = Object.keys(隨喜Map).length; }

        let pct = ((daysCount / maxUnits) * 100).toFixed(2);
        document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        document.getElementById('days-count').innerText = `${daysCount} / ${maxUnits}`;
        document.getElementById('progress-percent').innerText = `${pct}%`;
        document.getElementById('dynamic-water-fluid').style.width = `${pct}%`;

        const listContainer = document.getElementById('journal-list-render-target');
        if (listContainer) {
            listContainer.innerHTML = '';
            if (journalListHistory.length === 0) {
                listContainer.innerHTML = `<div style="text-align:center; padding:12px; font-size:0.85rem; opacity:0.5;">${d.noLedger}</div>`;
            } else {
                // 🛠️ 核心修改：清單中包入垃圾桶容器布局，並綁定 handleListRowTrashDelete 進行詢問刪除
                [...journalListHistory].reverse().forEach(item => {
                    const card = document.createElement('div'); card.className = 'journal-row-card';
                    const displayAmt = item.customValue !== undefined ? item.customValue : item.amount;
                    
                    card.innerHTML = `
                        <div style="display:flex; align-items:center; gap:8px; flex:1;">
                            <span class="j-day-tag">Grid ${item.amount}</span>
                            <span style="font-weight:bold; font-size:0.85rem;">📅 ${item.dateStr}</span>
                        </div>
                        <div style="display:flex; align-items:center; gap:4px;">
                            <span style="font-weight:900; color:#84a59d;">+$${displayAmt}</span>
                            <button class="j-delete-icon-btn" onclick="handleListRowTrashDelete(${item.amount}, event)">🗑️</button>
                        </div>
                    `;
                    
                    card.onclick = () => {
                        document.getElementById('manual-journal-day').value = item.amount;
                        document.getElementById('manual-journal-amt').value = displayAmt;
                        document.getElementById('manual-journal-delete-btn').style.display = 'block';
                    };
                    listContainer.appendChild(card);
                });
            }
        }
        document.getElementById('journal-total-count-label').innerText = `${journalListHistory.length} ${d.ledgerUnit}`;
    }

    function startSpiritualBgmEngine() {
        if (!isBgmEnabled) return;
        try {
            if (!webAudioCtx) webAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (webAudioCtx.state === 'suspended') webAudioCtx.resume();
            if (mainBgmNode) return;

            mainBgmNode = webAudioCtx.createGain();
            mainBgmNode.gain.setValueAtTime(0, webAudioCtx.currentTime);
            mainBgmNode.gain.linearRampToValueAtTime(0.04, webAudioCtx.currentTime + 1.5);
            mainBgmNode.connect(webAudioCtx.destination);

            if (activeThemeKey === 'classic') {
                const bufferSize = 2 * webAudioCtx.sampleRate;
                const noiseBuffer = webAudioCtx.createBuffer(1, bufferSize, webAudioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { output[i] = (Math.random() * 2 - 1) * 0.05; }
                const noiseSource = webAudioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer; noiseSource.loop = true;
                const filter = webAudioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(350, webAudioCtx.currentTime);
                const lfo = webAudioCtx.createOscillator(); lfo.frequency.setValueAtTime(0.12, webAudioCtx.currentTime);
                const lfoGain = webAudioCtx.createGain(); lfoGain.gain.setValueAtTime(200, webAudioCtx.currentTime);
                lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
                noiseSource.connect(filter); filter.connect(mainBgmNode); lfo.start(); noiseSource.start();
                mainBgmNode.lfo = lfo; mainBgmNode.src = noiseSource;
            } else if (activeThemeKey === 'buddhism') {
                let ticks = 0;
                mainBgmNode.timer = setInterval(() => {
                    ticks++; const osc = webAudioCtx.createOscillator(); const g = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(ticks % 4 === 0 ? 150 : 170, webAudioCtx.currentTime);
                    g.gain.setValueAtTime(0.12, webAudioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 0.2);
                    osc.connect(g); g.connect(mainBgmNode); osc.start(); osc.stop(webAudioCtx.currentTime + 0.2);
                }, 1000);
            } else if (activeThemeKey === 'gospel') {
                const osc1 = webAudioCtx.createOscillator(); const osc2 = webAudioCtx.createOscillator();
                const g1 = webAudioCtx.createGain();
                osc1.type = 'sine'; osc1.frequency.setValueAtTime(65.41, webAudioCtx.currentTime);
                osc2.type = 'triangle'; osc2.frequency.setValueAtTime(130.81, webAudioCtx.currentTime);
                g1.gain.setValueAtTime(0.03, webAudioCtx.currentTime);
                osc1.connect(g1); osc2.connect(g1); g1.connect(mainBgmNode);
                osc1.start(); osc2.start();
                mainBgmNode.osc1 = osc1; mainBgmNode.osc2 = osc2;
            } else {
                mainBgmNode.timer = setInterval(() => {
                    const osc = webAudioCtx.createOscillator(); const g = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(3500 + Math.random() * 500, webAudioCtx.currentTime);
                    g.gain.setValueAtTime(0.003, webAudioCtx.currentTime); g.gain.linearRampToValueAtTime(0, webAudioCtx.currentTime + 0.1);
                    osc.connect(g); g.connect(mainBgmNode); osc.start(); osc.stop(webAudioCtx.currentTime + 0.1);
                }, 70);
            }
        } catch(e){ console.error("Audio engine failed:", e); }
    }

    function shutDownBgmHardware() {
        if (mainBgmNode) {
            try {
                if(mainBgmNode.src) mainBgmNode.src.stop(); 
                if(mainBgmNode.lfo) mainBgmNode.lfo.stop();
                if(mainBgmNode.osc1) mainBgmNode.osc1.stop(); 
                if(mainBgmNode.osc2) mainBgmNode.osc2.stop();
                if(mainBgmNode.timer) clearInterval(mainBgmNode.timer); 
                mainBgmNode.disconnect();
            } catch(e){}
            mainBgmNode = null;
        }
    }

    function toggleBgmState() {
        if (isBgmEnabled) {
            isBgmEnabled = false; localStorage.setItem('bgm_engine_enabled', 'false');
            shutDownBgmHardware();
        } else { 
            isBgmEnabled = true; localStorage.setItem('bgm_engine_enabled', 'true'); 
            startSpiritualBgmEngine(); 
        }
        updateBgmBtnUI();
    }

    function updateBgmBtnUI() {
        const btn = document.getElementById('btn-toggle-bgm'); if(!btn) return;
        let t = "環境音效：已關閉 / OFF";
        if (isBgmEnabled) {
            if (activeThemeKey === 'classic') t = "🌊 環境音效：輕柔海浪中";
            else if (activeThemeKey === 'buddhism') t = "🪵 環境音效：禪心木魚中";
            else if (activeThemeKey === 'gospel') t = "✝️ 環境音效：恩典管風琴中";
            else t = "🌈 環境音效：夏夜蟬鳴中";
        }
        btn.innerText = t; btn.className = isBgmEnabled ? "settings-item-btn active" : "settings-item-btn";
    }

    function playThemeSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const g = ctx.createGain();
            osc.frequency.setValueAtTime(550, ctx.currentTime); g.gain.setValueAtTime(0.04, ctx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
            osc.connect(g); g.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
        } catch(e){}
    }

    function openSettingsPanel() { updateBgmBtnUI(); document.getElementById('settings-modal-layer').classList.add('active'); }
    function closeSettingsPanel() { document.getElementById('settings-modal-layer').classList.remove('active'); }
    
    function selectThemeStyle(k) { 
        activeThemeKey = k; localStorage.setItem('active_spiritual_theme_v2', k); 
        document.querySelectorAll('.theme-item').forEach(b => b.classList.remove('active'));
        if(document.getElementById(`s-theme-${k}`)) document.getElementById(`s-theme-${k}`).classList.add('active');
        
        if (isBgmEnabled) {
            shutDownBgmHardware();
            startSpiritualBgmEngine();
        }
        updateBgmBtnUI();
        customWisdomOffset = 0;
        
        const config = THEME_CONTENT_BANK[k];
        const d = LANG_DICTIONARY[currentLang];
        const bBoxDisplay = document.getElementById('celebrity-display');
        if (bBoxDisplay && config) {
            let tName = config.name[currentLang] || config.name['zh-TW'];
            bBoxDisplay.innerHTML = d.boxWelcome.replace('${name}', tName);
        }
        
        refreshDailyWisdom(false); 
        refreshBlueprintStatus(false);
    }
    
    function changeLanguage(langKey) {
        currentLang = langKey; localStorage.setItem('global_app_language', langKey);
        document.querySelectorAll('.lang-item').forEach(btn => btn.classList.remove('active'));
        if(document.getElementById(`s-lang-${langKey}`)) document.getElementById(`s-lang-${langKey}`).classList.add('active');

        const d = LANG_DICTIONARY[langKey];
        document.getElementById('app-title').innerText = d.title;
        document.getElementById('lbl-saving-core').innerText = d.lblCore;
        document.getElementById('lbl-custom-amt').innerText = d.lblCustomAmt;
        document.getElementById('btn-apply-amt').innerText = d.btnApply;
        document.getElementById('lbl-start-date').innerText = d.lblStartDate;
        document.getElementById('lbl-target-goal').innerText = d.lblTarget;
        document.getElementById('lbl-journal-title').innerText = d.lblJournal;
        document.getElementById('lbl-blindbox-title').innerText = d.lblBoxTitle;
        document.getElementById('main-action-random-btn').innerText = d.btnBoxDraw;
        document.getElementById('lbl-dash-total').innerText = d.lblDashTotal;
        document.getElementById('lbl-dash-progress').innerText = d.lblDashProg;
        document.getElementById('lbl-setting-lang').innerText = d.setLang;
        document.getElementById('lbl-setting-theme').innerText = d.setTheme;
        document.getElementById('btn-setting-close').innerText = d.setClose;
        document.getElementById('lbl-wisdom-title').innerText = d.lblWisdom;
        document.getElementById('lbl-setting-music').innerText = d.lblMusic;
        document.getElementById('lbl-btn-confirm').innerText = d.btnConfirm;
        document.getElementById('lbl-btn-cancel').innerText = d.btnCancel;
        document.getElementById('lbl-reset-btn-text').innerText = d.resetBtn;

        const sel = document.getElementById('main-saving-mode-select');
        sel.options[0].text = d.opt1; sel.options[1].text = d.opt2; sel.options[2].text = d.opt3; sel.options[3].text = d.opt4; sel.options[4].text = d.opt5;

        const config = THEME_CONTENT_BANK[activeThemeKey];
        const bBoxDisplay = document.getElementById('celebrity-display');
        if (bBoxDisplay && config) {
            let tName = config.name[langKey] || config.name['zh-TW'];
            bBoxDisplay.innerHTML = d.boxWelcome.replace('${name}', tName);
        }
        
        refreshDailyWisdom(false); refreshBlueprintStatus(false); renderGrid();
    }
    
    function saveTargetGoal() { localStorage.setItem('goal_365_journal', document.getElementById('target-saving-input').value); refreshBlueprintStatus(false); }

    function resetChallenge() {
        const d = LANG_DICTIONARY[currentLang];
        if (confirm(d.resetConfirm)) {
            localStorage.clear();
            alert(d.resetSuccess);
            window.location.reload();
        }
    }

    window.onload = function() {
        document.getElementById('main-saving-mode-select').value = currentMode;
        document.getElementById('target-saving-input').value = localStorage.getItem('goal_365_journal') || '夢想計劃';
        
        const savedStartDate = localStorage.getItem('365_journal_start_date');
        if (savedStartDate) {
            document.getElementById('journal-start-date-picker').value = savedStartDate;
        }

        changeLanguage(currentLang);
        if(isBgmEnabled) startSpiritualBgmEngine();
    }
    document.addEventListener('click', function() { if(isBgmEnabled) startSpiritualBgmEngine(); }, { once: false });
</script>
