                ],
                'en': [
                    { source: "Warren Buffett", text: "Start saving and invest early. This is the habit most worth forming. Small streams flow together to make a great ocean." },
                { source: "Charlie Munger", text: "Reaching a higher level requires immense self-discipline. Every bit of capital saved is a chip for future freedom." },
                { source: "James Clear", text: "The power of atomic habits lies in accumulation. Every dollar saved by resisting impulse today is a vote of confidence in your future." },
                { source: "Wealth Code", text: "Wealth comes not from how much you earn, but how much you keep. Every bit of savings is a solid stone for your dream castle." },
                { source: "Dale Carnegie", text: "Saving is not just financial management; it is a high-level cultivation of mental willpower and self-control." },
                { source: "Long-termism", text: "Only those who endure boring accumulation deserve a worry-free future. Store willpower today, reap freedom tomorrow." },
                { source: "Think and Grow Rich", text: "Wealth is the product of thought. Transform excess material desires into a sustainable saving jar to explore the vast world." },
                { source: "Rich Dad", text: "An asset is something that puts money in your pocket. Adding energy to your piggy bank every day is continuously buying future security." },
                { source: "Power of Habit", text: "Every click that avoids accidental spending strengthens your abundance mindset in the cortex, taking the first step into the Great Hall of Wisdom." },
                { source: "Financial Philosophy", text: "When you stop paying for pointless consumption, you begin to truly master your own financial destiny and life blueprint." },
                { source: "Napoleon Hill", text: "If you cannot discipline yourself in small matters, you will never build a true empire of wealth in big things." },
                { source: "Henry David Thoreau", text: "A man's wealth is proportional to the number of superfluous material things he can afford to let alone. Return to pure accumulation." },
                { source: "Atomic Habits", text: "Small changes bring huge chain reactions. Saving daily loose change is sculpting your future net worth." },
                { source: "Spirit of Exploration", text: "Stepping out of your comfort zone requires capital, and savings are your most solid fuel of confidence to explore the universe and pursue dreams." },
                { source: "Essential Thinking", text: "Distinguish between true needs and fleeting wants. Every rational saving is a victory in the Great Hall of Wisdom." },
                { source: "John D. Rockefeller", text: "The starting point does not decide the destination. Only diligent, thrifty, and step-by-step accumulation keeps the family wealth tree evergreen." },
                { source: "The Psychology of Money", text: "Saving money requires no special reason. Saving money is about gaining absolute control over your time, which is priceless freedom." },
                { source: "Howard Marks", text: "Superior financial results come from rational, non-conforming daily choices. What you save today is your safety net for tomorrow." },
                { source: "Deliberate Practice", text: "Saving is a skill that can be practiced. As the days increase, your financial core will become incredibly strong." },
                { source: "Future Manifesto", text: "The best gift to the future is to place every current resource where it yields the highest compound interest value." },
                { source: "Ray Dalio", text: "Pain plus reflection equals progress. Every temptation avoided today is an investment in a wiser future life." },
                { source: "Deliberate Discipline", text: "Freedom is not doing whatever you want, but being the master of yourself. Save today's desires for tomorrow's right to choose." },
                { source: "Wealth Awakening", text: "Money is the crystallization of your working time and energy. Squandering it mindlessly is squandering the life you once gave." },
                { source: "Habit Loop", text: "Break the cycle of instant gratification. Every intentional logging entry rewires your path toward a wealthy future." },
                { source: "Albert Einstein", text: "Compound interest is the eighth wonder of the world. Give time some time, and let the tiny seeds of wealth silently double in persistence." },
                { source: "Seiroku Honda", text: "The one-fourth savings method is an ironclad rule of wealth. Accumulating in ordinary daily life allows you to break through in times of uncertainty." },
                { source: "Willpower Bedrock", text: "The depth of wealth depends on your inner resolve. Refuse to spend on vanity today, and you will have real substance tomorrow." },
                { source: "Seneca", text: "Luck is what happens when preparation meets opportunity. Savings are your best strategic reserve." },
                { source: "Minimalist Life", text: "The less you own, the less chance you have of being taken hostage by material things. Keep your energy and funds for truly valuable dreams." },
                { source: "Financial Leverage", text: "Without principal, even the best opportunity leaves you as a mere spectator. Every dollar saved today is your financial leverage for tomorrow." },
                { source: "Grant Sabatier", text: "The savings rate is more important than the investment return rate. It is the only financial metric you can 100% control." },
                { source: "Inner Security", text: "Saving money is not about being stingy; it is because we know that confidence soothes life's anxiety far better than fleeting vanity." },
                { source: "Think and Grow Rich", text: "Mindset determines the flow of wealth. Transform the sense of material scarcity into the joy of accumulation, and you become the source of abundance." },
                { source: "Long-term Thinking", text: "Look at today's savings through a ten-year lens. A small step today is a giant leap toward financial freedom a decade later." },
                { source: "Warren Buffett", text: "Do not save what is left after spending, but spend what is left after saving. Reverse this order, and your life changes completely." },
                { source: "Power of Discipline", text: "Every day of unrepeated persistence builds up your grit. Wealth is just a byproduct of this game of willpower." },
                { source: "Essence of Money", text: "Money cannot buy happiness, but it buys the confidence to say no to a life you don't want. Accumulate today for that dignity." },
                { source: "Tiny Accumulation", text: "Do not look down on small bills. The top of the pyramid is built by stacking countless baseline bricks." },
                { source: "Financial Defense Line", text: "A solid defense line lets you sleep soundly. Use today's reason to buy a premium peace-of-mind policy for tomorrow." },
                { source: "Atomic Resolve", text: "Every deposit is a silent declaration: I am taking charge of my life, not being blindly pushed by days." },
                { source: "Financial Freedom", text: "The price of freedom is early self-discipline. In a world surging with desire, guarding your savings jar is high-level wisdom." },
                { source: "Charlie Munger", text: "To get what you want, you have to deserve what you want. Disciplined accumulation is the finest cultivation." },
                { source: "Essential Thinking", text: "The three-second pause before paying is a clash between reason and desire. Today, your reason won another battle." },
                { source: "Minimalist Abundance", text: "After material desires recede, true abundance remains. Seal up excess energy and wait for dreams to blossom." },
                { source: "Financial Bible", text: "Earning money is an ability, saving money is wisdom, and spending money is an art. Today we skip art and practice down-to-earth wisdom." },
                { source: "Willpower Cultivation", text: "Saving money is a fight against your brain's reward mechanism. Every success makes your soul one bit stronger." },
                { source: "Dream Fuel", text: "A rocket without fuel can never launch. Turn your grand ambitions for the future into tangible fuel drop by drop today." },
                { source: "Dale Carnegie", text: "Those who can master their finances can usually master their lives. Today, you are still on the path of mastery." },
                { source: "Self-Knowledge", text: "Understanding life's unpredictability and choosing to restrain in times of plenty is foresight of the highest order." },
                { source: "Future Asset", text: "What you save today is not a cold number, but the time and flexibility for your future self to allocate freely." },
                { source: "Clear Mindset", text: "Don't be trapped by the illusion of being 'exquisitely poor.' True elegance is having a fallback in your account, light in your eyes, and a blueprint in your heart." },
                { source: "Money Code", text: "When you respect every accumulation of money, money respects your will and stays to work for you long-term." },
                { source: "Long-termism", text: "Saving is a silent marathon. It doesn't matter how fast you start, only that you keep moving forward every day." },
                { source: "Discipline Switch", text: "Turn off unnecessary consumption impulses and turn on the fountain of joy in saving. Watching the progress bar grow is the healthiest endorphin." },
                { source: "Reason Supreme", text: "Don't let fleeting emotional swings empty your wallet. Healing yourself through savings today is far more effective than any retail therapy." },
                { source: "Master's Insight", text: "Wealth is like a snowball. The important thing is finding wet snow and a really long hill. Today, this hall is your slope." },
                { source: "Philosophy of Life", text: "Reduce earthly encumbrances, increase real assets. Let your every step be light and filled with confidence." },
                { source: "Atomic Habits", text: "Never give up because the amount is small. Daily micro-persistence reshapes your magnetic field to connect with an abundant world." },
                { source: "Financial Health", text: "Saving is to finance what exercise is to the body. This is a high-level discipline that requires daily consistency without excuses." },
                { source: "Foresight", text: "Prepare winter provisions during the most prosperous season. When the storm hits, you will already be sipping tea elegantly in a warm hall." },
                { source: "Wealth Vision", text: "People with broad vision see the landscape five years from now. For that priceless freedom, today's minor restraint means nothing." },
                { source: "Discipline Manifesto", text: "I refuse to be a slave to materials; I choose to be the master of wealth. Today, I firmly hold the control in my hands." },
                { source: "Money Energy", text: "Money flows to those who cherish it. Store it with a respectful and regular ritual, and it will keep you company long-term." },
                { source: "Life Wisdom", text: "Clever people know how to make money, but wise people know how to live with it. Today, we are cultivating wisdom." },
                { source: "Steady Progress", text: "Life needs occasional surprises, but finances demand absolute stability. Build an unshakeable Great Wall with consistent daily savings." },
                { source: "Independence", text: "True independence begins when you are financially unbound by others. Today, you cast a crucial vote for your sovereignty." },
                { source: "Habit Dividend", text: "The dividends of habit are staggering. When saving becomes as natural as breathing, abundance is no longer a distant dream." },
                { source: "Inner Strength", text: "Resisting current consumer temptations proves your inner strength has surpassed environmental distractions. Be proud of yourself!" },
                { source: "Money Aesthetics", text: "The finest emotion is long companionship; the best finance is constant regularity. Weave your exclusive asset art with daily persistence." },
                { source: "Fearless Future", text: "Holding a shield of accumulation built with your own hands, we can smile serenely in the face of future uncertainties." },
                { source: "Wealth Origins", text: "Every self-made wise person started by saving their first dollar or first thousand. You are on the right path now." },
                { source: "Rational Retention", text: "Keeping a portion of your hard-earned income for your future self is the most basic respect and care you can show yourself." },
                { source: "Atomic Power", text: "Never underestimate a 1% daily improvement. Accumulation over 365 days will unleash a massive compounding effect that astounds everyone." },
                { source: "Core Competitiveness", text: "In an era run by consumerism, a strong 'saving power' is your core competitiveness against the waves of times and uncertainty." },
                { source: "Long-term Evergreen", text: "Shift your gaze away from short-term discount sales toward the distant sea of stars. Your wealth blueprint is far grander than material goods." },
                { source: "Wealth Awakening", text: "As your balance goes up bit by bit, your inner anxiety goes down bit by bit. This is the most practical therapy for body and soul." },
                { source: "Mastering the Game", text: "Life is a magnificent game of resource management. Successfully keeping an asset today puts you one step ahead in this game." },
                { source: "Legacy of Will", text: "Set the finest example for your family with your regularity and self-discipline. The will of wealth is a noble inheritance." },
                { source: "Clear Living", text: "Don't be brainwashed by ads, don't pay for comparison. Save clearly, live clearly, and be the coolest master of your life." },
                { source: "Down-to-Earth Accumulation", text: "There are no myths of overnight riches, only epics of dripping water piercing stone. Today's drop has safely landed in your saving jar." },
                { source: "John D. Rockefeller", text: "I don't look at how much you earned in the past; I look at how much you keep now. Every bit of savings is your future trump card." },
                { source: "Warren Buffett", text: "When temptations are overwhelming, those who stay calm and steadily deposit assets into the hall are the true winners of wealth." },
                { source: "Atomic Habits", text: "The magic of compound interest lies in its early obscurity. Stick to this boring regularity, and it will reward you with massive freedom later." },
                { source: "The Psychology of Money", text: "True luxury is not about showing off gear; it's the continuous digits in your account giving you the freedom to reject what you dislike." },
                { source: "Charlie Munger", text: "To get what you want, the most reliable way is to make yourself deserve it. Self-disciplined accumulation is the best passport." },
                { source: "Clear Mindset", text: "The consumerist trap is making you trade hard-earned time for fleeting vanity. Today, we choose to keep our time." },
                { source: "Long-termism", text: "Never give up logging because the face value is small. The top of the pyramid is originally built by stacking countless baseline bricks." },
                { source: "Essential Thinking", text: "The three-second pause before checking out is a clash between reason and desire. Today, your reason won another great victory." },
                { source: "Essence of Money", text: "Money is not a cold number; it is the crystallization of your working energy. Storing it properly is basic respect for your efforts." },
                { source: "Power of Discipline", text: "Freedom is never doing whatever you want, but being self-governed. Save fleeting desires today for a wider range of choices tomorrow." },
                { source: "Habit Loop", text: "Break the cycle of instant gratification. Every intentional logging entry in your ledger rewires your path toward an abundant life." },
                { source: "Albert Einstein", text: "Compound interest is the eighth wonder of the world. Give time some time, and let tiny seeds of wealth silently double and grow." },
                { source: "Independence", text: "Confidence soothes life's anxiety far better than fleeting vanity. Having provisions in store brings permanent peace of mind." },
                { source: "Philosophy of Life", text: "After material desires recede, true abundance remains. Seal up excess resources in the saving jar, awaiting the surprise of future blossoms." },
                { source: "Foresight", text: "Accumulate in ordinary daily life to break through in times of uncertainty. Your reason today is your premium protective net tomorrow." },
                { source: "Core Competitiveness", text: "In this era where everyone is trapped by being 'exquisitely poor,' a strong 'saving power' is your most core strength against the tides." },
                { source: "Mastering the Game", text: "Life is a brilliant game of resource management. Keeping an asset successfully today places you one step ahead in the game." },
                { source: "Down-to-Earth Accumulation", text: "There are no myths of overnight riches, only epics of dripping water piercing stone. Today's drop has safely landed in your saving hall." },
                { source: "Financial Health", text: "Saving is to finance what exercise is to the body. It is a high-level discipline that requires daily consistency without excuses." },
                { source: "Long-term Evergreen", text: "Look away from immediate promotions and look toward the distant sea of stars. Your wealth blueprint is far grander than these materials." },
                { source: "Seneca", text: "Luck is what happens when preparation meets opportunity. Consistent daily saving is your strongest strategic reserve." },
                { source: "Willpower Cultivation", text: "Saving money is a battle against your brain's reward mechanism. Every success makes your soul and resolve one bit stronger." },
                { source: "Money Aesthetics", text: "The finest emotion is long companionship; the best finance is constant regularity. Weave your exclusive asset aesthetics with daily persistence." },
                { source: "Master's Insight", text: "Wealth is like a snowball. The important thing is finding wet snow and a really long hill. Today, the hall is your solid slope." },
                { source: "Fearless Future", text: "Holding a shield of accumulation built with your own hands, we can look at future uncertainties with absolute poise." },
                { source: "Clear Living", text: "Don't be brainwashed by ads, don't pay for comparison. Save clearly, live clearly, and be the coolest, most lucid master of yourself." },
                { source: "Rich Dad", text: "An asset is something that puts money in your pocket. Injecting energy into your savings jar daily is continuously buying future security." },
                { source: "Power of Habit", text: "Every click that avoids accidental spending strengthens your abundance mindset in the cortex, taking the first step into the Great Hall of Wisdom." },
                { source: "Dale Carnegie", text: "Those who can master their finances can usually master their lives. Today, you are still walking on the path of mastery." },
                { source: "Atomic Resolve", text: "Every deposit is a silent declaration: I am taking charge of my life, not being blindly pushed forward by life and bills." },
                { source: "Think and Grow Rich", text: "Mindset determines the flow of wealth. Transform material scarcity into the joy of accumulation, and you are the source of endless abundance." },
                { source: "Grant Sabatier", text: "The savings rate is more important than the investment return rate. It is the only financial metric in this world you can 100% control." },
                { source: "Money Code", text: "When you respect every accumulation of money, money respects your will and stays to work for you long-term." },
                { source: "Long-term Thinking", text: "Look at today's savings through a ten-year macro lens. A small step today is a giant leap toward financial freedom a decade later." },
                { source: "Financial Bible", text: "Earning money is an ability, saving money is wisdom, and spending money is an art. Today we skip art and focus on the most solid, hardcore wisdom." },
                { source: "Dream Fuel", text: "A rocket without fuel can never launch. Turn your grand ambitions for the future into tangible fuel drop by drop today." },
                { source: "Self-Knowledge", text: "Understanding life's unpredictability and choosing to restrain in times of plenty is the highest and most lucid foresight." },
                { source: "Future Asset", text: "What you save today is not a cold number, but the time and flexibility for your future self to say no." },
                { source: "Discipline Switch", text: "Turn off unnecessary consumption impulses and turn on the fountain of joy in saving. Watching the progress bar grow is the healthiest endorphin." },
                { source: "Reason Supreme", text: "Don't let fleeting emotional swings empty your wallet. Settling yourself with this saving ledger today is far more effective than any retail therapy." },
                { source: "Philosophy of Life", text: "Reduce earthly encumbrances, increase real assets. Let your every step be light and filled with confidence." },
                { source: "Wealth Vision", text: "People with broad vision see the landscape five years from now. For that future freedom, today's minor restraint means nothing." },
                { source: "Discipline Manifesto", text: "I refuse to be a slave to materials; I choose to be the master of wealth. Today, I firmly hold the control in my warm hands." },
                { source: "Wealth Origins", text: "Every self-made wise person started by saving their first dollar or first thousand. You are on the right starting point now." },
                { source: "Atomic Power", text: "Never underestimate a 1% daily improvement. Accumulation over a year will unleash a massive compounding effect that astounds everyone." },
                { source: "Rational Retention", text: "Keeping a portion of your hard-earned income for your future self is the most basic respect and care you can show yourself." },
                { source: "Core Competitiveness", text: "In an era run by consumerism, a strong 'saving power' is your core competitiveness against the waves of times and uncertainty." },
                { source: "Wealth Awakening", text: "As your balance goes up bit by bit, your inner anxiety goes down bit by bit. This is the most practical, direct therapy for body and soul." },
                { source: "Legacy of Will", text: "Set the finest example for your family with your regularity and self-discipline. The will of wealth is a noble inheritance." },
                { source: "Full Abundance", text: "Regularity is like flowing water; accumulation is like Mount Meru. When you internalize saving into life, you unlock the ultimate gate of abundance." },
                { source: "Warren Buffett", text: "Investing in yourself is the most profitable business. Learning to restrain desires and save regularly is the starting point of self-discipline." },
                { source: "John D. Rockefeller", text: "The starting point does not decide the destination. Only diligent, thrifty, and step-by-step accumulation keeps your family wealth tree evergreen." },
                { source: "The Psychology of Money", text: "Saving money requires no special reason. Saving money is about gaining absolute control over your time, which is priceless freedom." },
                { source: "Charlie Munger", text: "Reaching a higher level requires immense self-discipline. Every bit of capital saved is a chip for your future freedom." },
                { source: "Atomic Habits", text: "Small changes bring huge chain reactions. Saving daily loose change is sculpting your future net worth." },
                { source: "Long-termism", text: "Only those who endure boring accumulation deserve a worry-free future. Store willpower today, reap freedom tomorrow." },
                { source: "Think and Grow Rich", text: "Wealth is the product of thought. Transform excess material desires into sustainable savings to explore the vast world." },
                { source: "Power of Habit", text: "Every click that avoids accidental spending strengthens your abundance mindset in the cortex, taking the first step into the Great Hall of Wisdom." },
                { source: "Napoleon Hill", text: "If you cannot discipline yourself in small matters, you will never build a true empire of wealth in big things." },
                { source: "Rich Dad", text: "An asset is something that puts money in your pocket. Adding energy to your piggy bank every day is continuously buying future security." },
                { source: "Grant Sabatier", text: "The savings rate is more important than the investment return rate. It is the only financial metric you can 100% control." },
                { source: "Essence of Money", text: "Money cannot buy happiness, but it buys the confidence to say no to a life you don't want. Accumulate today for that dignity." },
                { source: "Tiny Accumulation", text: "Do not look down on small bills. The top of the pyramid is built by stacking countless baseline bricks." },
                { source: "Financial Defense Line", text: "A solid defense line lets you sleep soundly. Use today's reason to buy a premium peace-of-mind policy for tomorrow." },
                { source: "Essential Thinking", text: "Distinguish between true needs and fleeting wants. Every rational saving is a victory in the Great Hall of Wisdom." },
                { source: "Minimalist Abundance", text: "After material desires recede, true abundance remains. Seal up excess energy and wait for dreams to blossom." },
                { source: "Willpower Cultivation", text: "Saving money is a fight against your brain's reward mechanism. Every success makes your soul one bit stronger." },
                { source: "Dream Fuel", text: "A rocket without fuel can never launch. Turn your grand ambitions for the future into tangible fuel drop by drop today." },
                { source: "Future Asset", text: "What you save today is not a cold number, but the time and flexibility for your future self to allocate freely." },
                { source: "Clear Mindset", text: "Don't be trapped by the illusion of being 'exquisitely poor.' True elegance is having a fallback in your account, light in your eyes, and a blueprint in your heart." },
                { source: "Money Code", text: "When you respect every accumulation of money, money respects your will and stays to work for you long-term." },
                { source: "Discipline Switch", text: "Turn off unnecessary consumption impulses and turn on the fountain of joy in saving. Watching the progress bar grow is the healthiest endorphin." },
                { source: "Philosophy of Life", text: "Reduce earthly encumbrances, increase real assets. Let your every step be light and filled with confidence." },
                { source: "Foresight", text: "Prepare winter provisions during the most prosperous season. When the storm hits, you will already be sipping tea elegantly in a warm hall." },
                { source: "Wealth Vision", text: "People with broad vision see the landscape five years from now. For that priceless freedom, today's minor restraint means nothing." },
                { source: "Steady Progress", text: "Life needs surprises, but finances demand absolute stability. Build an unshakeable Great Wall with consistent daily savings." },
                { source: "Independence", text: "True independence begins when you are financially unbound by others. Today, you cast a crucial vote for your sovereignty." },
                { source: "Inner Strength", text: "Resisting current consumer temptations proves your inner strength has surpassed environmental distractions. Be proud of yourself!" },
                { source: "Wealth Origins", text: "Every billionaire started by saving their first dollar or first thousand. You are on the right path now." },
                { source: "Atomic Power", text: "Never underestimate a 1% daily improvement. Accumulation over a year will unleash a massive compounding effect that astounds everyone." },
                { source: "Core Competitiveness", text: "In an era run by consumerism, a strong 'saving power' is your core competitiveness against the waves of times." },
                { source: "Wealth Awakening", text: "As your balance goes up bit by bit, your inner anxiety goes down bit by bit. This is the most practical therapy for body and soul." },
                { source: "Clear Living", text: "Don't be brainwashed by ads, don't pay for comparison. Save clearly, live clearly, and be the coolest master of your life." },
                { source: "Down-to-Earth Accumulation", text: "There are no myths of overnight riches, only epics of dripping water piercing stone. Today's drop has safely landed in your saving jar." },

                ],
                'ja': [
                    { source: "ウォーレン・バフェット", text: "貯金を始めて早めに投資すること、これは最も身につける価値のある習慣です。川が集まれば、やがて大海原になります。" },
                { source: "チャーリー・マンガー", text: "より高いレベルに到達するには、並外れた自律が必要です。貯蓄されたすべての資金は、未来の自由へのチップです。" },
                { source: "ジェームズ・クリアー", text: "複利の魔力は積み重ねにあります。今日衝動を抑えて貯めた一円一円が、未来への信頼票となります。" },
                { source: "富の暗号", text: "富はいくら稼いだかではなく、いくら残したかによって決まります。日々の貯蓄は、夢の城を築く強固な礎石です。" },
                { source: "デール・カーネギー", text: "貯蓄は単なる理財ではなく、精神的な意志力の高級な修練であり、自己管理の本質です。" },
                { source: "長期主義", text: "退屈な積み重ねに耐える者だけが、憂いのない未来を手に入れる。今日意志を蓄え、明日自由を収穫せよ。" },
                { source: "思考は現実化する", text: "富は思考の産物です。余計な物質的欲望を持続可能な貯蓄瓶に変え、未知の広い世界を探索しましょう。" },
                { source: "金持ち父さん", text: "資産とはあなたのポケットにお金を入れてくれるものです。毎日貯金箱にエネルギーを注ぐことは、未来の安心を買い続けることです。" },
                { source: "習慣の力", text: "誤タップを防ぐための毎回のクリックは、大脳皮質で富の思考を強化し、知恵の大殿堂への第一歩を踏み出すことです。" },
                { source: "理財の哲学", text: "無駄な消費にお金を払うのをやめたとき、あなたは本当の意味で自分の富の運命と人生の設計図を支配し始めます。" },
                { source: "ナポレオン・ヒル", text: "小さな事で自律できなければ、大きな事で本当の富の帝国を築くことは決してできません。" },
                { source: "ヘンリー・デイヴィッド・ソロー", text: "人の豊かさは、その人が手放すことのできる無駄な物質の多さに比例します。純粋な蓄積に立ち返りましょう。" },
                { source: "アトミック・ハビッツ", text: "微小な変化は巨大な連鎖反応をもたらします。日常のささやな小銭を貯めることは、未来のあなたの身代を彫刻することです。" },
                { source: "探索精神", text: "コンフォートゾーンから一歩踏み出すには資本が必要です。貯蓄は、宇宙を探索し夢を追うための最も堅実な自信の燃料です。" },
                { source: "本質思考", text: "本当に必要なものと一時的に欲しいものの違いを見極める。理智的な貯蓄はすべて、知恵の大殿堂における勝利です。" },
                { source: "ロックフェラー", text: "スタートラインがゴールを決めるわけではありません。勤勉で倹約し、着実に積み重ねることだけが、一族の富の木を常青に保ちます。" },
                { source: "サイコロジー・オブ・マネー", text: "貯金に特別な理由は必要ありません。貯金は時間に対する絶対的なコントロール権、つまりプライスレスな自由を得るためのものです。" },
                { source: "ハワード・マークス", text: "卓越した財務結果は、大衆に盲従しない日常の理智的な選択から生まれます。今日貯めたものが、明日の防護ネットです。" },
                { source: "刻意練習", text: "貯蓄は練習できるスキルです。日数を重ねるごとに、あなたの財務のコアは信じられないほど強固になります。" },
                { source: "未来宣言", text: "未来への最大の贈り物は、現在の余剰リソースを最も複利価値のある場所に配置することです。" },
                { source: "レイ・ダリオ", text: "痛みと反省の組み合わせが進歩を生む。今日、目先の誘惑を抑えたすべての支出は、より賢明な未来の人生への投資です。" },
                { source: "刻意自律", text: "自由とは好き勝手することではなく、自分自身を主宰することです。今日の欲望を抑え、明日の選択権を勝ち取りましょう。" },
                { source: "富の覚醒", text: "お金はあなたの労働時間とエネルギーの結晶です。それを無駄遣いすることは、かつて捧げた人生を無駄にすることと同じです。" },
                { source: "習慣回路", text: "目先の即時的な満足のループを断ち切る。誤タップ防止を意識した毎回の記録が、豊かな未来への配線をやり直します。" },
                { source: "アインシュタイン", text: "複利は宇宙の第八の不思議です。時間に少し時間を与え、小さな富の種を継続の中で静かに倍増させましょう。" },
                { source: "本多静六", text: "四分の一貯金法は致富の鉄則です。平凡な日常の中で蓄積してこそ、無常の変局の中で突囲できます。" },
                { source: "意志の礎石", text: "富の厚みはあなたの内なる定力で決まります。今日見栄のために消費しなければ、明日本当の実利を手に入れることができます。" },
                { source: "セネカ", text: "幸運とは、準備された者が機会に出会うことです。貯蓄はあなたにとって最高の戦略的備蓄です。" },
                { source: "ミニマリスト生活", text: "所有するものが少ないほど、物質に縛られる機会は減ります。エネルギーと資金を、本当に価値のある夢のために残しましょう。" },
                { source: "富のレバレッジ", text: "元本がなければ、どんなに良い機会もただの観客にすぎません。今日貯めた一円一円が、未来のマネーレバレッジになります。" },
                { source: "グラント・サバティエ", text: "貯蓄率は投資収益率よりも重要です。それはあなたがこの世界で100%コントロールできる唯一の財務指標だからです。" },
                { source: "心の安全感", text: "貯金をするのはケチだからではありません。目先の虚栄よりも、確かな底力の方が生活の焦燥を和らげてくれると深く知っているからです。" },
                { source: "思考は現実化する", text: "マインドセットが富の流向を決めます。物質的な欠乏感を蓄積の達成感に変えれば、あなた自身が豊かな源泉となります。" },
                { source: "長期思惟", text: "十年の視野で今日の貯蓄を捉える。今日の一小歩は、十年後の財富自由への大いなる一歩です。" },
                { source: "ウォーレン・バフェット", text: "消費した残りをお金に回すのではなく、貯金をした残りでお金を使いなさい。この順序を逆にすれば、人生は大きく変わります。" },
                { source: "自律の力", text: "毎日の地道な継続が、あなたの毅力を蓄積します。富はこの意志のゲームの副産物にすぎません。" },
                { source: "お金の本質", text: "お金で幸せは買えませんが、嫌な生活を拒否する底力を買うことはできます。その尊厳のために、今日も蓄積を続けましょう。" },
                { source: "微小な蓄積", text: "十円、百円の小銭を軽視してはいけません。ピラミッドの頂点も、無数の最も基層のレンガが積み重なってできているのです。" },
                { source: "財務防衛線", text: "確かな防衛線はあなたを安眠に導きます。今日の理智で、明日の生活のために高額の安心保険を買いましょう。" },
                { source: "アトミックな決意", text: "毎回の貯金は無声の宣言です：私は人生に流されるのではなく、自分の人生をコントロールしている。" },
                { source: "財富自由", text: "自由の代償は事前の自律です。欲望が渦巻く世界の中で、心の中の貯金箱を守り抜くことこそが高級な知恵です。" },
                { source: "チャーリー・マンガー", text: "欲しいものを得る確実な方法は、それに値する人間になることです。自律的な蓄積こそが最高の修行です。" },
                { source: "本質思考", text: "支払う前の三秒の静止は、理智と欲望の交鋒です。今日、あなたの理智がまた一度勝利を収めました。" },
                { source: "極限の豊かさ", text: "物欲が退潮した後に残るものこそが本当の豊かさです。余剰のエネルギーを封存し、夢が開花するのを待ちましょう。" },
                { source: "理財の聖書", text: "稼ぐのは能力、貯めるのは知恵、使うのは芸術。今日は芸術を語らず、最も堅実な知恵だけを修練します。" },
                { source: "意志の修練", text: "貯金は自分の脳の報酬系との戦いです。一度成功するごとに、あなたの魂は一分強くなります。" },
                { source: "夢の燃料", text: "燃料のないロケットは決して打ち上がらない。未来への大志を、今この瞬間の実質的な燃料に少しずつ変えていきましょう。" },
                { source: "デール・カーネギー", text: "自分の財務を完全にコントロールできる人は、通常、自分の人生も簡単にコントロールできます。今日もあなたは主宰の道を歩んでいます。" },
                { source: "自己の知", text: "生活の無常を理解しているからこそ、順境の時に収斂し、豊沛の時に蓄えることを選ぶ。これは最高級の遠見です。" },
                { source: "未来の資産", text: "今日貯めたものは冷たい数字ではなく、未来のあなたが自由に調達できる時間と柔軟性です。" },
                { source: "清醒な思惟", text: "「見栄っ張りな貧困」の罠に囚われてはいけません。本当の洗練とは、口座に退路があり、目に光があり、心に設計図があることです。" },
                { source: "マネーコード", text: "お金の毎回の蓄積を尊重し始めるとき、お金もあなたの意志を尊重し、長くとどまって働くようになります。" },
                { source: "長期主義", text: "貯蓄は終わりのないマラソンです。スタートがどれだけ早いかではなく、毎日一歩ずつ前に進んでいるかが重要なのです。" },
                { source: "自律のスイッチ", text: "無駄な消費衝動をオフにし、貯蓄の幸福の泉をオンにする。進捗バーが伸びるのを見るのは、最も健康的なエンドルフィンです。" },
                { source: "理智至上", text: "一時的な感情の揺らぎで財布を空にしないでください。今日この貯蓄手帳で心を落ち着かせることは、どんな消費よりも癒やしになります。" },
                { source: "大師の教え", text: "富は雪だるまを作るようなものです。重要なのは、十分に湿った雪と十分に長い坂を見つけることです。今日のこの大堂こそがあなたの雪道です。" },
                { source: "生活の哲学", text: "地上での無駄な縛りを減らし、カードの中の本当の資産を増やす。あなたの一歩一歩を軽やかに、底力に満ちたものにしましょう。" },
                { source: "アトミックな決意", text: "小さな額だからと諦めてはいけません。毎日の微小な継続が、あなたと豊かな世界をつなぐ磁場を再構築します。" },
                { source: "財務の健康", text: "貯蓄の財務に対する関係は、運動の身体に対する関係と同じです。これは毎日言い訳をせず持続すべき高級な自律です。" },
                { source: "遠見卓識", text: "最も繁栄している季節に冬の食糧を蓄える。暴風雨が来るとき、あなたはすでに暖かい大堂の中で優雅にお茶を飲んでいるでしょう。" },
                { source: "財富の格調", text: "器の大きい人は、五年後の景色を見ています。五年後の自由のためなら、現在のこの程度の自制はまったく取るに足りません。" },
                { source: "自律宣言", text: "私は物質の奴隸にはならない、富の主人になる。今日再びコントロール権を自分の手の中にしっかりと握りしめます。" },
                { source: "お金のエネルギー", text: "お金はそれを大切にする人の元へ流れます。敬意と規律に満ちた儀式でそれを収めれば、それは長きにわたりあなたに寄り添うでしょう。" },
                { source: "人生の知恵", text: "賢い人はお金の稼ぎ方を知っており、知恵のある人は稼いだお金との付き合い方を知っています。今日、私たちは知恵を修練しています。" },
                { source: "安定した前進", text: "生活にはサプライズが必要ですが、財務には絶対的な安定が必要です。毎日雷打不動の貯蓄で、最も堅固な長城を築きましょう。" },
                { source: "独立自主", text: "本当の独立は、財務が他人に制約されないことから始まります。今日、あなたはまた自分の独立主権のために決定的な一票を投じました。" },
                { source: "習慣の配当", text: "習慣の配当は驚異的です。貯金が呼吸のように自然になるとき、豊かさはもはや遠い夢ではありません。" },
                { source: "内なる力", text: "現在の消費の誘惑に耐えられるということは、あなたの内なる力が環境の干渉を超えたことを示しています。自分を誇りに思いましょう！" },
                { source: "お金の美学", text: "最も美しい感情は付き添いであり、最高の財務は変わらぬ規律です。毎日の継続で、あなただけの資産美学を織りなしましょう。" },
                { source: "無畏な未来", text: "手の中に自ら積み上げた防護の盾を握りしめているからこそ、未来の様々な不確実性に直面しても、私たちは笑顔で風雲を見つめることができます。" },
                { source: "着実な蓄積", text: "一獲千金の神話はなく、水滴が石を穿つ史詩があるだけです。今日の一滴は、すでにあなたの貯蓄瓶の中にしっかりと落ちました。" },
                { source: "ロックフェラー", text: "過去にいくら稼いだかは重視しません。現在いくら残したかだけを重視します。すべての貯蓄はあなたの未来の切り札です。" },
                { source: "ウォーレン・バフェット", text: "誘惑がいたるところに溢れているとき、衝動を抑えて着実に資産を大堂に預けられる人こそが、本当の富の勝者です。" },
                { source: "アトミック・ハビッツ", text: "複利の魔力は初期の無名さにあります。この退屈な規律を守り抜けば、未来に巨大な自由となってあなたに報いるでしょう。" },
                { source: "致富のマインドセット", text: "本当の贅沢は見せるための衣装ではなく、口座の数字がもたらす、嫌なことを拒否できる自由です。" },
                { source: "チャーリー・マンガー", text: "欲しいものを手に入れる確実な方法は、自分をそれに値する人間にすることです。自律的な蓄積こそが最高の通行証です。" },
                { source: "清醒な思惟", text: "消費主義の罠とは、あなたの労力の時間を短期間の虚栄と交換させることです。今日、私たちは時間にとどまることを選びます。" },
                { source: "長期主義", text: "額面が小さいからと記録を諦めないでください。ピラミッドの頂点も、もともとは無数の最も基層のレンガを積み重ねてできているのです。" },
                { source: "本質思考", text: "決済前の三秒の静止は、理智と欲望の交鋒です。今日、あなたの理智がまた一度勝利を収めました。" },
                { source: "お金の本質", text: "お金は冷たい数字ではなく、あなたの労働エネルギーの結晶です。適切に収めることは、自分の努力に対する基本的な尊重です。" },
                { source: "自律の力", text: "自由とは好き勝手することではなく、自分自身を主宰することです。今日の短い欲望を抑え、明日のより広い選択権を引き換えましょう。" },
                { source: "習慣回路", text: "目先の即時的な満足のループを断ち切る。手帳への毎回の記録が、豊かな未来への配線をやり直します。" },
                { source: "アインシュタイン", text: "複利は世界第八の不思議です。時間に少し時間を与え、小さな富の種を継続の中で静かに倍増させましょう。" },
                { source: "独立自主", text: "確かな底力は、一時的な虚栄よりもはるかに生活の焦燥を和らげます。蓄えがあれば心は揺るがない、これは永遠の真理です。" },
                { source: "生活の哲学", text: "物欲が退潮した後に残るものこそが本当の豊かさです。余剰のリソースを貯蓄瓶に封じ込め、未来の驚きの開花を待ちましょう。" },
                { source: "遠見卓識", text: "平凡な日常の中で蓄積してこそ、無常の変局の中で突囲できます。今日のあなたの理智は、明日の最高級の防護ネットです。" },
                { source: "コア競争力", text: "誰もが「見栄っ張りな貧困」に囚われるこの時代において、強固な「貯蓄力」こそが時代の波に対抗する最強のコアです。" },
                { source: "ゲームの主導", text: "人生は素晴らしいリソース管理のゲームです。今日資産を無事に残せたなら、あなたはこのゲームでまた一歩リードしました。" },
                { source: "着実な蓄積", text: "一獲千金の神話はなく、水滴が石を穿つ史詩があるだけです。今日の一滴は、すでにあなたの貯蓄大堂にしっかりと落ちました。" },
                { source: "財務の健康", text: "貯蓄の財務に対する関係は、運動の身体に対する関係と同じです。これは毎日言い訳をせず持続すべき高級な自律です。" },
                { source: "長期常青", text: "目の前の割引セールから目を離し、遠くの星の海へ目を向けましょう。あなたの富の設計図は、これらの物質よりもはるかに壮大です。" },
                { source: "セネカ", text: "幸運とは、準備された者が機会に出会うことです。毎日の変わらぬ貯蓄こそが、あなたにとって最強の戦略的備蓄です。" },
                { source: "意志の修練", text: "貯金は自分の脳の報酬系との戦いです。一度成功するごとに、あなたの魂と定力は一分強くなります。" },
                { source: "お金の美學", text: "最も美しい感情は長きにわたる付き添いであり、最高の財務は変わらぬ規律です。毎日の継続で、あなただけの資産美学を織りなしましょう。" },
                { source: "大師の教え", text: "富は雪だるまを作るようなものです。重要なのは、十分に湿った雪と十分に長い坂を見つけることです。今日の大堂こそがあなたの雪道です。" },
                { source: "無畏な未来", text: "手の中に自ら積み上げた防護の盾を握りしめているからこそ、未来の様々な不確実性に直面しても、私たちは笑顔で風雲を見つめることができます。" },
                { source: "清醒な生活", text: "広告に洗脳されず、見栄のためにお金を払わない。清醒に貯金し、清醒に生き、最もクールで清醒な自分になりましょう。" },
                { source: "金持ち父さん", text: "資産とはあなたのポケットにお金を入れてくれるものです。毎日貯金箱にエネルギーを注ぐことは、未来の安心を買い続けることです。" },
                { source: "習慣の力", text: "誤タップを防ぐための毎回のクリックは、大脳皮質で富の思考を強化し、知恵の大殿堂への第一歩を踏み出すことです。" },
                { source: "デール・カーネギー", text: "自分の財務をコントロールできる人は、通常、自分の人生もコントロールできます。今日もあなたは主宰の道を歩んでいます。" },
                { source: "アトミックな決意", text: "毎回の貯金は無声の宣言です：私は人生や請求書に流されるのではなく、自分の人生をコントロールしている。" },
                { source: "思考は現実化する", text: "マインドセットが富の流向を決めます。物質的な欠乏感を蓄積の達成感に変えれば、あなた自身が源々とした豊かな源泉となります。" },
                { source: "グラント", text: "貯蓄率は投資収益率よりも重要です。それはあなたがこの世界で100%コントロールできる唯一の財務指標だからです。" },
                { source: "マネーコード", text: "お金の毎回の蓄積を尊重し始めるとき、お金もあなたの意志を尊重し、長くとどまって働くようになります。" },
                { source: "長期思惟", text: "十年の広い視野で今日の貯蓄を捉える。今日の一小歩は、十年後の財富自由への大いなる一歩です。" },
                { source: "理財の聖書", text: "稼ぐのは能力、貯めるのは知恵、使うのは芸術。今日は芸術を語らず、最も踏実で、最もハードコアな知恵だけを語ります。" },
                { source: "夢の燃料", text: "燃料のないロケットは決して打ち上がらない。未来への大志を、今この瞬間の実質的な燃料に少しずつ変えていきましょう。" },
                { source: "自己の知", text: "生活の無常を理解しているからこそ、順境の時に収斂し、豊沛の時に蓄えることを選ぶ。これは最高級で、最も清醒な遠見です。" },
                { source: "未来の資産", text: "今日貯めたものは冷たい数字ではなく、未来のあなたが自由に調達できる時間と、嫌なことに「ノー」と言える柔軟性です。" },
                { source: "自律のスイッチ", text: "無駄な消費衝動をオフにし、貯蓄の幸福の泉をオンにする。進捗バーが伸びるのを見るのは、最も健康的なエンドルフィンです。" },
                { source: "理智至上", text: "一時的な感情の揺らぎで財布を空にしないでください。今日この貯蓄手帳で自分を落ち着かせることは、どんな消費よりも癒やしになります。" },
                { source: "生活の哲学", text: "地上での無駄な縛りを減らし、カードの中の本当の資産を増やす。あなたの一歩一歩を軽やかに、底力に満ちたものにしましょう。" },
                { source: "財富の格調", text: "器の大きい人は、五年後の景色を見ています。五年後の自由のためなら、現在のこの程度の自制はまったく取るに足りません。" },
                { source: "自律宣言", text: "私は物質の奴隸にはならない、富の主人になる。今日再びコントロール権を自分の温かい手の中にしっかりと握りしめます。" },
                { source: "富の開端", text: "すべてのたたき上げの知者は、最初の一円、最初の一千円を貯めることから始めました。あなたは今、正しいスタートラインに立っています。" },
                { source: "アトミックな威力", text: "毎日の1%の進歩を軽視してはいけません。一年365日の絶え間ない蓄積は、誰もが驚嘆する巨大な複利効果を示します。" },
                { source: "理智の自留", text: "苦労して稼いだ給与の一部を未来の自分のために残すこと、これは自分に対する最も基本的な尊重と思いやりです。" },
                { source: "コア競争力", text: "消費主義が盛行する時代において、強固な「貯蓄力」こそが時代の波や無常に対抗する最もコアな競争力です。" },
                { source: "財務の覚醒", text: "残高が少しずつ増えるのを見るにつれ、内面の焦燥感は少しずつ減っていきます。これこそが最も実用的で、直接的な心身の癒やしです。" },
                { source: "意志の継承", text: "あなたの規律と自律で、身近な家族に最高の模範を示しましょう。富の意志もまた、高貴な継承の一種です。" },
                { source: "富足の完全体", text: "規律は流れる水の如く、蓄積は須弥山の如し。貯蓄を生活の一部として内面化するとき、あなたはすでに豊かさの究極の扉を開いています。" },
                { source: "ウォーレン・バフェット", text: "自分自身に投資することが最も儲かるビジネスです。欲望を抑え、規律正しく貯蓄することを学ぶのが自律の起点です。" },
                { source: "ロックフェラー", text: "スタートラインがゴールを決めるわけではありません。勤勉で倹約し、着実に積み重ねることだけが、あなたの富の木を常青に保ちます。" },
                { source: "致富のマインドセット", text: "貯金に特別な理由は必要ありません。貯金は時間に対する絶対的なコントロール権、つまりプライスレスな自由を得るためのものです。" },
                { source: "チャーリー・マンガー", text: "より高いレベルに到達するには、並外れた自律が必要です。貯蓄されたすべての資金は、未来の自由へのチップです。" },
                { source: "アトミック・ハビッツ", text: "微小な変化は巨大な連鎖反応をもたらします。日常のささやな小銭を貯めることは、未来のあなたの身代を彫刻することです。" },
                { source: "長期主義", text: "退屈な積み重ねに耐える者だけが、憂いのない未来を手に入れる。今日意志を蓄え、明日自由を収穫せよ。" },
                { source: "思考は現実化する", text: "富は思考の産物です。余計な物質的欲望を持続可能な貯蓄に変え、未知の広い世界を探索しましょう。" },
                { source: "習慣の力", text: "誤タップを防ぐための毎回のクリックは、大脳皮質で富の思考を強化し、知恵の大殿堂への第一歩を踏み出すことです。" },
                { source: "ナポレオン・ヒル", text: "小さな事で自律できなければ、大きな事で本当の富の帝国を築くことは決してできません。" },
                { source: "金持ち父さん", text: "資産とはあなたのポケットにお金を入れてくれるものです。毎日貯金箱にエネルギーを注ぐことは、未来の安心を買い続けることです。" },
                { source: "グラント", text: "貯蓄率は投資収益率よりも重要です。それはあなたがこの世界で100%コントロールできる唯一の財務指標だからです。" },
                { source: "お金の本質", text: "お金で幸せは買えませんが、嫌な生活を拒否する底力を買うことはできます。その尊厳のために、今日も蓄積を続けましょう。" },
                { source: "微小な蓄積", text: "十円、百円の小銭を軽視してはいけません。ピラミッドの頂点も、無数の最も基層のレンガが積み重なってできているのです。" },
                { source: "財務防衛線", text: "確かな防衛線はあなたを安眠に導きます。今日の理智で、明日の生活のために高額の安心保険を買いましょう。" },
                { source: "本質思考", text: "本当に必要なものと一時的に欲しいものの違いを見極める。理智的な貯蓄はすべて、知恵の大殿堂における勝利です。" },
                { source: "極限の豊かさ", text: "物欲が退潮した後に残るものこそが本当の豊かさです。余剰のエネルギーを封存し、夢が開花するのを待ちましょう。" },
                { source: "意志の修練", text: "貯金は自分の脳の報酬系との戦いです。一度成功するごとに、あなたの魂は一分強くなります。" },
                { source: "夢の燃料", text: "燃料のないロケットは決して打ち上がらない。未来への大志を、今この瞬間の実質的な燃料に少しずつ変えていきましょう。" },
                { source: "未来の資産", text: "今日貯めたものは冷たい数字ではなく、未来のあなたが自由に調達できる時間と柔軟性です。" },
                { source: "清醒な思惟", text: "「見栄っ張りな貧困」の罠に囚われてはいけません。本当の洗練とは、口座に退路があり、目に光があり、心に設計図があることです。" },
                { source: "マネーコード", text: "お金の毎回の蓄積を尊重し始めるとき、お金もあなたの意志を尊重し、長くとどまって働くようになります。" },
                { source: "自律のスイッチ", text: "無駄な消費衝動をオフにし、貯蓄の幸福の泉をオンにする。進捗バーが伸びるのを見るのは、最も健康的なエンドルフィンです。" },
                { source: "生活の哲学", text: "地上での無駄な縛りを減らし、カードの中の本当の資産を増やす。あなたの一歩一歩を軽やかに、底力に満ちたものにしましょう。" },
                { source: "遠見卓識", text: "最も繁栄している季節に冬の食糧を蓄える。暴風雨が来るとき、あなたはすでに暖かい大堂の中で優雅にお茶を飲んでいるでしょう。" },
                { source: "財富の格調", text: "器の大きい人は、五年後の景色を見ています。五年後の自由のためなら、現在のこの程度の自制はまったく取るに足りません。" },

                { source: "独立自主", text: "本当の独立は、財務が他人に制約されないことから始まります。今日、あなたはまた自分の独立主権のために決定的な一票を投じました。" },

                { source: "心經", text: "心無罣礙，無罣礙故，無有恐怖。知足常樂，儲蓄是為未來種下一福，得享真正大清靜。" },
                { source: "弘一法師", text: "人生最曼妙的風景，竟是內心的淡定與從容。少欲知足，一塵一法皆是心中福田。" },
                { source: "六祖壇經", text: "一切福田，不離方寸；從心而覓，感無不通。將富足化為恆心，淨水布施在小福之中。" },
                { source: "法華經", text: "福德因緣，皆由願生。每次微小的克制與儲蓄，都是在三千大千世界中，匯聚你的功德福德。" },
                { source: "大智度論", text: "如人持燈入冥室，光明照耀，眾冥皆滅。勤勉儲蓄如同持燈，能消弭未來的無常與擔憂。" },
                { source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的積累沒有捷徑，唯有在日常的起心動念間，恆常不懈地注入善因。" },
                { source: "修心格量", text: "財為五家共有，唯有內心的富足與手中的善業資糧，才是伴隨你跨越無常的最真財富。" },
                { source: "禪修開示", text: "外求皆是幻相，內修方得始終。存下一分欲念，便是點亮一盞心燈，照亮前行大路。" },
                { source: "一塵一福", text: "合抱之木生於毫末。今日將資糧輕輕封入淨瓶，便是對宇宙因果法則最深沉的禮敬。" },
                { source: "大品般若經", text: "若人能安住於無所得之心，則世間一切豐盛、喜樂、資糧皆能自然具足。" },
                { source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於虛浮與急躁。" },
                { source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質束縛，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },
                { source: "廣欽老和尚", text: "做人要老實，修行要恆心。今天踏實存下一分因果，未來便得一分心靈的大自在。" },
                { source: "寂靜之道", text: "世間喧囂皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是最大的福報資糧。" },
                { source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量功功德的福田。" },
                { source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲. 安養心神，莫向外馳求。" },
                { source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在無常的紅塵中得享大安穩。" },
                { source: "寒山詩", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
                { source: "八大人覺經", text: "多欲為苦，生死疲勞，從貪欲起；少欲無為，身心自在。儲蓄即是無聲的修持。" },
                { source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在無常到來時，心無驚怖，泰然處之。" },
                { source: "弘一法師", text: "知足常足，終身不辱；知止常止，終身不恥。內心清淨，眼前的乾坤自然寬廣富足。" },
                { source: "六祖壇經", text: "本性自足，莫向外求。少欲知足，今日將世俗資糧化作清淨功德，便是最上乘的修持。" },
                { source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
                { source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉的福田。" },
                { source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
                { source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
                { source: "普賢行願", text: "恆順眾生，常行清淨. 將多餘的物慾化為甘露，封存於福報淨瓶中，潤澤未來的漫漫菩提路。" },
                { source: "五家共有", text: "深知世間財富為五家所共，唯有內心的清淨功德與手中善因，才是任誰也奪不走的真資糧。" },
                { source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間修持最穩固的基石。" },
                { source: "禪修開示", text: "關閉外在的妄想，守住內心的方寸。存下一分欲念，便是點亮一盞智慧心燈，照破未來無常。" },
                { source: "法華經", text: "常行忍辱，心氣和柔。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
                { source: "維摩詰經", text: "雖處居家，不著三界。在紅塵中打理資糧，心卻不受物質奴役，是為大乘菩薩的清淨持守。" },
                { source: "大諦造化", text: "因果歷歷不爽。今日在此處播下一粒儲蓄的種子，因緣具足之時，必收穫滿樹的心靈安穩與福報。" },
                { source: "清淨法身", text: "外在的繁華皆是夢幻泡影。用每天的恆常自律，為自己的靈魂洗去浮躁，歸於最純粹的踏實。" },
                { source: "印光大師", text: "敦倫盡分，閑邪存誠。在小事上盡到自己的本分，不浮誇、不奢靡，福澤自然綿長不絕。" },
                { source: "佛曆隨筆", text: "水滴石穿，非一日之功。福報的凝聚亦在於日日不斷的堅持。輕輕點擊，便是又一筆功德資糧。" },
                { source: "心靈寂靜", text: "少欲者，雖臥地上，猶為安樂；多欲者，雖處天堂，亦不稱意。守住清貧中的富足，是大清靜。" },
                { source: "達摩祖師", text: "無妄想，亦無執著。將儲蓄當作一種自然的呼吸，不急不躁，因緣自會水到渠成。" },
                { source: "涅槃經", text: "善惡之報，如影隨形；三世因果，循環不失。今日克己存善，未來的清涼福報早已注定。" },
                { source: "廣欽老和尚", text: "修行不要貪快，要老實。存錢也是一樣，一天一個腳印，心安理得，才是真功夫。" },
                { source: "藥師經", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
                { source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將具有無量功德。" },
                { source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
                { source: "大悲咒語境", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
                { source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的存錢罐，當下便是靈山大廳。" },
                { source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小资財，即是明日大自在的因頭。" },
                { source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
                { source: "虛雲老和尚", text: "坐閱五帝四朝，不覺滄桑幾度。世間財物生不帶來，死不帶去，唯有定力與善業永隨。" },
                { source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶一滴功德清泉。" },
                { source: "金剛經開示", text: "若菩薩心住於法而行布施，如人入暗，即無所見。今日我們無相儲蓄，踏實生活，福德不可思量。" },
                { source: "太虛大師", text: "仰天長嘯，不如低頭播種。人成即佛成，理好當下的每一分資產，便是世間法中最高級的修行。" },
                { source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚福報與智慧的清淨方寸。" },
                { source: "禪林僧寶傳", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },
                { source: "慈悲布施", text: "儲蓄是為了未來有能力幫助更多的人。懷著這份大慈悲心去累積，每一塊錢都將閃耀佛光。" },
                { source: "六度波羅蜜", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
                { source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮、毫無罣礙。" },
                { source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
                { source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的功德登載，築起對抗世俗無常的金色法盾。" },
                { source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
                { source: "心經指引", text: "心無罣礙，自然無有恐怖。今日省下一分奢華，便是為明天的生活，多存一分大清靜。" },
                { source: "金剛經開示", text: "一切有為法，如夢幻泡影。看破眼前物質的虛妄，踏實積累淨瓶資糧，方是真持守。" },
                { source: "弘一法師", text: "少欲知足，身心自在。在這小小的存錢罐前，每一筆登載，都是在心中修剪無謂的雜草。" },

                { source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
                { source: "清心神咒", text: "物欲蒙蔽雙眼，自律撥雲見日。每一次與欲望的交鋒，都是在為內心的如意寶珠拂拭塵埃。" },
                { source: "布施心量", text: "手中常有餘糧，心中常有慈悲。儲蓄是為了在未來的某一天，能成為他人生命中遮風擋雨的傘。" },
                { source: "恆常持守", text: "任憑世間流行千百種風潮，守住自己的方寸不亂。清晨的一筆存入，是給靈魂最踏實的早課。" },
                { source: "安穩大廳", text: "知足之人，雖臥地上猶為天堂；多欲之人，虽處天堂亦如地獄。理好財富，便是安頓靈魂。" },
                { source: "智慧福田", text: "莫向外求精緻，要在內求穩固。當你不再為虛榮買單，你就在自己的福田裡種下了長青的松柏。" },
                { source: "定力修煉", text: "在消費主義鋪天蓋地的浪潮裡，你能穩穩按下一筆儲蓄，這份定力已經超越了絕絕大多數的凡夫。" },
                { source: "因果示現", text: "今日看似毫不起眼的一小筆資糧，在時間的無窮流轉中，終將化作漫天繁星，護佑你的人生旅途。" },
                { source: "心靈淨瓶", text: "把辛苦賺來的福報妥善封存，不使其隨意漏失。這不是吝嗇，這是對宇宙因果法則最誠摯的頂禮。" },
                { source: "圓滿始終", text: "日日登載，步步生蓮。當這份自律化為你生命的一部分，人間處處皆是安心無憂的普陀大廳。" },
                { source: "心經指引", text: "諸法空相，不生不滅。熄滅心中無謂的攀緣物欲，定心累積淨瓶資糧，得享真空大安穩。" },
                { source: "金剛經開示", text: "不取於相，如如不動。在漫天繁華的消費誘惑前，守住你手中的存錢罐，即是無上持守。" },
                { source: "弘一法師", text: "內心清淨，眼前的乾坤自然寬廣。今日將資糧輕輕封存，便是為未來的日子多植一分福田。" },
                { source: "佛門智慧", text: "水滴雖微，漸盈大器。福報的凝聚全在於日日不斷的堅持。輕輕點擊，便是又一筆功德。" },
                { source: "六祖壇經", text: "一切福田，不離方寸。從心而覓，感無不通。將富足化為恆心，淨水布施在小福之中。" },
                { source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
                { source: "普賢行願", text: "恆順眾生，常行清淨。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
                { source: "印光大師", text: "敦倫盡分，閑邪存誠。在小事上盡到自己的本分，不浮誇、不奢靡，福澤自然綿長不絕。" },
                { source: "維摩詰經", text: "雖處居家，不著三界。在紅塵中打理資糧，心卻不受物質奴役，是為菩薩的清淨持守。" },
                { source: "廣欽老和尚", text: "修行不要貪快，要老實。存錢也是一樣，一天一個腳印，心安理得，才是真功夫。" },
                { source: "藥師經", text: "解脫一切貪吝執著。在小福中修持，將今日的資糧轉化為無病無災、內心安寧的淨土能量。" },
                { source: "大願成就", text: "眾生願力不可思議。將你的儲蓄目標化作利他的宏大願景，每一步的累積都將具有無量功德。" },
                { source: "百丈懷海", text: "一日不作，一日不食。勤勞持家，智慧收斂，在日常的起居勞作中，圓滿自己的福德資糧。" },
                { source: "大悲咒境", text: "心懷慈悲，萬物豐盛。不為一己之私揮霍資源，理智持守，整個宇宙都將化作你的護法磁場。" },
                { source: "禪宗公案", text: "趙州茶，雲門餅，皆在當下。不必羨慕遠方的奢華，守住你眼前的存錢罐，當下便是靈山大廳。" },
                { source: "因果鐵律", text: "春種一粒粟，秋收萬顆子。因果從不欺人。今天省下的微小资財，即是明日大自在的因頭。" },
                { source: "弘一大師", text: "事事留個餘地，便是不著相。在財富充裕時留一分退路，是給靈魂最深沉的溫柔與慈悲。" },
                { source: "虛雲老和尚", text: "世間財物生不帶來，死不帶去，唯有定力與善業永隨。理好每一分資糧，心無罣礙。" },
                { source: "清涼蓮語", text: "欲火燒心，唯有知足能化作清涼甘露。今天將浮躁的消費欲熄滅，換來淨瓶一滴功德清泉。" },
                { source: "太虛大師", text: "仰天長嘯，不如低頭播種。人成即佛成，理好當下的每一分資產，便是世間法中最高級的修行。" },
                { source: "一塵一淨土", text: "一花一世界，一葉一如來。這個小小的存錢罐，就是你洗滌物欲、凝聚福報與智慧的清淨方寸。" },
                { source: "禪林僧寶", text: "耐得住寂寞，才守得住繁華。在枯燥的日日累積中，你的心性正在悄悄蛻變，圓滿具足。" },
                { source: "六度持守", text: "持戒即是克制，精進即是恆常。今天你在存錢罐前合十，便是同時修持了自律與長遠心。" },
                { source: "清淨道論", text: "遠離貪婪的染污，保持靈魂的純潔。看淡物質的誘惑，未來的道路自然步步生蓮、毫無罣礙。" },
                { source: "智者大師", text: "止觀雙修，定慧等持。在消費的衝動面前「止」步，在未來的藍圖中「觀」照，大富足也。" },
                { source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的功德登載，築起對抗世俗無常的金色法盾。" },
                { source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的淨土資糧。" },
                { source: "金剛經開示", text: "若菩薩心住於法而行布施，如人入暗，即無所見。今日我們無相儲蓄，踏實生活，福德不可思量。" },
                { source: "印光大師", text: "一分誠心，消一分罪業，增一分福慧。踏實積累，切莫流於虛浮與急躁。" },
                { source: "維摩詰經", text: "隨其心淨則佛土淨。心若不受物質束縛，眼前的存錢罐亦能化為無盡的藏寶法瓶。" },
                { source: "廣欽老和尚", text: "做人要老實，修行要恆心。今天踏實存下一分因果，未來便得一分心靈的大自在。" },
                { source: "寂靜之道", text: "世間喧囂皆是過眼雲煙。守住你手中的淨水，不讓欲念蒸發，即是最大的福報資糧。" },
                { source: "大成捷徑", text: "莫以善小而不為。今日入罐的一分一毫，在因果流轉中，皆是未來承接無量功德的福田。" },
                { source: "蓮池大師", text: "少一分追求，多一分清涼；省一分資財，多一分慈悲。安養心神，莫向外馳求。" },
                { source: "無量壽經", text: "世人共爭不急之務。唯有在智慧中內斂持守，方能在無常的紅塵中得享大安穩。" },
                { source: "寒山詩", text: "今日過今日，今年憂今年。不如早堆積，功德淨土蓮。定心持守，瓶自盈滿。" },
                { source: "八大人覺經", text: "多欲為苦，生死疲勞，從貪欲起；少欲無為，身心自在。儲蓄即是無聲的修持。" },
                { source: "無常觀", text: "世間萬物皆在流轉。於順境時知遮蔽、留資糧，方能在無常到來時，心無驚怖，泰然處之。" },
                { source: "弘一法師", text: "知足常足，終身不辱；知止常止，終身不恥。內心清淨，眼前的乾坤自然寬廣富足。" },
                { source: "六祖壇經", text: "本性自足，莫向外求。少欲知足，今日將世俗資糧化作清淨功功德，便是最上乘的修持。" },
                { source: "華嚴經", text: "一切唯心造。你若以匱乏之心看世界，處處皆是荒涼；你若以知足之心存資糧，滴水皆是福報。" },
                { source: "佛門格言", text: "一勺之水，漸成江海；微塵之積，終成須彌。今日淨瓶中的一分一毫，皆是未來不退轉福田。" },
                { source: "解脫之道", text: "看破執著，方得自在。克制當下的貪嗔痴慢，將資糧留給更廣大的慈悲願景，是為大智慧。" },
                { source: "大智度論", text: "布施、持戒、忍辱、精進。今日的自律與節制，即是精進波羅蜜在日常中的無聲修行。" },
                { source: "普賢行願", text: "恆順眾生，常行清淨。將多餘的物慾化為甘露，封存於福報淨瓶中，潤澤未來的漫漫菩提路。" },
                { source: "五家共有", text: "深知世間財富為五家所共，唯有內心的清淨功德與手中善因，才是任誰也奪不走的真資糧。" },
                { source: "百喻經", text: "愚人見他人建三層樓，便欲效仿，卻不欲築基。今日的儲蓄，便是你在人間修持最穩固的基石。" },
                { source: "禪修開示", text: "關閉外在的妄想，守住內心的方寸。存下一分欲念，便是點亮一盞智慧心燈，照破未來無常。" },
                { source: "法華經", text: "常行忍辱，心氣和柔。不與世俗攀比物慾，安住在當下的規律積累中，福德自當如影隨形。" },
                { source: "安住當下", text: "任憑外界風浪起，我自安坐蓮花台。用每天雷打不動的功德登載，築起對抗世俗無常的金色法盾。" },
                { source: "圓滿始終", text: "九層之台，起於累土。不要羨慕他人的福報，從今天這一步開始，你也在圓滿你自己的功德。" }
                ],
                'zh-CN': [
                    { source: "金刚经", text: "过去心不可得，现在心不可得，未来心不可得。安住当下，踏实积累净瓶资粮。" },
                { source: "心经", text: "心无罣碍，无罣碍故，无有恐怖。知足常乐，储蓄是为未来种下一福，得享真正大清静。" },
                { source: "弘一法师", text: "人生最曼妙的风景，竟是内心的淡定与从容。少欲知足，一尘一法皆是心中福田。" },
                { source: "六祖坛经", text: "一切福田，不离方寸；从心而觅，感无不通。将富足化为恒心，净水布施在小福之中。" },
                { source: "法华经", text: "福德因缘，皆由愿生。每次微小的克制与储蓄，都是在三千大千世界中，汇聚你的功德福德。" },
                { source: "大智度论", text: "如人持灯入冥室，光明照耀，众冥皆灭。勤勉储蓄如同持灯，能消弭未来的无常与担忧。" },
                { source: "佛门智慧", text: "水滴虽微，渐盈大器。福报的积累没有捷径，唯有在日常的起心动念间，恒常不懈地注入善因。" },
                { source: "修心格量", text: "财为五家共有，唯有内心的富足与手中的善业资粮，才是伴随你跨越无常的最真财富。" },
                { source: "禅修开示", text: "外求皆是幻相，内修方得始终。存下一分欲念，便是点亮一盏心灯，照亮前行大路。" },
                { source: "一尘一福", text: "合抱之木生于毫末。今日将资粮轻轻封入净瓶，便是对宇宙因果法则最深沉的礼敬。" },
                { source: "大品般若经", text: "若人能安住于无所得之心，则世间一切丰盛、喜乐、资粮皆能自然具足。" },
                { source: "印光大师", text: "一分诚心，消一分罪业，增一分福慧。踏实积累，切莫流于虚浮与急躁。" },
                { source: "维摩诘经", text: "随其心净则佛土净。心若不受物质束缚，眼前的存钱罐亦能化为无尽的藏宝法瓶。" },
                { source: "广钦老和尚", text: "做人要老实，修行要恒心。今天踏实存下一分因果，未来便得一分心灵的大自在。" },
                { source: "寂静之道", text: "世间喧嚣皆是过眼云烟。守住你手中的净水，不让欲念蒸发，即是最大的福报资粮。" },
                { source: "大成捷径", text: "莫以善小而不为。今日入罐的一分一毫，在因果流转中，皆是未来承接无量功德的福田。" },
                { source: "莲池大师", text: "少一分追求，多一分清凉；省一分资财，多一分慈悲。安养心神，莫向外驰求。" },
                { source: "无量寿经", text: "世人共争不急之务。唯有在智慧中内敛持守，方能在无常的红尘中得享大安稳。" },
                { source: "寒山诗", text: "今日过今日，今年忧今年。不如早堆积，功德净土莲。定心持守，瓶自盈满。" },
                { source: "八大人觉经", text: "多欲为苦，生死疲劳，从贪欲起；少欲无为，身心自在。储蓄即是无声的修持。" },
                { source: "无常观", text: "世间万物皆在流转。于顺境时知遮蔽、留资粮，方能在无常到来时，心无惊怖，泰然处之。" },
                { source: "弘一法师", text: "知足常足，终身不辱；知止常止，终身不耻。内心清净，眼前的乾坤自然宽广富足。" },
                { source: "六祖坛经", text: "本性自足，莫向外求。少欲知足，今日将世俗资粮化作清净功德，便是最上乘的修持。" },
                { source: "华严经", text: "一切唯心造。你若以匮乏之心看世界，处处皆是荒凉；你若以知足之心存资粮，滴水皆是福报。" },
                { source: "佛门格言", text: "一勺之水，渐成江海；微尘之积，终成须弥。今日净瓶中的一分一毫，皆是未来不退转的福田。" },
                { source: "解脱之道", text: "看破执着，方得自在。克制当下的贪嗔痴慢，将资粮留给更广大的慈悲愿景，是为大智慧。" },
                { source: "大智度论", text: "布施、持戒、忍辱、精进。今日的自律与节制，即是精进波罗蜜在日常中的无声修行。" },
                { source: "普贤行愿", text: "恒顺众生，常行清净。将多余的物欲化为甘露，封存于福报净瓶中，润泽未来的漫漫菩提路。" },
                { source: "五家共有", text: "深知世间财富为五家所共，唯有内心的清净功德与手中善因，才是任谁也夺不走的真资粮。" },
                { source: "百喻经", text: "愚人见他人建三层楼，便欲效仿，却不欲筑基。今日的储蓄，便是你在人间修持最稳固的基石。" },
                { source: "禅修开示", text: "关闭外在的妄想，守住内心的方寸。存下一分欲念，便是点亮一盏智慧心灯，照破未来无常。" },
                { source: "法华经", text: "常行忍辱，心气和柔。不与世俗攀比物欲，安住在当下的规律积累中，福德自当如影随形。" },
                { source: "维摩诘经", text: "虽处居家，不著三界。在红尘中打理资粮，心却不受物质奴役，是为大乘菩萨的清净持守。" },
                { source: "大谛造化", text: "因果历历不爽。今日在这里播下一粒储蓄的种子，因缘具足之时，必收获满树的心灵安稳与福报。" },
                { source: "清净法身", text: "外在的繁华皆是梦幻泡影。用每天的恒常自律，为自己的灵魂洗去浮躁，归于最纯粹的踏实。" },
                { source: "印光大师", text: "敦伦尽分，闲邪存诚。在小事上尽到自己的本分，不浮夸、不奢靡，福泽自然绵长不绝。" },
                { source: "佛历随笔", text: "水滴石穿，非一日之功。福报的凝聚亦在于日日不断的坚持。轻轻点击，便是又一笔功德资粮。" },
                { source: "心灵寂静", text: "少欲者，虽卧地上，犹为安乐；多欲者，虽处天堂，亦不称意。守住清贫中的富足，是大清静。" },
                { source: "达摩祖师", text: "无妄想，亦无执着。将储蓄当作一种自然的呼吸，不急不躁，因缘自会水到渠成。" },
                { source: "涅槃经", text: "善恶之报，如影随形；三世因果，循环不失。今日克己存善，未来的清凉福报早已注定。" },
                { source: "广钦老和尚", text: "修行不要贪快，要老实。存钱也是一样，一天一个脚印，心安理得，才是真功夫。" },
                { source: "药师经", text: "解脱一切贪吝执着。在小福中修持，将今日的资粮转化为无病无灾、内心安宁的净土能量。" },
                { source: "大愿成就", text: "众生愿力不可思议。将你的储蓄目标化作利他的宏大愿景，每一步的积累都将具有无量功德。" },
                { source: "百丈怀海", text: "一日不作，一日不食。勤劳持家，智慧收敛，在日常的起居劳作中，圆满自己的福德资粮。" },
                { source: "大悲咒语境", text: "心怀慈悲，万物丰盛。不为一己之私挥霍资源，理智持守，整个宇宙都将化作你的护法磁场。" },
                { source: "禅宗公案", text: "赵州茶，云门饼，皆在当下。不必羡慕远方的奢华，守住你眼前的存钱罐，当下便是灵山大厅。" },
                { source: "因果铁律", text: "春种一粒粟，秋收万颗子。因果从不欺人。今天省下的微小资财，即是明日大自在的因头。" },
                { source: "弘一大师", text: "事事留个余地，便是不着相。在财富充裕时留一分退路，是给灵魂最深沉的温柔与慈悲。" },
                { source: "虚云老和尚", text: "坐阅五帝四朝，不觉沧桑几度。世间财物生不带来，死不带去，唯有定力与善业永随。" },
                { source: "清凉莲语", text: "欲火烧心，唯有知足能化作清凉甘露。今天将浮躁的消费欲熄灭，换来净瓶一滴功功德清泉。" },
                { source: "金刚经开示", text: "若菩萨心住于法而行布施，如人入暗，即无所见。今日我们无相储蓄，踏实生活，福德不可思量。" },
                { source: "太虚大師", text: "仰天长啸，不如低头播种。人成即佛成，理好当下的每一分资产，便是世间法中最高级的修行。" },
                { source: "一尘一净土", text: "一花一世界，一叶一如来。这个小小的存钱罐，就是你洗涤物欲、凝聚福报与智慧的清净方寸。" },
                { source: "禅林僧宝传", text: "耐得住寂寞，才守得住繁华。在枯燥的日日积累中，你的心性正在悄悄蜕变，圆满具足。" },
                { source: "慈悲布施", text: "储蓄是为了未来有能力帮助更多的人。怀着这份大慈悲心去积累，每一块钱都将闪耀佛光。" },
                { source: "六度波罗蜜", text: "持戒即是克制，精进即是恒常。今天你在存钱罐前合十，便是同时修持了自律与长远心。" },
                { source: "清净道论", text: "远离贪婪的染污，保持灵魂的纯洁。看淡物质的诱惑，未来的道路自然步步生莲、毫无罣碍。" },
                { source: "智者大师", text: "止观双修，定慧等持。在消费的冲动面前“止”步，在未来的蓝图中“观”照，大富足也。" },
                { source: "安住当下", text: "任凭外界风浪起，我自安坐莲花台。用每天雷打不动的功德登载，筑起对抗世俗无常的金色法盾。" },
                { source: "圆满始终", text: "九层之台，起于累土。不要羡慕他人的福报，从今天这一步开始，你也在圆满你自己的净土资粮。" },
                { source: "心经指引", text: "心无罣碍，自然无有恐怖。今日省下一分奢华，便是为明天的生活，多存一分大清静。" },
                { source: "金刚经开示", text: "一切有为法，如梦幻泡影。看破眼前物质的虚妄，踏实积累净瓶资粮，方是真持守。" },
                { source: "弘一法师", text: "少欲知足，身心自在。在这小小的存钱罐前，每一笔登载，页是在心中修剪无谓的杂草。" },
                { source: "佛门智慧", text: "水滴虽微，渐盈大器。福报的凝聚从来没有捷径，唯有在日常的克制间，恒常不懈地注入善因。" },
                { source: "六祖坛经", text: "本性自足，莫向外求。不与世俗攀比物欲，安住在规律的积累中，功德福德自当如影随形。" },
                { source: "大智度论", text: "如人持灯入冥室，光明照耀，众冥皆灭。勤勉储蓄如同持灯，能消弭未来一切无常担忧。" },
                { source: "普贤行愿", text: "恒顺众生，常行清净。将多余的世俗物欲化为甘露封存，方能润泽未来的漫漫菩提路。" },
                { source: "印光大师", text: "一分诚心，消一分罪业，增一分福慧。踏实积累，莫要流于世俗的虚浮与急躁。" },
                { source: "维摩诘经", text: "随其心净则佛土净。心若不受欲望绑架，眼前的储蓄大厅，便是你清净的心灵方寸。" },
                { source: "广钦老和尚", text: "做人要老实，修行要有恒心。存钱亦是同理，一天一个脚印，心安理得才是真功夫。" },
                { source: "一尘一福", text: "合抱之木生于毫末。今日将资粮轻轻封入净瓶，便是对宇宙因果法则最深沉的礼敬。" },
                { source: "寒山诗意", text: "今日过今日，今年忧今年。不如早堆积，功德净土莲。定心持守，瓶自盈满。" },
                { source: "八大人觉经", text: "多欲为苦，生死疲劳；少欲无为，身心自在。手中的每一笔储蓄，皆是无声的修持。" },
                { source: "无常观", text: "世间万物皆在流转。于顺境时知遮蔽、留资粮，方能在暴风雨到来时，心无惊怖，泰然处之。" },
                { source: "修心格量", text: "外在的繁华皆是过眼云烟。守住你手中的净水，不让欲念蒸发，即是人间最大的福报资粮。" },
                { source: "大成捷径", text: "莫以善小而不为。今日入罐的一分一毫，在因果流转中，皆是未来承接无量大安稳的因头。" },
                { source: "莲池大师", text: "少一分追求，多一分清凉；省一分资财，多一分慈悲。安养心神，切莫向外驰求。" },
                { source: "无量寿经", text: "世人共争不急之务。唯有在智慧中内敛持守，方能在浮躁的红尘中，得享一份真正的大自在。" },
                { source: "清净法身", text: "外求皆是幻相，内修方得始终。存下一分欲念，便是点亮一盏智慧心灯，照亮前行大路。" },
                { source: "因果铁律", text: "春种一粒粟，秋收万颗子。因果从不欺人。今天省下的微小资财，即是明日大解脱的种子。" },
                { source: "达摩祖师", text: "无妄想，亦无执着。将储蓄当作一种自然的呼吸，不急不躁，因缘自会水到渠成。" },
                { source: "涅槃经", text: "善恶之报，如影随形。今日克己存善，为自己的灵魂洗去浮躁，未来的清凉福报早已注定。" },
                { source: "药师经", text: "解脱一切贪吝执着。在小福中精进，将今日的资粮转化为无病无灾、内心安宁的净土能量。" },
                { source: "大愿成就", text: "众生愿力不可思议。将你的储蓄目标化作利他的宏大愿景，每一步的积累都将闪耀慈悲的光芒。" },
                { source: "百丈怀海", text: "一日不作，一日不食。勤劳持家，智慧收敛，在日常的起居劳作中，圆满自己的福德资粮。" },
                { source: "大悲心水", text: "心怀慈悲，万物丰盛。不为一己之私挥霍资源，理智持守，整个宇宙都将化作你的护法磁场。" },
                { source: "禅宗公案", text: "赵州茶，云门饼，皆在当下。不必羡慕远方的奢华，守住你眼前的储蓄，当下便是灵山大厅。" },
                { source: "虚云老和尚", text: "坐阅五帝四朝，不觉沧桑几度。世间财物生不带来，死不带去，唯有定力与善业永随。" },
                { source: "清凉莲语", text: "欲火烧心，唯有知足能化作清凉甘露。今天将浮躁的消费欲熄灭，换来净瓶一滴功德清泉。" },
                { source: "太虚大师", text: "仰天长啸，不如低头播种。理好当下的每一分资产，便是世间法中最高级、最踏实的修行。" },
                { source: "一尘一净土", text: "一花一世界，一叶一如来。这个小小的存钱罐，就是你洗涤物欲、凝聚智慧的清净方寸。" },
                { source: "禅林僧宝", text: "耐得住寂寞，才守得住繁华。在枯燥的日日积累中，你的心性正在悄悄蜕变，圆满具足。" },
                { source: "六度持守", text: "持戒即是克制，精进即是恒常。今天你在存钱罐前合十，便是同时修持了自律与长远心。" },
                { source: "清净道论", text: "远离贪婪的染污，保持灵魂的纯洁。看淡物质的诱惑，未来的道路自然步步生莲、毫无罣碍。" },
                { source: "智者大师", text: "止观双修，定慧等持。在消费的冲动面前“止”步，在未来的蓝图中“观”照，大富足也。" },
                { source: "安住当下", text: "任凭外界风浪起，我自安坐莲花台。用每天雷打不动的储蓄，筑起对抗世俗无常的金色法盾。" },
                { source: "圆满始终", text: "九层之台，起于累土。不要羡慕他人的福报，从今天这一步开始，你也在圆满你自己的净土资粮。" },
                { source: "百喻经", text: "愚人见他人建三层楼，便欲效仿，却不欲筑基。今日的储蓄，便是你在人间修持最稳固的基石。" },
                { source: "佛门格言", text: "一勺之水，渐成江海；微尘之积，终成须弥。今日净瓶中的一分一毫，皆是未来不退转福田。" },
                { source: "解脱之道", text: "看破执着，方得自在。克制当下的贪嗔痴慢，将资粮留给更广大的慈悲愿景，是为大智慧。" },
                { source: "华严经", text: "一切唯心造。你若以匮乏之心看世界，处处皆是荒凉；你若以知足之心存资粮，滴水皆是福报。" },
                { source: "清心神咒", text: "物欲蒙蔽双眼，自律拨云见日。每一次与欲望的交锋，都是在为内心的如意宝珠拂拭尘埃。" },
                { source: "布施心量", text: "手中常有余粮，心中常有慈悲。储蓄是为了在未来的某一天，能成为他人生命中遮风挡雨的伞。" },
                { source: "恒常持守", text: "任凭世间流行千百种风潮，守住自己的方寸不乱。清晨的一笔存入，是给灵魂最踏实的早课。" },
                { source: "安稳大厅", text: "知足之人，虽卧地上犹为天堂；多欲之人，虽处天堂亦如地狱。理好财富，便是安顿灵魂。" },
                { source: "智慧福田", text: "莫向外求精致，要在内求稳固。当你不再为虚荣买单，你就在自己的福田里种下了长青的松柏。" },
                { source: "定力修炼", text: "在消费主义铺天盖地的浪潮里，你能稳稳按下一笔储蓄，这份定力已经超越了绝大多数的凡夫。" },
                { source: "因果示现", text: "今日看似毫不起眼的一小笔资粮，在时间的无穷流转中，终将化作漫天繁星，护佑你的人生旅途。" },
                { source: "心灵净瓶", text: "把辛苦赚来的福报妥善封存，不使其随意漏失。这不是吝啬，这是对宇宙因果法则最诚挚的顶礼。" },
                { source: "圆满始终", text: "日日登载，步步生莲。当这份自律化为你生命的一部分，人间处处皆是安心无忧的普陀大厅。" },
                { source: "心经指引", text: "诸法空相，不生不灭。熄灭心中无谓的攀缘物欲，定心积累净瓶资粮，得享真空大安稳。" },
                { source: "金刚经开示", text: "不取于相，如如不动。在漫天繁华的消费诱惑前，守住你手中的存钱罐，即是无上持守。" },
                { source: "弘一法师", text: "内心清净，眼前的乾坤自然宽广。今日将资粮轻轻封存，便是为未来的日子多植一分福田。" },
                { source: "佛门智慧", text: "水滴虽微，渐盈大器。福报的凝聚全在于日日不断的坚持。轻轻点击，便是又一笔功德。" },
                { source: "六祖坛经", text: "一切福田，不离方寸。从心而觅，感无不通。将富足化为恒心，净水布施在小福之中。" },
                { source: "大智度论", text: "布施、持戒、忍辱、精进。今日的自律与节制，即是精进波罗蜜在日常中的无声修行。" },
                { source: "普贤行愿", text: "恒顺众生，常行清净。不与世俗攀比物欲，安住在当下的规律积累中，福德自当如影随形。" },
                { source: "印光大师", text: "敦伦尽分，闲邪存诚。在小事上尽到自己的本分，不浮夸、不奢靡，福泽自然绵长不绝。" },
                { source: "维摩诘经", text: "虽处居家，不著三界。在红尘中打理资粮，心却不受物质奴役，是为菩萨的清净持守。" },
                { source: "广钦老和尚", text: "修行不要贪快，要老实。存钱也是一样，一天一个脚印，心安理得，才是真功夫。" },
                { source: "药师经", text: "解脱一切贪吝执着。在小福中修持，将今日的资粮转化为无病无灾、内心安宁的净土能量。" },
                { source: "大愿成就", text: "众生愿力不可思议。将你的储蓄目标化作利他的宏大愿景，每一步的积累都将具有无量功德。" },

                { source: "八大人觉经", text: "多欲为苦，生死疲劳，从贪欲起；少欲无为，身心自在。储蓄即是无声的修持。" },
                { source: "无常观", text: "世间万物皆在流转。于顺境时知遮蔽、留资粮，方能在无常到来时，心无惊怖，泰然处之。" },
                { source: "弘一法师", text: "知足常足，终身不辱；知止常止，终身不耻。内心清净，眼前的乾坤自然宽广富足。" },
                { source: "六祖坛经", text: "本性自足，莫向外求。少欲知足，今日将世俗资粮化作清净功德，便是最上乘的修持。" },
                { source: "华严经", text: "一切唯心造。你若以匮乏之心看世界，处处皆是荒凉；你若以知足之心存资粮，滴水皆是福报。" },
                { source: "佛门格言", text: "一勺之水，渐成江海；微尘之积，终成须弥。今日净瓶中的一分一毫，皆是未来不退转福田。" },
                { source: "解脱之道", text: "看破执着，方得自在。克制当下的贪嗔痴慢，将资粮留给更广大慈悲愿景，是为大智慧。" },
                { source: "大智度论", text: "布施、持戒、忍辱、精进。今日的自律与节制，即是精進波罗蜜在日常中的无声修行。" },
                { source: "普贤行愿", text: "恒顺众生，常行清净。将多余的物欲化为甘露，封存于福报净瓶中，润泽未来的漫漫菩提路。" },
                { source: "五家共有", text: "深知世间财富为五家所共，唯有内心的清净功德与手中善因，才是任谁也夺不走的真资粮。" },
                { source: "百喻经", text: "愚人见他人建三层楼，便欲效仿，却不欲筑基。今日的储蓄，便是你在人间修持最稳固的基石。" },
                { source: "禅修开示", text: "关闭外在的妄想，守住内心的方寸。存下一分欲念，便是点亮一盏智慧心灯，照破未来无常。" },
                { source: "法华經", text: "常行忍辱，心气和柔。不与世俗攀比物欲，安住在当下的规律积累中，福德自当如影随形。" },
                { source: "安住当下", text: "任凭外界风浪起，我自安坐莲花台。用每天雷打不动的功德登载，筑起对抗世俗无常的金色法盾。" },
                { source: "圆满始终", text: "九层之台，起于累土。不要羡慕他人的福报，从今天这一步开始，你也在圆满你自己的功德。" }
                ],
                'en': [
                    { source: "Diamond Sutra", text: "Past mind cannot be grasped, present mind cannot be grasped, future mind cannot be grasped. Dwell in the present and steadily accumulate provisions for your pure vase." },
                { source: "Heart Sutra", text: "The mind is without hindrance; because there is no hindrance, there is no fear. Contentment brings lasting joy. Saving plants a blessing for the future, yielding ultimate serenity." },
                { source: "Master Hong Yi", text: "The most beautiful scenery in life is inner calm and composure. With few desires and true contentment, every speck of dust and every phenomena becomes a field of blessings in the heart." },
                { source: "Platform Sutra", text: "All fields of blessings reside within the heart; seek from within, and everything aligns. Turn abundance into constant devotion, pouring pure water into micro-blessings." },
                { source: "Lotus Sutra", text: "Virtues and conditions are all born from vows. Every minor restraint and saving accumulates your merits and virtues across the cosmos." },
                { source: "Mahaprajnaparamita Sastra", text: "Like a person bringing a lamp into a dark room, the light shines and all darkness vanishes. Diligent saving is like holding a lamp, dispelling future impermanence and worry." },
                { source: "Buddhist Wisdom", text: "Though water drops are tiny, they gradually fill a great vessel. There is no shortcut to accumulating blessings; consistently infuse wholesome causes into daily thoughts." },
                { source: "Mind Cultivation", text: "Wealth is shared by the five hazards. Only inner richness and the spiritual provisions of your wholesome deeds are the true wealth that transcends impermanence." },
                { source: "Zen Teachings", text: "Seeking outwardly is an illusion; inner cultivation endures. Saving a single desire is lighting a lamp of the heart to illuminate the great path ahead." },
                { source: "Dust and Blessing", text: "A massive tree grows from a tiny sprout. Safely sealing your provisions in the pure vase today is the deepest reverence for the cosmic law of cause and effect." },
                { source: "Prajnaparamita Sutra", text: "If one can dwell in a mind that seeks nothing, all worldly abundance, joy, and provisions will naturally manifest in perfection." },
                { source: "Master Yin Guang", text: "One part sincerity dispels one part negative karma and increases one part blessing and wisdom. Accumulate steadily; never slip into superficiality and haste." },
                { source: "Vimalakirti Sutra", text: "According to the purity of one's mind, the Buddha-land is pure. If the mind is free from material bondage, your piggy bank transforms into an inexhaustible sacred vase." },
                { source: "Master Guang Qin", text: "Be honest in character and constant in cultivation. Steadily saving a wholesome cause today brings great spiritual liberation tomorrow." },
                { source: "The Quiet Way", text: "The clamor of the world is a fleeting cloud. Guard the pure water in your hands and prevent desires from evaporating; this is the greatest provision of blessings." },
                { source: "The Great Path", text: "Do not fail to commit a good deed just because it is small. Every bit placed into the jar today becomes a field of blessings for infinite merits in the cycle of cause and effect." },
                { source: "Master Lian Chi", text: "One less pursuit brings one more bit of coolness; one bit of resources saved brings one more act of compassion. Nurture your spirit and cease chasing external desires." },
                { source: "Infinite Life Sutra", text: "Worldly people contend for non-essential matters. Only by practicing restraint with wisdom can one enjoy profound stability amidst a chaotic world." },
                { source: "Cold Mountain Poem", text: "Live through today, worry about this year. Better to pile up merits early like lotuses in the Pure Land. Dwell in calm devotion, and the vase fills naturally." },
                { source: "Sutra on Eight Awarenesses", text: "Many desires bring suffering; the fatigue of life and death arises from greed. Few desires bring effortless peace and liberation. Saving is a silent practice." },
                { source: "View of Impermanence", text: "All things in the universe flow and change. Knowing how to store provisions in times of prosperity prepares you to face the storm with absolute poise and no fear." },
                { source: "Master Hong Yi", text: "Knowing contentment brings lifelong dignity; knowing when to stop prevents lifelong shame. When the inner self is pure, the universe naturally becomes vast and abundant." },
                { source: "Platform Sutra", text: "The inherent nature is fully sufficient; do not seek outside. With few desires and contentment, transforming worldly resources into pure merits today is the highest practice." },
                { source: "Avatamsaka Sutra", text: "Everything is created by the mind alone. If you view the world with scarcity, everything is bleak; if you store provisions with contentment, every drop becomes a blessing." },
                { source: "Buddhist Proverb", text: "A spoonful of water gradually becomes an ocean; accumulated dust eventually builds Mount Meru. Every bit in the pure vase today is a non-retrogressing field of blessings." },
                { source: "Path to Liberation", text: "See through attachments to attain freedom. Restraining current greed, anger, and ignorance to preserve provisions for a greater compassionate vision is grand wisdom." },
                { source: "Mahaprajnaparamita Sastra", text: "Charity, morality, patience, and diligence. Today's self-discipline and moderation are the silent everyday practice of Viriya Paramita." },
                { source: "Samantabhadra Vows", text: "Always accord with sentient beings and maintain purity. Turn excess material desires into sweet dew, sealing it in the blessing vase to nourish the long path to enlightenment." },
                { source: "Shared by the Five", text: "Deeply realize that worldly wealth is shared by the five hazards. Only pure merits and wholesome causes are the true provisions that no one can steal." },
                { source: "Hundred Parables Sutra", text: "A foolish man saw another build a three-story house and wished to copy it, yet refused to lay the foundation. Today's saving is your most stable bedrock in the human realm." },
                { source: "Zen Teachings", text: "Close off external illusions and guard the domain of your heart. Saving a desire lights a lamp of wisdom to shatter future impermanence." },
                { source: "Lotus Sutra", text: "Constantly practice patience with a gentle spirit. Refuse to compare material wealth with the world, dwell in regular accumulation, and blessings will follow you like a shadow." },
                { source: "Vimalakirti Sutra", text: "Though living at home, one is not bound by the three realms. Managing resources in the material world without being enslaved by matter is the pure devotion of a Bodhisattva." },
                { source: "Great Creation", text: "The law of cause and effect never fails. Sowing a seed of savings here today will surely yield a tree full of spiritual peace and blessings when conditions ripen." },
                { source: "Pure Dharmakaya", text: "External luxury is but a dream, an illusion, a bubble, a shadow. Use daily constant self-discipline to wash away restlessness from your soul and return to pure earnestness." },
                { source: "Master Yin Guang", text: "Fulfill moral duties, master yourself, and maintain sincerity. Perform your duties well in small matters without vanity or extravagance, and blessings will flow endlessly." },
                { source: "Buddhist Journal", text: "Constant dripping wears away stone; it is not achieved in a day. The gathering of blessings relies on daily unceasing persistence. A gentle click adds another provision of merit." },
                { source: "Spiritual Quietude", text: "One with few desires finds peace even sleeping on the ground; one with many desires finds discontent even in heaven. Guarding richness in simplicity is great serenity." },
                { source: "Bodhidharma", text: "Be free from delusions and attachments. Treat saving as natural breathing—neither anxious nor hurried—and conditions will naturally fall into place." },
                { source: "Nirvana Sutra", text: "Retribution for good and evil follows you like a shadow; karma never fails across past, present, and future. Restraining yourself for virtue today secures cool blessings tomorrow." },
                { source: "Master Guang Qin", text: "Do not rush your cultivation; be honest. Saving money is the same—one step at a time with a clear conscience is the true mastery." },
                { source: "Bhaisajyaguru Sutra", text: "Liberate yourself from all greed and attachment. Practice within small blessings, transforming today's provisions into Pure Land energy of perfect health and inner peace." },
                { source: "Great Vow Fulfillment", text: "The power of vows among sentient beings is inconceivable. Align your savings goal with a grand altruistic vision, and every step of accumulation will hold infinite merit." },
                { source: "Baizhang Huaihai", text: "A day without work is a day without food. Manage your home with diligence and gather resources with wisdom, perfecting your provisions of blessing through daily life." },
                { source: "Great Compassion Mantra", text: "Hold compassion, and all things flourish. Do not squander resources for selfish whims; practice rational guard, and the universe becomes your protective field." },
                { source: "Zen Koan", text: "Zhaozhou's tea and Yunmen's cake are right here in the present. No need to envy distant luxuries; guard your current saving jar, for the present is the spiritual hall." },
                { source: "Ironclad Law of Karma", text: "Sow a grain in spring, reap ten thousand seeds in autumn. Cause and effect never deceive. The tiny funds saved today are the source of tomorrow's great liberation." },
                { source: "Master Hong Yi", text: "Leave a margin in all matters to avoid attachment. Reserving a fallback path during times of wealth is the deepest tenderness and compassion for your soul." },
                { source: "Master Xu Yun", text: "Witnessing dynasties rise and fall, one realizes the fleeting nature of time. Worldly wealth cannot be brought along at birth or death; only resolve and karma follow." },
                { source: "Cool Lotus Words", text: "The fire of desire burns the heart, yet contentment transforms it into cool nectar. Quench your restless spending urge today in exchange for a pure drop of merit." },
                { source: "Diamond Sutra Teachings", text: "If a Bodhisattva practices charity without clinging to phenomena, it is like a person with clear eyes walking in bright sunlight. Saving without attachment brings immeasurable blessings." },
                { source: "Master Tai Xu", text: "Crying out to heaven is inferior to bowing down to sow seeds. Perfecting humanity completes the Buddha-nature; managing every resource well is the highest cultivation in worldly laws." },
                { source: "Dust and Pure Land", text: "To see a world in a grain of sand and a heaven in a wild flower. This small saving jar is your pure space to cleanse material desires and gather wisdom." },
                { source: "Zen Chronicles", text: "Endure the solitude to guard the prosperity. Through boring daily accumulation, your inner nature silently transforms into perfect fulfillment." },
                { source: "Compassionate Charity", text: "Saving is meant to empower you to help more people in the future. Accumulate with this great compassionate heart, and every dollar will shine with divine light." },
                { source: "Six Paramitas", text: "Morality means restraint, diligence means constancy. Joining your hands before the ledger today practices both self-discipline and long-term vision." },
