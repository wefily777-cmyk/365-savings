<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>祈星渡仁 — 萬用百變存錢大廳</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f7ede2 0%, #f5cac3 100%); /* Plan Joy 治癒系雙漸層 */
            --card-bg: rgba(255, 255, 255, 0.75);
            --text-color: #2b2d42;
            --text-muted: #6c757d;
            --border-color: rgba(255, 255, 255, 0.5);
            --cell-bg: rgba(255, 255, 255, 0.6);
            --cell-text: #2b2d42;
            --btn-gradient: linear-gradient(135deg, #f28482 0%, #84a59d 100%);
            --checked-bg: linear-gradient(135deg, #84a59d 0%, #62837c 100%);
            --checked-text: #ffffff;
            --water-color: linear-gradient(180deg, #96e6a1 0%, #d4fc79 100%);
            --app-shadow: 0 20px 40px -15px rgba(43, 45, 66, 0.1), 0 4px 12px -4px rgba(43, 45, 66, 0.05);
            --inner-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.02);
            --glass-blur: 24px;
        }

        body.midnight-mode {
            --bg-gradient: linear-gradient(135deg, #111827 0%, #1e1b4b 100%); /* 奢華深邃星空藍 */
            --card-bg: rgba(31, 41, 55, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --cell-bg: rgba(17, 24, 39, 0.5);
            --cell-text: #f3f4f6;
            --text-color: #f9fafb !important; 
            --text-muted: #9ca3af !important;
            --app-shadow: 0 24px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            margin: 0;
            padding: 24px 16px 50px 16px;
            background: var(--bg-gradient) !important;
            background-attachment: fixed !important;
            color: var(--text-color);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: -0.4px;
        }

        .container { max-width: 440px; margin: 0 auto; }
        
        .top-header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        h1 { font-size: 1.35rem; font-weight: 900; color: var(--text-color); margin: 0; letter-spacing: -0.5px; }
        
        /* ⚙️ iOS 質感物理回彈齒輪 */
        .gear-btn { 
            background: var(--card-bg); border: 1px solid var(--border-color); font-size: 1.25rem; padding: 12px 14px; border-radius: 18px; cursor: pointer; 
            box-shadow: var(--app-shadow); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); color: var(--text-color); backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
        }
        .gear-btn:active { transform: scale(0.85) rotate(60deg); }

        /* 🔮 懸浮立體磨砂玻璃面板 */
        .app-card {
            background: var(--card-bg); padding: 20px; border-radius: 28px; margin-bottom: 16px;
            box-shadow: var(--app-shadow); border: 1px solid var(--border-color);
            backdrop-filter: blur(var(--glass-blur)); -webkit-backdrop-filter: blur(var(--glass-blur));
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .mode-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; }
        .mode-label { font-size: 0.85rem; font-weight: 800; opacity: 0.8; }
        .mode-select { flex: 1; background-color: rgba(0,0,0,0.03); color: var(--text-color); border: 1px solid var(--border-color); padding: 12px 14px; border-radius: 16px; font-size: 0.9rem; font-weight: 700; outline: none; }
        body.midnight-mode .mode-select { background-color: rgba(255,255,255,0.06); color: #fff; }

        .wisdom-header-line { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; font-weight: 800; opacity: 0.5; margin-bottom: 12px; }
        .wisdom-text { font-size: 1.05rem; line-height: 1.65; font-weight: 700; text-align: left; margin-bottom: 8px; color: var(--text-color); }
        .wisdom-src { font-size: 0.75rem; text-align: right; opacity: 0.8; font-weight: bold; }
        .wisdom-refresh-btn { background: none; border: none; font-size: 1rem; cursor: pointer; color: var(--text-color); transition: transform 0.4s; }

        .config-sub-panel { display: none; background-color: rgba(0,0,0,0.02); padding: 12px; border-radius: 16px; width: 100%; box-sizing: border-box; border: 1px solid var(--border-color); margin-top: 12px; }
        .config-input { border: 1px solid var(--border-color); background: var(--cell-bg); color: var(--text-color); border-radius: 12px; padding: 10px; font-weight: 700; text-align: center; outline: none; }

        .target-input-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 8px; }
        .target-label { font-size: 0.95rem; font-weight: 800; }
        .target-input { flex: 1; border: none; border-radius: 14px; padding: 12px 14px; font-size: 0.9rem; color: var(--text-color); background-color: rgba(0,0,0,0.03); font-weight: 700; outline: none; text-align: right; box-shadow: var(--inner-shadow); }
        body.midnight-mode .target-input { background-color: rgba(255,255,255,0.05); }

        /* 🌊 進度條大優化：飽滿的水份儲蓄瓶 */
        .water-bottle-container { position: relative; background-color: rgba(0,0,0,0.04); height: 44px; border-radius: 20px; margin: 14px 0; overflow: visible; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        body.midnight-mode .water-bottle-container { background-color: rgba(255,255,255,0.06); }
        .water-fluid { height: 100%; background: var(--water-color); border-radius: 18px 0 0 18px; width: 0%; transition: width 1.2s cubic-bezier(0.1, 0.8, 0.3, 1); position: relative; }
        .water-fluid.full { border-radius: 18px; }
        .water-floating-runner { position: absolute; right: -16px; top: -24px; font-size: 1.5rem; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); animation: floatingWave 3s ease-in-out infinite; }

        @keyframes floatingWave {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(6deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .blueprint-status { font-size: 0.85rem; color: var(--text-color); opacity: 0.9; text-align: center; font-weight: 700; background-color: rgba(0,0,0,0.02); padding: 12px 16px; border-radius: 16px; line-height: 1.5; box-shadow: var(--inner-shadow); }

        .journal-title-bar { display: flex; justify-content: space-between; align-items: center; padding-bottom: 10px; margin-bottom: 12px; font-weight: 800; font-size: 1rem; }
        .patch-toggle-btn { background-color: rgba(0,0,0,0.03); color: var(--text-color); border: 1px solid var(--border-color); width: 100%; padding: 12px; border-radius: 16px; font-size: 0.85rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        
        .journal-container-list { max-height: 240px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .journal-row-card { display: flex; align-items: center; justify-content: space-between; background-color: var(--cell-bg); padding: 14px 16px; border-radius: 16px; box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); }
        .j-day-tag { font-size: 0.7rem; font-weight: 800; color: #f28482; background-color: rgba(242, 132, 130, 0.1); padding: 3px 8px; border-radius: 8px; }

        .random-btn { background: var(--btn-gradient); color: white; border: none; padding: 16px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; box-shadow: 0 8px 24px rgba(242, 132, 130, 0.2); width: 100%; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .random-btn:active { transform: scale(0.96); }

        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-card { text-align: center; padding: 10px 0; }
        .stat-card h3 { margin: 0 0 6px 0; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); letter-spacing: 0.5px; }
        .stat-card p { margin: 0; font-size: 1.4rem; font-weight: 900; color: var(--text-color); }

        /* 🗓️ 磨砂懸浮日曆網格 */
        .month-column { background: var(--card-bg); border-radius: 28px; box-shadow: var(--app-shadow); border: 1px solid var(--border-color); overflow: hidden; margin-bottom: 18px; }
        .month-header { background: rgba(0,0,0,0.01); padding: 14px 18px; font-weight: 800; font-size: 0.95rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .days-list { padding: 14px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        
        /* 彈簧反饋格子：按壓超滑順 */
        .day-cell { padding: 14px 0; text-align: center; background-color: var(--cell-bg); border: none; border-radius: 15px; font-size: 0.9rem; font-weight: 700; color: var(--cell-text); transition: all 0.25s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: var(--inner-shadow); border: 1px solid var(--border-color); cursor: pointer; }
        .day-cell:active { transform: scale(0.85); background-color: rgba(0,0,0,0.05); }
        .day-cell.checked { background: var(--checked-bg) !important; color: var(--checked-text) !important; box-shadow: 0 8px 20px rgba(132, 165, 157, 0.4); border-color: transparent; }

        /* 控制中心面板 */
        .settings-panel-box { display: flex; flex-direction: column; gap: 18px; text-align: left !important; }
        .settings-row-title { font-size: 0.85rem; font-weight: 800; opacity: 0.6; margin-bottom: 6px; }
        .settings-btn-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .settings-item-btn { background: rgba(0,0,0,0.03); border: 1px solid var(--border-color); padding: 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; color: var(--text-color); cursor: pointer; transition: all 0.2s; text-align: center; }
        .settings-item-btn.active { background: var(--btn-gradient); color: white; border-color: transparent; box-shadow: 0 4px 12px rgba(242, 132, 130, 0.2); }

        .custom-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.3); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); display: flex; align-items: center; justify-content: center; z-index: 9999; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .custom-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .custom-modal { background-color: var(--cell-bg); border-radius: 32px; padding: 24px; width: 88%; max-width: 340px; box-shadow: 0 30px 70px rgba(0,0,0,0.25); border: 1px solid var(--border-color); transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15); }
        .custom-modal-overlay.active .custom-modal { transform: scale(1); }
        
        .settings-main-action-btn {
            background: var(--btn-gradient); color: white; border: none; padding: 15px; font-size: 0.95rem; font-weight: 800; border-radius: 18px; cursor: pointer; margin-top: 18px; width: 100%; box-shadow: 0 6px 18px rgba(242, 132, 130, 0.25); transition: transform 0.2s;
        }
        .settings-main-action-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div class="container">
    <div class="top-header-bar">
        <h1 id="app-title">✨ 祈星渡仁 — 萬用百變存錢大廳 ✨</h1>
        <button class="gear-btn" onclick="openSettingsPanel()">⚙️</button>
    </div>

    <div class="app-card">
        <div class="mode-row">
            <span class="mode-label" id="lbl-saving-core">⚙️ 儲蓄核心：</span>
            <select id="main-saving-mode-select" class="mode-select" onchange="changeSavingMode(this.value)">
                <option value="365_journal">🛡️ 365天防誤觸智慧手帳模式 [預設]</option>
                <option value="365_阶梯">💎 365天階梯存錢法 (經典自選)</option>
                <option value="custom_fixed">📊 萬用自訂固定金額法</option>
                <option value="week_52">📈 52週階梯存錢法 (每週步道)</option>
                <option value="隨喜">💖 自由隨喜無壓力存錢法</option>
            </select>
        </div>
        
        <div class="config-sub-panel" id="custom-amt-panel">
            <div class="config-flex-row">
                <span id="lbl-custom-amt">🔧 設定自訂面額：</span>
                <div>
                    <input type="number" id="custom-fixed-amt-input" class="config-input" style="width:65px;" value="100">
                    <button id="btn-apply-amt" style="background: var(--btn-gradient); border:none; padding:8px 12px; font-weight:bold; border-radius:8px; color:white; font-size:0.8rem; margin-left:4px;" onclick="applyCustomFixedAmount()">套用</button>
                </div>
            </div>
        </div>

        <div class="config-sub-panel" id="journal-config-panel">
            <div class="config-flex-row">
                <span id="lbl-start-date">📅 起始日期：</span>
                <input type="date" id="journal-start-date-picker" class="config-input" onchange="updateJournalDates()">
                <span id="journal-end-date-display" style="color: var(--text-muted); font-size:0.8rem;">結束：--</span>
            </div>
        </div>
    </div>

    <div class="daily-wisdom-card app-card">
        <div class="wisdom-header-line">
            <span id="lbl-wisdom-title">📜 每日心靈指引 / Daily Wisdom</span>
            <button class="wisdom-refresh-btn" onclick="refreshDailyWisdom(true)">🔄</button>
        </div>
        <div class="wisdom-text" id="display-wisdom-text">讀取心靈字卡中...</div>
        <div class="wisdom-src" id="display-wisdom-src">...</div>
    </div>

    <div class="app-card">
        <div class="target-input-group">
            <span class="target-label" id="lbl-target-goal">🎯 儲蓄目標</span>
            <input type="text" id="target-saving-input" class="target-input" placeholder="輸入您的願望清單" oninput="saveTargetGoal(); updateDashboard();">
        </div>

        <div class="water-bottle-container">
            <div class="water-fluid" id="dynamic-water-fluid">
                <span class="water-floating-runner" id="dynamic-water-runner">🚀</span>
            </div>
        </div>

        <div class="blueprint-status" id="blueprint-status-text">裝填藍圖中...</div>
    </div>

    <div class="app-card" id="app-journal-ui-area">
        <div class="journal-title-bar">
            <span id="lbl-journal-title">📝 儲蓄流水手帳</span>
            <span id="journal-total-count-label" style="font-size:0.8rem; color: var(--text-muted);">0 筆</span>
        </div>
        <button class="patch-toggle-btn" onclick="togglePatchBox()">
            <span id="lbl-expand-tool">➕ 展開補帳與多人同步工具</span>
        </button>
        <div class="manual-patch-box" id="manual-patch-expand-area" style="display:none; margin-bottom: 12px;">
            <div style="display:flex; gap:6px;">
                <input type="date" id="patch-date-input" class="config-input" style="flex:1;">
                <select id="patch-amount-select" class="config-input" style="flex:1; background:var(--cell-bg); color:var(--text-color);"></select>
                <button style="background:var(--btn-gradient); border:none; color:white; padding:10px; border-radius:12px; font-weight:bold;" onclick="executeManualPatch()">登載</button>
            </div>
        </div>
        <div class="journal-container-list" id="journal-list-render-target"></div>
    </div>

    <div class="app-card" id="blindbox-ui-area">
        <div class="random-title" id="lbl-blindbox-title">🎲 幸運儲蓄盲盒抽獎</div>
        <div class="celebrity-info" id="celebrity-display">開啟今日驚喜儲蓄任務...</div>
        <button class="random-btn" id="main-action-random-btn" onclick="pickCelebrity()">抽取今日驚喜任務</button>
    </div>

    <div class="app-card dashboard">
        <div class="stat-card" style="grid-column: span 2; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px;">
            <h3 id="lbl-dash-total">目前已存總金額</h3>
            <p id="total-saved" style="font-size: 1.6rem; color: #62837c;">$0</p>
        </div>
        <div class="stat-card">
            <h3 id="label-completed-unit">已完成天數</h3>
            <p id="days-count">0 / 365</p>
        </div>
        <div class="stat-card">
            <h3 id="lbl-dash-progress">目前總進度</h3>
            <p id="progress-percent">0%</p>
        </div>
    </div>

    <div class="grid-container" id="months-grid"></div>
</div>

<div class="custom-modal-overlay" id="settings-modal-layer">
    <div class="custom-modal">
        <div class="settings-panel-box">
            <div>
                <div class="settings-row-title" id="lbl-setting-lang">🌐 選擇語言 / Language</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn lang-item" id="s-lang-zh-TW" onclick="changeLanguage('zh-TW')">繁體中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-zh-CN" onclick="changeLanguage('zh-CN')">简体中文</button>
                    <button class="settings-item-btn lang-item" id="s-lang-en" onclick="changeLanguage('en')">English</button>
                    <button class="settings-item-btn lang-item" id="s-lang-ja" onclick="changeLanguage('ja')">日本語</button>
                </div>
            </div>
            <div style="margin-top: 4px;">
                <div class="settings-row-title" id="lbl-setting-theme">🎨 選擇世界觀主題 / Theme</div>
                <div class="settings-btn-grid">
                    <button class="settings-item-btn theme-item" id="s-theme-classic" onclick="selectThemeStyle('classic')">🌌 經典原版</button>
                    <button class="settings-item-btn theme-item" id="s-theme-rainbow" onclick="selectThemeStyle('rainbow')">🌈 彩虹療癒</button>
                    <button class="settings-item-btn theme-item" id="s-theme-buddhism" onclick="selectThemeStyle('buddhism')">🏯 禪心福報</button>
                    <button class="settings-item-btn theme-item" id="s-theme-gospel" onclick="selectThemeStyle('gospel')">✝️ 恩典管家</button>
                </div>
            </div>
            <div>
                <div class="settings-row-title" id="lbl-setting-music">🎵 背景沉浸自然音效 / Nature Sounds</div>
                <div class="settings-btn-grid" style="grid-template-columns: 1fr;">
                    <button class="settings-item-btn" id="btn-toggle-bgm" onclick="toggleBgmState()">環境音效：已關閉</button>
                </div>
            </div>
        </div>
        <button class="settings-main-action-btn" onclick="closeSettingsPanel()" id="btn-setting-close">儲存變更 / Save</button>
    </div>
</div>

<div class="custom-modal-overlay" id="custom-modal-layer">
    <div class="custom-modal">
        <div class="custom-modal-text" id="custom-modal-msg"></div>
        <div class="custom-modal-btn-group" id="custom-modal-buttons-area"></div>
    </div>
</div>

<script>
    const DEFAULT_START_DATE = "2026-07-09"; 
    const monthsData = [
        { name: "一月", start: 1, end: 31 }, { name: "二月", start: 32, end: 59 },
        { name: "三月", start: 60, end: 90 }, { name: "四月", start: 91, end: 120 },
        { name: "五月", start: 121, end: 151 }, { name: "六月", start: 152, end: 181 },
        { name: "七月", start: 182, end: 212 }, { name: "八月", start: 213, end: 243 },
        { name: "九月", start: 244, end: 273 }, { name: "十月", start: 274, end: 304 },
        { name: "十一月", start: 305, end: 334 }, { name: "十二月", start: 335, end: 365 }
    ];

    const LANG_DICTIONARY = {
        'zh-TW': {
            title: "✨ 祈星渡仁 — 萬用百變存錢大廳 ✨", lblCore: "⚙️ 儲蓄核心：", lblCustomAmt: "🔧 設定自訂面額：", btnApply: "套用",
            lblStartDate: "📅 起始日期：", lblTarget: "🎯 儲蓄目標", lblJournal: "📝 儲蓄流水手帳", lblExpand: "➕ 展開補帳與多人同步工具",
            lblBoxTitle: "🎲 幸運儲蓄盲盒抽獎", btnBoxDraw: "抽取今日驚喜任務",
            lblDashTotal: "目前已存總金額", lblDashDoneDay: "已完成天數", lblDashDoneWeek: "已完成週數", lblDashProg: "目前總進度",
            opt1: "🛡️ 365天防誤觸智慧手帳模式 [預設]", opt2: "💎 365天階梯存錢法 (經典自選)", opt3: "📊 萬用自訂固定金額法",
            opt4: "📈 52週階梯存錢法 (每週步道)", opt5: "💖 自由隨喜無壓力存錢法",
            boxWelcome: "🔮 歡迎來到【${name}】大廳<br><span style='font-size:0.8rem; font-weight:normal; opacity:0.7; margin-top:4px; display:inline-block;'>點擊下方按鈕，抽取今日專屬指引面額</span>",

    function startSpiritualBgmEngine() {
        if (!isBgmEnabled) { stopSpiritualBgmEngine(false); return; }
        try {
            if (!webAudioCtx) webAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (webAudioCtx.state === 'suspended') webAudioCtx.resume();
            if (mainBgmNode) return; 

            mainBgmNode = webAudioCtx.createGain();
            mainBgmNode.gain.setValueAtTime(0, webAudioCtx.currentTime);
            mainBgmNode.gain.linearRampToValueAtTime(0.06, webAudioCtx.currentTime + 1.5); 
            mainBgmNode.connect(webAudioCtx.destination);

            if (activeThemeKey === 'classic' || activeThemeKey === 'gospel') {
                const bufferSize = 2 * webAudioCtx.sampleRate;
                const noiseBuffer = webAudioCtx.createBuffer(1, bufferSize, webAudioCtx.sampleRate);
                const output = noiseBuffer.getChannelData(0);
                let b0=0, b1=0, b2=0, b3=0, b4=0, b5=0, b6=0;
                for (let i = 0; i < bufferSize; i++) {
                    const white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179; b1 = 0.99332 * b1 + white * 0.0750759; b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856; b4 = 0.55000 * b4 + white * 0.5329522; b5 = -0.7616 * b5 - white * 0.0168980;
                    output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362; output[i] *= 0.11; b6 = white * 0.115926;
                }
                const noiseSource = webAudioCtx.createBufferSource();
                noiseSource.buffer = noiseBuffer; noiseSource.loop = true;

                const filter = webAudioCtx.createBiquadFilter();
                filter.type = 'lowpass'; filter.frequency.setValueAtTime(350, webAudioCtx.currentTime);

                const lfo = webAudioCtx.createOscillator();
                lfo.frequency.setValueAtTime(0.12, webAudioCtx.currentTime); 
                const lfoGain = webAudioCtx.createGain();
                lfoGain.gain.setValueAtTime(220, webAudioCtx.currentTime);
                lfo.connect(lfoGain); lfoGain.connect(filter.frequency);

                noiseSource.connect(filter); filter.connect(mainBgmNode);
                lfo.start(); noiseSource.start();
                mainBgmNode.lfo = lfo; mainBgmNode.src = noiseSource;
            } else if (activeThemeKey === 'buddhism') {
                let tickCount = 0;
                const BuddhistTimer = setInterval(() => {
                    if (!isBgmEnabled || !mainBgmNode) { clearInterval(BuddhistTimer); return; }
                    tickCount++;
                    const osc = webAudioCtx.createOscillator();
                    const gain = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(tickCount % 4 === 0 ? 155 : 175, webAudioCtx.currentTime);
                    gain.gain.setValueAtTime(0.14, webAudioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 0.25);
                    osc.connect(gain); gain.connect(mainBgmNode);
                    osc.start(); osc.stop(webAudioCtx.currentTime + 0.25);

                    if (tickCount % 6 === 0) {
                        const bowlOsc = webAudioCtx.createOscillator();
                        const bowlGain = webAudioCtx.createGain();
                        bowlOsc.type = 'sine'; bowlOsc.frequency.setValueAtTime(380, webAudioCtx.currentTime);
                        bowlGain.gain.setValueAtTime(0.06, webAudioCtx.currentTime);
                        bowlGain.gain.exponentialRampToValueAtTime(0.001, webAudioCtx.currentTime + 2.5);
                        bowlOsc.connect(bowlGain); bowlGain.connect(mainBgmNode);
                        bowlOsc.start(); bowlOsc.stop(webAudioCtx.currentTime + 2.5);
                    }
                }, 950); 
                mainBgmNode.timer = BuddhistTimer;
            } else {
                const SummerTimer = setInterval(() => {
                    if (!isBgmEnabled || !mainBgmNode) { clearInterval(SummerTimer); return; }
                    const osc = webAudioCtx.createOscillator();
                    const gain = webAudioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(3400 + Math.random() * 600, webAudioCtx.currentTime);
                    gain.gain.setValueAtTime(0.004, webAudioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0, webAudioCtx.currentTime + 0.1);
                    osc.connect(gain); gain.connect(mainBgmNode);
                    osc.start(); osc.stop(webAudioCtx.currentTime + 0.1);
                }, 65);
                mainBgmNode.timer = SummerTimer;
            }
        } catch(e) { console.log(e); }
    }

        if (currentMode === '365_阶梯') { totalSaved = checkedDays365.reduce((a,b)=>a+b,0); daysCount = checkedDays365.length; }
        else if (currentMode === '365_journal') { totalSaved = journalListHistory.reduce((a,b)=>a+b.amount,0); daysCount = journalListHistory.length; }
        else if (currentMode === 'custom_fixed') { totalSaved = checkedDaysCustom.length * currentCustomFixedAmt; daysCount = checkedDaysCustom.length; }
        else if (currentMode === 'week_52') { totalSaved = checkedWeeks52.reduce((a,b)=>a+(b*10),0); daysCount = checkedWeeks52.length; maxUnits = 52; }
        else { for(let k in 隨喜Map)totalSaved+=隨喜Map[k]; daysCount = Object.keys(隨喜Map).length; }

        let pct = maxUnits > 0 ? ((daysCount/maxUnits)*100).toFixed(2) : 0;
        if(document.getElementById('total-saved')) document.getElementById('total-saved').innerText = `$${totalSaved.toLocaleString()}`;
        if(document.getElementById('days-count')) document.getElementById('days-count').innerText = `${daysCount} / ${maxUnits}`;
        if(document.getElementById('progress-percent')) document.getElementById('progress-percent').innerText = `${pct}%`;
        if(document.getElementById('dynamic-water-fluid')) document.getElementById('dynamic-water-fluid').style.width = `${pct}%`;
        
        setTimeout(() => {

    document.addEventListener('click', function() { if(isBgmEnabled) startSpiritualBgmEngine(); }, { once: false });

    changeLanguage(currentLang);
</script>
</body>
